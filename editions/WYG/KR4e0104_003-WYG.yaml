body:
  text: 古穣集巻三明李賢撰書與薛僉憲書一嘗竊以為天下之士無不可與為善者特以聖賢不世出而無有成就之者昔孔子不出則七十子終晦於當時程子不出則㳺楊諸公不顯於後世夫天下之士如七十子㳺楊諸公者未嘗無也惟其不遇聖賢故無以自立于世士之不幸無大於此昔羅仲素聞楊中立得伊洛之學遂不憚千里往學焉既三日驚汗浹背曰㡬虚過一生使仲素當時不遇中立未必能傳其道顯名後世嗚呼天下之士如仲素而不遇中立者多矣固知虚過一生而莫由也已其志可哀焉如某之不肖安敢自列於㳺楊諸公意者使得逰於程子之門雖不敢望㳺楊庶㡬於聖賢之道得聞萬分之一必不為程子所棄矣豈至如此而已雖然聖賢之生闗乎氣運以今之世觀之氣運可謂盛矣而未有聖賢者出豈方出而未顯亦雖有之而人不知若曰有之未必不知意者其方出而未顯也今天下之士有志於道學方出而未顯者豈閣下其人歟某幼時務農十八始入學乏良師友無所發明在學七年為有司催迫赴試不幸而中既而以公務至山西得見閣下議論淵源心竊自喜以為天假此遇使知造道之方也孟子曰我猶未免為鄉人也是則可憂也嗚呼孟子之不為鄉人亦明矣而憂之如是若夫中人以下之質設使其心如孟子則其憂當何如哉此某之所以大懼也然雖愚昩所擇亦明黙觀四方賢士大夫其於道學見之明求之切者無如閣下於是願逰其門冀無虚過一生惟閣下察此心憐此志引而進之倘不見阻自當質疑不敢怠不敢忽與薛僉憲書二向者不揣無狀輒敢請教於左右已而赧然恐懼待罪不意閣下矜其愚昩辱賜教墨示以造道之方於是斂袵起敬而披誦累日不能釋洎閣下來京幸欲相從冀聞咳唾之音奈拘於職務未及再㑹而閣下行矣付之悵然來喻謂讀書而不由其道不免買櫝還珠之弊僕初未之覺已而留意驗之身心開巻便覺與聖賢不相似始大慙懼乃知向日誦其書解其義未嘗求是道體之身心真無用之糟粕耳宜乎於聖賢之道無異於夢中𡨕𡨕茫茫莫知所之來喻謂但覺心身存履少有違理則一刻不能安其身若於道理不實見得烏能如是㒒之所以願承教者亦求如是而已竊惟先儒論求道之方非一端至言立身進步之要獨曰涵養須用敬進學則在致知又曰敬以直内義以方外及言所以用力之方則以中庸戒謹恐懼為持敬之本大學格物致知為明義之端此聖賢造道的實緊切工夫有志於學者舍此無所用其力也然惟豪傑之士雖無文王猶興若中人以下之資安能自振拔邪必得師友朝夕講明相觀而善如此琢磨十數年後萬一可望嗟夫欲學齊語一齊人教之衆楚人咻之雖日撻求之不可得况於楚咻之中無一齊人之教而求齊語得乎僕之所行有類於是且志又不能勝氣毎於經書讀未終篇已欠伸思睡縱强之不克是以一曝十寒卒無次第望於道理有豁然貫通處何由得哉然忠孝大節固不敢虧惟聖賢細膩工夫精義妙理見於行已接物之際決不能到非敢自棄也素無涵養思索講明之功實理不能得之於心故耳然非不知為已為人為義為利之分凢有動作欲體為已為義之真但不能灼見辨之不精毫釐少差忽不自知已墮於為人為利之域矣此僕之所以凜凜也敢不就有道而正之夫所貴乎君子者以其能成已成物也古之先儒莫不惓惓欲接引成就人不追既往不逆將來以是心至斯受之耳望閣下以是存心啟迪來學若夫人之斥咲乃世俗常態非所恐也來喻所謂熟讀聖賢諸書一字一義灼見下落體之身心繼以無倦自今以往敢不服膺僕之所以願逰其門不肯他適者以閣下見道分明故也伏惟察其志而教之幸甚擬上執政書生某謹齋沐再拜上書於大人先生閣下生惟閣下名重天下天下之士用與不用在閣下而士風之振與不振豈非閣下之責哉今天下之士奔競之習未止而廉退之節少見豈世道日降而人不復古歟亦上之人有以使然歟不能無疑於是也夫人材之盛衰係國家之安危士風所闗不其要乎此生之愚見獨敢以是為閣下一陳之然閣下盛徳大才博學篤行臨大事決大議不動聲色而措天下於泰山之安如韓魏公者固知後生小子淺識薄見安能有補於萬分之一其心以為古之君子不可得而見之矣幸而今之君子有如古之人者不得一接其言終身之恨也於是不揣無狀輒敢妄言瀆聽竊惟近代以來士風之盛莫宋若也原其所自亦上之人有以勵之耳昔王文正為相張師徳兩造其門文正遂薄之以為狀元及第但當静以守之彼尚如是則無階而入者當何如邪雖惜其才遂終身不用其所以抑奔競勵廉退之意深矣吾是以知宋之士風宜於此乎振之韓持國執政一官上書求知伊川先生曰大資居位却不求人反使人求已盖為不求者不與來求者與之遂致人如此其所以惜亷退惡奔競之意篤矣吾是以知宋之士風宜於此乎正之至若與一官者必固辭有一過者必求退居當道者初無戀位之心在下僚者率皆髙尚之士冝乎宋之人才有三代之風君子推本必當歸功於如二先正者生之所以惓惓於閣下亦欲如二先正之意以振士風使當世之士無愧於宋不勝至願冒犯左右恐懼待罪惟閣下察其志而恕之幸甚簡金尚書伏惟左右豪傑之才耿介之操求於古人中亦不多得以區區愚陋無似累䝉眷注思欲效誠獻忠於左右久矣今左右以國家安危為己任因邊城乏糧勞心竭慮為轉運計不欲費損國家前者朝覲官已運米十數萬石今又欲在京為商大户軍民之家定為則例運之以與冠帶盖為社稷大計出於不得已而為之者但衆人不察此心以為故欲為此損下之舉是以多生謗議謂古之大臣為國大計務在得人心凡有所費寧在虧官不肯損民恐失人心故也極知左右之心非不欲得人心也以為此等為商之家承平日久所積必厚然其間亦有消乏不似前日者今奉行之人又過於嚴察稍見其家房舍動用脩飾便謂有錢拘而報之不聽其訴只欲多報為功不知十無一二不窘者况此時四方人心離散者多居京師者又有此逼不無動揺其心所闗不小見說四方商賈聞知征稅有増多止而不來今被拘報者亦欲賣房散去夫京師者大衆也今為此舉則大衆日散不可不慮或曰左右所舉已行雖有諫說必不從也予謂此說甚非盖不忠於左右者云耳果事有不可即當切告未必不從况大徳寛宏何所不容輒敢以所聞不便者為獻望髙明熟察審處之答陳祭酒書晚生某再拜書復致政大司成陳老先生閣下區區曩者筮仕之日聞士林清議謂先生道徳隆重威儀尊嚴造就人材具有成法與宋之胡安定不相上下於是藏之胸中日切景慕及文斾至京區區羣衆中進見獲覩風采乃知果為天下第一流人物第以拘於官守弗克從逰為恨後凢來京區區未嘗不進見既而歸休人皆惜之以為斯文宗主未有接其芳躅者且先生為天下儒者師豈必出其門然後仰之况區區叨在搢紳之末今濫竽館閣於前輩師儒當伸問安之敬但多事匆匆弗克致書兹乃先枉教墨之賜感愧交集緬惟先生優㳺林下安養天和山色水光詩懐酒興天壤之樂無以代之欣羡欣羡區區株守如常不足為長者道専此奉復臨筆毣毣惟自愛前迓景福不宣答王仲宏都憲書鄉末賢書復都憲仲宏文契足下屢荷恵書匆匆弗克裁答兹者又承見惠云令子愛女已沒極陳悲哀之狀遂欲自毁求罷夫古之君子立心制行具載方册皆可師法試觀宋名臣言行録大抵知有國不知有家其心以為不如是不足以立功名事業於天地間如富弼使契丹家書至不開而去彼非不重骨肉之情盖事有重於此者故也且人之脩短自有定數君子當以理自遣子夏哭子䘮明見責於朋友先王制禮務合中道不可不及亦不可過也安有因子女之亡盡棄平生之志乎又云逺斥於此足下為都憲大臣巡撫重地切近京師正得時行道之秋逺斥二字實不相干顧乃取而納之於已誠所未喻朝廷以足下才智過人託以重寄今因子女之殤輒欲陳情來京弔恤愚見以為不可凡數次書來見足下之意不能無私情之累誠非鄉里所願望者而今而後足下宜盡改前慮一力勤勞王事用昭令名於無窮幸甚簡江西黄布政今科得一進士張元禎選為庶吉士入翰林讀書此子年方二十三四學問甚博識見甚髙立論出人意表行文筆力老徤一竒才也不易得不易得但聞其家㣲而且貧茲者告回畢姻本不欲放去留之進學過二三年然後成婚未晚也又憐此子所禀欠厚骨體甚弱况血氣未定之時婚事用遲為好第念其父命再四不可强留若到家畢姻後早令起程明年二月中望其到京且彼處得此子於左右亦有光也可留意照拂其來至囑至囑答國子監丞閻禹錫昨得足下書反覆披閱足見才識髙逺出於尋常萬萬比嘗痛恨自己立志不堅無所成就不免虚過一生得見足下篤志進學如此亦為幸矣故以書相勉且道理無窮雖古之聖賢亦未敢自以為足足下謂於道半明半暗未得打成一片而受用雖云謙辭盖亦自知之明有益求長進之意在於不言之表矣但謂向上一節無誰與講是以舌本久强教無所施詳味其言則向上一節惟足下自知更無一人可講可教者夫向上一節豈易知而天下之士豈易輕邪雖周程張朱造道之深何嘗自謂獨知向上一節遂謂天下之士不可與講而教無所施也况在已於向上一節或未能盡知而教人之具或未必無缺遽謂不可與講而無所施毋乃忽於自察乎且既自以為半明半暗是模範未備於已而謂教無所施可乎既自以為教無所施是師道已足乎已又何親炙於人而賴其資乎所引韓退之云莫為之前雖美而不彰莫為之後雖盛而不傳自謂不敢如此且退之與于襄陽書有所干求故發此相須之言以挾制之期於必聽豈聖賢道徳之言邪况於此書前後篤志進學之意亦不相類而足下引用其中誠所未喻夫以足下致書盡禮如此豈可輒於辭語之間洗垢索瘢誠愛足下之深務期造於醇正之地故耳幸弗以為狂耄而鄙外也及觀佳作數篇辭意髙古可喜但為文貴條暢只看晦庵草廬之文如行雲流水理明意到初無險礙讀之令人快然於心二儒詩文累牘可謂多言矣於道不惟無害而且有所發明更望足下取法焉與李叅政書近因陜西守臣奏薦左右為叅政専理糧儲朝廷特賜俞允可賀可賀予惟此任不比尋常正是立功名之秋比先年公専理此事聲價由是振起近來楊君専理此事行之亦自安静今左右代理其事功名在此一舉但念此時陜西非前日之比以邊陲言之北敵入邊日久糧儲費用已多以腹裏言之連年災傷人饑加以大軍供給人民疲困已極存活者不得力田逃竄者多未復業若又徴運糧草豈不愈加狼狽雖左右有猷有為勢必有不可遂者為之奈何以區區愚見當以撫安百姓為先若使人皆耕作百穀既登方可徴運如或不察下情惟欲所委事完不但兩不得濟慮恐別生事端矣望左右留心斟酌預為逺慮幸甚復張用瀚叅政書兹承恵書足見雅意但稱許大過且儗人必於其倫皐䕫周召聖人之徒也區區何人可比倫邪在他人亦不宜如此稱譽况足下鄉友之至厚者豈可發此過當之言而今而後但聞行已有乖繆者即規諫之可也且區區與足下同鄉同年出處相似素愛足下為人平易坦率雖兄弟骨肉不是過也昔足下由戸部轉吏部雖區區之意亦公道耳非有私也天順初足下乃為右職所薦平生節操反被少損區區亦知不由足下特此輩以相知自為功耳向若不由此輩薦之不遲數月必為公論所推一時郎署豈有出足下之右者由是而為卿佐孰得而議之足下今日居藩尚以古之君子自勉其仕途利鈍不必介懐安知今日之屈不為後日之伸乎非相知至厚言不及此區區居此亦甚危殆毎欲退休莫遂其願但日復一日惟冀不虧晚節耳餘不一一與叅議兄時榮書弟某書奉兄時榮左右向者聞兄在任處事或偏因此有書勸戒盖骨肉至親情不能已故耳若疏逺之人任其所為於已何干孟子曰有人於此越人彎弓而射之則已談笑而道之無他疏之也其兄彎弓而射之則已垂涕泣而道之無他戚之也兄乃不然弟之勸戒盖必不察此言耳既而聞被校事者奏發弟甚恐懼慮不可解一日因上召問别事畢言及此事遂䝉記兄之名似有輕減之意今又遭此曠蕩之恩脫然無事却因言官議論吏部考按年老還家致仕得以保全晚節何幸如之兄今回家優㳺暮景鄉園之樂寜有涯邪弟居此勢位亦甚危懼毎欲求退未遂所願待一二年再用懇辭㑹須見從也只此不悉辰下向熱惟冀自愛與山西鄭僉事書近者楊編脩送足下所寄一書并詩三首足見雅意且喜足下實授憲職但云有母見在意欲援京官例求封此固人子之至願有不可得遂者足下必欲遂此願則惑矣且母氏之榮雖在於此其奈勢之不便在足下惟當盡其職分之所當為耳若使是方學校大興士風丕振才猷見於行名聲昭於時足以慰母氏之心矣其榮孰甚焉况人事盡而天理得然則前所願者庸詎知其不終遂邪足下為是藩斯文領袖人才邪正係焉或差之毫釐即謬以千里可不慎歟來而不往在禮為非輒以是奉答惟足下裁之請劉主静學士為冠賔書僕之長子名璋年已長成粗知禮義茲欲加冠於其首顧惟冠禮者人道之始古人之所重也冠義所以將責成人之禮焉可不重歟然古禮筮賔後世無古之筮惟賢是擇以今觀之搢紳之間學問之博行義之篤孰有過於先生者故敢請先生為之願先生有以教之也卜在五月二十二日至期恭俟儻䝉惠然賁臨玉成其事感佩盛徳寜有既邪専書以達萬冀不外與友人姜貴憲書向聞足下遭内艱還家繼又聞途中遇鼔盆之憂第恨宦路逺隔不能致生蒭之奠惶愧曷已茲承惠書足見故舊之情且審克襄𦵏事慰懐慰懐今嵗朝廷恩典極寛下民想皆被澤區區自去嵗以來屢經危險謗議紛紛播傳四方足下豈不聞知但以剛中自守獨立不懼近日頗就安静此心惟欲天下蒼生皆得其所一身禍患非所恤也先正云為善為惡殃慶自各以其類至且天順年來區區所親見者善惡之報錙銖不爽自念本以凡庸冒居輔導之職雖無正君之效而濟民之心未嘗不切切焉然奸惡之徒恒欲加害卒不見遂以勢觀之如羣虎逐一羊萬無可脫之理豈料虎反自斃而羊尚存焉其故何哉盖善惡之報誠如古今所言不可誣也區區毎以盛滿為戒決意求退未䝉見允奈何奈何但着意保全晚節而已惟足下相知至厚故一告焉簡蕭司馬向者朝廷以左右叅賛機務深愜衆望且謂根本重地自此有托矣尋荷左右恵書歸功於區區不敢當不敢當但往時公道難行料左右平生之志未能盡展茲時可以行矣况代守備者不過醇謹之人中人之勢亦非昔比或有私情決不可從凡百興利除害撫恤軍民安靖地方之事皆在左右一人太平氣象先自根本之地卜之佇見功名事業由此益盛矣朋友之所願望者如此諒左右必能副之與趙都督書近聞獨石羽書交至即日必然内侵且京師每嵗費糧數百萬石以養軍士為何専在禦敵而已今嵗又有銀兩之賚俗語云養軍千日用在一朝今軍士不思平日費用朝廷錢糧一旦用之凡百所需又仰給於朝廷有不遂者輒生怨望盖由上之人不能申諭故也今兵士聞征悍敵其心皆怯有詐病以避之者曽無奮臂敢勇之士盖由將帥不能鼔舞振作故也若兵無銳氣望其遇敵取勝難矣欲造鹿角拒馬鎗釘板㨧撅絆馬繩皆非攻戰之具不過欲自衛其身而已况木鐵之費動以百十萬計雖定天下者恐亦無此費也惟足下熟籌之與劉顯孜都憲書近聞蘇松嘉湖常鎮諸郡多水禾稼無收人民饑窘且云賴有巡撫者在不然無所望也由此觀之則數郡百萬生靈之命係於左右一人正勞心焦思之時凡百救荒之政宜極力為之可也見說彼處在官錢糧積之亦多若能存活民命雖盡數給散亦可此事在左右一力主張儻以為官物不敢盡用以致人民餓莩流離亦左右之責昔富鄭公在青州活饑民五十餘萬自謂賢於中書令二十四考朱文公在浙所至多災民不聊生而救濟之術無所不至以理言之賢者所歴宜召和氣以事觀之必如此然後見仁人之用心也或者天災流行預擬斯人以全一方生民之命耳又聞蘇州知府得人數十年來纔一見焉今年天下多水未有甚於彼處京儲所供全出於此不有人民何由而得勉之勉之請吴與儉學士為冠賔書某再拜書奉學士吴老先生閣下僕之第二子玠年已長成粗知禮義茲欲加冠於其首竊惟冠禮者人道之始古人之所重也而後世忽焉區區忝在搢紳之末不忍以後世所忽者從而忽之於是勉求古人所重之意將責其為人子為人弟為人臣為人少者之禮行焉但古有筮賔之禮而今則無古人之筮顧惟擇其賢者為之今名公鉅卿不為少矣而儒行之髙未有過於先生者况先生有母夀踰九齡有子官為風憲一門福夀當世罕比故予輒敢敦請先生為賔不但有以教之而又藉其積善之效以勵之也卜在是嵗正月二十七日至期恭俟倘䝉不外惠然賁臨玉成其事則僕之父子所以感佩盛徳者誠無量也専書以達惟先生其亮之答汪敬主事書同榜百人所餘無㡬每一念及為之悵然惟年兄不戀戀於禄位其就職也最遲其休官也最早若以𡨕𡨕乗除之數度之而年兄優㳺林泉之樂冝方殷而未艾也若區區濫叨崇階無所建明既不能康濟天下又不得引退較之年兄孰得孰失此可為智者道也茲承惠書乃有徤羡區區之意足見友道愛厚而於鄙懐所存宜乎不暇悉焉及誦奔走衣食之言於心惻然且以杜少陵自况而無王叅録之濟者奈何奈何區區慨念同年之義特以俸禄之餘少助二五之數不必如叅録也繼今以後倘篤友道尚以區區所行缺失見告辰下漸熱惟自愛不宣古穰集巻三
