body:
  text: 古穰集卷十八明李賢撰墓志銘輔聖莊懿夫人藺氏墓志銘夫人姓藺氏山後興州人自幼聰淑為父母所鍾愛洪武三十六年年二十有六被選入掖庭勤慎小心容止端重宫闈之譽藹然歷永樂洪熙宣德正統奉宸侍御凡五十有九年不懈如一日亦未嘗有毫髮過舉而寬裕和柔之德著於上下纍朝眷注之隆莫與為比用是受封輔聖夫人天順四年閠十一月二十五日一疾而逝距生洪武九年四月二日享年八十有五訃聞皇上為之哀悼不能已六宫無不痛惜一日上召臣賢曰輔聖夫人實朕之保母卿須加意為諭祭文臣賢奉命惟謹翌日遣官行禮諡曰莊懿贈賻之儀悉從厚典復命有司營葬事以內臣一人掌喪中宫以下罔不弔祭其生榮死哀之盛可謂千載一時者矣夫人從子曰清以夫人貴特授錦衣衛正千戶卜以今年十二月某日窆於西山某地之原乞豫為銘納諸墓中豫以夫人之德之功何可以不銘銘曰猗嗟夫人負此秀質入侍宫庭威儀秩秩明明列聖咸用爾嘉曽不恃恩寅畏彌加保我聖躬益殫厥慮翼翼小心佳譽益著乃食其報既壽且康福祉駢集御事之光生榮死哀膺此異數匪人之為實天所付孰曰泉室而日暗然有銘在石昭千萬年夫人陳氏墓志銘天順二年冬十月宣府守臣武強伯楊公走書京師抵豫曰哀子能無似粗效犬馬之勞至有今日深惟母氏鞠育之恩祿不逮養抱此無涯之戚往者朝廷推恩已贈夫人兹欲為不朽之圖敢抒情素於大君子之門覬惠然以銘諸墓豫重其言而從之夫人姓陳氏世家陜西漢中父諱真漢中衛百戶母某氏封安人夫人性溫厚莊恪善女工自幼為父母鍾愛比長擇所宜配曰非佳士不可時名家子楊宗禮有鄉曲之譽以媒通焉遂受夫人於陳氏之廟而歸於正室夫人曰吾聞婦道之良惟孝敬勤儉而已自是事姑惟謹凡敦牟巵匜用不敢假與不敢私閨儀肅整不少怠紡績補綴不憚寒暑衣食自御不厭粗惡姑喜謂人曰自新婦入門吾心未嘗不樂也未幾姑喪哀毁幾絶歲時修祀如事其生子能初事家人産業夫人教之曰人生天地間不見用於時非男子也能自是從其伯父昌平侯洪立戰功朝廷嘉之纍官都督又自邊城用薦者入統京營兵天順改元皇上復位特命佩鎮朔將軍印鎮宣府威聲震懾與昌平相望遂膺爵封實夫人義方之所致也夫人之沒景泰辛未二月十四日距生洪武辛酉十一月十三日享年七十卜葬于京城坤隅釣魚臺之原朝廷賻祭之儀甚厚宗禮以能貴受封榮祿大夫都督同知子男一即能也女一適都指揮劉政孫男幾人女幾人銘曰猗嗟夫人漢中之秀榮祿之妻武強之母桓桓武強為國虎臣義方之訓孰如夫人生榮死哀匪幸之會我銘其藏百世無廢太宜人李氏墓志銘太宜人李氏諱道賢武略將軍溫州衛千戶某之女少保戶部尚書兼武英殿大學士黃文簡公淮之次室太常少卿采之母就養於京餘二十年忽一疾而殞采悲痛毁形來請葬銘豫重文簡公為先達采又從事館閣中銘不可辭按其鄉人主事鍾清狀太宜人父母蚤亡有內戚王夫人者憐其幼且孤而育之太宜人天性仁孝遵王氏壼範未嘗少怠而織絍剪刺之事皆習為之精於是二姓姻黨交口稱譽無間言時文簡公年四十無子大為宗祀懼思同里閈女在室者無如太宜人第慮其生嫌託親故察其意太宜人慨然曰吾孤苦存活得托君子之門幸矣母夫人聞之喜遂為公以禮納之正室夫人楊氏嚴而有法太宜人左右承順曲盡禮意嘗曰詩不云乎夙夜在公實命不同造物於人自有定分楊夫人聞其言愛重之由是閨門之內穆如也已而楊生二子太宜人生一子時人謂一門和氣所召凡楊所生子撫摩鞠育之勞悉屬太宜人公嘗罹患難十年時舅姑垂白在堂諸子皆幼復值歲凶太宜人相楊氏竭力治家不憚清苦滫髓之供未嘗缺乏用是舅姑安之公既遭遇位望日隆祿賜有餘太宜人儉素如昔雖有紈綺置之弗御平居溫恭不見厲色待宗族有恩馭童奴無叱吒聲尤惜物命不御魚肉惟蔬食終身子婦力勸曰幸得微祿足以奉養何乃自苦如此卒不聽曰吾厭彼而樂此何苦之有采以文翰起家自中書舍人歷太常少卿為吏部考功郎中時例得誥封其親制嫡母在者生母不得封朝廷以采之成器實母訓特賜誥封太宜人蓋優典也太宜人既以子貴心愈謙下或歸美之輒遜避曰有夫人楊氏在吾何敢當人益賢之卒天順己卯六月二十三日距生洪武乙丑三月十八日壽七十有五采扶柩南歸將以某年某月某日葬邑之德政鄉大羅山之原從夫兆也銘曰嗚呼宜人斯世之珍早失怙恃托身至親安分不矜恭侍君子淑慎在躬綏此福履有子言言克舉其官推恩錫命紫誥回鸞不墜家聲伊誰之力嗚呼宜人百世之式節婦封太孺人倪氏墓志銘南京倪氏本姑蘇著姓而女之出其門者惟孺人淑德為最盛孺人之父處士某讀書知禮母袁氏閨範甚肅孺人自幼聰慧父母口授以書輒能記憶克遵女戒未嘗少違尤精女工凡剪製之事不學而能以故父母特鍾愛之曰吾女性行如此豈可儷凡子邪同郡張處士名豫者早有行義重其鄉媒妁一通曰佳配也即許而歸之孺人既入張氏之門恪執婦道上下咸宜之處士自幸得內助焉閲八年處士以疾卒孺人時年二十有四痛絶復蘇重念舅姑年俱八帙二孤尚未成童將何依乎乃黽勉不死於是獨持門户經理生業躬自紡績不憚勞苦營甘旨以奉舅姑無異夫在時撫訓二子日以成立袁氏老而無依亦迎養焉朝夕承順顔色於三親之傍凡佳味暖帛均奉甚腆莫不各得其歡心人謂有子者弗能過也已而相繼以壽終孺人哀毁盡禮安厝得宜歲時奉祀尤謹宗族鄰里無不嘆服孺人初見其子益資性穎異意謂必能起家乃遣入京庠為弟子員節縮用度以供從師取友之費益乃奮志力學底于成遂領鄉薦登永樂乙未進士第擢中書舍人升大理評事受敕命推恩贈父如其官封母為太孺人有司以孺人守節無玷可厲風俗又上其事詔旌其門曰節婦久之益為翰林修撰進侍讀學士為講官知制誥大獲時譽鄉人咸曰微孺人之力不及此未幾益扈駕北巡死於難孺人聞之曰吾兒得死所矣吾何憾動履如常時優遊太平之世又十有五年而卒天順七年七月二十日也享壽八十有五生子二人長即益次曰晉孫男四人長曰䎘次曰􅀈中書舍人次曰翺次曰翔太學生孫女四人長適晉州知州鄒和次適鄉貢進士周宗次適中書舍人朱奎一幼在室曾孫男五人女二人卜以是年某月某日葬于某山之原􅀈奉孺人行狀乞豫銘銘曰嗚呼孺人為妻而宜為婦而孝為母而慈張氏之門孺人大之獨食其報匪天所私家山之原新塋是基我銘以貞千載弗隳贈文林郎監察御史韓君孺人徐氏合葬墓志銘天順改元之明年春朝廷大施曠典推恩臣下有父母七十之上者越例先封贈之因存以及其亡惟時監察御史韓槃有母與焉鄉人以為喜謂千載之一遇者不數日訃聞忽至槃不勝其慟鄉人又以為悲嗟夫浹旬之內倐喜倐悲如此人生於世其果無異於白駒之過隙矣乎槃抱哀捧親之狀踵豫舍以告曰不肖既失怙矣幸母氏之存方少伸祿養而又棄背實不能堪計惟不朽之圖在銘惟鄉先達有以惠之則存沒之感寧有既乎豫不能辭按狀槃之父諱昱字永輝世居彰德之安陽曾大父諱有昌隱居不仕大父諱性之仕元為萬戶父諱瓛洪武間用薦為隂陽正術生子四人永輝行第三少有大志以家素業儒因從鄉先生逰窮理之餘始為舉子學永樂庚子年踰弱冠遂領鄉薦中乙榜授陜西米脂縣學教諭其為教也嚴而有法弟子多所造就以宣德己酉三月十一日終于官距生洪武庚申某月某日得年三十有八生徒皆哭失聲為之心喪焉以槃故贈文林郎監察御史配徐氏為孺人孺人訓導伯詔之女自幼為親所鍾愛洎歸韓氏時姑嫜在堂孝養惟謹而待姻族禮意周洽稱之者無間言既孀居綜理家政撫育諸孤皆有道守節凡三十餘年方恩命及門而一疾逝矣實天順戊寅二月九日也距生洪武己巳十月十日享年七十子男二長曰榮嗣祖業為隂陽正術次曰槃雲南道監察御史女三長適卜林次適千戶張銘次適王英孫男四女七邑城之西孫平村之原其宅兆也槃將歸而合窆之銘曰師道之良宜壽之長胡彼善人中道而戕較之子淵歲已多六况其門墻顯有私淑越配之貞誓死靡更撫其遺孤而底于成惟理之常宜食其報數莫移兮徒爾增悼嗟嗟伉儷無慨于斯裕垂後人顯庸於時平村之原有封夏屋考石之銘喟然毣毣孺人西昌蕭氏墓表西昌大族有蕭氏焉今封翰林編修尹君之室孺人其裔也孺人曾大父斯萬大父安節父德晉皆隱士母王氏生孺人自幼淑慧善女工早失所怙母氏鍾愛之宗賢先生其外祖也嘉其不凡授以孝經烈女傳即能背誦通大意聞説古今人成敗善惡報應事暗記不遺暨笄乃擇配時同邑著姓尹氏子源有子奐重行義甚髙咸曰斯人非蕭女為配不可於是孺人歸焉即封君也時姑已早亡孺人至即能綜理家業凡取豫應酬悉有條理若素練者親族初以為年少至是咸驚異之子源先以薦入館閣預修永樂大典書成授福清河泊官便道過家賀客沓至倉卒應待饌具未嘗不精子源喜曰起吾家者必新婦也子源有子五人封君居行之四孺人處妯娌間善則推之咎則引之用是舉無乖戾視諸子姪均一無間季弟振重幼孤孺人為之娶室置産無一毫德色恆以不逮養姑為恨尤重親黨見貧乏者至輒衣食以賑之遇婢僕以恩義上下之間無有不得其歡者封君嘗坐纍臺院往來道途間十餘年孺人持守門戶卒賴以濟家業不至於衰平居志向勤儉浣縫之事雖老不倦所御之服雖弊不忍釋見子直頴秀延師教之日望其成得一異味必留之曰為吾兒奉師也洎直弱冠乃遣入邑庠遂登景泰甲戌進士第選入翰林為庶吉士擢編修天順己卯賜敕命孺人遂受今封初孺人就養京邸宿疾稍作及封君詣闕謝恩得團欒者數月孺人之疾不減乃偕南還就醫道次星子縣卒於舟中是歲十一月十二日也距生洪武庚辰二月十八日得壽六十子男一即直也女二人長適蕭仲升次適毛仲練孫男女各一人卜以其年十一月三十日葬邑之江背壠之上嗚呼孺人起尹氏之家可謂賢矣豫承乏翰長而直以簉屬相好故特表其墓以勸世之為人婦為人母者故妻贈夫人黃氏墓志銘故妻姓黃氏諱淑靜世為將家髙祖某曽祖某祖某俱某衛指揮僉事父某族之彥俊者母周氏生四女夫人其季也自幼性慧為父母鍾愛方四歲會豫於姑之家姑曰此良配也時以為戲言又數歲為宣德改元豫入郡庠為諸生擇婚未成壬子秋領鄉薦明年登進士第又明年始委禽於黃氏正統改元豫官吏部驗封主事明年豫父母聘夫人於家送至京邸居一歲生子一見而亡嗚呼悲哉豫入仕之初官况蕭然凡百所需未有不缺夫人既主中饋綜之理之不遑寧居清苦勤儉不數月間家用視前十增六七俾豫無內顧憂奈何命之不淑遂至失偶夫人不慮其死第顧豫度日之艱雖至彌留猶惓惓焉死之日正統二年三月某日也距生永樂八年某月某日得年二十有八子名鎖住乳婦四易而成甫四歲能誦古歌詩賓至即拜跪應對能典謁矣忽一疾而夭造物者於夫人母子亦何毒之甚邪又踰年歸夫人之櫬於鄧州為壙於城南之左依舅氏之阡夫人初贈安人再贈宜人再贈淑人今加贈夫人纍膺恩典光賁泉扃雖嗇於壽而淑德不泯為之銘曰修短不齊冥冥有定情不能堪付之於命百年瞬息曽莫之殊銘以藏之終古不渝志兒鎖住文兒鎖住李姓未有名賢之子也甫四歲以疾死賢由進士任吏部主事之明年家嚴與姊送黃氏于京師官舍為豫室丁巳之五月也明年三月十二日生兒母生兒未見即亡兒鞠于乳婦一周歲五易其氏矣豫既續周氏始克鞠兒于家漸能飲食再周歲頗能言悅人意俾豫不能怒稍又能拱揖跪拜客至必見教之詩誦數十篇舉止有老成態豫與婦鍾愛日加樂無既也三周之前十五日兒嬰疾便指腹向父母言若有憂色醫者三四更而藥不中證過周之七日兒疾亟視父母淚盈睚睫不能言又明日夜乃死嗚呼兒鎖住何遽去吾而死也汝生而母亡人皆謂汝異凡必能成立未四歲而性慧人又謂汝後必能承家豫亦自負如是嗚呼兒鎖住何遽去吾而死也死之旦具衾棺出化化之時始見其疾脾也脾之疾此地小兒多有能瘳者什伍兒鎖住治非其法竟以此亡嗚呼豫齒三十四矣止一兒又死獲何罪于天而報之如是或者命數適然天固不能短長於其間然情之所鍾孰能已豫之悲乎因志其函骨之處以記歲月云壙志奉天翊衛推誠宣力武臣特進光祿大夫柱國太平侯追封裕國公諡勇襄張公壙志公諱軏姓張氏河南開封之祥符人父榮國公玊是為河間忠武王母王氏河間王夫人長兄太師英國公輔是為定興忠烈王文安伯輗其仲兄也永樂中公以勛戚侍太宗皇帝授錦衣衛指揮僉事洪熙元年仁宗皇帝嗣位恩賚有加特升指揮同知宣德改元漢庶人作亂宣宗皇帝親率六師討平之公扈從有功賞豫甚厚仍給世襲誥命正統甲子今上以北敵未靖命成國公朱勇往征之公為前行首敗敵於白城復追至氊帽山敵悉衆來戰公奮擊之敵讋而潰斬馘甚衆凱還以功升指揮使又用薦升都指揮僉事典禁兵未幾復署僉前軍都督府事尋即真時麓川賊子思機發復為亂上命將往討以公副之既至分道並進一鼓就擒師還至荆州復命公移師貴州以討叛苖會景泰改元遣使詔還以麓川功升右都督總京營兵天順元年上居南宫公奉上聖皇太后敕符與太監曹吉祥忠國公石亨暨兄輗等協力擁戴迎上復位論功行賞進封公奉天翊衛推誠宣力武臣特進光祿大夫柱國太平侯食祿二千石賜以誥劵寵賚之厚莫與為比仍官子瑾為錦衣衛指揮同知是年冬公上疏曰臣犬馬之年六十有五筋力日衰乞解兵柄以全晚節上方倚公不允二年春公得疾上即命御醫往療屢遣中貴人視公賚與頻繁已而疾愈劇公復力疾上疏曰臣年命乖蹇藥不奏功旦夕待盡惟聖明為宗社生民計選賢任能以圖至治臣即瞑目地下矣他一無所請上覽之惻然復命公勉進藥餌以副眷念命下而公已卒是年三月十六日也距生洪武癸酉九月二十九日享壽六十有六訃聞上深哀悼素服罷朝斂日即遣官諭祭喪葬賻贈之儀悉從優等追封裕國公諡勇襄配劉氏繼吳氏俱封太平侯夫人生男一即瑾卜葬都城之南蘆溝橋之西從先兆也公儀貌雄偉負氣剛直以智略雄人視古之名將不多讓也其勛績行實之大者將刻銘神道而此特列其槩置玄堂云古穰集卷十八
