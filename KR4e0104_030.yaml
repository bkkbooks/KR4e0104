body:
  text: 古穰集卷三十明李賢撰雜録宣廟初思用舊人召蹇義等數人寵待之皆依違承順之不暇惟戶部尚書黃福持正不阿命觀戲曰臣性不好戲命圍棊曰臣不會著棊問何以不會曰臣幼時父師嚴只教讀書不學無益之事所以不會上意不樂居數日勑黃福年老不煩以政轉任南京戶部優間之實疏之也向使蹇夏諸公皆如此持正其勢未必盡疏之則君德可修天下可肥矣初文廟命學士解縉評大臣十人何如縉每用八字斷之首許黃福自餘互有得失人以為確論具載縉傳文貞於本朝為巨擘側於宋之公卿終有愧焉試以一二較之王文正以張師德兩造其門惡其奔競終身不用文貞必以造門者舉之甚至人舉所知自以為不知而沮之宜恬退自守者不出其門也文彥博以唐介攻已被謫再三申救後卒舉用文貞以攻己者為輕薄生事必欲黜之禁錮終身也與二公所行何相遠哉胡闕菴急流中勇退非有髙尚志實不欲居等輩下耳觀其在鄉猶倚當道友聲勢自尊宦其地者避之不較其於詩文有作即刋况又未至好處以此傳世果何益哉適自暴其淺深而已文廟過江時胡廣金幼孜黃淮胡儼解縉楊士竒周是修輩俱在朝惟是修具衣冠詣應天府學拜宣聖遺像畢自為贊繫於衣帶自縊於東廡下可謂從容就死者矣諸公初亦有約同死已而俱負約真有愧於死者後縉為志士竒為傳且謂其子曰當時吾亦同死誰與爾父作傳識者笑之諸公不死建文之難與唐之王圭魏徴無異後雖有功何足贖哉縉才獨髙使遇唐太宗其所論諫豈下於魏徵若留於仁宣時事業必有可觀者士竒輩遠不及也士竒晚年泥愛其子莫知其惡最為敗德事若藩臬郡邑或出巡者見其暴橫以實來告士竒反疑之必與子書曰某人説汝如此果然即改之子稷得書反毁其人曰某人在此如此行事男以鄉里故撓其所行以此誣之士竒自後不信言子之惡者有阿附譽子之善者即以為實然而喜之由是子之惡不復聞矣及被害者連奏其不善之狀朝廷猶不忍加之罪付其狀於士竒乃曰左右之人非良助之為不善也已而有奏其人命數十惡不可言朝廷不得已付之法司時士竒老病不能起朝廷猶慰安之恐致憂後嵗餘士竒終始論其子於法斬之鄉人預為祭文數其惡況天下傳誦髙廟亦難受諫翰林編修張姓者能直言至不能容黜為山西蒲州學正例慶賀撰表髙廟閲之識其名見其表詞有曰天下有道又曰萬夀無疆發怒曰此老還謗我以強道二字疑之即差人逮來引見曰送法司問汝更何説張曰臣有一言説畢就死陛下有旨表文不許杜撰務出經典臣謂天下有道乃先聖孔子之格言臣謂萬夀無疆乃詩經臣子祝君之至情今謂臣誹謗不過如此聞其説良久曰此老還嘴強放去竟不問左右相謂曰數年以來才見容此一人而已文廟過江之日初即位欲詔示天下問姚廣孝舉代草者曰必須方孝孺召之數次不來以勢逼之不得已孝孺持斬衰而行見文廟即命草詔乃舉聲大哭曰將何為辭勑左右禁其哭授以筆即投之地曰有死而已詔不可草文廟大怒以凌遲之刑刑之遂夷其族孝孺受業於宋景濓其文章滂沛議論波瀾類東坡之才而忠義之氣凛然不可犯景濓不能及也麓川初叛時沐晟尚在若彼時只遣人宣布朝廷恩威赦其罪撫安之未必不從遂輕動舉兵又不委晟而另遣將以致王師失利適王振操柄之初乃逞其忿閣下議謂遠夷不足較且為耕守計振不從且與兵部尚書王驥謀驥阿其意舉兵以驥督軍起東南兵十五萬給餉者倍之窮其巢穴而冦首任思發不可得焚寨而還殺無辜十數萬且以為功驥封靖遠伯以次升者萬餘未幾冦勢復盛驥再往起兵如前東南搔擾軍民罷敝始不可言復窮其所冦首亦不可得而還又有功升秩半前然麓川不如中國一大縣縱得其地與人有何利益而連嵗興兵軍需所費萬萬不可計而升秩之俸又萬萬不可計皆出於民以所得較所失誠不忍言兵連禍結致有今日人以驥為功之首不知為罪之魁也豫在驗封日南陽郡守陳正倫考績來見西老道及豫名西老欲一見陳公約豫偕造豫終不從自思此一見無他即是求知既而以事相關入閣問知其名因話良久未幾孔目以祭人之文呈見豫名嘆曰我不識此人冀豫一見竟不往與王文正惡人造門者不同也豫在學讀聖賢書知佛老為異端同類有挂其象者即斥其非以為名公巨儒決不如此後居驗封造冡宰宅見正寢東嚴整一室疑必家廟問之則曰佛堂也不覺駭嘆又以為文章名世者必不爾既而見石首先生庭中髙懸一幅視之乃觀音象也不覺失笑嗚呼人其人火其書果誰望邪平江伯陳豫以白金采幣之類求西楊為其父佐墓志西楊却之不許固請辭益堅不得乃減金幣三分之一求於東楊即納而為之稱許過實或見西楊曰以平江之父先生不為志何也曰汝安得知彼曽祖吾為墓碑雖未識其人以子封爵非積德之厚不能致吾按狀而發揚之必有實也彼祖吾復為之以委督漕運而有行實功績可紀所以發揚之若佐無可述者茍稱之過實非所以取信於後世也吾何以金帛為哉豫因思唐之張説愛姚崇之玩物而得之盛為稱許之辭於碑蓋有愧於西楊者也東楊天資明敏有果斷之才中官有事來閣下議必問曰東楊先生在否知不在即回凡議事未嘗不遜西楊或執古以斷不可行已而卒斷於東楊灼然可行而無礙也每秋勑文武大臣赴內臺審録重獄自英國公而下俱遜避俟二楊先生決之西楊訊之未嘗決至不可了東楊一問即決庶幾子路片言折獄之才衆皆嘆服文廟英武羣臣奏對少能稱旨惟愛東楊先生之才自編修同解縉胡廣等入閣議國政未嘗一日離左右凡大事密計必參與焉或與大臣謀事未決文廟不樂甚至發怒東楊一至輒霽威事亦隨決有濟人利物之仁而不忍却人之餽人以為愛錢文廟亦知之每遂其所欲蓋用人之仁去其貪也或鄉人來餽者必訪詢貧富何如若知其貧亦不却其餽但以别物與所餽相稱酬之若富者以十分為率亦答其一二或坐法乞救或在卑求薦必留意焉報者相繼而不厭也自五府六部都察院無不畏其威聽其説使百職不能持正亦由於此大抵居仕途者安能一向遂意蓋天有乘除之數默行乎其間早年得意晚必坎軻少年蹇滯老必通顯或首尾多難而中則安樂若東楊自入仕即得君無日不在寵榮之中者四十餘年歷事四朝曽無數日之恙生榮死哀始終全美不可以常數論也或者間氣所生而稟得完厚如此其輔理之功在文仁宣時亦尋常在正統數年天下休息頗有力焉至於格君心之非引之當道則槩乎未有聞也宣廟時二楊用事思天下之士不由已進退勑方面風憲郡守令在京三品以上官舉保且薄吏部尚書郭璡不學無術但以老成至此尋勑今後御史知縣許在京五品以上官舉保由是天下要職吏部不得除已而奔競之風大作以贓露者甚衆尋有以弊言者遂罷御史知縣舉保之例郡守以上仍舊出於二楊之門皆由其操去取之權也西楊雖偏而無私尤持公論當時天下方面頗亦得人正統六七年以後張太后崩二楊相繼而亡進退天下人才之權遂移於中官王振邪正倒植矣陳敬宗由翰林拜南京祭酒美鬚髯容儀端整步履有定則望之者起敬嘗會食諸生稍有失儀者即待罪不輕容也或有所稟嚴於對君之禮然待諸生少恩病者必以為詐務出而驗之因而亡者亦不恤也以故諸生一登仕途必遠之遇諸途若不識也徒悵恨而莫能自省對客善飲襄城伯重斯文或盛設延賔既罷必留敬宗再飲主至酩酊猶自儼然若未嘗飲者人皆服其量何文淵守溫州時亷靜寡欲一郡大治當時浙東守稱為第一既而召為刑部侍郎民有餽金者却之好事者為之立却金館在刑部雖有深刻意以尚書主之弗克遂人亦未之知也後以故乞病歸正統十四年朝廷多事士大夫交章乞起之召為吏部侍郎遂進尚書太子太保其於擢用人才之際詭譎之迹始露而居言路者不能容矣雖百計固位奈何攻之者衆目為姦邪暴其情狀終於斥去不能留矣向使病去不出作郡清名必然傳後不失為亷謹之人今也雖得髙爵而喪其美何足羡哉豫在銓司時或所見不當者必面執之不行以此見忌洎豫遷兵部若屬任其所行莫敢誰何竟至顛踣而後已工部尚書吳中奏對聲音宏亮丰姿篤厚望之者知是享爵祿之器貪財巨萬嬖妾數十人厥妻嚴正中憚之不敢犯宣廟知之嘗宴臣僚命伶人作懼內戲以笑之中雖愧而不能免也一日關誥迎於家其妻拜畢呼子弟曰將吳中一軸誥來宣之我聽問左右曰此誥詞是主上自言歟是翰林代草歟曰亦翰林代草也乃嘆曰翰林先生果不虛妄且吳中一篇誥文正説他平生為人何嘗有清亷二字中聞之雖恚強為笑容而已吏部侍郎洪璵接人疏慢好褒貶人以才學自負大言不慙自矜其髙初為主事督陜西邊稅而回見西楊學士大言其設施之法西楊不考其實異之薦為侍講與經筵洎吏部侍郎缺力薦璵衆知不可莫敢抗既入吏部驕矜愈甚士林咸惡之以西楊在不敢攻及西楊沒遂鬱鬱得病而卒士之行己當自卓立不可倚恃他人之勢一旦失其所倚遂至如此可為戒也户部尚書金濓初為御史有聲自永樂以來巡按廣東者滿載而歸自濓去一毫不取廣人至今德之在陕西臬司亦出色用是纍升副都御史邊儲賴以充足後歸京師奏對宏壯上偉之拜刑部尚書頗號深刻福建盜起遂參軍務往平之加太子太保遷户部然喜結權貴士林少之人以為姦則過矣但性猜忌利數求精務充國課商貨微矣民或困弊亦不暇恤焉所學亦正言論風采動人接下多暴怒僚屬不能堪大抵亦豪傑之士也工部尚書周忱江西人初蘇松一帶稅糧有五六年未完者朝廷遣官催促相繼終未能完遂舉忱為侍郎往任之忱為人謙恭言若不出諸口謀慮深長一切破崖岸為之虛心訪問兼採衆論不一二年纍欠之數皆完羡餘之積日見充濫小民賴以振恤嵗凶無慮嵗輸京師之米甲於諸省朝廷每勞其能亦善於附勢中官王振極重之宦遊其地者無虛日人人得其所欲釋子見造者必往求之所獲必過望然自出粟千石旌其門又令子納馬得官士林以此少之山東參政鐵鉉初為五軍斷事奏對詳明髙廟喜之字之曰鼎石凡法司有疑獄未決者必屬鉉而成文廟潛邸時有訴違法狀者召至屬法司問之數日獄未成髙廟怒屬鉉鞫之片時而成以此益愛之未幾擢山東參政文廟兵至城不下圍之月餘亦不得時城有攻破者隨完之以計詐開門降用板候其入下之幾中其計後而出戰文廟被其窘甚知不能克乃棄去及過江登位用計擒至正言不屈令其一顧終不可得去其耳鼻亦不顧碎分其體至死詈聲方已後思忠烈不可撓者惟鉉一人而已平氏有愧焉張太后崩王振始㺯權正統某年雷擊奉天門殿鴟吻勑羣臣言得失翰林侍講劉球上言十事一言主上宜親政務權不可移於下振覽之怒以錦衣衛指揮馬順為爪牙令以他事牽之陛前捽去球不知所謂見刑但曰死訴太祖太宗遂支解其體自是人緘口不敢言球魂附順子數順之罪順頗不安命緇流誦經度之振既得權喜人趨附廷臣初不知數以微譴見謫始懼兵部尚書徐禧工部侍郎王佑憸邪小人首開趨附之路百計效勤極盡諂媚之態遂宣言於衆曰吾輩以某物相送振大喜以為敬已待之甚厚且言振意不進見致禮者為慢已必得禍衆聞知益懼皆具禮進見從此以為常初惟府部院寺大臣以後百執事俱行之在外方靣俱見之當朝覲日大開其門郡邑庶職能具禮者無不進見以百金為尋常重至千兩者始得一飽一醉而出由是以亷者為拙以貪者為能被其容接者若登龍門上下交征利如水去堤防勢不可止君子付之太息而已宣德間吏部官屬多因請託而得蓋以承平之世官於此者享富貴尊榮人所羡慕故也正統初豫以進士選驗封主事人以為異初不知者疑其必有為之先容者已而察知出於公道方審選時尚書郭璡侍郎鄭誠命豫作詩以嘉禾為題豫作七言八句一詩亦不知其何如也既又查在户部觀政訪豫平日為人如何豫不知也命下之日豫方悟其作詩之意有在但以孤寒之士與富貴氣象之人並處雖不相類豫惟敬慎自持彼亦不敢慢焉文選郎中吳敬自重自髙闔部官僚莫敢與之抗禮而效勤諂事者皆然豫惟以正道接之不諂不慢久之反重豫為人而見許焉豫同司員外李源凡百專取利豫見其勢不可與較惟閉門看書而已源恣氣乘之豫處之安然已而勢去却相親厚豫亦處之如常豫每自謂未必於已無益也蓋他山之石可以攻玉自可有動心忍性之意且因此以豫為好學而有手不失卷之稱正孟子所謂不虞之譽也宣德初學士楊士竒輩以方面大職亦任吏部自舉未盡得人乃令在京三品以上官各舉所知當時以為美事行之既久公道者少時人有拜官公朝受恩私室之譏景泰初遂罷此例仍從吏部自擢時豫在銓選乃將六部郎署年深者第其才之髙下為一帖御史為一帖給事中為一帖南京者附之方面有缺持此帖於尚書王直前斟酌用之將盡復增之方其推用之時人皆不知命下令人傳報彼方驚喜正謂各官舉時有九年將滿者以其自守不求知於人恥為奔競至此不得已而亦造人之門况其素行奔競者會舉方退其所舉之人已預知之不待命下而職位地方無不曉悉且又不論所舉之人才能髙下但以舉主官大列名在前者其所舉之人官亦大以此輿論不平及吏部自擢較短量長多愜輿論然各舉所知本是良法若皆存薦賢為國之心豈有不善但各出於私情反不若吏部自擢雖不能盡知其人却出於公道故也景泰時少保于謙在兵部侍郎項文曜附之內議患其黨比欲因事以開别用持正者佐之會豫被薦遂轉兵部遷文曜於吏部復附何文淵言官劾其憸邪賴于謙力保存之已而謙敗文曜卒見斥謫當時以文曜為于謙妾士林非笑之每朝待漏時文曜必附謙耳密言不顧左右相視及退朝亦然行坐不離既在吏部亦如是王直先生一儒者于謙初甚尊敬之已而被文曜譖毁以為無用腐儒謙遂慢之謙初嘗謂豫曰東王老先生君子儒也可敬可愛每經筵之宴得連坐必與之相勸多飲數杯及文曜轉吏部之後忽謂豫曰吏部老者如何不告歸豫曰告幾次矣朝廷不允謙曰第無實意耳豫曰觀其意亦實謙曰果有實意病卧不起一兩月必放歸矣豫謂老先生至誠使之假卧必不肯為後漸聞其所譖之言方知謙之不敬王先生乃由此耳當時文曜亦有代為之意謙蓋知之未遂其謀也天順初衆議薦豫入內閣翰林黃諫即來見豫曰恭喜先生入閣豫曰此何喜也諫曰何謂不喜豫曰昔冦凖問王嘉祐外議如何對云丈人早晚入相以我觀之不如不相之愈也凖曰如何曰文人負天下之望即入相天下以太平責之丈人自料君臣寧若魚之有水乎凖深服之以為髙見遠識今雖無相猶以入閣為內相時事如此入閣何為未見其可喜也翰林院實儒紳所居非雜流可與景泰間陳循輩各舉所私非進士出身者十將四五率皆委靡昏鈍浮薄之流無由而退因上欲將通志重修頒行惟擇進士出身者此輩自知不可居此托闔院達其意願補外職賢乃言於上命吏部除之因其才而髙下其秩無不自遂翰林於是為之一清初景泰不豫圖富貴者因起異謀學士王文與太監王誠謀欲取襄王之子立為東宫其事漸泄既而景泰疾亟太監興安諷羣臣請復立東宫僉謂上皇子固宜復之惟王文之意不在此閣下陳循輩亦知之賢因會議問學士蕭鎡乃曰既退不可再賢始覺其有異謀也文又對衆曰今只請立東宫安知朝廷之意在誰賢益知其必然明日早觀奏辭曰早選元良人皆曰此非復立之意遂駕其説於石亨輩曰王文于謙已遣人賫金牌勑符取襄王世子去矣即於十七日早帶兵入朝詣南城請上皇復位是時景泰不朝已四日矣先一二日又駕其説於石亨輩云景泰命太監張永等拿亨數人掌兵者其謀立上皇中官吉祥蔣冕輩白于太后寫勑旨與亨輩成此事遂以王文輩為大逆姦惡然王文初謀于謙輩未必知亨輩不過因于謙平日為總督軍務一切兵政專而行之亨不得遂其所私乃乘此機而除之其餘皆因平日不足者而中傷之未必皆知王文之初謀也况王文之謀其實未發所以誅戮者多非其罪乃曰臣等捨命舉此大事以為有社稷之功上亦信之極其報典之隆而亨等遂招權納賂擅作威福冒濫官爵恣情妄為勢焰赫然天下寒心初徐有貞亦與迎駕之謀特命入閣有貞以陳循輩在前不得自專乃助亨除去循輩未幾有貞亦為亨所嫉而出之人以為天道好還不意亨復遭烈禍益見天道之好還矣景泰欲易太子恐文武大臣不從先啖其左右於閣下諸學士各賜金五十兩銀倍之陳循輩惟知感惠遂以太子為可易於是假以外僚陳奏請易太子乃會文武羣臣議其可否有執以為不可者即以利害怵之無一人敢異辭於是擇日立之即以宫僚美秩付之閣下任其所取文武大臣與者十七八自公孤而下數十人為太保者十人名爵之濫一至於此惟賢等侍郎四五人不與一易之後人情悵然不平貪其利者揚揚自以為榮幸不知識者已知其非善後之計已而天道一還盡革無遺因而譴謫者亦多回視不與者反有愧焉榮辱相尋如此士之立身不可不審也景泰初豫進正本十䇿且乞留中朝夕省覽少助身心之學不省竟發出越數日户科給事中李侃因災異上言近日李某所言有關聖躬略不省覽無恐懼修德之實災異疊見殆由於此覽此奏却將豫奏疏取入謄寫一本觀看禮部尚書楊寧見之嘆息一日見豫曰吾讀崇節儉一事殆欲下淚乃逐條為前件以為當留意行之本部尚書何文淵聞之求稿一看曰忠鯁之言也少保豫謙見之曰人所難言者南京祭酒陳敬宗曰聞其題目知為至論矣後頒君鑒於羣臣豫復採二十二君善行每君不過三四事最切要者乞體而行之景泰覽之亦不省曰此奏欲何為中官王誠曰欲上學此數君耳乃頷之但流於荒淫不復介意士大夫行已交人不可不慎若徐有貞素行持公者少而所交者亦然及其當道豫輩持公以助之有貞遂改前轍不復徇私其所交者猶以平昔素情望之多拂其意遂以有貞為改常從而媒孽其短者甚衆向使素持公道豈有此乎古穰集卷三十
