body:
  text: 古穰集卷一明李賢撰奏議論誥敕狀臣聞誥敕者勸善懲惡之良法激厲名節之美事夫豈無益之費哉洪惟國朝制諸司職掌於誥敕一事至詳且備可為萬世法程凡大小之臣有私過者終身不得無私過者方許請給既與之後少有私過輒行追奪於是為官者未得之前兢兢小心既得之後益加謹慎馭士之方惟此為要此事一行則天下之士莫不感激去惡為善修身飭行顧惜名節是以所費者少所勸者多若此法不行則士皆失望善惡不分名節不振其有亷潔自守者反為闕於利途民之被害可勝言哉是朝廷所惜者寡而下民所傷者衆臣竊痛之然此事非但勸夫在位之士其未入仕者見己仕者蒙此恩榮推及父母光耀鄉里莫不爭自琢磨奮志經史明體適用竭才殫智願為國家之用矣譬之以餌致魚則投餌之費小得魚之利大有國家者豈可舍此而不為哉我國朝自洪武永樂以來此法雖行而未盛至洪熙宣德以來始大舉行於是天下之士鼓舞歡欣無不感激逮皇上即位以來率由舊章近者行在吏部欽奉旨意今後誥敕俱待九年考滿方與不許照諸司職掌施行臣愚不審聖意所在若以為織造費財則臣已言之於前謂所費者少而所利者多若以為各官得之易而多不保守旋復追奪則臣所目見保守者什九追奪者什一况中人之材可為善可為惡授職三年即得誥敕不勝榮幸遂革非向善戰兢保守而為端正之士若待九年則此輩必不持久遂流於貪况九年方與得給者十無二三不得給者十常八九何哉凡內外官員九年之中多不能齊有歷任四五年而轉遷者有歷任六七年而保升者有父母垂老而不能待者有已身多故而不遂請者如此則天下之士感激者少怠志者多使國家勸善懲惡之法激厲名節之事無所於藉而下民亦未能不被其害伏願皇上留意守祖宗之成憲遵先帝之良法昭曠典布宏澤乞敕所司今後誥敕仍照諸司職掌施行在京官員三年考滿依例請給在外官員三年與本身六年請封贈如此則天下之士善不患不勸惡不患不懲名節不患不振下民不患不安矣臣為驗封主事職頒誥敕既有所見豈敢隱默若以避嫌而不言則為不忠若以所掌而自言則為要名臣寧受要名之責不蹈不忠之罪故陳愚悃干冒天威不勝戰栗之至論太學狀竊惟太學者天下貢士所萃乃育賢成材之地故天下之士所以賢所以材胥此焉出賢材所以盛所以衰胥此焉係然則生民之休戚風俗之美惡國家之安危豈不皆關於此哉洪惟太祖髙皇帝聖神文武平一天下定鼎金陵首崇是道方是之時宫殿城池未盡完也百府諸司未盡創也佛寺道觀未盡興也乃建太學於國都宏其規模極其壯麗凡所以教士之法戒士之條居士之所養士之具無不詳審周密完備又慮表率之職實難其人務選天下學明行修德尊望重海內所向慕士夫所依歸足以師表一代名蓋當時者然後命為祭酒崇以師道以振文風以增士氣其愛惜諸生如慈母之顧嬰兒貴之若席上之􅎇恩惠極隆無以加尚於是天下之士入太學者居無不正習無不端衣無不具食無不足無飢寒之亂心無邪僻之墮行其所事者治禮義明人倫窮修已治人之方務致君澤民之術故當時賢才俊傑之士濟濟輩出布列中外大綱一正萬目畢張自古太平之盛未能或之先也易曰聖人養賢以及萬民其斯之謂歟永樂初年駕臨北京太學之設因元之舊凡百規制未暇增新洪熙宣德以來因仍未舉至其教戒居養之道頽然廢弛不遑介意師儒之職率皆庸常學行荒疏無所矜式雖有遺規不過承虛名為文具踵因循應故事而已於是天下之士入太學者蔑教戒之嚴無居養之正置禮義為外物輕亷耻如錙銖雜處於軍民之家渾住於營巷之地與市井之人為伍與無藉之徒相接同其室而共其食啖其夫而私其婦易君子之操為鄙夫之行改士夫之莭為穿窬之心所習如此一旦居官不過志於富貴而已尚何望其尊主庇民建功立業乎夫近朱者赤近墨者黑居處所致無怪其然也嗚呼天下之士修之於庠序而壞之於太學賈誼所謂可為太息者也今陛下春秋鼎盛纘成大統凡一舉措不可不慎舉所當舉則天下之人莫不歡心措非當措則天下之人聞之體解可不慎歟我國家建都北京以來有廢弛而不舉者有創新而不措者所廢弛者莫甚於太學所創新者莫多於佛寺舉措如是臣以為舛矣然成事不説廢者當舉若重修太學雖極壯麗亦不過佛寺一所之費況佛寺無益於朝廷而太學實關於治體伏願皇上興廢舉墜乞敕該部計料興工一新太學作養秀才重選師儒厚加眷注果能此道將見數年之後賢才濟濟文風大振生民於是乎安天下於是乎治我太祖養賢及民之效復見於今日太平之盛不期自至而國家社稷永享無窮之福矣臣性質凡陋無所知識偶有所見豈敢隱默冒干天聽不勝惶汗之至上中興正本䇿臣伏惟陛下即位之初大開言路凡朝政之闕遺有司之利病生民之休戚軍務之得失中外進言者論之詳矣若夫關於陛下躬行窮理正心修己治人之道則或略焉此臣區區犬馬之忠私竊過慮以為陛下一身乃家國天下之本也而陛下之心又一身之本也夫正其本萬事理惟陛下之心既正則家國天下之事可得而理矣臣所以忘其愚陋獻此中興正本策其目有十焉一曰勤聖學二曰顧針警三曰戒嗜欲四曰絶玩好五曰慎舉措六曰崇節儉七曰畏天變八曰勉貴近九曰振士風十曰結民心夫勤聖學者所以格物窮理也顧針警者所以誠意正心也戒嗜欲以至結民心者所以修身治人之道也皆切於陛下躬行之事不係各司舉行者伏乞留中萬機之暇時賜省覽於陛下身心未必無少補焉且陛下春秋鼎盛初登寶位天命之眷顧方新人心之向慕方切當端本正始之日適乘勢有為之時求其所謂要道先務今日最急而不可緩者在此十策夫十策既舉則大本正矣天下之事可以次第而推行之不難矣由是明是非以行賞罰辨邪正以用人材抗公道以振紀綱節財用以固邦本勵將帥以作士氣修政事以重邊防開壅蔽以通下情敬大臣以資治道特皆陛下之餘事耳伏望聖明深加察納果斷力行以幸天下以光祖宗以慰生靈延頸舉踵之望以追前代英君義辟之蹤蓋陛下之責必如是而後塞嗟夫言之逆耳者惟聖君乃能聽事之難言者非忠臣不能言故曰責難於君謂之恭陳善蔽邪謂之敬昔宋儒朱熹將上殿奏事或謂正心誠意之説上所厭聞熹曰吾平生所得惟此四字豈忍不言而欺吾君乎此人臣以道事君貴乎有犯無隱也臣觀陛下即位以來雖疏逺之臣芻蕘之賤皆得效忠况臣職居郎署日近清光噤默不言可謂忠乎雖然噤默不言者臣之罪也言之不用者亦臣之罪也何者陛下有聰明之資有溫恭之德有寬仁之度有納諫之美臣下有言而不用非拒之也蓋以所言未必剴切當帝心者或無誠意感動故也故曰言之不用者亦臣之罪也倘陛下不以臣卑鄙猥言或有可取舉而行之將見功業煥然必出於尋常萬萬豈但臣之受賜而己實社稷蒼生之大幸也臣不勝惓惓螻蟻之誠罔知忌諱昧死進言冒干天威無任激切悚懼之至一曰勤聖學臣觀自古聖賢之君率皆留心於務學曰人心惟危道心惟微惟精惟一允執厥中此堯舜禹相傳之學也曰以義制事以禮制心成湯之學也曰終始惟一時乃日新太甲之學也曰惟學遜志務時敏厥修乃來髙宗之學也曰克厥宅心文王之學也訪於洪範丹書武王之學也曰日就月將學有緝熙于光明成王之學也若夫漢唐宋之君或講論經理夜分乃寐或執業尊師升堂講説或鋭情經術夜艾不休或留意典墳採為龜鑑或進陸贄奏議或覽貞觀政要不以炎暑而輟經筵不以風雨而罷講讀雖無唐虞三代正心誠意之功亦可謂後世好學之賢君較之懵然不學而昏亂者不啻天淵之相逺矣伏願陛下歷觀前代聖賢之君所好者何學所學者何事不但口耳之粗迹務考義理之奧旨必専心以致志不一暴而十寒以正心修身為要務以居敬存誠為大本帝王之學既有所得應事接物無或不當異日嘉靖邦國巍然為中興之令主未必不由好學致之也伏願聖明留意二曰顧針警臣聞前代聖賢之君必賴針規警戒之助然後此心不敢怠忽常存敬畏庶幾無過舉焉若成湯之聖而猶銘其沐浴之盤以自新武王之聖而亦銘其席杖楹牖以自戒衛武公在輿有旅賁之規位寧有官師之典倚几有訓誦之諫居寢有􅉏御之針魯廟有欹器而寓持滿之戒稷廟有金人而存緘口之銘無逸一篇列於講閣前代遺迹寫為鑑圖書洪範之語於座屏書孟子之言於屏障此皆宋之令主也由是觀之前代聖賢之君以警戒為龜鑑以宴安為鴆毒內外交養而表裏俱修是以君德日隆多福自至其餘不知警戒雖有忠臣進獻針銘視為虛文略不省覽是以流連荒亡盤樂怠傲自求其禍以致敗亂者往往皆然伏願陛下法前代聖賢之君存針規警戒之助托往事之明鑑採古人之格言或施之障屛或設之殿壁出入起居常目必在退朝燕處此心不忘于以防過於未然于以禁欲於將萌如此則意無不誠心無不正身由是而修天下由是而治將無愧於古之聖帝明王矣惟聖明其深念之三曰戒嗜欲臣觀自古聖賢之君未嘗不以嗜欲為戒益之戒舜曰罔逰於逸罔淫於樂皋陶之戒舜曰無教逸欲有邦仲虺作誥以戒成湯曰惟王不邇聲色不殖貨利用人惟已改過不吝伊尹述訓以戒太甲曰敢有恆舞于宫酣歌于室時謂巫風敢有殉于貨色恆于逰畋時謂淫風召公之戒武王曰玩人喪德玩物喪志不矜細行終纍大德周公之戒成王曰無淫于觀于逸于逰于田以萬民惟正之供張藴古作大寶針戒唐太宗曰樂不可極樂極生哀欲不可縱縱欲成災范祖禹講五子歌戒宋哲宗曰內作色荒外作禽荒甘酒嗜音峻宇雕牆有一于此未或不亡此前代聖賢之君能受人臣之戒而不敢流於嗜欲當時天下之治不可尚也若夫昏暗之主雖有忠臣進戒拒而不納逸樂怠荒以致天下之亂者多矣夫宴樂乃害心之鴆毒酒色實伐性之斧斤伏望陛下以前代聖賢之君為法絶去嗜欲之私養其清明之德以斯民未被其澤為憂以天下未得其寧為念講周孔之遺編考帝王之治道務成中興之業以慰祖宗之心則社稷幸甚蒼生幸甚四曰絶玩好臣惟人主一心攻之者甚衆不能為玩好所惑者寡矣是以古之聖賢之君常有所警珠玉犬馬珍禽竒獸一切玩好之物悉皆罷去此心湛然虛明淵靜故召公恐武王受西旅之獒曰不役耳目百度惟貞蓋謂心無所主反為耳目所使若心得其職則百度無不正矣必欲心得其職非從事於學不可也夫一心無兩用既能専於此必不牽於彼伏乞陛下於內侍之中擇讀書知義者四五人置諸左右外聽儒臣講論經史內與左右解説其義心通性恱日新月盛聰明益長智慮益髙靜觀左右之人或以玩好之物來陳者必嚴以斥之曰爾以聖明之君待其主邪以庸暗之君待其主邪夫以聖明之君待其主者必以堯舜之道陳之以開陛下之心胸此忠臣也以庸暗之君待其主者必以玩好之物陳之以惑陛下之耳目此姦臣也歷觀前代未有明君而不法堯舜之道者未有昏君而不溺玩好之物者惟陛下留心省察果能務學而絶玩好則行無不謹身無不修宗社自固生民自安不患不為大明令主而中興之業不成者臣未之信也五曰慎舉措臣惟人君之舉措不可不慎也書曰惟皇作極蓋謂人君一身立至極之標凖而天下四方之人環顧而取法焉舉措一失其當則逺近之人得以窺探其好尚之偏可不懼哉記曰王前巫而後史卜筮瞽侑皆在左右王中心無為也以守至正又曰虞夏商周有師保有疑丞設四輔及三公皆所以防君之過舉也昔周成王削桐葉為圭以與叔虞曰封汝史佚請擇日王曰戲也史佚曰天子無戲言言則史書之至於漢唐宋之君皆有起居注之職有失即告有過必録蓋亦嚴於自防矣是以古之明主愛一嚬一笑夫一嚬一笑尚不可輕發况見諸行事一舉一措豈可輕動哉伏願陛下試加留意一日之間舉一事也必再思之果當於理然後行焉措一事也必更審之或乖於理而即止焉又望陛下內則告夫貴近之臣外則勉夫輔導之職若髙宗之命傳説曰朝夕納誨以輔台德又曰爾交修豫罔豫棄豫惟克邁乃訓夫人君既以伊傅周召望其臣則人臣必以堯舜湯武致其君由是君臣一體志同道合而陛下之舉措無有不得其當矣六曰崇節儉臣觀自古聖賢之君未有不崇節儉者若帝堯茅茨不剪土階三尺大禹絶旨酒菲飲食卑宫室惡衣服文王卑服即康功田功當時雍熙泰和之治不可尚矣漢文帝欲作露臺不忍百金之費身衣弋綈席用莞蒲所幸夫人衣不曳地唐太宗出宫女三千欲營一殿材用巳具鑒秦而止嘗曰欲盛則費廣賦重則民愁以此思之不敢縱欲宋仁宗夜思燒羊忍飢而不索恐自此多傷物命見宫人首飾珍珠遮目不觀惡其奢費器用止於漆素食裯止於黃絁漢唐宋各有天下數百年求其海內富庶無如三君之時蓋人君既以節儉存心臣下豈敢奢侈相尚自然家給人足也况今天下多事之秋工部光祿寺諸司諸色買辦倍於前日近因賊冦驚擾人民尚未寧息伏望陛下躬行節儉凡內府一應服食器用必須究查今日之費比之先朝果減省乎果增多乎務用減省以蘇民力則天下幸甚七曰畏天變臣聞天心仁愛人君必出災異以譴告之為人君者務求天意所在而存修省之誠可以變災為祥轉禍為福也昔商之中宗有桑榖並生於朝恐懼修德而天意即回髙宗有飛雉鳴于鼎耳克正厥事而王業再振宋之太宗避殿減膳而東井彗滅詔欲自焚而雨得蝗死仁宗霖雨為沴而引咎格天久旱不雨而密禱即應是四君者俱能上感天心變災為祥遂享靈長之福以成中興之治往嵗以來山崩河改地動殿災蝗旱相仍天象交變譴告之意可謂至矣當時若能廢出姦邪任用忠良克己自新以答天譴未必不轉禍為福也惟其修省未至是以不免於難由是觀之災異之見何代無之顧人君修省何如耳且匹夫一念之誠尚能動天况人君精誠所感其應尤速伏願陛下修德正事以承天心凡欽天監并各處奏來災異之變必早夜思省以回天意凛然敬畏以弭災變將見天人感應之速未必不如商之中宗髙宗宋之太宗仁宗也于以為守成之令主于以致中興之盛治功烈卓然萬世標凖豈不美哉臣區區螻蟻之誠所願望者如此惟聖明留心幸甚八曰勉貴近臣觀前代中官正直忠良有功於國家者不為無人若漢唐之世史遊良賀吕劉馬嚴或勤心納忠有所裨益或清儉退守無所引薦或清忠奉公直言切諫或排去姦邪委政廟堂或以一身扞人主之難或辭兩軍抗冥鴻之志千載之下仰其芬烈視彼招權撓政賣弄威福取快一時不旋踵而遭大僇者一薰一蕕相去逺矣今陛下左右內侍之臣大非前日之比率皆小心畏謹恪勤匪懈守祖宗之家法絶外人之交通蓋能以覆轍為戒也猶望陛下時加勉勵不使怠忽且陛下一日之間接文武羣臣之時少親左右貴近之時多若能輔成今日中興之治皆其功也可不勉哉果能取法於前人興循理好善之念存正直忠良之心載之方册傳之萬世後之人仰而羡之曰當時貴近之臣某也正直某也忠良如此則播令名於無窮豈不美哉九曰振士風臣聞唐虞三代之世人人有士君子之行比屋有可封之俗士風之振不可尚也降自後世西漢士風尚忠厚東漢士風尚名節雖所尚不同而莫非善行國祚所以綿逺者由士風之振有以維持之也魏晉以來流於清談虛曠放達而士風大壞李唐之世士尚華靡多文少實宜乎天下治日少而亂日多也惟宋之士夫有三代之風詳其所由亦上之人有以勵之耳觀太宗戒欺誕之詩曰好事盡輸純與直謾勞頰舌湧如泉士風安得不誠實乎真宗疾奔競之詩曰臣下但當守公法馳騖茍進何可取士風安得不恬退乎黜勢家子不與孤寒並進録亷吏後以愧貪墨之徒宜乎士風爭尚清亷也此宋之賢君護風俗如護元氣重名節如重神明所以士風大振而人人有士君子之行伏願陛下取法於宋以振士風戒欺誕以勵誠實疾奔競以惜恬退黜貪墨以重清亷抑僥幸之徒絶諂佞之輩俾我朝人人有士君子之行將見士風大振未必不如宋之可追三代也惟陛下舉而行之幸甚十曰結民心臣觀書曰天視自我民視天聽自我民聽蓋民心之向背係天命之去留有天下者不能固結民心而欲久安長治者難矣夏商周漢唐宋俱有天下數百年而歷世綿逺者固結民心之所致也其餘不能百年甚至三四十年而止者率由民心不向故也歷觀前代所以固結民心者豈有他術不過安之養之而已書曰德惟善政政在養民又曰安民則惠黎民懷之是以古之聖賢之君愛民之心如愛赤子休養生息惟恐失所朝錯曰人情莫不欲夀三王生之而不傷人情莫不欲富三王厚之而不困人情莫不欲安三王扶之而不危人情莫不欲逸三王節其力而不盡是以所欲與聚所惡無施此固結民心之道也劉基曰三代之民如以膠摶沙言其難散故也五伯之民如以水摶沙言其易散故也伏願陛下逺法前代結民心之道近體祖宗恤民之心發矜憐惻怛之念於九重之上播春風和氣之仁於八荒之表孟子曰德之流行速於置郵而傳命蓋陛下省一分之費則民受一分之賜施一分之寬則民被一分之澤務使海內富庶衣食充足將見下民愛戴陛下之心亦如三代之民以膠搏沙而不散或遇冦賊姦宄之變必不忍負朝廷之恩如此則宗社可安於永久雖歷億萬斯年可也惟陛下注意熟察幸甚太子太傅兼禮部尚書胡濙等覆奏一曰勤聖學前件所言歷代聖帝明王勤學之實願皇上勤於聖學以正心修身為要務以居敬存誠為大本如是則義理無不明處事無不當而致太平盛治於萬萬年端本於此伏乞聖明鑒納二曰顧針警前件所言前代聖賢之君皆知針警之道其餘不知警戒以致敗亂者往往皆然伏願皇上以前代聖賢之君為法常存警戒防過於未然禁欲於將萌此誠意用功所當先也伏乞聖明留意三曰戒嗜欲前件所言自古聖賢之君必戒嗜欲大臣之告君亦必以嗜欲為戒伏願陛下以前代聖賢之君為法養成聖德以臻盛治誠正本之要伏乞聖明一覽四曰絶玩好前件所言古之聖賢之君能先絶去一切玩好之物蓋恐此心之正而為外物所引伏乞陛下從事聖學取法堯舜不縱耳目之欲此誠正心之要伏惟聖明留意五曰慎舉措前件所言人君一身為天下之標凖舉措不可以不慎伏願陛下一舉一措必思當於理而後行乖於理而即止及內則告夫貴近之臣外則勉夫輔導之職如商髙宗之命傅説曰朝夕納誨以輔台德如此則聖德日新而自無過舉矣伏乞聖明留意六曰崇節儉前件所言自古聖賢之君皆崇尚節儉故時臻盛治伏望陛下躬行節用務從儉約以蘇民力實忠君愛民之心所發伏乞睿覽七曰畏天變前件所言天心仁愛人君必出災異以譴告之前代人君能恐懼修省以格上天則變災為祥矣伏願陛下修德正事以承天心倘有災異當早夜思省人事既盡則天意必回天人感應之速誠然伏乞聖明垂覽八曰勉貴近前件所言前代中官正直忠良有功於國家者多今陛下左右內侍之臣率皆畏謹能以覆轍為戒猶望時加勉勵不使怠忽果能取法於前人則正直忠良播名無窮誠為美事伏乞賜覽九曰振士風前件所言士風之振否關係國家之治亂惟在上之人有以勵之耳伏望陛下取法於宋之太宗真宗戒欺誕以勵誠實疾奔競以惜恬退黜貪墨以重清亷務使士風大振可追三代誠為正本之要伏乞聖明留意十曰結民心前件所言三代以至漢唐宋之有天下而歷世綿逺者皆由固結民心所致也求其所以固結民心惟在安養之而已伏願陛下逺法前代近體祖宗盡安養斯民之道延國祚于萬萬年最為切要伏惟聖明留意古穰集卷一
