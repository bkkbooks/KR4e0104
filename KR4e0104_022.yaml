body:
  text: 古穰集卷二十二明李賢撰七言律詩挽周是修先生砥節勵秋霜烈烈英聲逺近揚王魏一生功業著夷齊千古姓名香梁間夜月逰塵暗冢上秋風宿草荒欲問傳家何所有遺編幾卷付賢郎送海州太守淮東父老望回旌五馬南旋幾日程山店雞聲和月落曉村霜氣逼人行海瀕地逺民風古堂下公間德政清懸想到時春正好閭閻隨處頌升平送别歸浙駐馬離亭花亂飛傷情忍與故人違金臺别酒添行色潞渚歸帆帶落暉嶺上春風梅子嫩山中暮雨蕨芽肥謾從浙水經行處為訪嚴陵舊釣磯送練士者回鄧州匹馬南回嵗已秋離亭分手莫淹留山村月夜雞鳴早野樹霜天葉落稠驛路牙旗迎故壘孤城畫角擁髙樓到家盛吐籬邉菊尊酒親朋樂獻酬逰大勝寺賡壁間詩韻嵐黛迢迢見鷲山誰將一鏃破三關暫留金界看雲卧謾倚珠林伴鶴閒煙外鳥依晴嶂下溪頭僧背夕陽還諸天禮處聞清梵燈火熒熒紫殿間緩步溪行入暮山欲從佛界息機關半窗明月吟初穩一榻清風夢亦閒樹杪雲開看日上籬根花落見春還焚香補衲生涯好不許紅塵到此間曉穿飛翠到靈山花雨含香灑竹關林鳥不驚馴虎至溪雲長共老僧閒攜琴客為談𤣥住擁蓋人從聽法還鐘磬聲殘修定後萬龕燈火緑蘿間貝葉傳經向此山石門煙暖晝長關無生自得周身計幻化渾如一夢閒春殿香雲諸佛降夜龕明月定僧還百花臺上登臨處回首蓬萊咫尺間白雲繚繞四圍山十里松隂始扣關石澗風篁偏引興雲房清話暫乘閒山頭野鹿銜花至月下髙僧洗鉢還明發歸程朝雨淨紺園回首翠屏間送薛少卿罷官西歸自許孤忠結主知居官寧肻計安危平反不愧張廷尉直道何慙栁士師已羡一身中道立定看千載大名垂心間莫廢韋編業伊洛髙蹤尚可追送李參議之浙江粉署相從近十秋青春文采自風流鶚書髙薦膺藩佐虎竹初分出帝州寮采漸看青眼少交遊誰可赤心投長情莫為離情惱還擬鳴珂入鳯樓寄夏公謫戍世路升沈總是空眼前何必恨途窮青春已盡榮親孝素節應存報主忠月下寒聲聞戍角天邉秋色見歸鴻感懷未許多惆悵心事期同塞上翁穰侯冢秦相當年擅寵光空餘孤冢傍金湯秋風兔穴通黃壤落日烏棲滿白楊石馬有聲寒雨急豐碑無字緑苔荒可憐富貴今如此莫訝雍琴感慨長寒食拜掃宿草青青郭外墳每逢寒食倍傷神紙錢灰繞墦間祭楊栁花隨陌上塵寂寞九原春事老氤氲萬井曉煙新浮生漸覺光隂少往事興懷一岸巾孟夏書懷午簾分影上書床夢破才銷一瓣香鳥送晴音來灌木蝶尋春色過危牆命題自覺吟哦細罷誦還為念慮防與㸃髙情誰更識舉輿無地遂心腸觀物間來觀物到園東天理流行在在同方沼雨晴看躍鯉層霄雲淨見飛鴻春畦苗長隨宜緑曉樹花開任意紅並育宣明情固適還將此道細研窮和答顧進士孟喬積學芹宫嵗月深雲霄今喜合朋簪松筠耐守平生節鴻鵠寧閒萬里心座上論文寒對酒指邉流水夜鳴琴超遷擬見承恩寵鳯尾珊珊振佩音隱几看書日已中窗涵涼意樹隂濃捲簾燕避黃梅雨隔院鳩啼翠竹風一榻芳塵何日下百年壯志幾人同間來㸃檢身心事早計惟防外欲攻送無隱和尚早通禪教息逰方獨占名山嵗月長千片暖雲春補衲一龕明月夜焚香曉簾花雨清金界午院松風淨石床塵外真空心似水叢林無事任徜徉十四夜賞月秋容淡淡月華鮮萬里青天一鏡懸素魄漸從今夜滿玉輪爭看九分圓嬋姢皓彩寧知缺皎潔清光未覺偏且泛芳巵先試賞明宵此際有詩聯再賡大勝寺壁間韻三首珠林瀟灑對青山塵事紛紛自不關霜鴈落田香稻熟雨龍歸洞碧雲閒客穿松徑尋幽至僧扣柴門化食還無限好懷何處遣小橋流水夕陽間寶剎從來近好山溪頭馴虎護禪關竹窗雨過清隂密松院雲深白晝閒崖果經霜猿共摘楓林欲暮鳥知還試從老衲談空妙大智燈光滿坐間郭外招提接逺山煙蘿行盡到荆關香凝蒲室禪心定雲鎖松庭鶴夢閒晚竈烹茶留客話晴空飛錫見僧還吟懷頓覺清如洗始信沙門出世間桃源清隱髙情樂隱覓仙蹤深入巫山第幾重洞口有田春種玉鼎中無火夜蟠龍石潭涼浸蛾眉月蘭室香飄麈尾風遙想扁舟逰覽處桃花夾岸水溶溶送黃主事弟還家星霜幾度客神京此日歸帆肯暫停喜載琴書尋舊侣不論蹤跡等浮萍月中素練三江白雲外屏風九疊青想到家山行樂處籬邉秋菊正芳馨贈薛大理先生西蜀之行西河夫子繼前賢吾道於今賴有傳世態炎涼寧足較襟懷風月浩無邉育才自得平生樂報國還看晚節堅惆悵胸中茅塞久束修承教定何年追思先母慈母殷勤嵗月多一門百口賴調和堂前香暖雙姑饌燈下聲寒五夜梭釡祿方期延夀考桑田忽訝變滄波徒將富貴成哀感罔極深恩可奈何賜五倫諸書正統年中得賜書賜來書籍意何如五倫事迹新成類一代規模已用儒蓋世功名當自致逢時忠悃要全輸立身不在生前樂千載相期有令譽寒梅賡韻寄友人姜貴憲松篁為友自相親弄月迎風楚水濵數㸃嫩含窗外雪一枝香散嶺頭春寒分酒力傳杯滿清挹吟懷得句新盛世終需調鼎具遭時豈必竟無因聞說藏修惜寸隂獨憐梅樹寄疏林清生院宇春香細寒印庭階月影沈應許老逋吟瘦骨肯教狂蝶見芳心孤標未必淹鄉邑青瑣行看振珮音秦淮次韻秦淮南盡石頭城淮上帆檣半為名秋浦蓼風歌旅况春波萍月棹殘更數行白鴈沙邉落一抹青山岸上橫自是名川多潦集滔滔終古見澄清煙漠漠紛紛布曉空連雲帶霧晝溟濛淡籠山市秋天外輕鎖漁村夕照中寒浦歸帆迷逺近晴川飛鳥障西東蓬萊宫闕宜春望紫翠重重拂絳櫳氷水凍氷堅絶㸃埃坤爻初六見胚胎寒凝曲沼稜光淨夏薦髙堂爽氣來忠助漢君因霸合孝憐慈母為祥開髙人襟度真堪比又見豳風重取裁塵非煙非霧掩晴暉九陌行人勢莫違梁上曽因歌韻起驛前長逐使旌飛幾畨雨打方歸地一陳風吹又上衣自是甘心雲外客纎毫不許到林扉送平江侯守備南京龍盤虎踞帝王城坐鎮元戎屬俊英劍氣夜橫南斗白詩才秋與大江清賔盈幕府開樽俎令肅轅門列斾旌纍葉貂蟬今愈盛又看麟閣著芳名寄謝張尚書惠薑故人千里惠鮮薑佳味由來産異鄉犍谷雨晴紅指潤鴈山春暖白芽香贈辛已得梅君意施幻曽聞左氏狂從此神明應不昧報無瓊玖興空長贈宋都憲鎮守甘肅都憲襟懷湛玉壺逺參戎務著嘉謨夜鳴刀斗嚴諸寨曉列旌旗震萬夫異域功名同燕頷邉疆威望繼龍圖㑹看沐寵回軒日關外歡聲夾道呼寄延綏參贊曹少卿大理榮遷屬俊髦指揮戎務見孤標明時定展平戎䇿邉寨應傳破膽謠烽火靜中吟曉月雪花飛處擁輕貂海天鵬翮由來健此日爭看奮九霄和于少保書懷王事關心夜不眠孤忠應得聖君憐憂勤肯負平生志清白還教後世傳莫厭錦袍懸玉帶曽扶紅日上青天一身四海安危係未許煙波理釣船送程參政彥實之山東簪筆螭頭數載餘承宣方嶽拜恩殊臨城已建平戎䇿報國曽陳固本書南浦春風初拂斾東方甘雨定隨車蹇豫同受公庭薦願協丹心拱帝居次鄒都憲韻以下西蜀紀行曉出都門興已濃長亭南去蜀川通數行白鴈浮雲外一抹青山落照中行已但遵先聖訓濟時須繼古人功平生亦有澄清志願補中興治道隆沙河驛途中煙景蒼茫望處迷無端詩思謾成題荒城夜犬牆頭吠野店晨雞樹上啼驛吏鳴鈴來逺堠行人馳馬渡深溪路傍時聽農夫語隴畝收成稼穡齊早起霜橫玉宇旅懷清候館雞鳴月四更緑酒自供吟處興黃花偏動客中情天邉孤鴈拖秋色城上羣鴉送晚聲莫道髙人甘寂寞塵寰富貴果然輕過彰德霜落楓林九月秋山峯馬首翠光浮水分白鷺依沙浦風引青帘上酒樓旅榻燈前懷往事吟鞭月下度寒流此心自是堅如鐵一任砧聲響未休途次偶成王事驅馳分所宜雲程千里思依依菊花香冷迎霜綻鴻鴈聲寒帶雨飛古渡扁舟隨處少逺山落木望中稀徐行莫訝前途晚村市人家晝掩扉發泥溝驛驛樓撾鼓吏人忙一飯匆匆去路長分隴晚蕎花似雪連村髙黍穗如鎗山頭落木嵐光薄道左清渠水色涼滿眼紅塵何日淨西風回首意茫茫衛輝至新鄉草頭白露欲為霜陌上無塵曉色涼㸃破秋光山外鳥印開雲影路邉塘農夫垂老猶殫力賈客多財愈覺忙堪笑宦途如此輩功名何用掛剛腸曉發武安驛肩輿行處樂如何觸目悠然景物和蕩漾沙鷗臨渡少蒼茫煙樹近山多農夫收黍場中積牧豎停牛背上歌此景都歸懷抱裏幾回得趣謾吟哦河內鄉村清隂十里看修篁村市人家倚太行屋後分畦葵葉嫩門前流水稻花香秋林有果皆堪摘春酒無肴亦可嘗此地居民真快樂他時歸老定難忘懷慶道中西來平路入懷州楊栁隂隂夾道稠翠羽萬竿村內竹錦囊千顆舍傍榴間雲低繞青山卧活水深穿碧樹流滿目秋光渾似畫幾時乘興欲登樓濟源四面嵐光列翠峯懷州西畔有竒蹤羊腸路險中原隔濟瀆源深北海通盤谷髙風歸李願太行遺事慕梁公我來逰覽逢秋暮煙景蕭條落照中過黃河曉發河陽古渡頭棹歌聲裏過黃流柁公已疊風帆坐水手還牽竹纜逰神禹萬年留偉績洪濤千里界中州南來却上邙山道衰草寒煙冢墓稠洛陽西風回首洛陽城夕照蒼茫草樹平金谷尚思傳酒數天津猶憶聽䳌聲鶴來邙冢秋宵冷花沒名園野蔓縈惟有當年瀍澗在依然流水不關情靈寶縣邑名靈寶自前唐懷古令人遣興長霜滿桃林秋寂寂煙橫欒冢月蒼蒼已無紫氣來函谷尚有清風播講堂堪笑雞鳴田氏客曽無仁義說齊王題函谷關函關陜右咽喉地曲折縈回勢自強北倚河流成險固南來山峙界封疆令瞻仙氣迎聃老客作雞鳴救孟嘗千載悠悠追往事不堪風景正凄涼望氣臺靈寶城南古望臺仙人相遇亦竒哉老聃未跨青牛至尹喜先瞻紫氣來道德傳時方領悟蜀川逢處又徘徊嗟豫自是儒門客方外安知有異才陜州懷古秋風駐馬陜州城召伯甘棠不見生避暑宫中叢木暗望仙臺上暮雲橫鐵牛鎮水終難走砥柱中流自不傾况此地靈人傑盛姚張何事獨馳名謁華嶽廟華嶽巍巍勢獨雄層霄削出翠芙蓉紅光映日仙人掌黛色連天玉女峯絶頂泉飛千尺練懸崖根固萬年松四時賴爾興雲雨歷代尊崇祀典隆華隂懷古西出潼關到華隂油然清興發胸襟希夷洞口荒苔合玉女峯頭古木森捫虱憶談當世務却金曽愧故人心可憐隱顯俱陳迹落日風寒起暮砧和薛大理華山詩韻太華髙峯壓衆山五龍宫殿四時寒雲開翠色飄晴漢日映嵐光接曉關空外蓮池當絶頂望中仙掌獻層巒竒蹤多少煙霞裏何日登臨得遍看過長安故城長安千載故城荒衰草寒煙滿未央廢宅總成芳草地寢園一任野花香連村何處藏溫室啼鳥渾如覓建章惟有當時原上墓纍纍猶自對斜陽和許氏咸陽晚眺韻咸陽回首暮雲愁煙鎖蘆花逺近洲古渡馴鷗依短棹夕陽歸鳥過危樓道傍故苑風霜冷原上諸陵草樹秋多少英雄俱寂寞渭河依舊水東流題蘇武墓蘇卿一去鬢成霜贏得殘軀入漢鄉旄落共憐堅使節雪深猶憶牧羝羊荒墳草掩斜陽裏短碣苔封古道傍顧我逺因王事過匆匆不及奠椒漿寶雞縣懷古間來訪古對清樽暗度陳倉事可論尚父釣時磻石在張仙逰處道宫存玉雞山上晨啼歇紫草原頭晚色昏但喜居民農事畢任教風葉護柴門蜀道峭壁嵯峨萬仭髙烏江聲急浪花飄懸崖棧閣穿雲上掛樹猿猱帶雨號絶頂振衣秋思逺長空回首帝鄉遙平生浪說登雲路今日身親到碧霄過漢中憶昔髙皇王漢來故城千載使人哀寒煙猶鎖觀星閣芳草空鋪拜將臺席卷三秦傳妙算勢摧西楚見竒才當時不用蕭何䇿帝業焉能向此開過五丁峽五丁峽在漢江西萬仭髙峯兩面齊鑿斷石崖穿鳥道疏通流水上雲梯馬頭惟見千山合澗底都教萬樹迷路險不知天色暮金牛嶺畔聽猿啼保寧往劍州紀行止此保寧此去劍州程曲折曽無半里平曙色漸分村未逺鳥聲忽散吏來迎雲從落木林中過人在髙山頂上行窮日到來雙斾急譙樓撾鼓報初更送勛部陳郎中使朝鮮初立青宫告萬方金章玉節賜傳揚日邉持遣皇華使海外爭迎粉署郎雨霽朝鮮征斾疾天連遼海使星光逺人拜舞承恩後願效葵心向太陽秋日謾書殘暑秋來氣尚炎喜看微雨過疏簾午窗詩就歸清淡一枕公餘到黑甜此日朝端知止足何時林下笑掀髯浮雲富貴堪同視道在行藏不用占秋晚知已交遊仕路稀短檠燈火閉雙扉誰憐髙節名長在自許孤忠願不違聲逺簾櫳蛩唧唧涼生庭院雨霏霏光隂瞬息驚時換千里鄉園有夢歸再和謾書韻金令初行已退炎一琴山水坐垂簾竹林帶雨枝還重果實經霜味正甜燦燦黃花娛晚節蕭蕭白髮映修髯人生出處何須慮靜對韋編獨玩占可畏無如夏日炎涼風俄喜到疏簾煙松結翠尋常潤霜柿垂紅分外甜秪向雲途堅大節肻緣詩句斷長髯平生自信行無妄睡覺還將吉夢占要路爭趨氣勢炎獨憑書几靜鈎簾疏慵不較人情暖淡薄非憎世味甜興趣知濃塵外夢形容看老鏡中髯立心肻似脂韋軟龜䇿何勞鄭尹占蠢鈍形軀不奈炎偏宜露頂坐風簾髙才處世如舟險佞口交人似蜜甜几上遺編開睡目琴中流水拂垂髯客來忽見平生友好是燈花昨夜占小窗已減數分炎的是今朝雨一簾立志光隂須寸競養生滋味戒多甜思鄉逺望頻回首得句長吟一奮髯莫訝蓍龜成亹亹從來謀事貴先占又和韻懶將薄命市頭占才到中年便白髯緑蟻酒斟拚一醉玉漿瓜剖嗜多甜涼聲在户風敲竹疏影當軒月照簾可奈夜深渾不寐小窗燈火究羲炎安分何勞把命占漸看白髮間蒼髯蟬依晚樹吟中亂蜂採秋花釀後甜霜徑菊香凝緑酒月庭竹影上疏簾醉來髙卧南窗下不戀人間勢位炎和人韻事業蹉跎可奈何時光轉眼去如梭仕能行義心無愧年到知非鬢欲皤菊圃清霜凝細藥槐庭涼月上橫柯一簾秋興憑誰遣對酒掀髯發浩歌再和人韻秋風畫角起邉城雲路功名嘆未成山鳥飛來青嶂逺沙鷗泛處緑波平松庭皓月分清影野寺疏鍾度晚聲千里客懷今夜夢鄉園歸去定分明葱葱佳氣護金城秋思無邊句易成民俗可能敦禮讓吏心安得尚廉平虛庭生白嬋姢影四壁催寒絡緯聲憂樂敢同先正志㳙埃無補愧時明萬里秋光接禁城無邉清興有詩成山浮逺翠千鬟淨水滿方塘一鏡平煙外長空橫鴈字雲邉落日帶砧聲間來不廢韋編業開卷偏教眼界明草載星霜寓鳳城功名回首恨無成宦途總謂如山險心地惟教似水平吟罷月移簾外影夢回風動竹間聲時人莫羡腰金好未有㳙埃答聖明畫閣峥嶸錦繡城全燕形勝自天成一簾暮景殘霞淡萬里秋光逺樹平塞上風煙迷鴈影月中砧杵雜蛩聲從知萬事能窮盡只在靈臺一㸃明和寄薛大理詩韻秋來乘興憶山隂客邸長吟思不禁天外聲寒鴻列陳籬邉香冷菊垂金青年學道功名薄白首論交嵗月深别後但憂成鄙吝敢虧忠孝一生心蹉跎嵗月仕途中紫禁秋深色正葱防患髙情憐范蠡卧樓豪氣惜元龍紅垂村塢霜前柿翠合庭階雨後松清夜月明涼似水寒螿聲裏思無窮撥悶無如甕裏春那堪歸鴈望中頻交情淡淡平生友世態炎炎要路津寒夜青編存古道髙秋白雪動梁塵嵗時云邁慙無似惟把丹心拱帝宸賡薛學士詩韻玉堂無事坐清暉栁絮因風作雪飛紫禁鶯聲晴後滑赤霄雲葉午前稀兔毫間運成珠玉雞舌長含侍鎖闈慙顧非才膺寵渥中官又報賜新衣簡友人姜貴憲位重才微愧不充春氷危懼此心同宦途敢屬蒼生望稔嵗良由造化功五十光隂驚白髮一生懷抱有丹忠前修晚節尤關意須向明時取令終賜繡麒麟紅袍麒麟盤繡上宫袍天寵非常不易遭一寸丹心惟報國平生精力在揮毫但思古道人情厚敢望前修事業髙他日不慙綸閣地浩然歸老卧林皋簡友人姜貴憲一㸃葵心向太陽知非時候鬢成霜獨憂位重乖輿論深愧才疏乏寸長止謗有方惟自省避嫌無意但如常試看澗畔蒼松質晚翠依然異衆芳絶句自君之出矣四首自君之出矣屈指算途程遙知霜降後行李到邉營自君之出矣明月長滿窗妾心似明月不用對銀缸自君之出矣春風不入户見說蜂蝶殘何曽到園圃自君之出矣日望漢道昌安得邊塵靜從此罷秋防偶書玉堂清不寐盡日作秋隂閣吏傳將晚收箋罷細吟𤣥妙觀㑹同年次韻宿雨初晴月漏光琳宫桂子散秋香相逢盡是他鄉客一舉何妨纍十觴題張真人墨竹數竿瀟灑出蓬萊共道仙人手自栽涼月滿庭間玩處翛翛疑有鳳凰來貌得琅玕真妙絶清隂恍若飛霜雪誰能裁作紫鸞簫吹碎鳳凰臺上月夷齊父命天倫不忍違弟兄辭國世應稀能存大義慙周粟萬古清風重採薇晏嬰相齊三世顯諸侯危行危言霸業修知友仲尼能久敬論封何事沮君謀衛鞅變法初心只霸秦却言王道信非真貪商不悟羊狐喻車裂方知禍此身平原君好士能誅笑躄人士如毛遂更無倫當時未解邯鄲厄門下誰知却帝秦和楊教諭園花灼灼總新竒何事蒼松發故遲不向東風鬬顔色此心惟許雪霜知題畫素花香繞翠玲瓏石鎖蒼苔隱緑叢枝上寒皋窺錦雉羽毛驚動白蘋風雲嵐深處數椽幽松下柴門對碧流記得山窗清夢破落花香裏雨初收題宣廟畫蘆葉蕭蕭兩岸秋漁翁垂網在寒流揮毫自是天工妙意似磻溪欲往逰古穰集卷二十二
