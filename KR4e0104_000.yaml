body:
  text: 古穰集目録别集類五明卷一奏議卷二奏議卷三書卷四記卷五記卷六序卷七序卷八序卷九說題跋卷十神道碑卷十一神道碑卷十二神道碑卷十三神道碑卷十四墓碑墓碣卷十五墓表卷十六墓表卷十七墓志卷十八墓志壙志卷十九行狀傳卷二十祭文銘針贊賦哀辭卷二十一五言古詩七言古詩五言律詩卷二十二七言律詩絶句卷二十三和陶詩卷二十四和陶詩卷二十五天順日録卷二十六天順日録卷二十七天順日録卷二十八雜録卷二十九雜録卷三十雜録臣等謹案古穰集三十卷明李賢撰賢字原德鄧州人宣德癸丑進士官至少保華蓋殿大學士諡文達事蹟具明史本傳賢為英宗所倚任知無不言言無不從自三楊以來得君未有其比雖抑葉盛擠嶽正不救羅倫諸事頗為世所譏議要其振飭綱紀奬厲人材屬朝野多故之時能以一身搘拄其間其事業實多可稱道至文章本非所注意然其時去明初未逺流風餘韻尚有典型故詩文亦皆質實嫻雅無矯揉造作之習此集為其壻程敏政所編凡奏疏二卷書一卷記二卷序三卷說題跋一卷神道碑四卷墓碑碣一卷墓表二卷墓志二卷行狀傳一卷祭文銘針贊賦哀辭一卷古今體詩二卷和陶詩二卷天順日録三卷雜録奏疏雜文三卷多有關係當時政事人物可以偹史乘參核者其天順日録世有别本單行已具論于史部中兹亦姑仍原本併録之焉乾隆四十三年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
