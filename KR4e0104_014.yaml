body:
  text: 古穰集卷十四明李賢撰墓碑銘中順大夫太常少卿兼翰林院侍讀贈禮部左侍郎諡文介劉公墓碑銘士之所存文與行而已惜乎今之世能具是二者鮮焉若劉文介公其殆庶幾乎公諱儼字宣化別號時雨上世自金陵徙江西泰和復徙吉水以儒術起家為望族五世祖天聲以書經授家孰宋咸淳進士弟新民繼之於是劉氏經學盛傳於時曰益厚曰維德曰永寧公之高曽祖也皆能以先業相承考原性號退菴隱居不仕以公貴贈奉議大夫右春坊大學士兼翰林院侍講妣楊氏宋屯田員外郎清之裔有淑德贈宜人生子三公其季也公為人端介自幼不凡勤學勵行退菴知有逺大志遣從族之先達時年十六七為文必主理雖修舉子業耻為口耳之學務探底裏嘗曰讀書豈但皮毛而已年二十四遂領鄉薦春闈中乙榜不就而還潛心林下二十六年正統壬戌乃得雋春闈廷對有鯁直忠愛之詞遂擢進士及第第一授翰林修撰階儒林郎位既顯學益進以古文名天下八年與修五倫書獲賞賚十一年充經筵講官賜敕命景泰初進侍講階承直郎三年遷右春坊大學士兼舊職階奉議大夫四年與修君鑒書有白金文綺之賚五年選進士十八人為庶吉士與狀元孫賢等屬公教之六年賜誥命是年修寰宇通志為副總裁繼續宋元通鑑綱目公復領之七年志書成進太常少卿兼侍讀階中順大夫錫賚益厚尋主考京闈有公卿之子欲僥幸科名者公持公道落之遂誣公重罪賴學士高榖救之獲免天順改元皇上復位奬用忠良以公署翰林院事將有寵任之漸而一疾不起公天性孝友初二親垂白在堂伯兄早亡仲兄優遊文翰間惟公綜理家務雖公私多故而二親安公之養及遭親喪立見毁形凡附身附棺之事無所不用其極居間教子弟務底成材有姪曰斆官阜城而死公哭之歸櫬於鄉族人數千指稱公無間言凡窘者葬其喪貧者成其配寡弱者扶之得所及上春官鄉人有貸者悉焚其券嘗慕范文正之為人立義倉於先祠之左貯粟以周其乏且自為記以見志在朝言論侃侃所交必正人回邪者折之不少借用是直聲大振訃聞上悼惜不已特贈禮部左侍郎諡文介敕工部營葬事復遣官諭祭其家嗚呼若公者斯可謂之士矣公生洪武甲戌正月十三日卒天順改元九月十二日享年六十有四配淑人王氏故翰林編修覺非之女子男三長節次即次敉女一適錢啓明孫男存者二孫女三銘曰黃茅白葦天下紛紛孤松秀拔挺然不羣毅此劉公得氣之正浩然流行莫之敢競繄氣所發有行有文名魁天下義動壬人翰苑春坊太常之署較藝編摩綽有餘裕位不滿德士論惜之才不盡用我皇恤之特進崇階載加美諡光振廬陵羞彼千駟公行公文耿兮不磨詔爾後世銘勒山阿中議大夫大理寺右少卿李公墓碑銘公諱奎字文曜廣信弋陽人九世祖必達宋解元曽祖仲祥元進士祖德懋隱居不出父興祖以公貴贈監察御史母胡氏封太孺人公自幼好學稍長博通諸經永樂辛卯領鄉薦明年春闈登乙榜授湖廣黔陽教諭丁外艱服闋調廣東保昌宣德丙午以績最升南京國子監學録訓飭造就如二廣正統丁巳用薦拜監察御史明年出巡浙江兼理海道時巡撫大臣及總戎貪縱不法即上章劾之復陳機務數事上皆嘉納已而倭寇桃渚朝廷知非公咎獨罪總戎辛酉春還京甲子夏復出巡蘇松常鎮諸郡法令嚴明吏以贓去者甚衆尤重名教若鄒忠公東坡龜山三先生嘗寓其地皆為祠以祀之楊文貞公薦公學行遂受詔督京畿學事舉儒士胡珏等五十人分主教導士習丕變丙寅召升大理寺左寺丞己巳夏復受詔巡撫河南并畿內諸郡得便宜從事奏減真定所負官馬八千匹免河南諸府災傷田租二十萬石慮汴梁為中原重地請移南陽護衛軍以守之又慮南陽地接荆襄流民聚居者不下數十萬恐生變請於關隘洞口設巡檢司軍衛防禦布按兩司增參議僉事二人以任撫治朝廷嘉公之䇿皆從之以璽書勞公復遣行人賚白金文綺以賜是歲冬清豐邑以妖言倡亂公運謀督兵悉擒捕之詔下褒奬進右少卿明年夏廷議以去秋敵侵京畿人民驚擾不已遂移公專撫真定諸郡公益殫慮往來綏輯民遂安堵時諸郡久旱公齋沐禱於神即雨是歲大熟先是民飢公請移臨清倉儲三十萬石賑之民賴全活者甚衆見前代名臣宋璟李沆墓圮即命工修治之忠勤之績冠於一時乃遽遘風疾代還之日諸郡士民咸號泣挽留至京懇乞骸骨公卿大夫士爭為詩文重公之去未幾以子貴賜誥命進階中議大夫贊治尹時巡撫廣西江西憲臣聘典文衡疏請大用公皆辭之不就築溪山風月鷗波二亭與親友詠觴其中重建祠堂書院以勵鄉俗教後學天下莫不高其行所著有詩經辨疑九川集歸田録數十卷忽一日疾作乃自為祭文復書後事而卒天順改元三月一日也距生洪武己巳三月十四日享年六十有九上聞訃遣官諭祭其家邑令汪復肖公像於鄉賢祠以祀焉公配張氏繼陳氏皆封恭人又繼孫氏子男二人長玘舉進士授監察御史出為陜西按察司僉事次璘女五人羅徽裴憲陳顯詹珏其壻也孫男四人孫女八人族孫曰良復為監察御史其餘顯宦者又數人銘曰維政與教鮮克兼舉有美李公慨然自許始攜一經于嶺于湘于彼成均頌聲洋洋受薦而興執國之憲董學于京士習丕變受帝之命王事有程于浙于汴惠流威行南北畿民見公咸喜聞公之歸攀號不已晚節令終有子希蹤政教之臣孰如李公祠並鄉賢哀動宸極我銘其藏過者必式中奉大夫太常寺卿夏公墓碑銘公姓夏氏諱衡字以平樗菴其別號也松江華亭人曽祖福隱居不仕祖彥容考宗文俱以公貴贈亞中大夫太僕寺卿祖妣顧氏妣鄭氏俱贈淑人公自幼端謹不羣永樂初選為郡庠弟子員力學不怠己亥以善書徵入翰林修永樂大典越三年辛丑書成擢中書舍人壬寅扈從文廟北征洪熙初仁廟授以敕命階徵仕郎賜第宅一區凡內閣制勑文字屬公書之公夙夜謹慎大得時譽宣德改元扈從宣廟征武定州公能周密文事諸老先生咸倚重之師還賜畔者家屬四人明年丁未上念公勞勩特升行在吏部考功員外郎未幾升郎中供職如舊公益感激盡心嘗曰吾幸居此清切之地敢不知所重乎明年夏以預修兩朝實録成加祿一級且有白金文綺楮幣之賚又明年授誥命階奉政大夫正統初英廟賜公織金衣一襲尋以清修文雅為楊文貞公所推入侍經筵而白金綵幣之賚尤厚是歲丁內艱上命兵部給舟送其櫬還鄉安葬聞公哀毁骨立又遣太監范安賫瓊玉膏賜之服闋供職惟謹癸亥秋以秩滿升順天府丞己巳秋朝廷有事以公勞於文墨進升太僕寺卿賜白金文綺楮幣三年復授誥命階中順大夫天順改元英廟復位進升太常寺卿復有白金文綺楮幣之賚癸未公以年踰七十無子懇乞致仕自顧孑然一身托其壻翰林譯字官王臣以老焉天順甲申十月十七日以疾卒距生洪武壬申十二月十一日享年七十有三公天性孝友襟度和易少與伯兄桂軒先生自相師友居官四十餘年曽無過舉俸祿之餘多濟貧乏所賜僮奴不勞以事惟使之應門而已有貧民韓五典屋以居久之自搆數間已而五卒鄰豪欺其孤寡欲攘其居公為奏請仍歸韓氏母子內姪顧廷玉遺孤本無依公憐之訓習法書薦入翰林擢中書舍人復出資擇婚而配之嘗以俸金二十餘兩托寄南京禮部郎中金汝礪為盜所竊償之不納曰是不以其道得之者何償之有士大夫咸以長者稱之公平生善吟詠至於字學真行隸篆無不精美尤善作山水竹石四方來求者甚廣得之者咸寶愛焉所著樗菴集若干卷藏於家配顔氏贈淑人生女一壻即臣也卒之日朝廷遣官諭祭復令有司為營葬事銘曰造物冥冥孰云可測善惡之應未必皆獲溫溫夏公惟善是行乃絶其嗣聞者愴情公在仕途惟勤惟慎館閣周旋芳聲屢振以德觀之裕後可期夫何乖焉在理不宜匪曰不宜亦云有變變而不常於人何譴是以君子求無愧焉曰常曰變一聽於天嗚呼夏公名稱在世不以無後乃有或替為述其事勒石墓前以詔鄉人以永其傳通議大夫湖廣按察使馮君墓碑銘正統初豫識馮君至誠於京師固已藏之胸中矣既而揚歷中外功名事業過人逺甚豫固知其必至是也今即世五年矣其子韺始克狀君之行乞余為銘豫辭以不暇而請之不置也則序而銘之序曰君諱誠字至誠別號無偽道人漢車騎將軍唐之後有諱給者仕宋為吏部侍郎始居饒之浮梁曽祖良輔隱德不仕祖夫志元末大儒也洪武中應聘至南京以疾辭歸父溪翁以明經教授鄉人參政黃勉辟之不起娶張氏生子四人君行三也自幼聰敏為諸生力學不懈弱冠以詩經領永樂庚子鄉薦明年登進士第賜歸進學慨然曰吾聞古人顧名思義因號無偽道人識者曰此逺大器也又明年赴召授廣之香山知縣君便道至家曰吾有祿可養親矣乃盡讓田産於昆季奉二親以行香山邑素陋君以禮教變其習邑人始易君年少已而皆心服之有虎為患君曰人與神分職以治民使其冥然不靈何以享明祀乃移文城隍之神虎遂渡海北去朝廷用兵交趾檄君備軍餉甚急役夫在道感君恩信無後期者久之二親相繼以沒君哀毁不勝扶柩還葬一用朱氏禮且建祠堂修譜牒以倡族人服闋吏部委君理蘇松諸郡工役之隱漏者事竣調徽之祁門君益勞心民事未幾用薦授湖廣道監察御史正統丁巳奉命出巡貴州軍民利病悉條奏以聞辨明寃獄前後數十己未復巡陜西值歲大歉即檄有司發倉廩以賑復奏停賦稅鹽糧以實邊囷民困乃蘇又劾閫帥之貪殘者壬戌麓川夷梗化分遣憲臣發兵往征之君發四川兵盡得其精鋭還授敕進階文林郎復用薦升浙江按察司副使時憲使軒輗用法甚嚴每有疑獄多從君辨嘗與御史讞兩浙獄囚君平反甚衆處州賊起宣慈之黨尤衆兩浙騷然巡撫憲臣議捕之衆皆憚往君曰食君之祿而避其事可乎毅然請行至則遣健者潛入賊中啖以金帛賊謀寖衰乃大饗兵士掩其未備一鼓而敗之殱其渠魁散其脅從單騎巡勞民皆安堵先是民有謠云若要宣慈破除是馮君過至是驗焉朝廷嘉其功進升湖廣按察司浙民聞之遮道乞留不獲乃大書其事鑱諸崖石君至湖廣訟牒紛積囹圄充斥乃晝夜省閲而斷遣之滯獄為之一清湖南夷獠告訐之風頓息都御史劉廣衡奉敕糾察湖廣庶官乃疏君政績第一朝廷賜誥旌之進階通議大夫推恩二代祖父皆贈官如君妣皆淑人君益思自力以答主眷未幾坐微纍逮繫朝廷知其誣即遣還任踰數月疾作猶治事如常未嘗就枕一日諸孫侍側君忽語之曰歸語汝父奉法循理勿忝所生言訖而逝時天順己卯四月二日也距生洪武庚辰四月二十五日享年六十藩閫官僚哭之盡哀湖之南北數月猶聞行哭聲德之感人其深也如此君天性忠厚襟度坦夷不輕為喜怒其處事也據理為是非其用刑也原情為輕重僚友無不嘆服者平居手不釋卷所著詩文有真齋集若干卷藏於家配閔氏纍封淑人子男二人長曰韶次即韺登景泰甲戌進士第為平湖知縣有政聲孫男六人孫女二人以卒之歲某月某日葬於邑之豐村烏龍之原從吉兆也銘曰嗟嗟馮君發迹江右碩學宏才世豈多有始為邑令于廣于徽受薦而起民曰疇依入官烏臺士類咸喜南徼西陲大振風紀佐臬於浙叛寇以殲遂持憲節聲震湖南仕路翺翔餘四十載一節始終曽莫之改古人芳躅孰允蹈之相彼馮公實克造之身雖云亡功則甚偉我銘其藏令譽無已墓碣銘武德將軍烏撒衛正千户孔侯墓碣銘侯諱顯姓孔氏系出宣聖之後傳𣲖疏逺莫稽其詳先世有徙淮甸者居鳳陽之靈壁遂為其邑人侯早以茂材仕元至山東行樞密院判時元綱不振羣盜蜂起侯守沛城我太祖高皇帝起兵定天下丙午年夏四月遣偏將陸參政取徐州侯遂歸附吳元年春充宿衛夏六月授兵馬指揮分巡金川驛橋冬十月改金吾右衛鎮撫洪武改元夏四月授武略將軍賜誥命侯纍扈從南北征討二年秋上聞鄧州自元將實喇巴圖攻而克之燬其城無居守者二十餘年冬十一月乃命侯提兵五十人來治是州侯抵襄陽詢鄧之流寓者導至故址於是冒霜露披荆棘收集散亡興舉廢墜規為新城三年冬十一月上聞侯治狀賜誥命四年夏城成公私屋宇亦完市井棊布人多來歸是冬驗版籍得軍士千餘人編民千有七百餘户五年內鄉山盜起侯率所部兵往捕之盡上嘉侯之功遣官賚龍彩紵衣一襲六年秋七月復念侯效勞升正千户專理戎事不煩州政蓋優之也九月授武德將軍賜誥命侯與其副益綜理經營以壯樓觀以浚濠池明禁耀武四境晏然十年十一月上復念侯之功賜世襲誥命侯在職不懈每欲足食足兵闢四野修陂堰民稱易治復如古昔十七年春正月侯鑄雲版為晨暮節有無賴者誣之遂逮侯夏四月獲宥調貴州烏撒衛侯即怡然起任二十九年夏五月以有疾引年請以兵付其長子乃歸老於鄧鄧人敬愛之加於在仕時新城之南建宅一區日課子孫農擇其秀者延師於孰訓成之時徜徉容與於別墅山水之間見者不知其為故將也一日忽嬰疾畢集親族慨然曰人生於世與朝露何異死生常理固不足介意所貴者有善可稱而名不泯焉爾吾昔受天子命來治此州於兵燹之餘故城榛莽為虎狼麋鹿之所賴兵民之力而城之使名郡不減於昔吾死不憾矣言訖而逝侯生於元某年某月某日卒於大明永樂某年某月某日享壽若干曽祖某祖某父某母某氏配李氏子男四人長著襲正千户次藝次某次景女若干人長適某次適某孫男若干人長安襲正千户次文行忠信溫良恭儉讓某某某某俱有恆産不墜侯業孫女若干人卜葬在新城乾隅湍河之北文之妻李氏賢女兄也通家之義不可以不銘銘曰煌煌大明致時之亨開拓疆宇四方底平桓桓孔侯攀龍附鳳仗劒驅馳躬頻扈從鄧為荒州餘二十年宸衷軫念簡任才賢毅此孔侯受帝之命手握兵權兼彼庶政翼翼新城載經載營惟侯之功不日而成遺黎乃來事我南畝足食足兵惟此賢守襄漢之南名郡再興惟藩惟翰以慰聖情誤玷青蠅蠻邦戾止皓首來歸鄧人咸喜相古朱君葬祀桐鄉任丘名城亦有中郎孔侯配之有美無忝湍河之藏無伐無翦我作銘詩刻石墓門奕世簪纓惟侯子孫翰林院檢討從仕郎鄒君墓碣銘唐季王審知稱閩王中原之士多歸之若河南固始鄒勇夫其一也勇夫以僕射鎮歸化因家焉歸化即今泰寧縣是後子孫繁衍衣冠不乏若令歡為唐水部員外郎長孺為宋太學録曰應麟曰應博俱登進士第曰應龍以慶元二年狀元至端明殿學士簽書樞密院事贈少保其族益大顯今翰林檢討君諱安其後也君曽祖光號東軒祖林甫號樵隱考世榮贈翰林檢討母朱氏封孺人君自幼頴敏不凡書過目即成誦善屬對世榮與故人江飲江屢出竒語欲屈之見其略不締思隨應如響乃嘆服曰吾兒素稱能句輸爾一籌矣甫睟為邑庠弟子員令尹見而竒之洎冠字仕恭益自奮勵凡經史靡不涉獵尤專於易永樂辛卯遂中鄉科明年中春官乙榜得教諭浙之新昌或曰是邑乏科久矣奈何君曰何地不生材顧教之者何如耳至學召諸生前曰吾受天子命來教爾輩務底成材效用於時若見從乎咸曰諾於是立程課嚴教條雖隆寒盛暑不少輟始有不堪者搖以浮言終則翕然從之故一科而舉者五人再舉者三人若楊信民甄完諸輩為都憲為方伯者彬彬相繼時論偉之君歷典京浙文衡士類服其公嘗考績赴京遇燈節獻詩文廟嘉之賜寶鏹尋有以君學行老成者薦擢國子學録會宣廟親平沙漠君獻頌有椰子內醖之錫繼賀騶虞元兔嘉禾卿雲諸祥多獲賚豫九載進秩助教再進檢討天下英才皆卒業其門正統九年春上視太學君蒙勑諭賜衣一襲東軒以幼孤育外族為王姓已三世君慨然念水木本源之義抗章於朝復鄒姓又念王氏不可絶仍以兩兄嗣之未幾以引年乞致仕自大司成以下暨六館之士與朝紳知舊祖餞都門外見者莫不歎息以為復見二疏既歸深衣幅巾徜徉山水間訓諸孫禁侈靡之習宗族鄉黨咸樂從之為詩文必法古人才識豪邁有氣節求之者接踵於門所著管窺集易講義若干卷尤愛寫竹梅蘭菊山水禽鳥之類得趣一揮極其工緻士大夫爭尚之揚歷中外四十年踐履篤實始終如一可謂當代之醇儒矣君生洪武辛酉正月三日卒天順改元五月八日享年七十有七配蕭氏封孺人子男三長允崇次允隆舉進士官太僕寺丞次允升女一孫男十孫女一曽孫二以天順二年某月某日葬某山之原銘曰師道之立自昔為難猗嗟鄒公終老儒冠邑校成均傳道解惑孰出公門都憲方伯仕優而學紹古作程華國之文洋洋頌聲庭訓有嚴濟其世美我銘其藏百世無毁處士崔君墓碣銘處士崔君往歲以子富為吾州來京師謁豫因識其人於今殆十霜矣忽以疾捐館富聞訃悲號奔喪既葬狀其行走豫泣請銘其墓上之石豫嘗識處士固宜銘况重其子之為名守乎處士諱政字以德世居薊州巫山知縣文憲之孫清河巡檢恕之子也處士早孤母張氏鞠之既長能力農以致恆産人或諷之曰以子之才遊庠序取青紫如拾地芥耳何憚不為處士謝曰孤不幸早失怙賴母氏撫育至有今日罔極之恩惟終養圖報而已安能捨膝下之奉而干祿仕乎況出處有命不可幸致也假使造物有意付之子孫亦不為晚鄉人聞而韙之於是一力事母務盡其情庶幾古所謂孝弟力田者平居朴淡自適不事華奢好施豫聞鄉人竇氏之風慕之曰使吾有千金之資必繼其蹤自是度其衣食之餘盡賙貧乏錙銖不遺既遣富入州庠訓勵諄諄曰爾上世宦業不可墜也富奉教惟謹遂起貢士知鄧州則又馳書戒曰汝在官俸祿之外一毫無取於人異日行李蕭然而歸方是孝子用是富在官冰蘗之聲大振處士生洪武己卯正月十六日卒天順戊寅九月二十三日配張氏子男四長即富也次曰宣次曰寧次曰宏孫男五孫女二葬以是歲十二月二十八日墓在州東鳳凰山之麓銘曰身不求貴而不失其貴者孝以事親而天爵存其衷也行不求名而不失其名者義以訓子而人爵在其躬也况景仰哲人而允蹈其善蹤者乎宜慶澤之流方殷而未窮也銘以勒石潛德具彰嗚呼窀穸將無憾於深藏處士許君墓碣銘承族之微由已著之必其善行出於尋常否則未必能之也承族之著由已微之必其惡行下於尋常否則未必若是也以此論之曰著曰微是皆有以致之者若處士許君士榮殆所謂由微而著者乎處士世居杭之仁和其童丱時已失怙恃孑然孤弱無彌月之儲人不堪其憂而處士能勉自樹立殷勤治生不數年遂有恆産日益月盛家用以饒鄉之右族罕與儷者嘗自嘆曰家門衰替之餘不自意其享有今日然力能致富不過陶朱猗頓之流耳吾聞君子所貴乎富者以其能好禮也於是奮志力學日考德問業於章縫牧校翼翼然不少怠且痛自刻厲行已待人一以謙卑自牧而橫逆之來亦惟以自反為主因號容菴以見意又悟積而能散之義以施與為樂里有匱乏者每每賙給之不厭正統間值歲歉邑人大飢有司賑之不能遍處士慨然曰鄉人多餒而吾獨飽可乎遂出榖五百石以助官凡通衢甓甃歲久而壞與夫祠宇橋梁之弊者處士悉出財修治之處士為人襟度瀟灑雅愛清致所居隙地濬為池沼植以芙蕖壘石為山嘉卉美木駢羅其上暇日延搢紳之士觴詠其間時誦邵康節四太平世之言曰吾其庶幾乎幼子曰傑性頴敏遣為學諸生處士每程其業而䇿勵之歲庚午乃領鄉薦登太學天順改元選擢監察御史將有封命之榮而處士一疾不起矣享年七十有二洪武丁卯其始生之年也娶同邑鮑氏女凡處士起家皆藉以內助而恆以不逮侍舅姑為恨歲時祀事必躬必親待族黨禮意周洽撫諸子慈而能教每處士有所施與必欣然順之無吝意洎處士屬纊驚惶悲感同日而沒鄉閭莫不嘆異享年七十有四生子四人長曰誠次瑛次俊次即傑女二長在室次適丁勉孫男六人孫女五人嗚呼處士之家自微而著者如此其善行豈可使之泯泯無傳哉銘曰成家之難譬之升天家聲復振在彼後賢矢心不渝乃有恆産孰將凂之流俗淟涊乘衰之極遂熾而豐鄉有巨室莫之敢雄君也奮然思進於學譬之鳴蟬脫此汙濁我既盈矣將之以謙犯而不校匪涼匪炎解槖周貧曽不少倦匪恤人言行我之善優遊暮景家以大成適情山水用畢此生有美一郎登庸烏府蘭玉蓁蓁以篤純祐高壽全歸復何憾焉矧與良配同此逝川峨峨澗松挺出茅葦我為銘辭永昭二美古穰集卷十四
