body:
  text: 古穰集卷七明李賢撰序送考功李先生致仕序考功李先生年六旬有五以員外郎秩滿在正統八年夏五月一日不謀于妻子不告於寮友獨狀老疾於冢宰决意請休冢宰方注意薦之乃欵接良久猶豫未允既三日不行先生乃懼留之果遂抗章納祿辭極懇切命下亦不决屬之吏部先生復白于冢宰至再至三猶弗許輿論紛然謂先生學醇望重况未及引年不可釋選部郎中張君留之不獲至於泣下遲命浹旬冢宰以先生之志終不可奪宜遂其髙為請於上允之內閣大臣聞之悵然謂適加品題若李某者非六卿之二則方伯之長顧去已成矣食不下者竟日嗟夫先生果何修而得此哉蓋其所存所行必有卓乎不可及者賢獲從先生之後八年于茲其精微逺大雖未能識至於耳目所見聞賢悅之學而未能者尚可道也飲食之甘舉世之所好也而先生珍味不嗜于口衣服之美舉世之所尚也而先生縠綺不著於身干名附勢衆人之所蹈也而先生逺之髙位厚祿衆人之所慕也而先生薄之其所好尚慕蹈獨異乎世之人者何也蓋先生之所好者淡薄所尚者儉素所蹈者恬退所慕者天爵惟古之人是同宜乎與世之人固有如圓鑿方枘之難合然則難合如此宜見疏於人及其去也識與不識咸以為惜何歟于以見天理之在人心有不可得泯者或曰朝廷清明世道亨泰尊賢使能不靳爵賞雖逺方僻壤髙人端士自蔽於不耀之地者咸振衣興起願立于朝况先生以宏博之學正大之行居考課黜陟之地為士屬望已久自宜遷秩崇髙揖讓於公卿之間以佐化理今乃果於求去吾黨之士未有所聞賢曰先生起自布衣登名進士歷官于茲三十餘年今乃早圖晚節以全始終其有補於士風不小子之云云奈何或乃憮然為間曰命我矣賢以門生辱先生雅愛不以形穢自鄙敬書此為别送郭司訓之任黃巖縣學序世嘗說古之君子大過於人今之君子不及也又謂今之人無復有如古人者豫竊疑焉以為人之常情慕逺而忽近喜傳聞輕見知自古而然未必今之人盡不及古古之人盡過於今誦斯言於人無不以為然者已而靜觀世故大要以今之君子所存所行驗之乎詩書所載則又大有不相似者翻思前日所然之言又甚惑而不可據孟子曰君子有三樂一則曰樂得天下英才而教育之蓋古之君子誠以是為樂不誣也今之職斯樂者非校官乎然而天下之士出登仕途內則為公卿為大夫外則為藩臬為郡邑雖有大小之異莫不皆以為樂至於校官之授必有不懌然者均是務也古人以為樂今人以為不樂其所好尚若是其背馳也則今之人誠不類於古之人矣既而思之教育英才固為可樂茍在我者無教育之具縱得是職不能一朝樂也雖古之人能得是樂者無幾使今之君子果有其具豈必下於古人之樂哉蓋古之君子在春秋時惟孔子有其具得是樂戰國時惟孟子有其具而樂未遂漢之董唐之韓具亦有而未能樂文中子似有其樂而具則未在宋惟周程張朱有其具得是樂而安定亦然在元北有許南有吳具與樂亦兼有之然則是樂也豈易得哉惟古之君子大過人者能之今之君子不及焉宜乎得是樂者寡矣郭君用輝常之無錫人自幼見樂於其師為學益富而未已又有得其可樂之具乃歌鹿鳴上春官遂登乙榜擢台之黃巖訓導夫天之於人也不枉其才郭君既有可樂之具又得其職且黃巖之士學有源委可教可育者有其人焉非如徒有其具而不得其樂者此吾知郭君之樂將無愧於聖賢君子之樂矣考功李先生實出其地賢辱在門生謬為所知命序郭君之行敢以是告魯氏族譜序案富珠哩原作孛术魯故仲禮以魯為氏太學生魯仲禮持其族譜一編詣豫告曰吾族本孛术魯姓國初入版籍去孛术字先世歷有顯人文章政事具載元史而家無譜系吾懼夫族屬之無統也作魯氏一譜然世代綿邈不能逺引乃斷自諱德者為始歷子孫至震凡七世據可知也願為我序之俾族人知所紹而後世知所述以不忘水木本源之義焉豫聞而嘉之以謂江北故家子孫弗克世守先業非盡不肖也厄於兵燹故耳有或一遭是厄子孫流散隨處家焉茫然不知世系所在相逢不異於途人孰知以是為念而能追考世次乎仲禮獨惓惓於此其賢於人逺矣夫譜系之作豈徒然哉非欲矜眩閥閲誇示鄉黨也將以推本反始也將以辨昭穆叙親疏睦宗族化鄉人也由是而得尊祖敬宗之道焉豈非仁人孝子之用心歟古者人尚譜系之學家藏譜系之書是以天下之人貴賤有常而宗支不混奈何五季以來其書既散其學不傳而此道於是乎蕩然矣近世大夫間有能修舉者多出於江南蓋無兵燹之患故家子孫猶能世守其業而譜系固可舉也今魯氏出於內鄉內鄉江北之地也乃有七世之譜焉非子孫之賢孰能致之觀其歷世簪組後先相望其曽大父文靖公翀文章政事擅名前朝仲禮尚思繼述以振揚家聲期無愧於文靖可也雖然本深則末茂源逺則流長理勢之必然也仲禮為人淳雅好學異日必有光先世者吾是以知文靖之澤未艾也詩云子子孫孫勿替引之尚驗之魯氏之門是為序送朱縣丞之洛川序吾友朱有年為人倜儻有竒志蚤入學為諸生從明師遊識見迥出輩行既登太學所交益廣所聞見益博為仕之方洞然於胸次蓋持此以待其用素矣特未知利器見别於何地耳今年春謁選吏部無慮千餘人有年以太學區别例試于考功歸于選部品藻于冢宰列狀以聞命下得陜之延安洛川丞鄉之宦遊或觖望謂斯職未足以滿其才而有年亦有不懌然者豫聞而惑之曰其亦未之思也古之人寧願才有餘而不患位不至以有餘之才而居未顯之位茍盡其當為則力可能而功易成况丞之職所以二令於一邑豈可不加之意乎昔吳門葉芑丞於潛嘗曰官無庳崇職無簡繁事無難易惟敬則行以此見重於咨夔意者取其能敬職業有合乎孔子所謂執事敬者世之人往往不足於丞必以昌黎所作崔斯立記為援殊不知彼有激而云不然昌黎王承福傳政以戒夫食焉而怠其事者而又述斯立之語以開之無乃不可乎吾知昌黎必不如是自矛盾也有年盍亦慮諸試觀今之髙官大職未有一蹴而至者率有漸也蓋行逺自邇登髙自卑理勢之必然以有年之才固不止此行將躡要津躋膴仕以遂厥初心茲之往也惟隨其分之所至而盡其職焉無戚戚可也若夫擇便為㕔斫桷鏝壁面山而俯沼嘉卉美竹儼立而森列玩游鱗聽幽吭坐密䕃弄柔芳吟哦以自適曰丞負豫豫不負丞亦無取焉耳送南陽楊推官序南陽中州大郡也其屬十有三縣居其十山川明秀土地膏腴人生其間者有東漢風士尚節義民務農業其為訟也簡其為俗也淳守茲土者往往馳名至有不尚刑而蒲鞭示辱者斯固德化之所致抑以民生易擾也自漢以來郡之刑訟太守兼之後唐始有推官之制宋元及我朝因之誠以一郡之大有政焉有刑焉政以為治刑以輔治治之不專則刑罔而政弛是故以守出治同以佐之通以贊之而刑則付之於推焉然委政何備而待刑何嗇于以見人君之治天下也惟尚德政民有不一然後刑焉故曰刑者輔治之具也書曰士制百姓于刑之中以教祗德若夫專務黷刑以為治無乃昧於本末輕重之義乎吾郡推官楊公玉華世家蜀之儀隴為人慷慨有氣節領鄉薦入太學正統改元之三年以選人優等擢今職嘗舉孟子之言曰矢人豈不仁於函人哉矢人惟恐不傷人函人惟恐傷人故術不可不慎也吾非學申韓之學者奈何務此既又曰古人所謂積隂德於冥冥之中者率由是道吾何歉乎哉於是破崖岸置邊幅一切獄訟務求其情三載之間大畏民志而庭間若無事者茲以考績書最而還郡人榮之請豫文以贈惟吾郡之風土既如此而楊公理刑又操心如此則民俗加淳不言可知而蒲鞭可復見於今日已楊公往任益用其心哉他日又將大書特書以俟觀民風者録焉送夏公瑾還鄉序天之生物萬有不齊而物之成敗亦萬有不齊若夫人又物之最貴而靈者其在世也又有吉凶榮辱窮通得喪之不齊焉且以士之在仕路者觀之通達於前者或蹇滯於後遭遇於後者或坎坷於前又或前後屈焉而伸於中或中屈焉而伸於前後求其所謂富貴利達始終得意而不失者殆千百之十一也豈非天地乘除一定之數出於自然而不可移易者乎古之君子有見於此惟盡夫在已之道而已其於禍福之來一聽於天初不芥于心焉故曰君子居易以俟命又曰莫非命也順受其正奈何世之人之未達也得意則喜失意則悲甚至未得意之時冥行妄作以求之未之有得秪見其失也或既得矣恣情縱欲以騁之卒亦不能保其得焉若是者非正命也諉之於天不可也然則古之君子能盡在已之道是以俯仰之間無所愧怍卒之禍去而福來在易履之九四曰履虎尾訴訴終吉言能戒懼以順自處則終免於危而獲吉也今之君子其亦有能若是者乎吾友夏公瑾始舉進士官吏部之考功十有餘年可謂通達於前矣已而獲譴謫戍邊城離患者十有餘年豈非蹇滯於後乎茲者遇霈恩既釋其戍復官其身俾還鄉里是又所謂屈於中而伸於前後者矣蓋其所守之道同乎古之君子故能如履之九四卒之禍去而福臻焉公瑾姑蘇人其鄉里衣冠文物之盛甲於東南諸郡蓋不減於宋時洛陽也先達耆舊宿德雅望之老皆公瑾平昔相知之稔者公瑾斯歸林下又增一人矣耆英之㑹所樂何如哉然公瑾所以得是樂者實天之所為也尚勿忽其在已之道以為始終全人庶幾朋友之望乎行稿序詩為儒者末事先儒嘗有是言矣然非詩無以吟詠性情發揮興趣詩于儒者似又不可無也而學之者用功甚難必專心致志於數十年之後庶幾有成其成也亦不過對偶親切聲律穩熟而已若夫辭意俱到句法渾成造夫平易自然之地則又係乎人之才焉嗚呼詩豈易言哉豫往時亦頗好詩但無專心致志之功加以才思疏拙欲耽佳句卒不可得且能妨廢讀書工夫用是不屑為之已數年矣茲者奉命有事於蜀川凡道路之間目之所經發乎情而句亦成第恨鄙俚不能佳耳即欲投之丙丁不如録之以俟善詩者之運斤焉賡詠杜律序豫以公事幹當蜀川暇日無以自遣因得杜律一册詠之不已復賡其韻或曰世稱杜詩冠絶古今以為聖於詩者詩至於是天下之能事畢矣惟太白能與之齊名後世雖有作者願立下風莫敢與之抗也文人才子莫不竊效其體製隂襲其辭意而不敢明和其韻第恐和之不如徒取譏於人也子何不此之顧耶雖然恐取譏於人而不敢和者詩人之慮耳吾非詩人也特憐子美之才不為世用而坎坷終身鬱鬱不遂之懷往往發泄於詩蓋苦其心志行拂亂其所為者豫自思身雖未嘗經此亦當驅意於此使知古人所遭之地庶幾亦能動心忍性增益其所不能耳初不計其可也君子幸勿以為僭焉景泰三年嵗壬申冬十月吉日慎獨子寓錦城序平隂王夫人王氏挽詩序禮曰弔於葬者必執引執紼言送葬者必挽引紼以助其力不言有歌詩也及觀春秋時齊將命其徒歌虞殯解之者曰是送葬之歌曲也乃知挽歌之來逺矣莊子曰紼謳以生必於斥苦言必起於促急用力之疏緩者或曰鄰有喪舂不相里有殯不巷歌安有送葬而反歌者乎豫曰舂相巷歌止於齊力而已執引執紼而歌者不惟齊力而又寄其哀焉詩曰君子作歌惟以告哀挽歌之意亦猶是也或曰歌以寄哀則聞命矣果出於執引紼者之歌之也則可今之為挽詩者初則未嘗執引紼也不幾於妄乎豫曰不然孝子之心雖極其哀然不能自叙其情也必托之聲詩則孝情於是乎暢矣豈必出于執引紼者而後可哉又曰公卿大夫之喪為之挽詩可也而夫人之喪亦為之可乎豫曰此孝子傷其父母之情禮無彼此之間也記曰自吾母而不得吾情吾惡乎用吾情所以必索詩以哀其親者亦情之所不能已也成國朱公嘗詣豫告曰先母棄世得縉紳大夫挽詩甚富幸先生為序其首豫惟公之父平隂武愍王及母夫人神道碑銘皆豫之所撰也挽詩之序不可以重辱公固求之不釋也竊思王之豐功茂績與夫人之淑德美行具載碑中不宜復贊特序挽詩之所從來以貽之嗟夫世之勛臣子孫率多溺於富貴視詩書為外物薄倫理而不由今公乃能從事詩書克篤忠孝於親既沒之後猶惓惓不忘托於聲詩以叙其哀則其所存異於常情逺矣由是以知平隂之澤其未艾乎贈少詹事孔君序甲戌之嵗三月一日廷試天下舉子簡命儒臣讀卷豫忝與焉方試之初執事者報少一人驗其名乃孔公恂也僉曰孔氏子孫本朝鮮有與廷試者幸而有之豈可遺之即遣人召入問其故愀然曰適聞父病亟也僉曰訃音未至宜就試如令孔君黽勉從之時司晷已報午矣策就猶先於人第在髙等豫時歎曰孔君所存所學如此信乎為聖者之後也已而拜禮科給事中敷奏詳雅恭慎不怠士林莫不重之天順改元皇上復正大寶慎選才能列于庶位既識君不欲輕用遲之蓋數嵗矣癸未春詹事府缺人上曰宫僚務得正人如孔公恂司馬恂可也遂同升少詹事搢紳聞之無不欣悅以為得人其僚友之厚善者請文以為贈豫惟先聖之裔文學才行功名事業後先爭光者自戰國而下可數也若斌若安國若融若頴達若巢父若道輔又其表表者蓋聖人之德之功同乎天地而慶澤宏衍綿綿不替有不期然而然者矣雖然天下之士讀聖人之書者莫不遵聖人之道而不敢違夫然後無愧于聖人之徒况為其子孫者乎茍於聖人之道而少有違焉其愧比之常人蓋倍蓰矣可不慎與觀孔君聞父病亟不肯就試孝親之心誠矣敷奏詳雅恭慎不怠忠君之志著矣今茲膺寵擢以輔元良豈無自而然哉雖然未可以是自足也必使文學日富才行日髙功名事業日進與前所謂表表者並美於千百載之上庶幾其無愧乎君先聖五十八代孫是為序送固始教諭姜貴憲序人之為師出於自立者難出於受職者易夫自立者非有朝廷之命而四方之士自然景從雖千里之逺負笈而至蓋非學博識廣德尊道隆灼然可以為人模範者不足以致之此其所以為難也在古有能之者若漢之董馬隋之文中子宋之孫石程朱是已是數君子後世仰之如孤松挺秀於黃茅白葦之中豈易得哉若夫受職者非有自立之能而往主師席學不必博識不必廣也生徒之他適以法拘之而已德不必尊道不必隆也弟子之相違以勢臨之而已此其所以為易也若是者自古至今人得而為之今有人焉有自立之能而復受朝廷之命殆所謂難易兼得者矣姜君貴憲江西番昜人與豫布衣交也相知最稔昔在鄧庠時豫與之約曰有過相規明友之道也而今而後當留意毋忽焉君曰諾遂於處已接物之際互相察之自朝至暮豫得姜君之失者不過二三而姜君得豫之失者每至四五於是乃知姜君資質之美豫不及也已而豫登仕路君亦還家入郡庠後進之士皆從學焉久之多有成效往往登巍科躋膴仕于以見姜君别後其學識道德必有過於人者其於師道亦可謂能自立者矣今乃膺貢而來慨然有造就人才之志遂得固始教諭君往矣慎勿以易者自恃而尤以難者自勉庶以副朋友之望焉嗟夫豫與君不相見者二十年矣使吾不得聞過不幸孰甚茲獲㑹晤方藉以相規而未及再期又復告别麗澤之益復於何時而可得乎於其行也悵然于懷乃述師道難易及相從之舊為贈且寓責善之意云一路恩榮序豫始入學讀曲禮至士無故不徹琴瑟不知琴瑟之聲何如與不徹之意安在及讀樂記至君子聽琴瑟之聲則思志義之臣解之者曰絲聲有亷制裁割之義人而亷隅則志不誘於欲然後知不徹之意有在而琴瑟之聲尚未聞也已而登進士官吏部適浙之浦洪氏以上舍生謁選聞其善琴乃禮致之來浦君為一鼓之其聲音節奏輕重疾徐各極其至而亷制裁割之義未嘗不寓其間傾聽之際雜慮頓消有不知手之舞之足之蹈之也從而學之得數曲焉顧於指法雖未精熟而琴中之趣則已識其一二矣未幾浦君擢尹名邑而去天順二年秋上方留心於禮樂思得善琴者於萬幾之暇時一聽其聲音以養中和之德召臣賢以問因以浦君對乃自句容尹召至京改大理評事尋又進寺正浦君間持一卷來告曰洪自幼好琴誠得其趣思樂之終身洎擢官知縣又以為喜謂得琴堂焉既至句容乃知不如子賤之在單父也蓋是邑密邇南畿政務繁劇且公私往來之人如絡繹然為縣官者奔走迎送之不暇甚至不脫衣冠而寢稍或不及便為得罪一旦詔㫖下臨如去平地而上青霄也如釋重負而恣逺遊也如蟬之蛻以騰飛而吸沆瀣於叢木之顛也自句容至京師雖數千里之逺不啻若百步之近感恩榮之遽加免叢脞之煩擾乃繪圖為卷題曰一路恩榮惟執事賜之一言乎豫謂浦君以善琴召用獲被恩榮如此蓋非常之典也尚圖報稱而勿忽使南風解愠之詩復見于今上庶幾恩榮之無忝乎賀劉克明升通政司參議序歲在丁丑之春皇上復登寶位改元天順簡任才能一新庶政時則有若劉君克明居近侍任言責劾大臣之不法者奏對間雅聲音嚴正聽之悚然令人起畏心上甚偉之越數月通政司以缺佐聞上曰朕得其人矣比宣奏章者惟良顯哉適克明奉使親藩於外既還遂拜右參議已而敷奏詳明一時未有出其右者僉謂上之擢用克明誠當其才也嗚呼咸若時世無遺才才無枉用庶績咸熙不占而得矣雖然此特才之見於外者耳其存於中者人尚未知之也吾聞克明早以禮經魁陜之鄉試登進士髙第其經濟之略平治之具必有卓然出乎等夷者上將察其所存而超用之豈但如是而已或曰若子之言將謂是職未足以盡克明之才乎且今之通政即古之納言舜命龍曰汝作納言夙夜出納朕命惟允夫以龍在虞廷任斯職也未聞不滿其才雖克明之賢不讓於龍而居龍之官夫豈少哉豫應之曰納言之任固云重矣非才兼內外者不足以勝之但克明是職由才之見於外者而得必欲稱之非展其內之所藴不可也豫前所云特以逺大期之耳然則是職固不足以盡克明之才乎矧克明年富力强才之所就終當不止於此在乎勉之而已都給事中王君鉉輩請豫文以賀克明豫非長於文者辭不獲則書此以貽之古穰集卷七
