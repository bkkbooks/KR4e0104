body:
  text: 古穰集目録别集類五明巻一奏議巻二奏議巻三書巻四記巻五記巻六序巻七序巻八序巻九說題跋巻十神道碑巻十一神道碑巻十二神道碑巻十三神道碑巻十四墓碑墓碣巻十五墓表巻十六墓表巻十七墓誌巻十八墓誌壙誌巻十九行狀傳巻二十祭文銘箴贊賦哀辭巻二十一五言古詩七言古詩五言律詩巻二十二七言律詩絶句巻二十三和陶詩巻二十四和陶詩巻二十五天順日録巻二十六天順日録巻二十七天順日録巻二十八雜録巻二十九雜録巻三十雜録臣等謹案古穰集三十巻明李賢撰賢字原徳鄧州人宣徳癸丑進士官至少保華葢殿大學士諡文達事蹟具明史本傳賢為英宗所倚任知無不言言無不從自三楊以來得君未有其比雖抑葉盛擠岳正不救羅倫諸事頗為世所譏議要其振飭綱紀奬厲人材屬朝野多故之時能以一身搘拄其間其事業實多可稱道至文章本非所注意然其時去明初未逺流風餘韻尚有典型故詩文亦皆質實嫻雅無矯揉造作之習此集為其婿程敏政所編凡奏疏二卷書一巻記二巻序三卷說題跋一巻神道碑四巻墓碑碣一巻墓表二巻墓誌二巻行狀傳一巻祭文銘箴贊賦哀辭一巻古今體詩二巻和陶詩二巻天順日録三巻雜録奏疏雜文三巻多有闗係當時政事人物可以偹史乘參核者其天順日録世有别本单行已具論于史部中兹亦姑仍原本併録之焉乾隆四十三年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
