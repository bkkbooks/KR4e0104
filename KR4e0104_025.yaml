body:
  text: 古穰集巻二十五明李賢撰天順日録正統十四年間上在位未嘗有失德事當時王振擅權致有土木之變上既回鑾入南城天下人心慕向不衰及景泰淫蕩無度臣民失望一聞上皇復位無不歡欣鼓舞及石亨張軏輩竊弄威權人又失望有御史自河間來者言石亨家人霸占民田上謂賢與徐有貞曰御史敢言如此實為難得亨輩遂謂賢與有貞主使不然御史安敢如此遂於上前訴其迎駕奪門之功且言賢等欲排陷之悲哭不已上不得已依其所言召言官劾賢與有貞下之獄是時士大夫莫不驚懼方喜上嘉御史敢言以為朝廷清正可卜不料如此是日忽雷雹大作大風㧞木承天門災京師震恐翌日即將賢等降除叅政等官人以為感召天變如此其速亨輩之家大木俱折氷雹尤甚皆恐懼不安遂有此處置不然賢等安得即出上亦心知此輩之非但以初復位亨等又自以為功日在左右前後只得循從越二日上曰近日主張行事皆是徐有貞一人李賢在朕前未嘗有妄言今與有貞同責於心不堪即召吏部尚書王翺曰李賢不可放去還欲用之遂轉吏部左侍郎上之復位天下人心無不歡戴若無亨輩擾擾左右前後皆得正人輔導行事三代可復不幸而遇亨輩䜛言一入未能遽解數年之乆言路猶塞所謂開國承家小人勿用可不戒哉上留賢為吏部左侍郎時石亨聞之愕然而怒然無可柰何及見賢忸怩有恧色已而反加親厚且以酒盃接殷勤之歡或有宣召同事喜見於面若獨召賢心便生疑惟恐毁其短乆之見賢惟誠無偽方不介懷但數日不䝉宣召心便不安必假以事而進出則張大其言及寵恩所加使人畏其勢而羡其榮然所言大抵私情十八九在朝文武之士踈者雖正以為邪其趨媚親附者雖邪以為正原其所存不知天理為何物惟利是尚欲其不敗難矣天順改元復位之初學士陳循輩斥去惟徐有貞等三人衆論謂賢宜入閣石亨聞之宻謂賢曰請子入閣賢即固辭曰不可時賢為吏部右侍郎亨即言於上曰吏部尚書王翺老矣可令致仕即報翺上疏自陳已許之矣亨見賢曰翺已休致君代之矣賢曰朝廷不可無老成人况翺雖老精力未衰以賢輔之可也賢何敢當此重任亨曰事已成矣為之柰何賢懇求不已明日亨言於上曰李某以翺不可釋左右亦賛其說遂留之衆論復欲賢入閣翺聞賢留之不樂曰吾計决矣何故見沮賢曰所以留之者非為公計為朝廷慮也已而賢為石亨輩嫉而黜為福建參政上召翺曰李某非其罪不可釋去翺曰既不去福建令徃南京可也上曰南京亦逺留為吏部左侍郎翺不得已而從之翺之欲賢逺去者非惡賢也恐亨輩害之幸使離此庻免其害耳天順改元之初天下人心莫不欣恱歸向徐有貞以迎立有功命入閣與議國事賢亦為衆論所推入閣與有貞同事上銳意委任寵眷極隆賢自念遭逢之難助有貞展盡底藴知無不言謂太平可立而待凡用人行事一以公道處之左右遂不能堪初太監吉祥以有迎立功與國政不通文墨恐事歸司禮監以此極力贊說凡事與二學士商議而行意欲籠絡附已及論薦文武士有狥私者賢等持公道以沮之祥亦不恱㑹有御史楊瑄言太監吉祥總兵石亨家人占奪民田乞加禁約上嘉其敢言祥在傍見斥其名初甚慚懼已而盛怒欲罪之上不許乃已及石亨出兵回聽左右言忿然訴御史不實意有貞與賢主使且激祥曰今在内惟爾在外惟吾彼欲排陷其意非善初祥見亨濫冒陞賞意甚不平每訐其短及聞亨言其勢遂合曰内閣専權欲除我輩上初信其說而從之遂置有貞與賢於獄是日晩雷電大作雨雹如注大風㧞木祥之門老樹皆折亨之宅水深尺餘明日即赦而出之初言官欲論亨不能振作兵威敵復入邊又歴數不法事情附勢者潛泄於亨亦謂有貞主使其都御史御史逮之一空朝野愕然莫不失望言路從此不通矣景泰間山東連嵗災傷天順初人猶饑窘已發内帑銀三萬兩賑濟有司以為不敷乞増之上召有貞與賢曰可從否賢對曰可有貞怫然曰不可不知其弊者以為可臣嘗見發銀賑濟小民何嘗沾惠俱為里老書手得之賢曰雖有此弊猶勝於無銀上曰增銀是也吉祥亦曰朝廷錢財如山不必吝惜有貞不得已從之遂増銀四萬兩有貞退而不樂賢曰先生悞矣朝廷欲出内帑濟饑民而我輩反沮之萬一廹而為盜責將誰歸蓋其初不論可否惟欲事事出於已古之人惟其事之當而從之不必出於已也後上亦覺有貞之非嘗曰如増銀濟民一事有貞不然先生之言其謬如此天順初副都御史年富被石亨姪彪奏害自大同逮擊至京上曰此人何如賢對曰行事公道在彼能革宿弊上曰此必石彪被富阻其所行不得遂其私耳賢曰陛下明見真得其情須早辯之幸甚明日上召錦衣衞指揮門逹曰年富事情務在推問明白已而進狀果多不實賢曰須遣人體勘庻不枉人上曰然乃遣給事中郎中二人上曰再遣武職一人同徃不然縱得其實彼必以為回䕶賢曰陛下所慮極是勘回果無實狀富遂致仕而歸天順初石亨招權納賂文武大臣多出其門奔競成風士大夫不知廉恥節義為何物賢深憂之思欲息此風適廷試舉子以求賢安民二事問之欲得真才止奔競以正士習時都御史缺員有行賂於權貴之門者薦其名上知其不可問賢可以勝此任者且曰若耿九疇何如賢曰陛下得其人矣此人廉名素著士林重之未幾九疇自陜來遂拜都御史上召見戒諭諄切深愜輿論天順初上以郕王薨欲令汪妃殉葬賢因奏曰汪妃雖立為后即遭廢棄幽閉幸與兩女度日若令隨去情所不堪况幼女無依尤可矜憫上惻然曰卿言是朕以為弟婦且少不宜存内初不計其母子之命一日上曰汪妃既存不宜在内欲移居舊府何如賢曰如此誠便但衣食用度不可缺減上曰朕更欲加厚豈可減乎其原侍宫人悉隨之復遣老成中官數人以備使令由是母子保全甚得其所天順初敵帥博囉近邊求食傳聞寳璽在其處石亨欲領兵巡邊乘機取之上曰何如賢曰景泰以來連年水旱災傷府庫空虛軍民疲困已極陛下初復位正宜與之休息况敵人雖近邊不曽侵犯今無故舉兵伐之恐不可若寳璽乃秦皇所造李斯所篆亡國之物不足為貴上曰卿所見極是莫若只遣通事賫賞賜以與之賢曰聖慮如此庻幾允當明日召亨曰且未可舉兵先遣通事探其逆順俟其回報處置亨意方止於是遣都督馬政徃見博囉厚與賞賜深知感恩但其餘部落為梗得博囉保送使臣而回賢自再入閣立意退避必待宣召方趨侍不然只在閣内整理文書封進雖十日不召亦不徃上乆而覺之且厭石亨輩朝退頻入見或因小事私情或無事亦報入見一日上召賢曰先生有文書整理每日當來若其餘總兵等官無事亦頻來甚不宜令左順門閽者今後非有宣召不許擅進上意謂賢當來賢亦不自入必有宣召而後入然上意漸加向從凡左右薦人必召賢問其如何賢以為可者即用之不應者即不用但賢惟以正對上亦漸覺二年郊天後上一日顧賢曰朕居南宫七年危疑之際實頼太后憂勤保䕶罔極之恩欲報無由可倣前代尊上徽號何如賢頓首曰陛下舉此莫大之孝也於是命擬徽號賢定四字曰聖烈慈壽詔示天下人心大恱慶賀禮成太后深慰喜之復加贈其親以榮所自太夫人董氏壽方九十兄弟五人長廕㑹昌侯次皆髙品子孫數十人皆爵禄之左右又有為其次兄求陞者一日上謂賢曰外戚孫氏一門亦足矣復希恩澤以為慰太后之心不知太后正不以此為慰比者受其子弟官時請於太后數次方允且不樂者累日曰有何功於國家濫受禄秩如此然物盛必衰一旦有干國憲吾則不能救矣今若聞此必見怒矣賢曰此足以見太后盛德因問祖宗以來外戚不與政向為侯者與此不審太后知乎上曰太后正不樂此初為内庭近侍惑以關防之說至今猶悔賢曰此尤足以見太后之髙但侯為人淳謹後不可為例耳上曰然禮部請太子出閣讀書上召賢謂曰東宫讀書當在文華殿朕欲避此徃居武英殿但早晩朝太后不便姑以左廊居太子卿可定擬講讀等官卿宜時常照管且曰先讀何書賢對曰四書經史次第講讀宜先大學尚書上曰書經有難讀者朕昔讀至禹貢及盤庚周誥諸篇甚費心力賢曰讀書經法先其易者如二典三謨太甲伊訓說命諸篇明白易曉可先講讀上曰然寫字亦須用心朕初習字侍書者不曽開指下筆法任意寫去及寫畢令其㸔視又不校正以此寫字不佳賢對曰寫字亦不必求佳但㸃畫不茍且率易為善上曰然及定擬講讀等官將二十人上一一品其人物髙下皆當其才其明哲如此四月中上召賢謂曰如今各邊革去文臣廵撫十分狼狽軍官縱肆貪暴士卒罷敝且曰朕初復位奉迎之人紛然變更以此為不便只得依從今乃知其謬也卿為朕舉進才能者用之賢因請曰遼東宣府大同延綏寜夏甘肅此六處要人最急上復曰卿與王翺馬昻商議推選務在得人且曰多舉數人擇而用之於是議推十二人明日進呈遂定浙江布政白圭在遼東山東布政王宇在宣府僉都御史李秉在大同監察御史徐瑄在延綏山西布政陳翌在寜夏陜西布政芮釗在甘肅俱以京官廵撫其地上曰武人所以惡文臣者只是不得遂其私耳在任者即日遣使召之兵部尚書馬昻以貴州賊情甚急速得一人徃理其事於是復以白圭徃時圭適以考績至京即陞右副都御史贊理貴州軍務復以太僕卿程信為僉都御史廵撫遼東㑹昌侯弟顯宗家人私起店房專利以病客商事聞上召賢曰皇親豈可如此法之不行自上犯之賢對曰若陛下以至公斷之誰不畏服乃命毁其房家人抵法顯宗姑免其罪而戒之侯初病既出見上為其弟乞恩終不允上召賢謂曰為侯者不知自責反乞恩澤朕終不允又以母老為辭求之良乆竟從公法賢頓首曰真可謂王者不私矣吏部左侍郎孫𢎞聞喪上召賢曰孫𢎞豈勝吏部賢曰誠如聖諭蓋𢎞以知縣考滿赴京為忠國公石亨鄉里囑留京官又因奉迎有功陞工部侍郎復極力謀求得此士林鄙之上又恐其謀奪情即令守制復召賢曰吏部侍郎乃天下人物權衡非他部比必得其人先生以為誰可賢曰以在朝觀之無如禮部二人可擇一用之上復問其優劣賢曰鄒幹為人端謹但規模稍狹姚䕫表裏相稱有大臣之量上曰然遂用之命下士類皆悦禮部郎中李和託一釋子囑權近求為侍郎士論紛然不平上問賢此人何如賢對不知上悟其意復問吏部尚書王翺亦不甚許他日以學士李紹對上復問賢賢對曰此公論也上遂决奉天門朝畢召吏部發玉音除紹為禮部右侍郎輿論大愜兵部尚書陳汝言坐贓下獄忠國公石亨因齋宿來予朝房内議當此任者難其人賢曰以在朝言之惟都御史兩人中擇一人焉又問誰可賢謂馬昂行事平易亨尚猶豫復㑹尚書王翺薦工部尚書趙榮賢以為不可翺意順其所厚又以昂是鄉里避嫌賢甚不然云此議對越天地鬼神務出至公翺與亨謝而從之一日上召賢問此任誰可賢以昂對上以為然賢請勑廷臣共舉堪任者若髙於昂當用之不然方用昻洎僉議亦以昂遂除兵部尚書上躬理政務凡天下奏章一一親决有難决者必召賢商議可否且厭左右干預察知無非私意嘗於靜中召賢嘆曰為之奈何賢對曰惟在獨斷可以革之上曰非不自斷如某事某事某人某人皆不從其說賢對曰若常如此可矣上曰但依之則恱不從便怫然見於辭色賢曰於理果不可行者宜從容諭之上曰今後彼欲用人不當者先生亦當執而沮之賢曰臣若頻沮其勢必怨惟陛下明見自以為不可庻幾漸能革之上曰然上復位之後因思建庻人輩無辜淹禁將五六十年意欲寛之一日謂賢曰親親之義實所不忍賢對曰陛下此一念天地鬼神實臨之太祖在天之靈實臨之堯舜存心不過如此上遂决即日白太后許之左右或以為不可上曰有天命者任自為之左右聞之皆愧服不能止乃遣中官於鳳陽造房屋畢日上召賢曰今可送去勑軍衞有司供結柴米凡一應器用悉令完具聽其婚娶自在出入給與閽者二十人婢妾十數人遣太監牛玉入禁諭其意建庻人聞之且悲且喜不意聖恩如此時庻人年五十六七吳庻人已没尚有庻母姐㚺老婦五六人有年八十之上者庻人入禁時方二嵗出見牛馬亦不識上召賢謂可發㫖意賢謂此非細事宜諭文武百官上曰然次日宣畢人人感嘆以為真帝王美事既而又有淺見者以利害之言沮之上不聽景泰間太監興安崇信釋教每三年度僧數萬於是僧徒多濫洎天順二年又如期天下僧徙復來京師聚集數萬上召賢曰僧徒豈可如此泛濫賢對曰陛下明見最是宜禁止之遂出榜曉諭今後每十年一度擅自披剃二十以上者俱令還俗違者發邊衞充軍度者俱照定額考送於是僧徒知懼皆散去先是忠國公石亨來閣内議事因說山林隠士聞江西撫州有吳與弼者乃司業溥之子累薦不起實淹貫經書動遵古禮亨慨然曰吾薦之煩子代草章奏即日上之數日不報蓋為左右所沮也一日上召賢問曰吳與弼如何賢曰與弼儒者之髙蹈自古聖帝明王莫不好賢下士徴聘隠逸若陛下行此一事亦本朝盛舉上遂决乃命行人賫勑書束帛造其廬與弼接見之際即謂朝廷厚意如此當赴闕謝恩但本意不受官職就辭幣帛數月未至上問數次一日行人來報至通州矣賢即入言之上曰當授以何職賢曰今東宫講學正宜老成儒者輔導之宜授宫僚上曰何職賢曰庻子諭德皆可上曰莫若諭德之名賢曰諭德有左右上曰與之左賢曰若見畢可召至文華殿顧問以重之上曰然仍以文幣賜之賢曰再與館次張具尤當上許之次日見上發玉音召吏部命為左春坊左諭德朝士皆悚然驚異以為布衣召至一旦授此上召賢曰明日可引至文華殿次日既見引至上前問曰乆聞髙義特聘爾來如何不受官職初不對賢促其對良乆方對云㣲臣草茅賤士年二十嬰疾日加虛怯以此不能出仕山林之下不敢接見一人雖聞犬吠亦驚調治病軀不暇非有髙世之心不意聲聞過情為當道論薦䝉皇上厚意以天書幣帛來聘天使到門不勝感愧因而動作老疾復發延至數月方能起程至通州忽失聲一日又痰作二日洎入見皇上之時幸不痰作况年六十有八老病衰朽之人實不堪供職上曰宫僚亦從容優閒不必辭與弼對曰朝廷之職臺諫之次宫僚為重上曰宫僚亦衆不専勞先生不允所辭終不敢應於是賞文幣四表裏羊酒柴米遣太監牛玉送至館上顧謂賢曰此老非迂闊者務令就職與弼終不就三辭後稱病叩其所以不就之故以勑書太重以伊傅之禮聘之却以此職授之故不受賢謂如此亦固執矣且朝廷致敬盡禮待先生非輕初無不承權輿之意今必欲如傅說爰立作相亦難既稱衰病務當大任倘勢不能行人皆失望不若且就宫僚若果有建明則大任以漸而至不然三辭不允亦宜就職以答朝廷至意間日上謂賢曰與弼既來如何不受職若授職亦不相拘聽其自在候秋凉欲歸亦不固留以俸禄養其終身不亦可乎復命賢諭以此意亦不受賢初見與弼待以賔師之禮於是公卿大夫士無不加敬以為待布衣之重如此近世罕見所以人咸驚訝中官尤不然之賢每為之解云待此所以勵風俗使奔競干求乞哀之徒孜孜於利禄宦達者觀此自覺羞愧孟子所謂貪夫廉懦夫有立者此舉庻幾能之賢偶因右脚指下為手所傷復入湯氣遂致發腫五月二十九日早不能趨朝上即問之左右以疾對即遣太監裴當賫羊酒來視疾六月一日復遣當同太監安寜賫銀五十兩來視又命太醫劉禮調治四日復遣太監牛玉領禮來視六日再遣玉來每來必以政事數十條參定七日趨朝入謝上甚恱且云先生尚宜將息不可多行動也處士吳與弼不肯受職三辭後以疾不能動履留京兩月不敢具本再辭來賢舎訴衷曲乞回賢謂若肯就職或有可行之道且東宫早晩天凉講學凡有輔導進學之法賢必能贊說依行又或因其留可以開聖學賢當乘間進言云與弼於經書義理窮究最精皇上勵精圖治日勤政務凡天下奏章一一親覽自斷比先於經書雖嘗講讀彼時春秋尚早至今嵗乆豈無或㤀况此聖心開明又非前日之比若於萬幾之暇令與弼從新講說發明則陛下於義理愈加精熟由是剖政事益得其當有功於聖治不淺矣又况賢輩早晩亦得請教以治身心以贊治道與弼堅辭謂衰疾不能供職决意乞回又恐上意見譴乞賢成全賢次日早見上言與弼本意亦願供職第以老疾不愈進退狼狽望陛下寛容若不見譴許其具本再辭上曰果然亦難留也賢曰此朝廷盛事若始終成美尚得賜與為善上首肯之且曰既以行人聘來還以行人送歸再與勑書令有司供月粮食米以贍終身賢即拜賀云此舉實帝王盛德之事曠世稀有於是與弼感激無以報稱條陳十事上之復上表謝恩而去古穰集巻二十五
