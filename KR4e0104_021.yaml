body:
  text: 古穰集卷二十一明李賢撰五言古詩擬古嗟我少年士其性非不聰明知為人學仍復蹈其蹤纎毫未有得孜孜伐其功聖賢苦不出吾道誰相宗大言人皆有踐之豈不難所以坐終日兢兢不自安緬惟聖賢學豈徒筆舌間至理瑩方寸外物無能千約之於七情驗之於四端何以能若是返之而靜觀遊學苦不早登科苦不遲雖有聖賢質亦為物所移况我中人下寧敢慕不羈茍無殷勤志衆欲以之隨仰愧而俯怍於道已相離一善不足稱富貴將何為白頭吟古禮重親迎必從父母命是以夫婦間所貴惟其正生男願有室生女願有家茍能待媒妁好合寧有涯婦雖由正道夫猶未可保誰謂私相從一心可偕老嗟哉卓文君相如豈負心婦道既有虧何用白頭吟美人隔秋水美人隔秋水欲渡無舟航清波泛明月對此空斷腸耿耿見牛女河漢在中央誰云七夕會無乃謬且狂託物感情興水上雙鴛鴦動止不盈尺物性固其常在人良不異云胡各一方寒燈照孤寢淚下沾衣裳出金陵江口阻潮匹馬出金陵冠蓋雜途擁日落到江東官舍頗清回秋月當窗明永夜霜氣重孤榻不成眠一鴈度寒隴艤船欲渡江潮勢兼天湧須臾波浪平百櫓相曳踵嘔啞響中流舉目神駭悚安得在周行我命若膠鞏雍熙寺書維揚逢小春風葉散空宇寂寞寄雍熙悲鄉淚如雨何以慰我心燈下援琴撫知音苦未逢芳華為誰吐人日喜晴長年到人日晴少而隂多今年到人日天氣何清和一世能幾逢歡忭將如何縷金鬢邉垂剪綵庭中羅蓂草舒芳葉梅萼點翠娥靈辰不易得擘繭邀相過酒酣發清狂撫劔歌長歌呂梁洪遇風客程過呂梁大風折桅子洪濤衝舟橫一命輕如紙牽攀泊崖下相顧戰而泚人生百年間出處不相似老樗卧空山流槎行萬里勞逸何不同分固當如此展席坐篷窗須臾風亦止日陽精結為日真火空中燃運行有常道晝夜一周天無欠亦無餘不與天相聫圍三徑千里其形如彈圓出谷入咸池紅光耀八埏從知月與星借此光明鮮云何亦見食隂盛月同躔于以象君德但願常昭然月月方太隂精形圓質亦清其體本無光日照方能明望逺翔相隨傍觀虧復盈山河微有影九道分其行左旋最為遲閏餘嵗方成云何望中食太陽射其形于以象后德遜避斯為寧述古稽古有嘉言逸欲戒諄諄大聖若重瞳禹益猶互陳阿衡佐商嗣風愆竟勿循懇懇周太保旅獒却來賔敬觀無逸圖有邦萬世珍夫何事荒怠此道未遑詢飄飄夾林賞艷艷閭須春豈有鴟梟智將同燕雀倫在古垂明鑑休迷覆車塵支頥顧衷曲期不負儒紳嗟彼一心微紛紛衆欲併所以古哲人惕然事針警自新若盤銘常使目在炳楹杖與劔矛丹書更肅整稷廟鑄金人三緘貴深省式觀魯欹器持盈未堪騁亦有睿聖公年耄心愈警旅賁瞽史徒交戒幸無眚顧惟理與義涵養見真境心正意亦誠允矣前修並看書有感銓府務益廣或有半日間乘間看古書忸怩愧我顔聖賢今已矣慨然發長嘆紛紛安厚祿寧復思素餐非無書萬卷曽不誦伐檀緬惟范文正髙名重丘山寥寥千載後誰復與之班黽勉效分寸汲汲不憚煩先憂與後樂志欲回狂瀾安得似魚水不見遭逢難誰云出望水依然在人寰滯畫豈有疾去魯不為膰所願非如此煩君聽猗蘭述土木之難正統己巳秋敵騎忽冦邊聲息一何急頃刻數十傳當寧乃震驚姦臣擅其權悍然挾天子六師聽周旋廷臣既失措將士俱茫然乘輿不自禦疏留行愈堅豈思帝王舉為謀出萬全姦心欲逞威制勝當誰先况彼承平久鬭志良已捐戰陳既不習安能事戈鋋秋髙朔馬驕敵勢方控弦我師雖百里無異羣羝聯土木一以圍裸體相摩肩前途盡倒戈甘心喪其元人馬積若山營中如沸川微軀不可競頽然在人顛幸能脫鋒鏑萬死復相連山深鳥道危一命若絲懸遙遙䀽絶頂恨無羽翼鶱水漿不入口喉吻生塵煙筋力既已疲歷險愁攀緣﨑嶇轉崖壑曽不遇微涓縱有梅林想何由見酸涎晝夜歷三周山盡始得泉歸來問城郭哭聲上青天當死乃不死恍如再生年忽忽過半載悸恙方獲痊敵志益奮發深入踐京㕓豈無貔貅士莫敢衝其前志滿利已得回首齊揮鞭外兵禍中原天意無乃偏國恥未能雪寧忍戴貂蟬壯志幾時畢雄腸何日牽經略到窮髮燕然名可鐫邊烽從此息黎庶始安便一洗朔方功萬古垂青編簡薑貴憲聞過詩古人喜聞過信為百世師君子能成德賴友以相規奈何今之士諱疾而忌醫訑訑距人諫不善何由知心惟恥下問自用不能移甘心守孤陋寡助親亦離若人究其見無乃愚且癡念此恆自省觀生驗我為吾友具三益顧我實所資但願忘人勢有過忠告之武公臻耄耋求戒辭愈卑况豫知非嵗考祥豈憚疲位髙才不稱戰兢恆自持斷斷無他技盍簪意欲縻小德已出入毋俾大節虧望君不我棄善行勗我施俯仰無愧怍致此非君誰幸免取譏誚豈獨相追隨題畫方圖展佳趣二客空山遊峯回石路轉籟息林壑幽斷崖鎖煙蘿隂澗鳴琳球擔頭空翠濕屐齒苔痕留百折度﨑嶇千尺看飛流殘月墮屏嶂枯松挂猿猴溪雲涼帶雨山色淨含秋霜重丹楓落巖深嵐氣浮太行歷危險羊腸任夷猶蜀道古云難攀緣竟何求遙知飛鳥倦疑聞杜鵑愁崔嵬到絶頂髙寒透重裘飄然發遐想俯景豁吟眸會當逢仙子攜手訪丹丘七言古詩金臺惜别玉河隄上楊花飛玉河隄外客西歸晚色蒼蒼慘别恨東風蕩蕩吹征衣昔君從父涼州謫回首家山邈胡越塞閫驚回旅夢孤杜鵑啼破邉城月邉城月缺復圓月光常照玉門關對月空教動鄉思西陲萬里何時還翻懷親友司封客生長相違重堪惜攜琴命駕上京華聚首開懷論疇昔親情契合未云久官舍匆匆又分手煙光二月薊城春祖飢一尊燕市酒行旌遙指夕陽西驛路青山足品題雨霽函關吟處好雲連秦樹望中迷我聞君子擅文武剩有竒謀禦戎虜立志休同燕頷流致身期與嫖姚伍他年霄漢重相逢當時故舊歡無窮皇家金石賜不薄願言壯嵗收邉功題夢萱堂兒生三嵗母即亡母心戀兒魂悲傷兒在童蒙渾不覺母魂惻惻時護防日居月諸兒漸長始有知覺動思想愀然問爺母不存涕泗潸然心惚恍母有魂兒有身幽明無路得相親母向夢中見兒語兒初不識母酸辛覺來問爺驚所見兒説形容爺與辨衣裳總是沒時穿音容不異存日戀兒知是母頓欲絶五內崩摧淚成血毁形便若初喪時饘粥一御哀情切嗟哉衛氏孝且純古有曽參亦可倫天性由來非矯作風俗如此寧不淳人生何幸父母存恬不為養獨何心視此安能不汗恧撫卷因成孝子吟題丘氏節孝傳丘家姑嫂美且烈遭危赴水情默默捨母棄夫非獲已不死必為凶冦得嗚呼此情真可哀悲風為爾從天來苕溪之水清見底玉骨沈處無纎埃姑嫂捐生身既潔母往投之將共絶兒心蒼惶急救母負之出水聲哽咽母既蘇兮兒在邊一門孝節良兼全羣凶相顧咸驚愕棄而去之心茫然世上非無顔色好節義不全何足道獨羡丘家姑嫂心堅如金石貴如寶峩冠博衣為丈夫往往貪生甘就汙若人讀此三節傳面赤汗下空沾膚聖人扶世立名教但使斯民存節孝丘氏芳名永不磨後胤綿綿宜克肖我忝搢紳儒者流此心常為天下憂憂見民風不復古吁嗟丘氏誰能儔秋夜秋夜有餘清耿耿不能寐出户涼意來四野星河墜露氣濕衣裳茫茫宇宙長凌空不可得歸來倒書床記書已成念波冷湘筠簟撫景役吟魂得句還重練須臾天山月一鏡渾無缺坐落半窗明對之心愈潔向來雜慮湯潑雪不知東方之既白喜晴天昏雨方密悄悄幽窗寂就枕已成夢雨聲猶未息覺來氣愈爽風細木葉響紙窗忽已白雲淨月華朗攬衣開雙扉深院凝清輝吟眸四邉開無限秋色來偃仰東方曙林間鳥飛去回首扶桑日正紅歸鴻幾點散晴空新秋雨霽人心喜我心亦與人心同送張尹之江隂江隂勝景接湖海水國名鄉富魚蟹張侯釋褐綰銅章父老欣傳得賢宰秋風潞水片帆輕淮月當空夜正明北固雲開楓樹曉翠光亭古山禽鳴襟懷皎皎氷壺潔僚寀相從盡相恱百里春風錦製新一簾化雨民寃雪卓魯芳蹤良可追德政行看聖主知他時有待徴書至還擬承恩向玉墀聽琴銀河耿耿月華涼有客坐對琴一張金徽玉軫聯輝光拂髯舉指彈清商漆園春夢蝶飛揚花底嗈嗈雙鳳凰碧霄嘹唳孤鶴翔四壁唧唧鳴寒螿嗚咽流泉出澗忙萬壑爽籟發笙簧古戍悲角曉帶霜洞庭秋漲波茫茫巴峽驚湍激石礓突然鐵騎鳴刀鎗長堤栁絮隨顛狂珠林石鼎沸蘭湯雪花六出紛呈祥平沙鴈落滿江鄉喧啾百鳥忽軒昻下流奔急見飛航髙峯瀑布千尺強雷電交作雨霈雱挺然松竹共蒼蒼壯哉不屈百鍊鋼引雛江燕語危檣梧桐飄葉􅑁銀床幽谷叢蘭自芬芳八鸞雲漢聲鏘鏘離騷忠憤志堪傷孤臣孽子意相將在陳絶糧興慨慷演易羑里憂思長肅然環珮步巖廊關關鳩鳥在洲傍觸目感雉飛來雙慟回命短沾衣裳英雄蓋世歸劍芒三命益恭走循牆聖謨洋洋嘉言彰虞廷賡歌際明良千載遺音幸不亡豈云氷炭置人腸棲鸞之桐出嶧陽法象天地圓與方昔聞孔子學師襄杏壇函丈日徜徉爨下焦尾聲琅琅知音爭似蔡中郎正聲感我塵慮忘藹然和氣在中央煩君為我收錦囊來日還銷一瓣香搗衣篇搗衣向中宵銀河月色饒處處砧聲急家家戍卒遙戍卒遙幾千里霜砧續斷聲不已展轉孤衾夢未成風送愁聲入人耳閨情感此淚雙落明月流輝照沙漠寒衣寄得到邉城朔雪苦寒衣正薄公莫舞公莫舞公竟舞龍泉三尺虹光吐鴻門宴上殺氣髙勇士相看勢如虎赤帝龍顔不可傷何用屑屑揚雙璫英雄獨學萬人敵豈知厯數歸真王筵前舞罷將軍醉玉斗聲中霸圖碎不須約誓界鴻溝江東父老難重會城上烏城上烏啼月將落城外秋風起寥廓烏聲啼罷露華晞草樹蒼涼曙光薄都門車馬集如雲離筵勸酒何殷勤酒闌人去棹歌發明日烏啼何處聞獨不見獨不見佳人面二八美如花嬌態人爭羡又不見佳人老鬢邉白髮垂委棄如秋草世間萬事同此輩興衰得喪真相類古來達人每洞觀無辱無榮亦無悔行路難行路難難更苦孤影飄飄無定所關河迢遞渺天涯長風吹夢歸鄉土亂石灘中一葉舟江心白浪風颼颼劍閣崔巍連鳥道縈紆詰屈心煩愁行路難難更險嵗月無情何冉冉山頭夕照樹千行天外秋光鴻數點對景增離憂莫作汗漫逰百樣艱辛在行路不如髙卧藏林丘送俞侍郎還家養疾明良相逢海宇清甘盤舊學功非輕夙資啓沃不可釋聖躬有賴增髙明潛邸師臣已無幾眷注時時荷殊禮忠言正論立朝端帝德光輝日興起如何微恙苦相纒動履艱辛淹嵗年宸衷軫念醫殫術獨坐經幃徒慨然封章懇乞還鄉里寵賚頻繁情不已優遊適意謾珍調平安早報天顔喜片帆髙挂上京船鵬翮重看奮九天保傅虛席待耆德相期事業光無前我忝同寅致私願臨别不勝情繾綣作歌相贈寫離懷目送飛鴻去如箭題卧龍圖漢家神器風波舟姦雄環顧涎欲流斯時誰有匡扶具南陽嘉遁阿衡儔帝室之胄何英偉草廬三顧驚神鬼幡然感激釋耕耘一旦君臣若魚水鼎分畢竟不能休務償初志復神州永安遺恨抱終古出師二表殫嘉猷錦水祠堂宛如故劍閣荒蕪流馬路七擒南徼讋天威八陳夔城訝神護營中星隕渭濵秋五丈原頭殺氣收歸櫬猶能走仲達運移漢祚終難留英雄千載空惆悵商周人物能多讓世間成敗不足憑卧龍遺址人爭訪送户部尚書沈公致仕君不見文富二公當耄耋起復入朝人共恱進退從容大節完千載令人羡英傑又不見廣受二疏歸故鄉冠蓋如雲擁道傍道傍觀者咸嘆息芳名百世猶輝光後來誰可繼前躅今喜司徒更知足再入朝行三載餘浩然歸志如鴻鵠鶴髮童顔近八旬休官髙趣寓鱸蓴籬邉秋興黃花發林下春逰翠竹新天壤之間樂誰比蘭玉盈庭歡不已水光山色獨扶笻月白風清隨泛蟻物外緇巾返自然太平人世樂天年江鄉容與不知老一任人稱地上仙蘆溝曉月此下四首皆代言之作金雞唱徹扶桑曉殘月姢姢挂林杪長河斜抱鳯池西流彩遙連碧波杳橫橋逺亘如遊龍明珠影落長河中桂魄千層琥珀瑩蟾光萬頃玻璃同霜葉飄飄綴馬鬛沙河閃爍黃金屑蘆荻聲乾風力寒煙霏才上銀河滅往年幾暇曽一臨碧波渺渺蘆花深千官振轡發歸騎月華猶在西山岑西山霽雪太行西來幾千里突兀連峯半天起朔風吹雨凝作花玉龍鹽虎相偎倚嫩寒澄霽朝暾紅千峯萬峯如發蒙瑤華散盡錦屏列露出朵朵金芙蓉兹山見説多竒秀况復清明景偏茂日射松梢翠欲流雲開石竇氷成溜捲簾坐對情何濃預為吾民歌嵗豐瑞麥連雲先有兆遺蝗入地潛深蹤薊門煙樹薊門近與都城通佳氣蔥蔥一望中朝煙暮煙自漠漠逺樹近樹皆濛濛居民樂土今百載閭閻相望春長在榆栁分行似幕張桑麻遍野如雲靉紅稀緑暗鳥聲和往來車馬肩相摩酒館紛紛笑語集旗亭渺渺離情多都市樓臺迷逺近殊方賔貢無停運須知此地異尋常會教永作韶華鎮南囿秋風南郊八月天氣清囿中萬木皆秋聲靈臺靈沼足蕭爽似逰閬苑登蓬瀛長堤迤邐疏楊裊十里芙蓉香不了翠柏隂搖輦路涼碧梧影動行宫曉麋鹿呦呦雉兔肥鷗鷺浮沈鴻鴈飛蘭菊總芳時可樂稻梁正熟農無飢時哉逰豫民心喜緬想周文可同軌惜哉漢武縱髙歌不知耕斂真徒耳五言律詩次泐季潭雜詠白蓮沼方鏡無何有亭亭數白蓮潄芳憐後輩遺愛憶前賢築土為髙岸臨流引細泉最堪秋夜靜花月兩嬋姢深居避世尋幽隱山行十二峯茅簷翠竹合石徑碧苔封溪漲一川雨林深千尺松遙聞漁父唱未得一相逢漁隱晦迹知何事生涯一棹中歌聲聞夜月笛韻和秋風有意同歸蠡無心作兆熊達人皆遁世吾道幾時隆入澗有作谷裏誰來往林深一徑通猿啼常對月虎嘯自生風霧重溪流暗霜濃葉落紅何時歸此澗漁舫任西東朝東曉院竹風清珠簾捲畫楹薄雲收暑氣疏雨帶鐘聲棋勝還經慮詩成可細評年年長此日聊復過平生夜雪瑞雪紛紛落殘燈半夜餘獨憐為客日重看古人書夢覺憂還集詩成樂自如遙思乘興客風細片帆舒題送别圖送别都門外江山入畫圖東風吹嫩栁南浦接荒蕪驛路停青斾離筵餞玉壺一朝千里别相贈有詩無寄隱居道人髙隱處茅屋傍松蘿犬吠樵夫至車聲長者過春風多興趣秋月費吟哦忽覺光隂晚衰顔可奈何櫟山雨雨勢到孤峯涼生萬壑松山頭掣紫電雲際挂蒼龍溪漲魚爭躍風狂蝶自慵兒童驚虎過門外有行蹤洞山泉尋幽來洞口洗耳聽泉聲曉色如苔淨寒流似珮鳴芳春無客到深夜有猿驚不敢多時立松風透骨清故人見過誰知霄漢客復意到山阿花栁春偏勝風煙秋最多彈琴得雅趣攜酒費吟哦異日著雙屐還來訪薜蘿溪漲連朝疏雨過溪漲欲臨軒濤響激松石波流入草原潺潺欹樹拔滚滚落花翻古渡逰人隔時時看水痕隴下居尋幽居隴下山色滿窗前覽物知天地觀書對聖賢煙凝秦嶺樹雲鎖華峰蓮欲賞間中景還須酒似泉山水圖看遍丹青手無如此畫工雲邉千樹合林下一溪通翠竹圍茅舍清流繞柏宮便思尋隱處忽見晝溟濛天然真景趣畫史信多能傍壁兩枯樹臨流一老僧煙光溪上結雲氣嶺頭蒸遙望山中寺孤峯第幾層過后山山程渺渺去曉色尚熹微野鶴穿松徑殘花點客衣溪魚當鏡躍山鳥近人飛却憶漁郎説桃源果是非東軒見訪為謝東軒客多勞到此林臨流青樹合歸路白雲深世事非關慮浮榮肯係心江山秋夜靜抱膝一長吟江風山月堂風月江山景秋來共寂寥籟生涼氣肅天淨晚煙消翠色經朝雨寒聲起暮潮堂前得此會眼界自逍遙送人之陜西送子西逰日獨傷南浦春如何關外客去作隴頭人異地還思舊他鄉莫厭貧懸知從此隔相見夢中頻送法師住慈感故人從此去尊酒莫頻催臘雪猶堆嶺春風已放梅交情留偈别疏景入詩來想到南山寺才逢栁眼開題畫久隔江山景何人寫此圖寒流如渭水秋色似成都恍聽幽禽語疑聞野鶴呼不知煙霧重還有隱居無南澗遙觀南澗水山畔噴長虹清響孤峯下寒流一竅中龍升千嶂雨虎過滿林風盡日西逰遍扶笻欲向東三老亭亭構因三老終朝會此間圍棋消白日酌酒對青山野鳥時飛止溪魚自往還不知名利客誰似此生間大勝寺集聯句酌酒坐晴沙新秋景物佳緑苔殘雨霽紅樹夕陽斜野老來鋪席髙僧自煮茶對吟新月上得意岸烏紗除夜書懷使節淹淮甸殘冬謝早春揚州除夜客湍水未歸人歌管千家樂琴書旅舍貧鄉懷從此切清淚欲沾巾寄延綏參戎曹少卿十六韻豪俊當亨泰雲途早著鞭文章期顯後星鳳覩爭先卿秩超遷美戎權委任專嘉謀應出衆偉績貴無前定許忠輸國寧論雪上顛种公同妙算范老共髙鶱有志平沙漠無心望酒泉三軍威自振千里寨相連驍騎時分陳精兵每控弦旌旗鋪逺塞笳鼓擁中堅帝顧憂全釋天驕懾自旋橫行間將略直上息狼煙漢道宜臻盛兵塵不近邉秋防嚴據險生計課屯田障夏規千載安疆䇿萬全中興推獨步歌頌寄長箋古穰集卷二十一
