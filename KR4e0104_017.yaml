body:
  text: 古穰集巻十七明李賢撰墓誌銘奉天翊衛推誠宣力武臣特進光禄大夫柱國文安伯追封文安侯諡忠僖張公墓誌銘今世勲臣之盛無如張氏一門盖永樂初靖難之臣雖衆而功之著者河間定興兩王也天順初翊戴之臣雖多而功之著者文安太平兩公也嗚呼張氏父子兄弟四人咸建非常之功此所以享福禄榮名于當世與國咸休也與文安之終其子斌前期來請塟銘按狀公諱輗字文端河南開封祥符人父諱玉贈奉天靖難推誠宣力武臣特進榮禄大夫右柱國榮國公追封河間王諡忠武母王氏元判樞宻院事執中之女追封河間王夫人生三子長諱輔奉天靖難推誠宣力輔理佐運武臣特進光禄大夫左柱國太師英國公追封定興王諡忠烈仲即公天順初自太子太保兼中軍都督府右都督進封奉天翊衛推誠宣力武臣特進光禄大夫柱國文安伯追封文安侯諡忠僖季諱軏奉天翊衛推誠宣力武臣特進光禄大夫柱國太平侯追封裕國公諡勇襄公自㓜聰穎動止不凡六七歲時即能習禮儀讀書史悉通其大義稍長益力于學不尚紈縠之習河間王早已死國公不及逮事事母夫人尤篤愉色婉容可方古之達者敬禮其兄若嚴師焉於弟尤盡友愛之道親賢取友樂善不倦由是上下皆得其懽心母夫人特鍾愛之永樂中以勲臣子入見文廟竒之特授金吾前衛指揮使歴長陵神策兩衛公益淑慎自將大獲時譽正統初今上念公父兄之功且姻聨戚里進錦衣衛都指揮僉事日侍經筵十四年以勞勩陞僉後軍都督府事領禁兵宿衛盖以公勲戚故託以心膂之寄也尋加太子太保又進兼中軍都督府右都督公益毖懋小心夙夜在公務竭忠藎所部將士咸畏愛公而不敢犯天順改元上復位公首以翊戴之功封伯食禄一千三百石子孫世襲賜以誥劵仍典宿衛兼都督府事三年以老疾乞謝事上念公宿德特許優閒調攝且命醫專視賚予有加時致存問五年冬上思公欲一見特遣中貴人賫寶鏹三千緡及白粲羊酒等物往賜公且道意遂力疾強起入見上甚歡顧問良乆命公仍典宿衛寵眷彌隆六年春忽疽發于背自謂不可復起乃上疏言臣本庸謬遭遇聖明安享髙爵方圖報稱柰何大數止此惟皇上以宗社生民為念任賢治理用臻康泰臣瞑目於泉下矣他無所請上惻然以手詔諭公曰覽卿所言忠愛可嘉今卿疾勢雖篤尚加調䕶以副朕意即日遣中貴人賫白金百兩往賜之命至而公薨矣實二月三十日也距生洪武庚午二月一日壽七十有三訃聞上震悼輟視朝一日追封賜諡及賻儀悉從厚典遣禮官諭祭工部治塟事公之死生可無憾矣公風姿清偉辭氣雍容接人謙恭絶類儒者暇則閉戸觀書為盆池聚石襍植花卉以自適賢士大夫至則倒屣出迎講説道義亹亹忘倦性不嗜酒而待客務盡欵洽尤好吟詠於凡古詩無不熟覽亦敬禮方外之士内典丹書悉得其肻綮教子務循禮法而治家尚儉所居賜第未嘗增新見孤貧者必傾財以賙之俾得所而後已聞人之善稱道不釋口有不善則避之以故人人企仰而被其容接者自以為幸噫勲舊戚里門第之髙爵位之隆求其清聲雅望如公者豈多見哉公配侯氏有淑德累封文安伯夫人子男四人曰鑑曰瑄早卒曰斌為勲衛即繼爵者曰昌女三人一適後軍都督郭英一適保定侯梁珤一適李玉孫男四人曰亨曰洪曰淳曰清斌等以是歲某月某日奉塟于都城南盧溝橋之西從先兆也銘曰勲戚之家有美張氏父子弟昆以續以似惟忠僖公志行尤敦不矜以驕侃侃王孫左公右侯惟我同母篤是天倫惟孝惟友薦膺帝眷時譽孔昭帥兵宿衛遑恤其勞翊戴之功在公尤偉爵與功崇介此繁祉公也危懼翼翼小心謝病斂迹深淵是臨帝起復公櫜鍵甲胄相古先王人惟求舊忠誠允蹈之死弗渝懿哉行實允冝特書洸洸武臣公為稱首勒銘堅珉千載不朽資善大夫刑部尚書劉公墓誌銘劉之先河南祥符人其逺祖有曰功甫者仕宋為江西萬安丞子孫因家焉自是以來宗支蕃衍代有顯宦具劉氏家譜公諱廣衡字克平曽祖仁一祖昭年父俊英俱業儒不仕祖父以公貴累贈資善大夫刑部尚書祖妣鄭氏妣歐陽氏累贈夫人公自㓜穎敏在醜夷中卓異如老成早失怙恃遭家多難諸弟㓜弱公與兄廣泰綜理家務家遂以振閭里莫不嘉羡曰劉氏有子矣洎長入邑庠授易于鄉先生翰林檢討宋琮永樂庚子遂領江西鄉薦益肆力於學登甲辰進士第宣德戊申拜刑部廣東司主事乙卯陞陜西司員外郎正統丁巳再陞浙江司郎中凡歴三署廉明之譽翕然庚申秋朝廷軫念四方多罹飢饉欲廣蓄積以禦荒歲乃簡廷臣分理預備之政勑以便宜從事公在首選往浙江即日上道遍歴郡邑所區畫甚多得粟數百萬石為四倉以儲之復督勸有司築陂塘抑豪強拯困弊事集而民不擾既還朝廷嘉之甲子陞陜西按察司副使命專理重刑凡疑獄賴公而明者甚衆己巳陞陜西布政司右布政使明年上以陜西邊務方殷特陞都察院右副都御史鎮守闗中公益感激自效條陳數十事皆安邊禦敵利國便民急務多見施行時邊報多警公從容裁處咸得其肻綮督脩城堡七十餘處復奉勑轉輸軍餉數萬石於邊城適歲旱民饑因設法濟之俾不失所而公家之務亦辦尋召公還京治院事未幾復命往録南京法司之獄多所平反既還有白金綵幣之賚壬申秋復奉命糾察湖廣庻職之亷貪者凡所黜陟人服其公且條陳軍民利病數事多見采納既還勞以羊酒時福建浙江民鄭懷冒王孝心等作亂特勑公馳往督兵捕之至則賊已就擒公察其嘯聚之故以山有銀塲連亘深僻賊得以潛伏其中即命伐山通道且奏設縣治以便廵視其患遂息已而守臣以所獲賊屬俱論謀逆報功希賞公覈其實得首惡者十人餘悉縱之事竣而還賜白金綵幣甚厚丙子復奉勑廵撫遼東提督軍務鎮靜不擾逺近悦服天順改元春皇上復位特召公還陞刑部左侍郎八月遂進尚書累膺金帶綉袍之賜公感上知遇益自力以圖報稱秋九月忽遘風疾而瘖即上章懇乞骸骨詔許之既而言語如常衆醫皆喜曰公疾瘳矣公獨不以為然惟諄諄屬後事未數日疾果復作竟不起天順二年十二月十五日也距生洪武某年某月某日享壽六十有四上聞訃嗟悼遣官致祭于其家復命有司為營塟事公為人直諒通敏寛厚坦夷處已接人一出於誠不立崖岸平居温然和氣可掬及遇事能斷毅然不可奪而亷介之操始終不渝雖歴通顯服食無異於寒士尤以文學推重於時所為詩文有集藏于家娶康氏累封夫人子男四曰述古曰述憲中順天府鄉試曰述某曰述績為邑庠生女三長適歐陽聰次適蕭欽訓次適王鴻孫男二孫女四銘曰葦有松焉挺然秀㧞石有玉焉孚尹旁達大江之右懿此劉公卓卓温温如玉如松發跡司刑爰歴三署巨臬名藩大有時譽都臺薦升司㓂載登既忠以勤皇寵是膺惟德之厚惟才之長惟學之富懿此劉公邦家之光胡不慭遺皓首巖廊我懷伊人昭代稀有刻銘堅珉永世不朽中憲大夫大理寺左少卿李公墓誌銘庚辰歲暮上將時享太廟前期詔百官陪祀者皆致齊大理李公與其僚友同宿公所夜談二皷盡乃寢至五皷將趨朝訝公乆不起視其寢曰死矣傍無綱紀之僕京邸寥寥殆無以為殮嗚呼悲哉踰數月其長子匍匐而來泣請銘予與公同朝乆相知又稔不復辭按其友國子祭酒劉益先生狀公諱茂字茂蕚唐西平忠武王裔也忠武七葉孫曰祖堯始徙吉水之谷坪至十七葉孫人傑復徙縣治學宫之東公曾祖諱永吉祖諱文泰俱隠弗仕考諱伯葵以公貴累贈奉政大夫大理寺丞妣劉氏贈宜人公二歲失恃母氏撫育之成童見其天資穎異俾從師講學學大進有司選為邑庠生益勵志不懈宣德乙卯以易經領鄉薦正統己未登進士第尋丁内艱哀毁踰禮鄉人稱其孝釋服擢大理評事讞獄平恕有聲遂授勑階文林郎己巳用廷議陞寺丞景泰初以南京舊都諸司庻政多怠弛特勅公按行至則考覈百司而黜陟之審録獄情而伸理其枉事竣乃還初衆以公為晚進當此重寄慮或不勝既而舉措得宜如碩望老成者始加嘆服尋上治兵安民救時急務凡八事多見采納賜誥階奉政大夫未幾進右少卿乙亥復奉勅録南京法司殊死已上獄俱得其情聲譽益振時南京大理缺人遂命公掌寺事天順初召還進左少卿公愈益盡心刑事復受誥階中憲大夫遂至不起公天資淳篤操履端慎孝友之行著于鄉邦而性尤尚約所得禄入計一身用度悉分以奉諸兄及賙宗黨之孤乏者平生不喜以賢知先人雅度雍容僚友莫不愛重為文典實類其為人死之日喪具不備衆為之鳩金以助朝廷聞訃遣官諭祭於其家公生永樂丙戌十一月十八日卒於是歲十二月二十七日得夀五十有五配鄒氏累封宜人子男二長曰全次曰竒女三長適某次適某皆名家子也全扶柩南歸卜以某歲某月某日塟於某原為之銘曰惟家之約乃士之常惟公起家以約自將奮自布韋歴登顯任禄入之餘宗黨是振宅心仁恕獄多平反慕于與張曾不憚煩惟德之原曰孝曰友公能充之宜臻永乆今胡不然有命在天公雖往矣清譽綿綿鎮國將軍錦衣衛都指揮同知孫公墓誌銘公諱顯宗字光表别號澹樂世居濟南之鄒平故㑹昌伯贈太傅安國公諡恭憲忠之子今太保㑹昌侯繼宗之弟母董氏安國夫人張氏其生母也公自㓜俊爽異人居常幹蠱太傅之為永城簿公侍行太傅蒞政時公即扄門自守不納私謁太傅竒之以為有子巳而董工脩山陵不以家務累心盖倚公也宣廟為皇太孫時冊公女兄今聖烈慈壽皇太后為妃宣德改元正位中宫上命中貴人劉寧取公昆弟至京入見上喜公動止詳雅以為府軍前衛指揮同知賜錦綉衣一襲宴于宣武門賜第宅一區于東華門左公嘗隨侍習武藝上見公騎射精熟又大喜賜以珍禽一日上取魚于太液池分賜公昆弟烹食之次日公不至上曰得無以魚骨梗之乎及公至果以是對上大笑曰偶爾中耳正統改元以公昆弟至戚待之愈厚己巳秋車駕北征命公留守公夙夜弗倦屢獻良䇿景泰改元有小人貸公白金不償反造謗言朝議欲陷公且宻緝之公坦然略不介懷乆之事乃釋天順初公與太保暨昆弟子姪同迎英廟復位特賜勅褒奬陞都指揮僉事累賜金帛楮幣蟒龍麒麟袍服尋陞都指揮同知食禄錦衣衛天順甲申十一月十七日以疾卒距生永樂戊子五月十二日享年五十有七公荷列聖眷顧之隆三十餘年小心翼翼未嘗敢以貴富驕人雖在優閒日勤朝謁為人慷慨讀書好義居家孝友安國夫人喜公勤誠鍾愛之無異已出每退朝昆弟㑹于一堂怡怡終日子孫眷屬多至數千指無乖爭者性樂施予婚人之男嫁人之女舉人之喪不一而足屬纊之際無他言惟顧其二子曰勉盡忠孝訃聞上哀悼遣官諭祭於柩前復令有司為營塟事公娶李氏繼丁氏再繼吳氏俱封淑人生子三長曰琥早卒仲曰瓏季曰璃俱錦衣衛千戸女三長適神䇿衛指揮李謙次適散騎舍人郭嵩次適寧逺伯孫任勇孫女一在室卜以成化元年二月十一日塟香山之原從先兆也銘曰貴富常情驕奢自至有不驕奢孰尚其志懿此孫公安國是承不侈不矜澹樂自名豈惟澹樂篤是孝友賙貧恤孤惠亦多有譽隆戚畹孰如公門惟弟惟昆惟子惟孫公今已矣世澤有繼我銘其藏永永無替中奉大夫湖廣右布政任公墓誌銘公諱禮字敬讓别號澹齋世居西江之豐城前人歴有顯宦有至司空樞宻副使者七世祖陸吕登宋景定進士官大理評事祖原傑以上多隠不仕父載逺以公貴贈朝請大夫河南布政司右叅議母鄭氏贈恭人公自㓜頴敏為父祖鍾愛稍長從明師遊力學不倦永樂庚子以詩經領鄉薦遂登辛丑進士時二親尚無恙間得請南歸扁其堂曰順親鄉人榮之越三載召至京遣持節冊封楚王禮成而還凡王府金幣之賚俱弗受文廟對廷臣屢嘉奬之宣德丙午擢工部營繕主事司素號繁劇公至理之裕如尚書呉公大竒之由是闔部章奏移文必經公然後行戊申奉命取淮浙工人四千餘赴京公持法雖嚴而撫諭甚至未有一後期者同行五人皆以悞事黜惟公得譽特賜勅進階承德郎時議欲脩宫殿者僉曰此大事也非採辦於四方不克成惟公久在營繕知所積足用與否乃召公問狀公上章極言其不便遂免採辦事竣朝廷賜綵幣以旌之甲寅以秩滿陞郎中勤慎之操愈勵正統戊午丁外艱服闋用薦陞四川布政司右叅議善政甚多流移之民得公招撫而復業者八千餘時雲南貴州播夷不靖連歲興師公奉勅督軍饟十餘萬斛或遇㓂阻不為懼兵以足食師還有欲論功者公止之曰此亦分内事何足言己巳丁内艱景泰癸酉改河南值歲凶公振貸于諸郡活饑民數十萬乙亥春秩滿用薦陞湖廣右布政使給前任誥進階朝請大夫時苖冦作亂朝廷命將討之督軍饟之功在公尤多天順庚辰春以老疾致仕方將優游林野以適其所適居三月一疾而逝是歲七月十七日也距生洪武乙亥六月二十日享年六十有六公天性孝友襟懷坦夷急於濟人而薄於自奉其接人也誠不設崖岸居官四十年聲譽籍甚可謂人中之翹楚者矣配周氏繼蔣氏累封恭人子男三長曰善順天府儒學教授次士淵次士霑女二長適萬景同次適黄成章孫男六孫女四善卜以是年十一月某日將奉塟于邑山之原乃以國子祭酒劉益先生之狀來請銘銘曰先世之澤逺以長瞻彼後裔如蘭芳有卓其孫才且良讀書起家煒有光歴躋膴仕奮顯楊佳聲籍籍聞四方薦膺寵錫雲錦章家庭夙志允已償早圖晩節歸故鄉全歸瞑日邱中藏嗚呼新阡城下岡太史之銘在幽堂後千百載無毁傷奉訓大夫吏部文選員外郎尹君墓誌銘尹氏之孤曰天覺持其父之行狀泣且告曰愛吾父者莫厚於執事幸而銘諸墓吾父之目瞑矣噫我知尹君者為銘固宜按狀君諱弼字廷佐號介菴常之宜興人也曾祖俊卿祖伯敏俱不仕以善名一鄉父時中篤儒行居亳溪之上嘗搆一軒聚圖書其中扁曰清趣以自適鄉人稱亳溪處士云以君貴贈承德郎吏部文選主事母吳氏贈安人君自㓜端謹為父母鍾愛年十八入學為生徒時父母繼沒哀毁過禮里人悲之正統戊午以書經中鄉選明年入太學學益富尋歴事吏部聲譽勃然聞搢紳間正統甲子春冢宰試其能曰主銓事者非此人不可乃請於上而授之君益自力期副所知遇既六載勤慎如一日上嘉之賜勅授承德郎正統丁卯進署員外郎適東宫初建詔中外之署職者咸即真君與焉復有白金文綺之賜又進階奉訓大夫方期以大用而一疾不起矣予昔與君同官交好最久見其處已待人一於謙恭不少懈言若不出諸口而勤於職務人莫能及盖訥言敏行之君子也為詩善古選有漢晉風味尤精於篆刻好蓄書畫適趣於琴性不嗜酒而喜延賓客此其髙情出於塵表夫豈流俗所能測哉君生於永樂丁亥八月十三日卒於景泰甲戌正月某日享年四十有八娶吳氏封安人子男四人曰天民天覺天常天秩女二人幼在室天覺等將歸塟於其鄉某山之原銘曰以德則壽以命則乖從古則然豈惟君哉嗚呼玉之佳在乎無瑕君之德百世之誇藏之于幽而不泯者有燁其華奉政大夫南京刑部郎中鄭君墓誌銘予正統初聞錢塘鄭君為兵部主事有能名而未識也間邂逅相遇接談之頃始悉君才識副其名君亦待予若素交者未幾君以薦陞而去久之不相聞則君已謝事歸矣天順庚辰廷試進士第三人曰鄭環乃君之子也予方喜賢者之有後足以慰君一日環忽衰絰以來泣且告曰環父沒矣幸憐而銘之嗚呼予與君豈一日之雅哉按其鄉人大理寺丞夏時正狀君諱垕字良載輿齋其别號也君自幼雅飭如老成人稍長從鄉先生受業奮勵不少懈凡經史子籍靡不渉獵發而為文辭理嚴切一時耆德宿儒皆折輩行加重莫不喜曰鄉里不乏人矣永樂中以春秋領鄉薦登甲辰進士第賜歸于家乃構堂於後圃扁曰樂存以奉親宣德中以外艱服除擢兵部武選司主事遽理繁劇若素練者時靖逺伯王公驥為尚書深器重之三年以績最賜勅階承德郎九年復以績最陞南京刑部江西司郎中君曰今日之職務尤當盡心者凡理獄訟務加詳焉有以舟行賈載兵自防者附舟之人因他事忿爭委貲而去誣以強刼因獲兵具論死君獨疑之鞫審所由事乃得白有甲乙相毆者乙以病死誣甲故殺既成案君直其枉遂得減論凡辯獄多類此嘗上疏言獄情數事朝廷多見采納部長或公出必委君署之尋賜誥進奉政大夫脩正庻尹一日與長官論議不合嘆曰吾不能詭隨以固位遂乞休致時景泰辛未年五十有六耳或曰君年力未衰何去之决乎君曰吾欲留有餘不盡之福以遺子孫况老母垂白在堂得遂膝下之養何樂如之聞者嘆服君既居家奉親之暇課子讀書門無雜賔淡然若與世相忘者預營壽藏于碧梧之原時遊其中其情之任達如此舊有寒疾忽發㑹母亦遘疾君遂驚憂不起屬纊惟以不終養為欠卒在天順辛巳正月一日距生洪武乙亥十二月二十九日得壽六十有六君為人簡重不尚浮靡尤寡嗜好有古法書名畫彛噐人或持去亦不顧惜所著有甲辰稿輿齋集措菴集若干巻藏于家君之先汴人七世祖筠孫仕宋為太中大夫從髙宗南渡居越之山隂曾祖克明從陳旅游錢塘愛其山水之秀遂家焉祖脩父璧俱不仕璧以君貴累贈奉政大夫脩正庻尹南京刑部江西司郎中母陳氏累封太宜人配洪氏封宜人子男四人長即環翰林編脩次瓉次璽次璪女三人長適劉英次適王璋次在室孫男三人孫女四人卜以是歲某月某日啟竁而窆之銘曰錢塘之秀鄭君生焉出而用世業光於前惟位於才人不為滿君則泰然兢競自勉惟彼㝠數以乘以除孰如晚節有美令譽我昔㑹君知為大器今為君銘悲思曷既碧梧之原安此泉宫君名不朽桑海是同封翰林院編脩文林郎徐君墓誌銘今之制子官于朝三年即推恩及父如子官盖人君以孝治天下其典未有盛於此者金谿徐瓊為翰林編脩三年其父即受勅封未踰年而卒嗚呼瓊之父死其可以無憾矣夫瓊持脩撰黎淳狀請為銘按狀君諱文字貫通别號拙逸其先世居臨江有栢軒翁者仕宋為撫郡博士因訪友人吏部尚書呉㮚于金谿見柘岡之東陽谷山水佳甚乃卜居焉遂為金谿人髙祖淵尚志明經與中書左丞危素為布衣交素薦不起鄉人師之稱松坡先生曽祖昌祖克明俱隠弗仕父邦用性愛竹手植萬竿作亭其間吟詠自樂因號萬竹翁母李氏繼母毛氏生子七人君其長也少從鄉先生遊讀書不少懈或勸之出仕曰非吾志也乃躬耕𤣥洲之上植有豐産遂泝江漢遊吳越以有易無而歸曰奉親之具足矣由是不復出平生所適惟四書羲帖每究其義而玩其摹曰道藝在是宣德間父年髙且倦以家政付君君夙夜任之不數歲貲用倍于前事繼母尤委曲盡孝得其懽心居親喪哀毁踰禮服盡而情不衰立塾延師以訓族黨子弟婚娶慎擇所宜以故子姓繁盛幾千百人正統辛酉歲大饑君慨然出粟千石以助有司賑濟既而朝廷下勅旌異乃讓其從父邦任景泰壬申復饑君再出粟七百石有司請立石君止之曰濟乏以僥名非吾意也鄉有貸者輒應之不計其償里豪有犯君者為其隣搆死婦誣之屬君為證君曰吾聞君子以直報怨遂白其誣有竊君之囷儲者君曰我有餘而彼不足無怪其然也盗聞之感悔性嗜酒不為所困不喜奉老釋或以福田利益為誘輙正言斥之貲雖饒裕而自奉甚薄初結屋𤣥洲號稼菴晚悟機非遂更今號及子瓊進士及第官翰林嘗勉之曰清慎忠勤四字不可缺一違吾言非孝子也邑大夫歲時請鄉飲以爵推之輒避不與殆所謂一鄉之善士者與卒在天順辛巳六月二十五日距生洪武庚辰四月六日得壽六十有二配黄氏封孺人子男二人長即瓊次曰瑶女二人長適龔克初次適楊仁政孫男五人卜以是歲某月某日塟于某山之原銘曰已能官者才之特也子能官而已受封者德之植也才足榮乎身而顯名德足裕其後而承式也若徐君之不仕豈徒云哉抑尚德也嗚呼惟德是尚故報施之不忒也慶鍾于家鄉閭是則千載之下其德音昭然而不泯者庸非賴此刻乎古穰集巻十七
