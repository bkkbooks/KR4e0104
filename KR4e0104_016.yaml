body:
  text: 古穰集卷十六明李賢撰墓表通議大夫大理寺卿王公墓表吾鄉之士顯逹者甚衆求其志節介然而潔白自守始終不渝者大理寺卿王公其人也嗚呼公今逝矣年止四十有七可勝痛哉公諱宇字仲宏别號厚齊河南祥符人曾大父敦本隱居不仕大父友德父希哲俱以公貴贈通議大夫大理寺卿母丁氏封淑人公自幼穎秀異於羣兒父母獨鍾愛之童丱時從師受業日記萬言巡撫侍郎于謙一見之曰此逺大器也即遣為邑庠生正統戊午遂發解鄉闈明年登進士第擢南京戶部主事剗革宿弊亷能之聲大振都憲周銓時總京儲蔑視屬吏見公獨敬愛之三載以績最進階承德郎公益砥勵名節在郎署中特立獨行不顧流俗時郎佐秩滿例轉正郎吏部以公才能顯著薦升江西撫州知府是郡地儉民夥素號難治公至以簡御煩闔郡翕然稱頌里有隱士吳與弼以道自髙足迹不至城府公欲往造其廬與弼聞之即先詣府謁拜接談竟日乃嘆曰真明府也公益勞心民事凡漁利害民之弊悉罷之吏有奸黠者盜府金自若公亷得其狀置于法衆皆畏服以為神明撫民多商給繻之錢歲計纍萬前守皆自取以為當然公曰可以勿取而取之是傷廉也悉以屬官郡治傍有穴地前守引水畜魚以自給公以土實之為倉儲粟數萬石以濟饑民郡人題其壁有關節一毫無地入公亷兩字有天知之句逺邇傳誦宜黃多山虎為患公為文告神而驅之虎皆遁去金溪有聚衆暴掠者公曰此吾良民迫於饑餒故耳即開倉濟之衆皆感泣曰真吾父也即時散去藩臬書公績曰剸繁治劇才識有餘清白操持纎毫無玷都憲巡撫者上公治行於朝特賜誥命以旌異之進階中憲大夫天順改元皇上復位首念方嶽重臣為郡邑表率屬廷臣㑹薦公在首選遂升山東右布政使時廷議山東纍歲不登民皆流移必屬能者撫安之上以璽書托公凡賑濟之䇿不遺餘力民賴全活者數十萬人明年上念宣府北邊重地宜得憲臣巡撫遂召公為都察院右副都御史以往公至訓練士卒堅完城堡凡芻粟屯田邊備戎務一切便冝處之剗弊刈奸士卒感恩而權貴則不悅矣賴上知公為人譛毁不行未幾兼巡撫大同時石亨與其姪彪皆驟遷髙爵恃寵自肆而大同乃舊鎮之地索取尤橫衆莫敢攖公獨上章劾之以為大蠧大奸莫甚於此乞置于法以消未形之患詞氣剴切聞者嘆服已而亨彪果以奸敗朝廷益嘉公忠直庚辰丁內艱還家一年上起復公至京將有南臺之命忽念大理卿缺員持天下之平者無踰於公遂以命之纍章懇乞終制弗獲在任惟以洗寃澤物為心清研獄狀務得其情不知案牘之勞形也癸未春進階通議大夫公質幹竒偉心性剛介慎亷隅重名節操履端方確乎不可拔事親盡孝處兄弟篤於友愛自奉甚薄雖居顯貴服食不異寒士視貨財如汙穢見不亷者若將凂已避而逺之卒之日囊篋罄然無以為斂上聞訃惻然傷悼曰可惜佳士遣官諭祭其家復令有司營葬事公平生耽嗜六籍博極羣書為文章根理趣詩古淡舂容有餘味所存厚齊藁藏于家公生於永樂丁酉五月四日卒于天順癸未七月十六日配段氏子男三長曰樟次早卒次尚幼女一早卒卜以是年某月某日歸葬於先塋之西嗚呼公之志氣如鳯凰翔于千仭之上而潔白之操方宋之趙清獻公亦可以無愧矣亞中大夫陜西布政司右參政李公墓表公姓李氏諱源字士澄别號志雲唐宗室燉煌之後五季時避亂徙家浙之寧海逺祖穆宋迪功郎五世祖洧孫宋甲戌進士學者稱霽峰先生元黃文獻公歐陽文公皆出其門霽峰生栗栗生炳炳生孰洪武初以通經分教華亭升鄜州同知公之祖也卒葬華亭子孫遂為松江人孰生志剛永樂中禮部尚書兼左春坊大學士公之父也母孫氏生公自幼穎敏為父母鍾愛稍長即能文永樂中領鄉薦登甲辰進士時宗伯公以陳漢王叛繫獄聞而喜之作書以戒公晨夕展誦必泣下嗚咽是年秋仁廟嗣位釋宗伯公為通政尋出知興化府以優餘年公得侍行奉親之暇不廢問學宗伯公卒于官喪葬盡禮宣德庚戌服闋至京擢吏部驗封主事尋署員外郎滿考為真正統甲子用薦升浙江布政司左參議人或不滿望者公曰藩佐非輕在吾足矣是歲浙東旱公曰此非安寢時也即出巡視災雨隨降民皆擁道歡呼自是方伯憲長莫不加敬而巡撫大臣凡清軍提學勘治審獄諸務悉以屬之公理斷各得其宜戊辰冬閩賊大起處婺諸郡乘勢亦亂衆議推公往守金華公慨然當之至則奬勵兵民欲重賞以鼓其勇為同事者所沮幾至敗事公又言朝廷錢榖所仰給者在此數郡今日之事誠不可緩使此賊如宋方臘也即日進軍克銅鼓巖據要地賊既失勢使人來覘公獲之斬以徇賊始懼以退諸郡賴之以安時朝廷命將出師總戎監軍知公之能以諸郡兵民數萬屬公統之公率其家人子弟悉出行陳曰吾門纍世簮紱叨竊國恩多矣圖報㳙埃在此一舉凡十有七戰馘賊甚衆招輯流民數萬總戎上其功適公述職之際有譛於都憲者乃中以事罷還天順改元皇上復位始白公寃復其官改陜西至即巡邊撫民仍理軍政時歲歉民饑邊餉缺供守臣上疏舉公董其事上可之進公右參政公益盡心區畫期副委任巡歷郡邑至秦州遇暴雨成疾而卒天順癸未四月二十七日也距生洪武辛巳正月十四日享年六十有三公為人和易謙恭篤於友道且好施豫或遇婚喪不能舉者輒分財以賙給之不與物競方被譛家居惟課子孫讀書足迹不至城市賓友至輒具酒殽笑談終日無憾意及在任得疾嘆曰吾非不樂山林者第以荷上擢用邊事方殷豈可遽言吾私竟至不起所著志雲集若干卷藏于家配盛氏封孺人側室尤氏劉氏子男五人長曰桓南京前軍都督府經歷次曰楷國子生次曰概次曰果次曰奈女四人長適監察御史張璠次適汀州知府陸澄之子斆次適陜西副使姜濬之子泰次在室孫男六人女四人楷等卜以某年某月某日歸葬某山之原乃以狀來泣請表其墓嗚呼公豫僚友也感傷故舊情不忍辭乃抆淚而書之使後世有考焉中憲大夫太僕寺少卿金公墓表公諱弼字輔伯姓金氏世為江西新淦巨族曾祖仲卿祖守正臨江儒學訓導學者稱雪崖先生俱贈資善大夫太子少保禮部尚書兼武英殿大學士伯父幼孜永樂中文淵閣大學士歷洪熙宣德又以已所歷官推恩三世卒贈榮祿大夫少保諡文靖父幼孝贈中憲大夫太僕寺少卿母劉氏贈恭人公自幼警敏不凡先生長者咸異之年十六喪父知自力學與兄故兵科給事中昭伯並擅時名以禮經魁鄉薦登宣德癸丑進士第正統改元擢中書舍人秩滿以績最升太僕寺丞天順改元進少卿纍階中憲大夫初公為中書舍人尚寶少卿袁中徹獨傲公公具言其過遂置于理竟坐罷去兵部建議擇太學生善書者書武臣誥已得請矣復有以歲月久近論之者公上疏以為若是則不善書者亦得濫預詔是其言為太僕丞時北敵為患公建言選將練兵數事多采行之為少卿慨然以馬政修舉為已任屢奉命督理虧耗者自衛使郡守而下悉聽决無不畏法感德有順聖川者水草甘肥永樂中嘗牧馬蕃息天順初屬公往視定築二城用養天間之馬增二驛於中道以便往來凡百利害悉條陳以聞詔嘉納之公每歲往理馬政不憚勞勤壬午冬忽得寒疾猶強視事癸未春疾甚還京遂不起實三月十五日也距生永樂癸未閏十一月七日享年六十有一公孝友之行出於天性痛父早世每遇時祭哀戚不已嘗迎母於京邸就養務得歡心拓地築室以居宗族弟姪作詩規戒子孫無不備至在京師買棺助人不能葬者凡十數恤貧濟難恆恐不及可謂君子人矣配孔氏纍封恭人側室尚氏張氏楊氏子男四人長𢎞經次𢎞倫早卒次𢎞紀郡庠生次竒尚幼女四人長適廖方鼎次適訓導尹嗣禎次適刁石次適蕭漢從孫榮將扶柩以歸卜葬于鄉某山之原以祭酒劉益先生所為行狀乞豫表豫與公為同年友故不忍辭而次其事使劖諸墓上之石焉遵化衛指揮僉事贈昭勇將軍馬公墓表公諱索珠其先居朔方元有天下都燕入居薊州遂為遵化人曽祖瑪穆特仕元為中書左丞祖逹實密為逹嚕噶齊從祖托和齊為開府儀同三司太尉録軍國重事父阿勒坦為明威將軍公性資英敏體貌魁竒自幼從事詩書尤間於兵法仕元為樞密院斷事暨我太祖髙皇帝定天下慨然歸附以武略見用為兵士之長屬籍振武衛洪武五年調興武才能日著時上夜夢一人長身廣眉器宇宏偉侍衛左右周旋甚悉問其姓名對曰鎖住馬明日即命羽林百戶潘雄宣訪於衆乃得公曰鎖住馬者公之號也視其狀貌脫如夢中所見上喜而異之特升鳳陽中衛指揮僉事因號應夢將軍時十八年正月二十七日也未幾從師北征大寧遼東至金山復從征龍安一渡河一迷河追擊納克楚及平大寧和中俾守大寧前衛復征捕魚兒海子哈勒哈纍立戰功賚與甚厚特賜誥命二十二年顧遵化為喜峰口要路逼近邊境以公熟知地勢遂調遵化衛復賜誥命公乃練士卒修武備於龍山之南構屋數椽戎務之暇與親兵耆舊㑹聚為樂延章縫之士討論古今成敗得失人才賢否不以富貴驕人四方文人才士莫不聞風而至公益虛心下問故其識見大過於人及太宗文皇帝興靖難之師公首從之奮力鼓勇以自效遂死於敵上深憫之録其孫榮為指揮同知公生元至正辛卯七月二十三日沒洪武己卯七月十四日得年四十有九配馮氏贈淑人合葬龍山之南子男一日祥與公同沒於陳孫男一即榮也既受䕃敘正統己巳以才能進都指揮僉事充右參將協鎮薊州永平山海等處乃以公死國迄今六十一年而墓未有表大懼功行莫白於世以鄉人崔富嘗守吾鄧託請文於石辭弗獲為述其槩而系之辭曰有赫前人勝國名臣歷世罕倫公也華胄匪襲其舊挺然獨秀初以才雄精神上通擢任兵戎屢督戰騎轉守邊地益思盡瘁皇起于藩公屬櫜鞬卒喪其元有孫洵武克繩其祖作鎮東土龍山之陽刻此銘章百世之光奉政大夫浙江按察司僉事彭君墓表君子坐纍既白而卒于以見天理之有在也向使未白而卒君子之心固無愧怍怨尤于其間而世之為善者怠矣安福彭君君子人也不幸坐纍逮至京師所枉既白寢疾十日而卒天理於是乎不泯君諱貫字進唯一齊其别號也家居智溪其先出番陽曰忠泰仕宋為吉州判官因家於安福曾孫曰亷訪使仕益亷訪子曰轉運使國祥轉運十世孫曰復安以同族曰伯樞者無後以其子同升繼之即君之父也以君貴贈刑部雲南司主事母郭氏贈安人君自幼秀爽不羣父兄咸異之稍長篤志進學遂領鄉薦登正統丙辰進士明年冬擢刑部雲南司主事是司獄繁多滯君涖任旬日剖决無留難每於燈下詳讞其室人曰勞心如是彼罪人者安知之君曰吾盡吾心耳有盜伐山陵樹君驗其去陵逺遂薄其罪有中官獲盜送鞫欲掠殺之君曰吾豈可殺人以媚人哉卒處以常典有夫婦犯法當俱死君憐其一子在抱出其婦凡斷獄平恕多類此尚書魏源深重之源去囚反獄金濓為尚書以為典獄者私弊所致委君整飭乃得贓狀者奏謫戍邊自是防範始嚴歲癸亥用濓薦升浙江按察司僉事督理屯田君見餘田多荒由子粒之輸與正同乃奏請遞減餘丁民人之輸田遂不荒孔氏在衢者家廟如闕里元賜田以供祭國初由僞姓罪纍田盡入官君奏請復給嘉湖水災朝廷遣官覆實君遍履視之計虧常賦數十萬君曰為民獲罪尚何恤邪獨具實以聞遂免徴尋丁外艱服除復任景泰庚午受勑命推恩及親時處州盜起御史李俊督兵挫其勢有嫉之者反誣奏之事下守臣都御史軒輗以君公直檄往亷之卒釋其誣復屬理軍政凡詭籍妄附者悉正之洎詔恤刑復委君案閲可矜疑者皆得不死所至興學校正風俗除奸弊民皆悅服按察使陳璇禮君獨異由是同官多忌之或譖於都御史洪英乃求君與璇之瑕考奏左遷君不與辨力以疾辭還家浙人數百上疏乞留不獲璇既得辨英坐是被劾而去君居家怡然自得時徜徉山水間世事一不挂口天順己卯用子華貴復受誥命進奉政大夫修正庶尹及卒于京師凡卿大夫士莫不悼惜咸往哭弔君平居孝友事父母處昆季咸得其歡天資剛明而器度髙邁臨事立决確然當理是非成敗常預料之後皆不爽尤善别人物髙下暇則書史不釋手為文以辭達為主從學者甚衆卒年五十有三天順庚辰十二月十一日也配伍氏有淑德纍封冝人子男四人長曰禔克家不仕次彥充禮部儀制司主事次華翰林院編修俱以進士發身次禮邑庠生女二長適劉某次適劉某俱名族也禔與華扶柩將歸葬于故里乃以君從子學士時之狀乞豫為表刻石墓上豫不獲辭乃述其槩而系之以辭且以為世之力善者勸辭曰安城之彭世逺而芳簮組相繼後先爭光有卓嗣人明時奮翮偉績賢勞世豈多得樂天知命曽不尤人橫逆之至我心無嗔數之乘除乃豐厥後益振家聲自天之祐眷此善行匪溢其詞刻諸堅石終古不移中議大夫黃州知府致仕滕君墓表記曰親有善而弗知不明也知而弗傳不仁也况為人子者其孝在於顯親揚名者哉都察院左僉都御史滕昭痛親之俱逝手述其行乞豫表其墓豫哀其用情而不忍辭按狀滕君諱霄字九臯其先開封鈞州密縣人元季避兵徙南陽之汝州曾祖公甫祖貴父興俱潛德弗耀君自幼天資穎秀為州庠子弟員永樂初貢入太學久之擢禮部司務升祠祭員外郎有精勤之譽歲丙申用薦升湖廣黃州知府抵任以寬厚為政民有爭訟者諭之禮義興學鋤奸政聲翕然黃岡之民訴有虎害君為文告神虎即逺去宣德中行部至麻城有訴勾軍戎士為人殺死不白者君宿城隍廟亷之見一刺鼠走入寢處盤旋而去即使人追之至一池塘潛伏不見掘之得尸即戎士也因獲所謀殺者遂正其罪逺邇驚異郡之獄囚一訊而决未嘗久繫人多德之九載秩滿黃民不忍釋去上章懇留詔令復任君益勞心撫字惟恐一民不得其所在黃凡十有八年而亷潔之操如一日甲寅歲乃引年致政而歸閉門甘守淡薄如未仕時正統改元三月三日以疾終于正寢距生吳元年二月三日享年七十太恭人程氏克盡婦道隨行仕途佐以勤儉君卒後家無儋石之儲太恭人孀居獨持門戶凡百所需皆出勤儉之力有售書者過門輒脫簮珥易之以授昭曰讀此可繼父志也昭甫成童遣為郡庠生遂領鄉薦授監察御史乃迎太恭人就養京師每戒昭曰爾父居官始終亷潔爾任憲臣尤當淑慎况吾平生不喜華靡勿以我故而較豐約昭奉命惟謹天順己卯以昭貴乃獲勑封祿養方殷忽遘一疾惟顧謂昭曰汝能輸忠報國不墜家聲吾瞑目矣言訖而逝癸未十一月二十三日也距生洪武丁卯九月十七日享年七十有七滕君先配李氏早卒贈恭人太恭人其次室也子男二人長曰振次即昭孫女二人長適貢士郭升次幼在室孫男五人昭扶柩南歸卜以明年某月某日合葬杏園之南岡嗚呼滕君夫婦善行豈不足以為邦人出仕者之所取法哉是為表朝議大夫國子祭酒劉公墓表髙官大爵有才能者皆可為之而祭酒則不可為蓋必學行老成足以為人取法者斯稱其任焉天順己卯祭酒缺員朝士大夫中拔而用之非不近且便而必求於數千里之遠外若劉公豈非學行老成者之難得乎豫方哭公之亡而公子溥請表其墓同年之好不可孤也按司業張業狀公諱益字崇益别號覺菴先世安成人後徙吉水曽祖某號章江祖某號村老俱隱德弗耀父宗平號拙菴四川大寧儒學教諭為學士解縉所知薦修永樂大典書成升翰林檢討母解氏即縉之從女弟生子三人公其仲也自幼穎悟好學弱冠遊邑庠從前司業曽暹受易經知州柯暹來掌縣事見公勤力不怠獨加奬曰此必異日名士也宣德壬子遂中鄉試第四人登癸丑進士第正統改元授兵科給事中戊午弟觀復中鄉試第一人登己未進士第兄弟同朝士林榮之尋以山西久旱命公往祀河瀆西海之神祀罷大雨人以為至誠所感六年以績最賜勑命推恩及親乙丑持節冊封周王有所贈遺悉卻之不受既還聞母喪葬祭一遵古禮服闋改刑科給事中己巳秋敵逼京師人心危懼公疏陳禦敵䇿朝廷嘉之即命公往募山東諸道民丁習武藝以備調遣人皆倚以為安是歲冬以公勞績升湖廣布政司左參議時興師征苖山川險阻所慮者督運軍餉同官難其行公曰地方失寧咎可逃乎乃毅然當之襄事而還時御史出巡歸者必劾方面之不職於公不惟無疵可擲且疏其為政寬猛適中得民心上特賜誥命以旌其能仍推恩及親天順己卯用大臣薦召為國子祭酒公以師為司業弟子為祭酒不可欲固讓之至則暹已致仕矣公既蒞事乃申勑學規作興士類諸生翕然從之天順癸未十二月十有六日以疾卒距生洪武壬午三月二十九日享年六十有二配徐氏封恭人子男三曰澡早沒曰溥曰濬女一適周仁達孫男二曰機曰楩公偉貌修髯容止典雅望之可知為儒者師然篤於孝友性度寬和橫逆之來未嘗與較有加誣者亦不復辨待其自明人以是多之作文理為主辭意條暢尤好吟詠音律清淡亦工翰墨字畫遒美求者接踵於門所著覺菴集若干卷藏于家卒之日上嗟悼遣官諭祭公卿大夫咸弔哭之嗚呼公之儒行足見重於世有如此者豫故次第其事而授溥使歸刻諸墓石以示後人復齊焦先生墓表翰林庶吉士焦芳持其祖之行實謁豫告曰吾祖儒行可述非得重世之文第恐不白于世敢以鄉後學請于下執事者豫憐其志而為之表云先生諱顯字宗仁復齊其别號也世家南陽之泌陽曾祖某仕元為萬戶抗志不合即棄官歸隱而終祖良輔父成俱樂志不仕母董氏有淑德先生自幼不凡穎敏端重為父母鍾愛出入擕之口授古訓輒成誦稍長遣入邑庠為弟子員勵志讀書師友莫不許可時泌久乏科目咸屬先生適以內艱居家服制將闋有司強起之不從永樂甲午遂登鄉科明年春闈中乙榜有勸辭之者先生曰命也當順受之擢易州儒學訓導恆以不任為懼雖東修之禮不茍納邑之材士賴其啓迪率多成人永樂甲辰秩滿以績最選擢韓王府教授輔導宗藩其任益重先生亦竭心力不少怠久之曰人生貴適意耳吾何戀於此遂上疏乞骸骨時宣德丁未先生年才四十有五人或以為太早先生曰早圖晚節古人所尚竟得請以歸營别墅於泌城之西去家數弓許為屋若干楹繚以周垣䕃以佳木園池蔬果觸目成趨日與鄉之故舊幅巾藜杖徜徉容與於其間且曰向為儻來之物所絆今始復吾此樂耳為人簡易寬厚初無町畦處父兄宗族鄉黨間無不得其歡心見孫芳聰秀俾入邑庠曰是能繼吾家聲者已而果領天順己卯鄉薦時先生年七十有九喜曰老夫含笑入黃泉矣至八十有一乃卒天順辛巳三月六日也配武氏繼吳氏俱先逝子男五人長宣次溫次朗次舉次鑑孫男十一人曾孫男二人是月二十日與武氏合葬于泌城西南先塋之傍系以辭曰泌之儒先不多見也有美復齊焦之彥也粹行清文心罔衒也啓迪輔導力不倦也晚節遄歸適所願也别墅徜徉名鞅之弗戀也考祥視履闔邑之獨擅也昌厥後人不掩其善也我勒斯銘永為鄉人勸也長樂林表吾族上世逺不可考其在宋有兄弟四十八人自後子孫屢遭兵革不能自存於是棄家走四方各避害以全性命而已國朝洪武初惟先祖少保府君來守祖塋嗚呼以四十八人之後無慮千百指豈料守祖塋者僅存一人吾族之衰未有甚於此時者也已而先祖乃生三子于今孫枝又漸盛焉賢竊官于朝推恩三代曾祖祖父俱光祿大夫柱國少保吏部尚書兼華蓋殿大學士妣皆一品夫人蓋盛極而衰衰極而盛一理勢之自然耳雖然盛極而衰之家不再盛者多矣吾族既衰而復盛得非前人積德之厚歟譬之水焉淵之深者流必逺或暫阻焉終不害其逺也譬之木焉根之固者發必茂或暫困焉終不害其茂也吾祖之墓去鄧六十里號曰長樂林者自宋以來然也吾髮未燥時每隨父兄往拜掃焉但見叢木修竹屯雲蔽日中有數墳纍纍相向吾於斯時茫然不知本源之義也洎為諸生讀書講道心始開明歲時拜掃之際方思先世盛衰如此亦不慮及表而著之也未幾出仕于朝三十餘年思欲表之亦莫之就而且於勢有未便者今也始克為之蓋其志之堅情之切思之久成之急有不可得已者第恨為之已晚難免不孝之罪或曰昔歐陽公為龍岡阡表蓋卜葬其親已六十年矣且曰非敢緩也蓋有待也今子葬其祖亦三十餘年而始為之抑豈非有待之云乎是大不然吾於初時何恃而待但其為表乃在恩典極隆之後亦若有待焉者蓋事之適契豈敢上擬先正哉嗚呼後世子孫誦此刻文可不惕然懼其衰至而思有以繼其盛乎欲繼其盛豈有他哉惟修德行義而不虧焉可也噫可不慎歟古穰集卷十六
