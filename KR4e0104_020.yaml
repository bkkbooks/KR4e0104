body:
  text: 古穰集卷二十明李賢撰祭文受誥命告先祖文維景泰二年嵗次辛未月日孝曽孫吏部文選清吏司郎中賢敢昭告於三代先祖考妣尊靈恭惟祖宗積德之厚澤及後人賢仰承餘庇竊祿於朝祗懼戰兢不敢荒怠兹奉天恩頒賜制命階奉政大夫父母妻室同荷寵榮嗚呼根之固者枝必茂源之深者流必逺今日之慶豈無自而然哉膺斯曠典追慕何勝謹以三牲酒果用伸䖍告焚黃告先妣文維景泰二年嵗次辛未月日孝男賢敢昭告於先妣之靈男奉承慈訓竊位於朝兹荷天恩頒賜制命追贈先妣為宜人謹用謄黃焚於影堂竊惟男自幼多厄長育最難我先妣軫念之懷備極憂懼幸而成立縻於仕途弗克就養膝下顧兹罔極之恩方將圖報於萬一豈意遽違祿養况今俸入稍厚不及生前言之痛心豈勝感慕嗚呼泰山為礪磨盡有期此恨綿綿何有窮已謹以三牲酒果用伸䖍告伏惟尚享焚黃告亡妻文維年月日夫賢以三牲酒果祭於黃氏之靈兹荷天恩錫爾制命贈為宜人念爾昔者配豫方兾成家闕一星命遽云夭此雖定數情何能為服此寵榮少慰幽魄爾其享之祭陳僉憲文象山之秀鄞水之清鍾靈孕竒惟公以生公之生也粹然其質不昧而明不妄而實潛心稽古易書春秋得聖之奧與賢者遊蚤掇巍科擢任御史豸冠峩峩振揚風紀如唐子方孤忠自將如趙鐵面凜乎風霜簡任帝心十年清苦超升臬司往臨中土公惟初志益勵不渝方伯連帥孰不憚豫公出巡行滿車甘雨一道澄清閭閻却暑報最天官厥績茂焉乃增祿秩持憲蜀川蜀人仰之咸曰我公期公福我溘然告終嗚呼哀哉豫昔在學公來按試獨霽霜威戒勉諄至以豫試文遍示諸庠不肖之名愧公以彰於時賔興值公監試為某嫌也乃辭厥事幸而中焉副公盛心公豈有私顧豫何任猥以匪才辱公之好訃音忽聞豈勝哀悼義當往弔羈於官守千里緘辭附以尊酒追思儀容潸然涕滂公其有知鑒此衷腸祭尹貟外文嗚呼尹君廷佐年方四十有八矣忽一疾而竟亡士林相顧愕然無不為之痛傷造物者操數於𡨕冥之中何獨斯人之不常謂善者福謂仁者夀今乃大謬不然豈天道之乖張嗚呼廷佐兢兢小心循循雅飭司銓衡十有餘年而持已之恭未嘗一日而怠忘威儀棣棣不可選也如驥之德如玉之良豈獨僚友親而愛之在朝搢紳孰不願交曰氣味之深長豫之不肖昔忝同事而朝夕相從世俗之態曽不見其毫鋩惟仁禮存心所以愛人敬人之道愈久而彌彰名位方殷如川之至誰謂半世而止沾豫襟之浪浪屬纊之際思豫一見而永訣痛知己之難留惟附命於穹蒼陳辭寫哀薄奠一觴靈爽如存將必有感而來嘗焚黃告先祠文維景泰六年嵗次乙亥某月某日孝孫男吏部右侍郎賢敢昭告於顯祖考妣顯妣尊靈曰仰荷尊靈積德深厚被我後裔榮仕於朝兹者祗奉制命贈顯祖考江川府君為通議大夫吏部右侍郎顯祖妣楊氏孟氏顯妣葉氏及亡室黃氏皆為淑人恭惟朝廷推仁廣恩施及先世恪捧制命欣恱曷勝顧惟賢拘於官守弗克躬詣鄉園敬伸祭告瞻望桑梓感慕益增謹用謄黃并製冠服齎至祠墓恭行燎禮今以清酌庶羞於京邸行祠先此伸告代家父告焚黃文維景泰六年嵗次乙亥某月某日孝男封吏部右侍郎升敢昭告於考妣尊靈有孫曰賢仰荷考妣積德垂慶獲仕於朝叨膺祿位於斯有年兹者仰荷皇上大恩特賜誥命贈先考江川府君為通議大夫吏部右侍郎先妣楊氏孟氏為淑人及亡室葉氏并孫亡婦黃氏亦為淑人祗承恩命欣忭無涯念孫逺隔鄉園羈於官守弗克親詣祠墓祭告恭依制命謄此黃文并製冠服専人齎回男敬潔牲醴庶羞特伸燎告伏惟尊靈服此休命敷佑小孫竟展忠誠用昭令美我先人亦倍有光焉謹告新居祭五祀文維天順三年十二月己酉朔越十日戊午吏部尚書兼翰林院學士李賢敢昭告於司門之神司竈之神司中霤之神司户之神司井之神曰五行之運發育萬物惟神之靈有家當祀賢叨荷聖恩徙兹新宅神各司職尚賴爾庥安我人口蕃我畜殖其永無愆以保終吉謹以牲醴用伸䖍祭祭伯母楊氏文嗚呼伯母自為先伯繼室殆五十年於兹矣勤於治家勞於紡績儉以自奉恆憂門户之衰和以待人尤篤宗姻之義於婦道則克修於母儀則能盡子女各底於成立福夀已臻於隆長老而孀居不渝初志沒應無憾瞑目泉臺訃音忽聞心衋傷而出涕緘辭遙奠靈昭鑒而來嘗嗚呼哀哉銘存養銘天之生人道在其心神明之舍無迹可尋方其靜時具此太極萬理森焉洞然以寂君子於此敬以持之須臾之際不使或離不覩不聞提撕警覺聳然惺惺防間儼恪天下大本未發之中能不忽焉感而遂通嗟豫之資既昏且駁存養之功亦曰願學從事於斯動省厥幾庶幾終身無或自欺省察銘幽暗之中細微之事著見明顯亦何其至所以君子惟慎其獨人欲將萌絶之宜速於動之幾審之惟精毫釐有差道不吾凝奈何為學紛紛鹵莽人不見聞遂失其養潛伏之詩我則味之內省不疚於心自恞喫緊工夫莫此為要嗟豫小子敢違斯教於以作聖於以致和兢兢其畏矢心靡他克己銘一心之微理欲交戰所以君子力為之辨惟理惟欲能判於心務去其欲勿使或侵惟欲之端奚翅一辭曰邪曰偏曰非曰私或有一焉理即亡矣形雖為人心則物只志士於斯奮然不回遇敵而前安問其誰惟兹大勇古有顔氏顔何人哉學之則至顧豫之鄙匪曰大言斯復其初無忝於天改過銘人非生知孰能無過過而能改斯不為懦志不可惛慝不可留改之勿憚勇於自修學問之道惟此為急茍或畏難闕以集所以君子知過不容速以改之惟善是從於以徙義於以崇德歉悔不存我心則懌如湯之聖如回之賢不吝不二莫之或先下逮仲由聞過則喜百世為師在此而已如豫不肖敢忽其要希聖希賢弗棄弗暴主靜銘學問之道靜為第一心靜則虛不靜則窒惟其靜焉湛然以寧如水之止如衡之平豈若釋氏曰禪而定收此放心隨事而應茍不靜焉紛紜膠轕蔽交於前莫之能遏於以應事齟齬鶻突茫然無歸方寸恍惚惟聖立極乃主於斯惟賢致逺亦曰在兹由是持敬乃為善學非同槁木有見其卓先師訓戒我則佩之専其精神庶無外馳主敬銘惟人之生得氣之正理亦具焉斯謂之性盡性曰心虛靈知覺茍不敬焉昏亂交錯為聖為賢為愚為頑究其所由敬否之間所以為學非敬則肆成始成終咸由於是偉哉先儒提敬於前用力之方開示惓惓主一無適整齊嚴肅曰常惺惺曰時檢束惕然悚然薄氷深淵表裏動靜無或間焉潰川隄防奔馬銜轡須臾怠忽衆欲交熾凡我後學尚鑒於兹作聖階梯舍是何為參前倚衡惟敬是主宜效仲弓請事斯語行恕銘為學工夫惟恕為要終身行之可以至道聖門穎悟子貢為先夫子告之三以恕焉推以及人取譬於已求仁之方在此而已斯恕之公不可無忠體用雖殊形影則同曰愛曰惡曰治曰責彼我之間分願各得亞聖有言强恕而行服此成訓誓勿荒寧輔漢卿所編朱子讀書法綱領凡六條前後二集總十有四條已刋於集慶學中後有番昜齊熙又更易次第著其說於每條之下今雖載於真西山記中又殘缺大半兹欲揭六條於家孰以警子弟於是每條為銘數句云居敬持志讀書之本在於一心至虛至靈神妙莫尋心能不放何術可仗居敬持志無以復尚敬或不居志或不持飛揚馳騖物欲是隨嚴恭寅畏心入腔內讀書觀理庶幾不昧循序漸進讀書之法貴乎有序漸進為功不可急遽小學大學論孟中庸六經子史次第求通量力所至立此程課字訓句㫖勿得放過茍為不然貪後忽前凌躐疏易是誰之愆熟讀精思書必熟讀不厭反覆在口成誦千百未足精而思之卻立徐行如攻堅木如理亂繩意得於心常使浹洽燕閒之中玩味勿雜心與理㑹血脈貫通持此不懈作聖之功虛心涵泳士之讀書貴乎有則務廣貪多終無所獲虛心靜慮涵泳從容欲速不達進鋭無功所以君子深造自得意緒安間勿急勿迫心潛於一久而不移顧豫所樂知者其誰切已體察體察之功貴乎切已矯輕警惰私念或起省身如曽奚翅日三萬物豫備一誠勿參喚醒此心內外交養㸃檢提撕纎毫不爽見微之著遏於將萌慎獨自克日進髙明著緊用工為學工夫忙若救火即時向前奮然敢果如饑求食如寒求衣嚴立程課不可少違撑船上水急流之中一篙放緩退而無功所以君子孳孳不倦競此寸隂務償夙願硯銘嗟爾泓出端溪奈之何精堅之質友陳𤣥而見虧𤣥哉𤣥哉其亦孔子所謂損友也君子取友其慎之筆銘爾穎之才藉𤣥而著友道相須古人斯慮進鋭之志尚宜戒之茍或忽焉鋭盡何施蓋銘嗟爾髙蓋以覆為職雖無蒼穹之廣大其於人也有益惟雨惟日汝能蔽之第恐狂風忽至而倉卒不能自持雖㒒𨽻紛然奔救其不離披也者幾希惟智者早見能收於未風之時床銘床橫八尺載人之眠於夜也則宜於晝也為愆或曰愆者人也床何與焉然則人之愆必有其緣使其晝無斯床將必絶人之便庶幾乎終日乾乾劔銘寶劔之精龍光上升其為形也如虹如霆如星之粲如霜之清君子佩之鬼神為驚若夫措諸用也剸犀斷鯨㑹須為我獻之明廷天下之人其不肅然以寧尺銘惟尺之度因律而作積而纍之不失毫末古之神禹以身為度地平天成豈無其故若夫大學潔矩之道非爾為用亦莫能較由是觀之一尺雖微而有公平正大之體君子於是乎亹亹針思誠齊針有序焦君秉聰有志於聖賢之學以思誠名齊而請其說於豫豫何足以發明斯道哉然竊聞之誠之一字只是實理聖賢論之更無餘藴而思誠又孟子教人用力求誠之要即中庸所謂誠之者人之道也嗟夫天地萬物莫非實理惟聖人不假修為而自存賢人必待修為而後存若夫衆人為私欲所蔽往往流於妄誕欺詐而實理之在已者昧矣學者能於日用之間一動一靜一言一行必思所以誠之擇善而固執自强而不息則實理復存於我矣古之君子作聖之功惟在於此今焦君獨能以是留意其度越常情逺哉故不鄙而為之針人之有身萬物皆備惟聖存誠絶彼私意賢人而下豈免自欺必由乎學曰惟以思審思明辨乃慎其獨心廣體胖自反而縮是曰自慊氣乃浩然惟誠在已樂莫大焉古葉之英故家之胄曰焦秉聰褎然其秀立心制行取法聖賢顧此人道思誠惓惓表厥齊居舉目常在擇善固執罔敢或怠俯仰無愧廣大寬平進進不已自明而誠日用彞倫一真無僞仁義根心睟面盎背由中形外表裏不殊斯為盡性聖賢同趨嗟豫疏拙矧敢自棄亦有志焉孜孜不替相彼爾室丐豫以言針以共勗為蹄為筌贊漢三臣贊蕭何何與髙祖布衣相從入關所得圖書是崇養民致賢卓為上計拜信築壇懲彼兒戲不絶糧道恆保關中漢興楚滅伊誰之功帝心多疑何亦甚殆善用人謀獄猶見逮以參代相為國得人勛居第一永矣無倫曹參參從髙祖始以中㳙攻城掠地執鋭披堅身數被創志不少替踣楚興劉允賴其濟既還假相遂相王肥治用蓋術民有所依剖符定封居何之亞代何為相功不為下何由以見遵之弗違民歌寧一千載有輝王陵髙祖微時事陵為兄陵聚其黨遂從楚兵洎漢擊楚陵乃從漢以母招之母死其難漢定天下陵實佐之究其初意封侯故遲及居相府后欲王呂正色直言后意乃沮夫何平勃背約阿從人臣之義孰與陵同自贊以言乎學無潛心諦玩之功以言乎進無剛毅堅忍之志愧天爵之不修奈人爵之荐至徒存康濟之心而才單力弱不足以自遂也思引退而弗能將不免於天下後世之譏議惟此心之惓惓何功名之敢覬所願者世道亨嘉而身見唐虞之盛治也復齊焦先生像贊觀舒遲之容而有以知其德之裕也覩睟盎之色而有以知其性之具也藹發外之英華存凝逺之風度主師席而育才之志伸輔宗藩而正義之功著其歸老也扶笻容與於水光山色之間其樂道也抱膝吟詠夫鳶飛魚躍之趣士林仰出塵之清標後裔挺臨風之玉樹噫斯人也誠儒者之髙流在吾鄉而獨步者也封通政司參議趙公像贊觀素質而識其意誠覩貌間而知其心古挺孤松之秀於秋巖藹幽蘭之芳於春塢良貴在已不慕乎人爵之榮安宅是居宜受夫天錫之祜朱顔白髮衍牲養於家山烏帽緋袍絢龍章於庭宇噫斯人也可謂得至樂於天壤而無愧怍於仰俯者邪賦禎槐堂賦監察御史房君子儀洛陽人也其尊甫既構堂以居忽有槐生其下已而蓊然暢茂子儀亦大顯人以是槐為房氏積慶之兆遂名其堂曰禎槐而豫為之賦繄大唐之元勛兮蕃後裔於洛陽覽寰宇之茫茫兮乃𨽻籍乎中央歷千載而昌盛兮惟積纍乎隂德念所居之靡固兮肆鼎新乎堂宅紛輪奐之壯美兮曰宗族其聚於斯羌落成之既吉兮見槐生其荑荑揆木類之攸産兮宜逺茂乎山壑獨離羣而自異兮其鍾秀乎旁礴思有開之必先兮兆奕葉以流芳異晉公之手植兮信房氏之嘉祥乃於是乎封之培之育之以夜氣之息飽之以雨露之滋順物性之自然兮隨生意而怡恱抑造化之聏和兮夫豈待乎提挈將見萌之於青陽長之于朱明秀之于白藏固之于𤣥英拂青雲以森鬱兮矗凌空于百尺蕩繁隂以滿庭兮羡喬木之無敵符華𦙍之穎脫兮表英邁於子儀擅五色之雄文兮斑上下其陸離魁多士于梁園兮復髙第乎金榜快鵬摶之九萬兮衝雲霄而直上慨攬轡乎􅍡駒兮綴峩冠以神羊著繡衣之煌煌兮肅烏府之堂堂運兔毫于螭首兮簉鵷班于青瑣振霜威于關右兮觀民風乎江左由中揚而外歷兮偉廟廊之清標矧推恩以榮親兮絢錦敕之封褒允禎槐之不誣兮何家聲之大振保令德而無斁兮期始終而一慎又從而歌曰槐之禎兮房之興兮綿綿子孫引勿替兮源源慶澤寧有既兮瞻彼其廬洛城之東兮嵩髙惟嶽惟房之鍾兮張氏孝節賦繄唐室之忠義兮衍百世其流芳藹詩禮之雲孫兮實系出於南陽曰有女其貞靜兮蚤育秀於閨房才不較夫道韞兮德乃符於孟光惟松蘿之託好兮遂和鳴之鳯凰擬鶴髮之偕老兮痛所天而遽亡悵幽明之異路兮衷鬱悒而莫制捐膏沐以勵節兮指井波而自誓幸遺孤之方齔兮殫績紡以撫育覬成立以有後兮慰泉下以瞑目豈蒼穹之莫知兮復修短以難留徒海枯以為淚兮曽不覽其增憂念雙親之垂老兮願滫􅔱以躬勤同諸弟以周旋兮侍膝下以欣欣羌素懷之未愜兮忽靈椿其凋謝悼三從之俱棄兮崩五內於長夜倚萱堂以釋抱兮謹奉養而益周嘉難弟以奮庸兮得三釜以綢繆驚四時之代序兮忽白日其西暮恨青鳥之不返兮望瑤池而迷路慈闈忽云告徂兮心何極夫傷悲蹇一身之自苦兮顧重遭夫乖離於方寸以無愧兮允孝節而兼全視共姜於前古兮僅能盡夫一偏系曰惟孝而節兼之鮮兮孰以上聞昭曠典兮寵命下臨光生墟墓兮垂之青史永永無斁兮哀辭周是修先生哀辭訓江都邑庠周轅持其父是修先生行狀以示豫豫三復披閲凜然有感遂哀之以辭嗟先生之節義兮與烈日而爭光凜千載之英風兮實可慕而可傷視古人其夷齊兮之就死為尤决抑所謂求仁而得仁兮乃丈夫之貞烈先生之容吾不得而見兮夷考其行而可知身雖永隔於黃泉兮心則暴著而無虧使我聞之其感慨兮欲何為而致奠潔生芻之一束兮盼千里而酹獻嗚呼義重於泰山兮何一命之可留彼齟齬之偷生兮其視此寧不為之含羞秦性初哀辭秦性初㑹稽人也以進士擢春官主事豫嘗接其風采淳然篤厚君子也年未六旬以疾卒位不稱德物論惜之豫以晚進辱雅愛為辭以申其哀焉若有人兮山之隂紉蘭茞兮撫瑤琴朝翺遊於藝苑兮夕弭節乎頖林御泠風以遐舉兮折仙桂於夜明官南宫而少試兮擬雲路以髙翔忽委蛻於大塊兮曽不係夫毫釐闕魂氣之飛揚兮遣巫陽以招之神返堂室兮風蕭蕭形歸窀穸兮夜寥寥芳名千古而不泯兮紹箕裘之有人嗟旅櫬其南旋兮悵執紼以無因慨夫人而不可見兮增豫懷之隱憂慘鬱悒以歔欷兮睇雲山之悠悠古穰集卷二十
