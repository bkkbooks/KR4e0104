body:
  text: 古穰集巻八明李賢撰序贈吳先生還家序道在天下無物不有無時不然必有聖賢者出乃能明而行之茍無聖賢道固自若也為聖賢者豈有他哉能不謬於是道而已若夫衆人則聽其自謬不著不察惟學者能知斯道之彷彿然擇之弗精執之弗固失之多而得之寡所謂獲十一於千百者也豈惟後世為然雖聖門髙第顔曾之外未見復有純者寥寥千載迨宋之興有周程張朱者出焉於斯道也始能大明而允蹈之然聖賢之生世不常有殆無異于祥麟威鳳之稀蹤也今去數賢又若是其久矣閒有一二豪傑之士頗欲振作其間然於斯道之全體終有憾焉嗚呼艱哉若崇仁吳與弼先生葢有志於斯道者也予承乏吏部時凡有自撫來者必詢先生之動履造詣何如卒亦未有知其詳者嘗致書以伸景慕之私既而累年訖無消息意其引避者宜然不復計念後有出於其門及遊宦其地者交章論薦竟亦不起天順改元予始被命入内閣言及先生學行之懿忠國石公慨然上疏薦之朝廷遣行人齎璽書幣帛往聘於其廬既至京師上喜其來陛見之日即拜左春坊左諭德召至文華殿從容顧問寵賚有加先生以衰病不能供職固辭上堅意不允留之數月見其病勢弗已乃允其辭復賜之璽書賚以白金彩幣仍遣行人送還故里令有司月供廩餼冀有精力著書以廸後學聖心眷望如此其盛葢曠世所未聞也昔者范文正公謂嚴子陵與漢光武以道相尚而使貪夫亷懦夫立為大有功於名教以今觀之皇上之量尤大於光武與弼之志不下於子陵君德由此而益光士風於是乎大振而國家元氣亦將藉此益厚矣豈曰小補之哉予既得與先生面見其學極髙明動遵古禮有深造自得之樂願留以自輔而不可得也告别之際遊其門者乞予言以贈嗟夫予言烏足以軒輊先生哉健羡之餘有不能已焉耳是為序賀劉先生新居詩序翰林學士劉先生所居之宅在西長安街中面北即王文安公舊居也而劉先生居此亦十年矣今年夏始克買諸南隣而大之新造㕔事乃得面陽予與同官者期落成之日往賀焉先生聞之乃復見招初約在九月望日既而移約在望後二日及臨十五夜則雷雨大作晝則寒風大作又明日昩爽方止乃十七日也是日内閣文書頗靜吏報正午予與同官者乃出造而賀之至則日如春陽之暖天宇晴明纎雲不興舉盃相酬賔主之情胥悦先生羅列甚豐予以為過矣先生曰客以為豐主人以為嗇各用其情也既即席酒數行先生復請為令以樂之予曰君子不盡人之歡先生曰盡人之歡者責人之厚也今主人自欲厚之非客之責也已而酒將䦨賔主皆沾醉而威儀不忒予謂先生待賔之意甚盛不可虛辱宜各賦一詩以去遂命先生之弟行人寅之漫寫一韻五字以示衆賔予謂引玉者先抛其磚乃速成之衆賔及主人即繼成之頃刻間無未成者豈乗興而作有神相之歟于是主人喜斯㑹之雅復勸酒數行盡醉而罷明日先生請曰席上所賦之詩謹為冊録之以示永久雖然必得執事序其所以然使人知作詩之意可也予惟此㑹可以見賔主以和相感之效焉向使約而不移業已為之安可中輟將見飛埃滿席凄淡蕭騷賔主之情必有索然者矣豈能賦詩而盡歡哉今移其約而得天時之和若主人知而擇之者非偶然也夫天時之和實由人事之和所感召惟為賔為主者志同道合舉措得宜而盡人事之和則天時之和自然應之不然或有一人乖戾于其間未必得此吾因是有以知天人感應之妙矣先生名定之世家江西之永新其先君子儒行甚髙先生得家學之傳為文必追古作方角藝春闈時泰和王先生知貢舉見其策驚曰世未有此文今有之必永新劉君也遂擢為第一已而開巻見先生之名乃其子也寅之亦登進士第先生長子稼復領鄉薦餘子七人如玉如蘭然則斯室之新其慶未有涯也席間賔主共十人各列姓名于所賦詩後茲不悉數玉堂賞花㑹詩序文淵閣之下有花臺焉列芍藥三本聞自宣德間章廟嘗幸閣命作是臺特植一本居中是也景泰初増植二本左右是也又聞宣德正綂時歲常有花洎増植之後未嘗一開天順改元之初予方入閣時則同事者四人居中一本遂開四花佳者惟一枝耳今年春季前萌芽忽出予與彭吕二先生往來目之未敢必其開也是月望後林李劉倪錢諸先生偶來聚觀枝葉始茂予因戲曰此花若開必共賞之又數日有緑蕚焉首夏上旬之四日遂各吐蘂欣欣然若解人意吾之賞業乃成初亦不必其數也明日㑹者八人花即盛開八枝各獻芳妍無不佳者咸以為異以理觀之固出於適然以數觀之似亦非偶然也因思昔者韓魏公在廣陵時是花出金帶圍四枝魏公甚喜乃選客具樂以賞之葢以人合花之數也予今㑹客以賞花初不取合於花數葢花自合人之數也夫人合花數者係於人花合人數者係于天然魏公四人皆至於相亦豈獨係於人哉由是觀之則魏公之有意葢亦合乎天數之自然矣嗚呼魏公一代之偉人也後世誰敢望之偶因賞花一事而比論其所以然耳諸先生曰此禁苑之花又非廣陵者比然三本三色宜製佳號遂名居中淡紅者曰醉仙顔居左純白者曰玉帶白居右深紅者曰宫錦紅予作詩一章復和數首諸先生在㑹者亦皆和之但取適情不拘首數時惟廷臣黄先生以足疾不赴㑹明日復開一枝廷臣當之亦和數首已而闔院青宫諸僚友咸喜為玉堂盛事亦屬和之且謂區區不可無言以紀其實也遂序其所由於首云澶淵紀先生輓詩序人之常情仕則慕君不得於君則熱中葢得君則得富貴利達矣若登名進士其勢漸可以得君乃富貴利達之階梯也孰肯舍之而他適乎偉哉紀先生之為人也先生早以淳篤之資博雅之學登名進士於富貴利達殆無跬步之勞顧乃舍之而願就教官則其所見豈常情之可測哉夫教官者道義之所寓也先生惟以道義存心故能不以得君為念視富貴利達不知為何物也易曰艮其背不獲其身行其庭不見其人言所見者道義而已外物不足以動之也古之聖賢君子所以異於人者在此奈何世之人不知天爵之貴而惟人爵之慕卒歸於鄙夫之域而已吾於紀先生安得不擊節歎賞哉嗚呼先生逝矣而其制行之髙無愧於古人者不可泯也宜乎搢紳大夫景仰其行作為詩歌以輓之葢亦情之發有不能自己者其子工科給事中欽裝潢成帙請予為序予與先生同官吏部聞訃之日已嘗為誄辭一章以寄哀矣慨念平生不可復作乃以先生所存之大者冠諸篇首若夫歴官行已之詳具載狀銘者茲不贅送林先生致仕還家詩序宣德癸丑予始至京師舉進士見翰林諸先生衣冠濟濟無慮數十人若林先生其一也今三十餘年矣以先生視之或前或後或長或幼零落俱盡而先生獨存何異於衆芳揺落之時而孤松挺秀者乎噫果何脩而得此也予嘗以理觀之先生之為人也德性堅定而不移氣質沉靜而不躁處心平易而不險操行端潔而不汚臞然身不勝衣而志不餒也怡然自得其樂而思不出位也然則安享禄位於悠久者得非有此衆善之所致乎盛矣哉當太平無事之日從容於館閣之間而壽至稀年之上者在今惟先生一人而已曩者先帝復位之初即進先生為翰林學士又明年先生以七十乞歸先帝謂臣賢曰此淳雅君子人也不可釋去自後先生屢求致仕以先帝不允未遂所懐今皇上嗣登寶位念先生隨侍講讀日久特加太常之秩先生慨然曰吾年七十又五筋力衰憊如此尚可戀此厚禄而不休耶遂上疏懇辭皇上重違其意而允之予惟先生今日之歸視漢之二疏職雖不同其隨侍東宫而輔導之任則同也二疏當輔導之日上疏乞歸宣帝即從其請先生於輔導之日亦上疏乞歸而先帝留之至再至三而卒不釋去誠以先生正人而儲德賴以成之也茲者皇上臨馭天下先生為舊學老臣尤不可一日不在左右奈何年近耄耋禮在優閑所以遂其請焉先生歸矣凡同官者且喜且惜喜則喜其保全晩節而俯仰無愧惜則惜夫老成既去而後進無聊乃作二軸分題為詩以寫其出身歴官歸老之狀而予為之序云贈南京翰林學士王君詩序予嘗以為仕途通塞造物自有乗除之數不必容心於其間歴觀古今居仕途者有以知其故矣葢得意於前必失意於後蹇滯於始必顯達於終或前後得意而中則失或始終蹇滯而中則通在君子惟居易俟命而已反是未有不怨天尤人者焉且以毗陵王君觀之一登甲第即為編脩守職十有餘年之久方以秩滿而遷何其淹也已而居侍講也曾未期年而有春坊庶子之擢又未許時而有南京學士之擢何其驟也假使王君於未滿之時厭其淹而思欲振之其奈造物之未許何又使王君於復遷之後懼其驟而思欲辭之其奈造物之無意何然則王君之所存亦不異於居易俟命之君子矣士之處世如此則名節豈有不全風俗豈有不厚而國家治道豈不賴之益盛哉雖然古之論文學者必以德行為之本王君所存固異于人而又以明敏之資廣博之學醇正之文為翰長於故都固綽綽然有餘裕矣使惟此自足而忽於踐履操守之間亦豈朝廷擢君之意耶試觀前代學士之選捨張洎而用畢士安捨梅詢而用楊億寧用竇儀而不用杜韡寧用劉攽而不用曽肇則命官之意可知矣闔院僚友榮君是行分為十題賦詩贈之而予為之序世德堂序義惠劉侯繼祖之孫祠祭署祀丞雄者持世德堂巻謁予曰雄之婦翁兵部尚書兼翰林學士苗先生也先生致仕家居題四言詩一章於巻以惠雄有勉承世德之句故摘以名堂欲常目在之以景前人之德而自勉也惟大君子賜之一言予聞義惠侯世居鳳陽昔太祖髙皇帝㣲時侯以鄉曲之舊嘗助其不給已而復與善地葬帝之考妣則今皇陵是也帝得天下之後念侯之恩侯已亡矣特贈為義惠侯賜侯夫妻誥命具道其事復官其子以報之葢劉氏世德自侯始侯之子英為祠祭署丞孫鏞繼之曾孫謹復繼為奉祀京復繼為祀丞率皆淳雅端謹樂善循理而世德不替焉今雄繼為祀丞乃以世德名堂可謂有其實矣雖然侯之濟人其諸異乎人之濟人者與人之濟人所濟者不過尋常之流耳尚獲顯報于身于子孫若侯之所濟者非常之人當時賴侯之濟不至窘迫一旦出而治世天下之民咸被其澤君子推本未有不大侯之功德者故曰侯之濟人其諸異乎人之濟人也然則侯有功德於國家如此所以慶流後裔一門五世咸脩其德簪組相承嫓美于時豈偶然哉吾知劉氏之澤未艾也詩云子子孫孫勿替引之其劉氏之謂歟贈太醫劉君序成化改元端陽後五日予左頰中偶患腫結即召瘍醫劉英氏視之曰風熱所致也其勢方盛不可急吹藥其上庶以解明日再視復吹之又明日亦然且相以消毒之劑所患自若藥力既不能敵其痛乃不可忍入夜尤劇予以英之技止此欲改圖之英且囑曰慎勿為他醫所惑也適有親識以一醫來視之曰此易易耳痛可速止問其法曰必潰其外以出其毒今夕可安枕矣予雖急欲止痛又恐其術不良醫者欲售其藥曰不然只内潰可也予念英之言竟猶豫不决及視其藥若黒油然醫者既去持以示英英大驚曰已用之否曰未也英曰幸甚此膏著肉糜爛矣况欲置之頰中安能保其不傍及乎吾恐患者未愈而爛者方殷也乃以指入口探所患處曰腫今成疣可决矣徐以尖刃决之膿即潰出予殊不覺英大喜曰無恙矣吾初非不欲痛之速止也奈何疾勢不可遏第以藥力防閑之使之不至散流而已若不待成疣而先時强治之是欲速而反遲也吾驗此多矣堅守其法不敢違焉膿既去痛即止是夕乃得安寢又數日而愈予惟人之有疾不可不謹也向若不聽英言輕聽薦醫之説祗自苦耳曩者予患足疾亦痛不可忍召醫治之但敷藥其上而痛愈甚朝廷聞之亟命英父院判君來視所患處一决而愈英之父子妙術咸見效於予予何幸哉今院判君辭世矣而英之術方盛行予嘉其醫道精熟如此將來名位未可量也特序以贈之楊文定公文集序古之君子有事業者未嘗無文章葢事業所以伸平生之志文章所以著平生之學事業而濟之文章則益顯文章而本之事業則益重若徒有事業而無文章譬之植木但有質榦而無花葉則為枯槁之木矣士生斯世亦何嘗不欲事業文章之兼得也然而兼之者鮮焉何哉由學與命之不同也夫事業可述而文章不著者是其學之疎也文章可述而事業不著者是其命之蹇也學必優焉命必通焉事業文章斯可以兼得矣今之君子能若是者楊文定公其人也公早以進士甲科職翰苑領宫僚又進而直𢎞文入内閣輔導之功論思之績經濟之畧著于五朝聞四方者可以傳之乎百世而無窮及觀其所為文章則辭惟達意而主于理言必有補於世而不為無用之言論必有合于道而不為無定之論嚴重老成有臺閣之氣象焉然則公之志伸于事業學著于文章方之古人豈多讓哉僉憲董君應軫於公為鄉後學得公之文壽梓以傳求予序嗚呼公之文章以事業而見重於世必矣何以序為第予素慕公之為人序公之文固所願者獨以晩進孤陋不能發公之所藴耳遂三復其藳而歸之二程全書序嗚呼道不易知也宜乎知之者寡自孔孟至兩程夫子中間千數百年學者於斯道渺渺茫茫無異於夢中若漢之董仲舒揚雄隋之王通唐之韓愈亦皆有志斯道殷勤著述以傳後世求其造之深而知之真者卒未有焉由是觀之道果易知乎向無兩程夫子以出類之資深造是道而發明之則千數百年之後學者復如夢中而已雖然宋之大儒於斯道造之深而知之真者尚有其人顧賢獨推兩夫子者何耶葢周子雖云黙契道體而兩夫子受學之後擴充廣大發明親切其功過於周子矣張子雖云妙契洛書及聞兩夫子之論盡棄其學而學焉實有得於兩夫子矣至於朱子集羣賢之大成則又神㑹心得於兩夫子之言而興起者觀其於羣書之中摘庸學語孟四書為標指而發明其理以示後學於無窮則續孔孟千載不傳之緒者舍兩夫子其誰哉然則兩夫子之書學者所當尊信與四書並行可也今去兩夫子四百餘年學者不見其全書天下缺事無大於此矣國子監丞閻禹錫惓惓訪求兩夫子遺言盡得其書而集之名曰二程全書欲刻梓以傳求賢為序夫兩夫子發明斯道之言具載是集顧賢何人而敢置喙於其間景行之餘不能自己特著其梗槩于編首如此若夫以誠敬為入門以踐履為實地脱於言語之間而得心傳之妙則在學者所自勉也禹錫兩夫子故里人賢亦忝在鄉邦云送禮部侍郎李公南歸詩序君子進退以義不以利進而合義則進得其道而無倖進之非退而合義則退得其道而無茍退之失不然則進退以利而已世之學者非不知義與利之分也求其進退以義而不以利者何其少邪豈知之有未真邪抑為私欲之所蔽邪夫知之有未真者其失猶可望其改也其為私欲之所蔽者吾恐終其身矣嗚呼可不察哉今之君子能察二者之弊而惟以義進退者吾於克述李公見之且以求退一事而言今天子以克述博學能文命脩英廟實録而為總裁之副一旦以㣲疾捨之而去自常情觀之孰不曰事已就緒業將告成進官錫賚有日矣以利言之安可去乎而克述之志則不在此意謂晩節不可不早圖也四時之序成功者去天道自然不可違也年臻六十子已登科宦途有繼亦可休也而况嬰疾未愈思鄉日切於此不能見幾而作尚俟終日可乎所以幡然求退不愛輕肥而直欲遂林下之願也故君上不能留僚友不能止親舊徒興悵别之懐士林徒惜老成之去而克述之心惟見義之所宜退浩然而歸莫之能禦視前所謂利者不啻浮雲之輕漠然無所動於中也名節從此而益全亷恥由是而益振國家有斯人而道益光鄉閭有斯人而榮益彰然則如吾克述者豈可多得哉詞林僚友重克述之行欲侈為詩文以壯之乃分題十二叙其歴仕始末之詳以予與克述為同年友也宜為文以寫其情素噫吾榜百人三十年間零落殆盡今在朝者惟秋官卿陸公及克述與予三人而已今克述又云别去在予尚忍言邪雖然疾愈而望其復來實今天子人惟求舊之意重用老成而不欲釋者克述尚體之勿拂焉此予之志也送兵部尚書兼翰林學士彭先生省親詩序臣子所當盡者忠與孝也說者謂忠孝不能兩全予以為不然夫為人子者終身事親不干仕進是固不能盡忠於君矣若見用於世者登要津躋膴仕立身揚名以顯其親謂之忠孝不能兩全可乎第以位有崇庳任有輕重故為孝為忠亦不能無大小之殊焉今之位崇而任重若吾僚友彭先生純道其一也純道以進士第一人歴官翰林居論思之地司輔導之職典領機務叅决大議主上獨加眷注百僚為之具瞻其於忠孝不既大乎純道曰此以理論忠孝非人情也禮云左右就養無方言事親也左右就養有方言事君也事君事親雖有無方有方之别而左右就養則無彼此之分臣子之盡忠孝必如此庶不失其情焉且以有方為言以見為臣者各守其職有一定之方不必務在君之側也以無方為言以見為子者不分職守無一定之方不可一日離親之膝下也吾今違養十有六年矣而家嚴之壽七十有八縱不得日在親側而得一面於垂老之際亦無憾矣於是上疏懇乞歸省上以純道如左右手誠不欲暫釋重念父子之情不一遂則又乖以孝治天下之意於是不得已而許之又慮純道歸見其親情不能舍必有眷戀不起之懐俾之乗傳而往賚予加厚復以中貴人輔行無非欲其來之速也夫來之速者豈徒然哉凡百制作賴之脩飾焉凡百政務賴之贊畫焉而又欲主德日進於光明國是日臻於全美主上之所委托士林之所期待而僚友之所願望者無不在是然則純道一身之所係豈直泰山之重哉同官者於其告别不能黙黙乃分題賦詩以壯其行謂予與純道相知尤稔宜為序以道其情第愧才思疎淺深有愛莫助之之歎姑述其槩如此若夫去來之榮具載題詠咸世之所稀有者非純道不足以當之古穰集巻八
