body:
  text: 古穰集卷二十八明李賢撰雜録學者於聖賢之道貴乎知而能行今之士誰不讀書講明之功或有之身體力行百無一二要之講明者亦粗通文義未能真知其理望其能行難矣哉宋朝理學最優於前代者蓋自濂洛關閩諸大儒倡起於是天下士大夫皆知為務觀其於諸先正書問往來論辨不已若渠不留心寧有此今則借為出身之階一得仕後置之度外更不相關但任其天資而行之於聖賢立身行已法度茫不在意視理學不知為何物也可勝嘆哉嘗怪前元博雅之士朝野甚多以為時運如此及觀取士之法用賦乃知所謂博雅者上之使然也今則革之蓋抑詞章之習専欲明經致用意固善矣竊謂作賦非博雅不能而經義䇿論拘於正意雖不博雅可也試於二場中仍添一賦不十數年士不博雅者吾未之信也吳草廬得弟子如虞伯生而不能傳其道其究安在非草廬不悉其傳也意伯生初遊其門已無求道之志不過欲正其文詞而已不然以伯生之質果能刮去詞章之習一力從事道學豈不得哉顧乃耽於詞章觀其作詩不下萬餘首宜不及於道學也本朝仕途中能以理學為務者才見薛大理一人蓋其天資美處某嘗欲從遊以官鞅弗果斯人疏於處世直道見黜已就間矣未知造詣何如也吏部尚書郭璡出身早不遑問學然天資甚美受氣完厚臨事從容喜怒不形於色精於吏事簡切不泛為户曹屬文廟已知其名正統初侍臣因蝗旱言大臣不能盡職久妨賢路有旨回奏衆欲罷歸田里以謝天譴璡獨以為不可云非是貪位但主上幼沖吾輩皆先帝簡任受付托若皆罷去誰與共理只宜戴罪修省改過以回天意衆從其言識者韙之竊見今之士大夫聞喪且用求討挽詩數月延緩哀戚之情甚略當道者宜用人之長今有以謀略薦者見其人以勢位臨之略而不接曰豫既知之矣則訑訑之聲音顔色拒人於千里之外豫謂如此為國家計固疏矣其自為計亦未為得也何則古之宰相惟不自用而各盡人之所長已而事就成功宰相獨收其名向也所長之人不預焉唐之房杜是已今慮不及此必謂天下之人無踰於已者嗚呼何見之晚也昔者周公之聖天下之士豈復有過之及之者觀其吐哺握髮之心蓋周公未嘗自以為能必謂天下之士髙於已者多矣今無周公之聖而謂天下之士無踰於已者可發一嘆今之士大夫不求做好人只求做好官風俗如此蓋亦當道者使然也何則有一人焉平日仕未顯時士林鄙之一旦乞求得好官人皆以為榮向之鄙之者今則敬之愛之矣欲人之不求做好官難矣有一人焉位未顯時士林重之介然自守耻於干人好官未必得也若所鄙之人一旦得好官人反重之而向之重者今反輕之欲人之求做好人難矣今欲回此風俗在當道者留意若不由公論而得好官者不變前日之所鄙不得好官而為好人者不變前日之所重庶乎其可也同年鄒來學由户部郎中改通政司參議不以為美謂此官何足榮豫謂誤矣且曰無才何敢當此若才有餘而位不足公論以為虧此是好消息或才不足而得髙位公論以為非此非好消息也遂悔謝自後歷顯職而愈覺斯言有驗也惜乎今之士慮不及此惟恐位之不髙於才也士在學時坐誦書史有志聖賢之道者甚衆且曰窮經將以致用異日臨政當如此設施做事業當如此立身行已一旦出身而授之以職惑亂於利害隨時上下任其天資而行之無復留心於向日所窮之經不知為何物也户部尚書夏元吉有德量冬出使至館晨發命館人烘襪誤燒一隻館人懼不敢告索襪甚急左右請罪笑曰何不早白欲以餘廪易之弗及并存者棄之而行館人感泣曰他則無故加捶若此平生才一遇也在部時吏捧精微文書押之因風為墨所汚吏驚懼即肉袒以俟公曰汝何與焉叱起乃自袖其所汚吏猶懼莫測明日朝畢至便殿請罪曰臣昨日不謹因風起筆汚精微文書懷中出之上命易之既罷朝吏猶莫測尋出其所易吏大感免冠謝大抵正統數年天下休息皆張太后之力人謂女中堯舜信然且政在臺閣委用三楊非太后不能正統初有詔凡事白於太后然後行太后命付閣下議決太監王振雖欲專而不敢也每數日太后必遣中官入閣問連日曽有何事來商確即以帖開某日中官某以幾事來議如此施行太后乃以所白驗之或王振自斷不付閣下議者必召振責之由是終太后之世然後専初宣廟崩太后即命將宫中一切玩好之物不急之務悉皆罷去禁中官不差然蝗蟲水旱訖無虛嵗或者天使民多艱而不欲其安樂也宣德初許臣僚宴樂以奢相尚歌妓滿前紀綱為之不振朝廷以通政使顧佐為都御史罷劉觀遂黜貪淫御史彈劾不亷者禁用歌妓糾正百僚朝綱大振天下想聞其風采藩臬郡邑莫不起敬當時惟佐正色立朝元勳貴戚俱憚之陜西布政周景貪淫無度佐切齒欲除之纍置之法為上纍釋之不能伸其激濁之意後又沮之者數次正統初以風疾乞歸賜敕褒嘉優禮而去其實用事者忌而陰排之也後疾愈亦不復起居家十餘年而終繼居其位者皆莫及也都御史陳智性褊急躁暴撻左右之人無虛日洗面時用七人二人攬衣二人揭衣領一人捧盤一人捧潄水碗一人執牙梳稍不如意便打一掌至洗畢必有三四人被其掌者一日堂上靜坐因岸帽取鑽剔指甲失墜於地怒其鑽不得已而啓座自拾鑽觸地磚數次若懲其鑽者方靜坐若左右行過履有聲者即撻之或諫以暴怒為戒曰諾乃作木方刻戒暴怒三字挂之目前以示警已而怒其人欲撻之輒忘其戒取木方以擊之怒性既消觀其所戒悔之弗及也禮部尚書胡濙器量亦自寬容若有觸其怒者則不可免也石首楊先生在獄中十餘年家人供食歲久數絶糧不能繼又上命叵測日與死為鄰愈勵志讀書不輟同難者止之曰勢已如此讀書何用答曰朝聞道夕死可也五經諸子讀之數回已而得釋晚年遭遇為閣老大儒朝廷大制作多出其手實有賴於獄中之功蓋天將降大任於是人必先苦其心志而玉成之如此為人謙恭小心接吏卒亦不敢慢初入鄉試為首選胡儼典文衡批其所刋文曰初學小子當退避三舍老夫亦讓一頭地又曰他日立玉階方寸地必能為董子之正言而不效公孫𢎞之阿曲人以胡儼為知人後胡儼歷官祭酒先生已在禁垣既而儼以病免仁宣以來先生位望益髙終身執門生禮儼亦自任而不辭士論兩髙之儼為祭酒以師道自重文廟亦寵之公卿莫不加敬士由太學出至顯位者執弟子禮益恭儼遂名重天下先後居是職者皆莫能及髙廟看書議論英發且排朱文公集注每儒臣進講論語等書必有辨説呼朱熹曰宋家迂濶老儒因講攻乎異端斯害也已辨曰攻是攻城之攻已止也孔子之意蓋謂攻去異端則邪説之害止而正道可行也宋儒乃以攻為專治而欲精之為害也甚豈不謬哉又講聽訟吾猶人也必也使無訟乎辨曰自古聖君莫如堯舜天下向化莫如唐虞之世尚有臯陶為士師明五刑若當時無訟何用設此官且天下之廣居民相參安得無訟孔子之意蓋謂聽人之訟我無異於人但能得人是非曲直之情不至枉道既斷之後更無寃者宋儒乃謂正其本清其源則無訟矣豈不謬哉如此辨者甚多漢唐以來人君能事詩書如此留意者亦不多見由其天資髙邁所以不襲故常能將許多見識來説文廟初甚寵愛解縉之才置之翰林縉豪傑敢直言文廟欲征交址縉謂自古羈縻之國通正朔時賔貢而已若得其地不可以為郡縣不聽卒平之為郡邑仁廟居東宫時文廟甚不喜而寵漢府漢府遂恃寵而有覬覦之心縉謂不宜過寵致有異志文廟遂怒謂離間骨月縉由此二諫得罪洎宣廟初漢府果發交址亦叛悉如縉言正統間考功李茂𢎞先生嘗言可憂謂君臣之情不通經筵進講文具而已不過粉飾太平氣象未必可久官滿年六十有五即抗章致仕而去於今果驗蓋知者嘗見於未然茂𢎞有焉為人恬淡少許可與人不茍合疾惡之心勝以故未至卿佐區區獨加敬焉為序以贈其去至今不忘也福建參政宋彰交址人與中官多親舊侵漁得銀以萬計餽送王振遂升左布政抵任計營所費驗户斂之貧不堪者甚為所逼於是鄧茂七聚衆為盜因勢而起遂不可遏不兩月間天下震動聞風而作若火燎原不可撲滅人心易搖如此自振專權上干天象災異疊見振略不警畏凶狠愈甚且諱言災異初浙江紹興山移於平田民告於官不敢聞又地動白毛遍生奏之如常又陜西二處山崩壓沒人家數十户一處山移有聲叫三日移數里不敢詳奏又黃河改往東流於海淹沒人家千餘戶又振宅新起於內府乾方未踰時一火而盡又南京殿宇一火而盡是夜大雨明日殿基上生荆棘二尺髙始下詔赦盜不可遏蝗不可滅天意不可回矣北敵乘機大舉犯邉聲息甚急日報數十次已已秋七月振不與大臣議挾天子率師親征明日朝罷使上宣諭出師又明日即行大臣倉卒不及言各退以待豫與驗封郎中趙敏謂敵勢叵測駕不可出白於冡宰乃約大臣上章留之不從明日駕出總兵官以下亦弗預知軍士俱無備文武大臣皆匆匆失措而隨之天時人事極不順至龍虎臺扎營方一鼓即虛驚衆以為不祥明日過居庸關又明日過懷來又二日至宣府連日非風則雨人情洶洶聲息愈急隨駕文臣連上章留之振益怒俱令略陳明日當過雞鳴山衆皆危懼無不嘆息怨恨者豫不勝其怒與三五御史約謂今天子蒙塵六軍喪氣無不切齒於振若用一武士之力捽而碎其首於駕前數其姦權誤國之罪即遣將領兵詣大同而駕可回也欲謀於英國公不得間竟行人人自危未十日兵士已乏糧矣方秋禾稼遍野所過一空將至大同僵尸滿路敵亦開避待我深入至大同又欲北行因鎮大同中官郭敬密言其勢決不可行振始有回意明日班師大風至晚雷雨滿營人畜驚懼益甚又連日雷雨滿營過宣府敵追至明日於土木駐營宣府報至遣成國公率五萬兵迎之勇無謀冒入鷂兒嶺北敵於山兩翼邀阻夾攻殺之殆盡遂乘勝至土木明日巳時合圍大營不敢行八月十五日也將午人馬巳二日不飲水渴極掘井至二丈深無泉敵見不行退圍速傳令擡營南行就水行未三四里敵復圍四靣擊之竟無一人與鬭俱解甲去衣以待死或奔營中積疊如山幸而敵人貪得利不專於殺二十餘萬人中傷居半死者三之一騾馬亦二十餘萬衣甲兵器盡為敵人所得滿載而還自古敵人得中國之利未有盛於此舉者敵人亦自謂出於望外况乘輿為其所獲豈偶然哉英國公為文廟功臣平交址回進爵為公位羣臣上宣廟時漢府密遣人與謀公即縛其人白於宣廟得此早覺而易於撲滅宣廟自此愈重之洎顧佐拜都御史謂宜保全功臣去輔兵權而寵賚無虛日正統時亦不衰安享福祿榮名二十餘年天下倚以為重四裔莫不知名自餘勳戚文武貴臣莫敢與並而抗禮者洎振專權視勳戚大臣如屬吏獨加禮於輔而不敢慢仍戒子姪致敬於輔之昆弟輔既衰老亦屈節於振以避禍竟沒於土木之難以衣衾葬焉輔為人寡言笑膂力過人重章縫之士為夲朝武臣之冠老泉論漢髙帝命平勃斬噲一事謂帝不以一女子斬天下功臣但欲除吕氏之黨亦未必然戚夫人寵冠後宫又生子如意豈尋常比邪雖以吕氏結髮之妻亦由此見疏以太子正名東宫尚欲易之夫帝之寵愛戚氏如意如虎之乳子犯之者立見韲粉今乃聞噲黨於吕氏欲俟其宴駕盡誅戚氏如意之屬宜乎發怒而立欲斬噲當時若聞吕氏太子有此謀恐亦不能保也况樊噲乎帝崩戚氏母子竟遭吕氏之毒吾知髙帝之目不能瞑於地下矣正統十四年春北敵遣使二千餘人進馬報作三千人權臣怒其詐減去馬價敵使回報遂失和好秋七月敵將額森等大舉入冦其鋒不可犯大同失利邊將有棄城走者權臣挾天子親出師百官上章懇留不從迫促而行至大同見敵勢猛鋭始懼旋師至土木會兵將無鬬志人馬飢困敵衆來襲前鋒莫當追而圍之我師大潰遂獲乘輿羈於敵庭八月十五日也天下聞之驚懼不寧賴今上皇帝以太弟即位尊兄為太上皇人心始安然上皇在敵音問不通者一載餘矣有自敵營脫回者方知無恙敵亦遣使來但譎詐不可信未可以使往報左都御史楊善慨然欲往上從之人皆危懼善曰上皇在敵庭食君之祿者於心安乎此為臣者效命之秋也遂行至其境敵將額森密遣一人黠慧者田氏來迎且探其意相見云我亦中國人被虜於此因問向日土木之圍南朝兵何故脫衣甲而走答曰太平日久將卒相安况此行只是扈從隨駕初無號令對敵因四方無虞只營修寺宇而已何曽操習被爾敵兵陡然衝突如何不走雖然汝之幸而得勝未見為福今皇帝即位聰明英武納諫如流有一人獻䇿云敵人敢入中國者只憑好馬扒山過嶺越關而來若令一帶守邊者俱做鐵頂橛子上留一空安尖頭錐子但係人馬過的山嶺遍下錐橛來者無不中傷即從其計又一人獻䇿云如今大銅銃止用一箇石炮所以打的人少若裝雞子大石頭一斗打去迸開數丈濶著人馬即死打中最多也從其計又一人獻䇿云廣西四川等處射虎的弩弓毒藥最快若箭頭上擦此毒藥一著皮肉人馬即死今從其計已取的藥來天下選了三十萬有力能射者演習曽將有罪的人試驗箭去著皮就死又一人獻䇿云如今放火鎗者雖有三四層他見放了又裝藥便放馬來衝屣若做大樣兩頭銃裝鐡彈子數箇擦上毒藥排於四層後馬來齊發俱打穿肚曽試驗三百步之外者皆然獻計者皆升官加賞天下有智謀者聞之莫不皆來操練的軍馬又精鋭可惜無用了敵人曰如何無用答曰若兩家講和了何用敵人聞此言潛去報知次日至營見額森問曰汝是何官答曰都御史曰兩家和好許多年今番如何拘留我使臣減了我馬價與的段匹一匹剪為兩匹將我使臣閉在館中不放出這等計較關防如何答曰比先汝父差使臣到我太宗宣宗皇帝前進馬不過三十餘人所討物件十與二三也無計較一向和好汝今差來使臣多至三千餘人一見皇帝每人便賞織金衣服一套雖十數嵗孩兒也一般賞賜殿上筵宴為何只是要官人面上好看臨回時又加賞宴差人送去何曽拘留或是帶來的小厮到中國為姦為盜懼怕使臣知道從小路逃去或遇虎狼或投别處中國留他何用若減了馬價一節亦有緣故先次官人寄書一封著使臣王喜送與中國某人會喜不在誤著吳良收了進與朝廷後某人怕朝廷疑怪乃結權臣因説曰這畨進馬不係正經頭目如何一般賞他以此減了馬價段匹及某人送使臣去反説是吳良詭計減了意欲官人殺害吳良不想果中其計額森曰者彼語云者然辭也又説買鍋一節此鐵鍋出在廣東到京師萬餘里一鍋賣絹二闕古穰集卷二十八
