body:
  text: 古穰集卷十九明李賢撰行狀先祖迪功郎雲南江川縣丞致仕贈資善大夫吏部尚書兼翰林院學士李公行狀公諱威字希原其先古薊人唐時有官於鄧者見其山水清秀地腴民淳遂土著焉子孫蕃衍宋光宗時有昆弟四十八人計三百餘口同㸑不分旌為義門歿後子孫用遺命合葬一丘今墓木成林者十餘里號長樂林云曽祖諱成祖諱義卿父諱寬甫俱不仕以行義為鄉里表率族兄諱恭敏仕元為陜西行中書省平章政事以才能為時聞人至正十四年丙戌公年十四從本郡毛葫蘆義兵二十五年授金字銀牌毛葫蘆千戶三十二年至陜西授乾州總帥洪武初棄官歸家十一年有司以才能辟授福建興化府莆田縣典史尋轉山西平陽府翼城縣任滿以績最升雲南澄江府江川縣丞乃慨然曰吾聞志士不擇地而行道化民成俗此其時乎至邑誠心佐令專事德教而民無梗化者有遺愛在民三十一年以年老乞致仕還家壽七十有八以疾終公器宇魁梧天資嚴重遇事敢為未嘗茍合所至人稱長者嘗曰士生斯世貴乎濟人聖賢云仁者愛人四字吾未嘗一時不留心也在江川時民有詣藩司告商衆欲為亂布政張紞責速捕之令簿咸失措公以為安知非詐潜往察之無狀明日自詣紞白乃止商以故得安凡事類此紞異之曰他日舉用必此人也未幾紞為吏部尚書㑹乞致仕竟不能留居家儼然非衣冠不臨子弟鄉之章縫牧校咸禮於家相與考德問業改行者什九民有訟者胥質焉一言愧服每羡陳仲弓王彥方之為人曰士大夫居鄉如二子斯無憾矣尤好施豫民有匱乏者輒恤之不望報族中仰給者十餘家子弟俱事産業嘗曰良家所事耕與讀耳專耕則俗專讀則窘乃擇諸孫之秀者為郡庠弟子員用是家聲不墜公生於元至正元年癸酉十二月二十二日卒于明永樂八年庚寅九月十九日正統以來以孫賢貴纍贈資善大夫吏部尚書兼翰林院學士娶楊氏繼孟氏纍贈夫人側室張氏髙氏桑氏生子男三人長曰善次曰良次曰升纍封吏部右侍郎加封如公官女二人長適鄧州守禦所百戶丁鋭次適郡庠生鞏智族子曰旺信陽衛指揮僉事孫男十人長曰孟芳湖廣布政司右參議次曰仲芳次曰賢少保吏部尚書兼華蓋殿大學士次曰季芳次曰謙次曰興次曰隆次曰讓南京貴州道監察御史幼未名者二孫女八人正統四年某月某日葬于長樂林之陽從先兆也謹狀先伯行狀先伯諱良行二自幼為祖考妣鍾愛方先祖驅馳於仕路間弗遑家事惟先伯與長伯在家俱方弱冠能自卓立經營産業以故弗克隨侍然先祖得專意仕進勤其職務抑以初無家事纍心故也當是之時隨侍者惟家父一人自福建之山西自山西之雲南跋涉雖勞而無鄉園之思亦以先伯能膺幹蠱之任使闔家數十口不乖不離怡然和順而無戚戚囂囂之惱焉洎先祖以引年致仕北歸産業饒裕用是得享優遊之福十有餘年先伯之力也及先祖辭世先伯哀毁過禮凡百用情附身附棺之事必誠必信已而兄弟三人者議同㸑誓不析居然家之别墅鼎峙南北遂各守其一得以專力課業惟先伯於農務最精暇則督行負販不使生理或輟其心力之勞視昆季十多四五而衣食時或不給豈非命歟先伯為人朴實儉素醇謹無僞嘗自嘆曰吾竭力生涯不敢荒怠而資用缺然豈非儒者所謂耕也餒在其中者哉吾又聞抱甕灌田之老惡其用機者然則吾亦無愧於斯老矣夫鄉人無遠近老少咸推為長者方六旬餘忽病僂遂隆然伏行有類槖駝即古所謂鮐背者人以為壽徴七旬後其伏尤甚凡鄉人歲時慶㑹必以肩輿迎之已而送之不然莫能自至至則怡然正席酌必盡量賓客雖衆而主人之歡必係於此蓋其齒德有足致人之愛慕者豫自獲仕于朝始能以俸帛什一為助歲恆繼之正統乙丑豫以內艱還家居憂得頻㑹焉㑹則或留浹辰必盡天倫之樂而去彼時猶能自健也景泰癸酉豫奉使西蜀道經故里明日即迎至得奉寢膳十有五日蓋已衰倦無復自健意匆匆拜别星未兩終遂一疾不起訃音忽至痛不能興第恨絆於職守弗克匍匐祭窆以盡猶子之情悵望家山徒增感悼而已先伯生于洪武丁巳某月某日卒于景泰甲戌某月某日享年七十有八娶桑氏生男二人女二人今惟季女適湯氏者存繼湯氏生男四人女一人俱成立有配豫懼先伯行實之泯敬述其槩以藏庶後世子孫有考焉中順大夫安慶知府周公行狀公諱濟字大亨世家洛陽曽大父諱文質大父諱誠之俱隱德不仕父諱禮以不羈之才逺涉江湖間公既冠永樂丁亥春自入郡庠為弟子員博學强記因讀論語至父母在不逺遊章味定省曠而音問疏之語愀然不樂曰父在數千里之外幾星周矣若之何而不往省乎即棄學徒步以往再越月抵閩適遘疾已危一見公遂愈乃奉以歸復入學曰方寸定矣於是刻苦不知寒暑者纍年遂領河南甲午鄉薦赴太學學業大進尋歷事烏臺㑹蠡縣豪民毆人至死賂同行證一老人已問未决公訊其情有疑既二日乃得豪民狀遂出老人闔院異之聞於都堂自後獄有疑必委公無不得其情適有中官陳姓者宣廟極寵之因有過大怒送院鞫之御史嚴繼先輩莫測上意咸避之公曰何以避為立訊成獄都御史劉觀由此注意於公㑹御史缺員以公屬吏部補之公以目疾不就宣德戊辰夏遂除江西都司斷事初獄有輕重惟都指揮是决公曰此吾職也彼何與焉雖盛怒執愈堅既久服其公反加禮呼為大兄藩臬巨公由是皆重之癸亥春以父喪去位居家不作佛事一從文公家禮鄉人咎之謝曰僕儒者流安敢從佛因嘆曰昔程子之賢亦不能化况我輩乎服闋調湖廣都司正統改元秋用當道者薦拜監察御史立朝有蹇諤風士大夫為之改觀二年冬鎮大同中官郭姓者以豪橫僣度聞於朝廷敕一御史往亷之先往者不得其情復以公往乃微行代負芻者入其宅盡其違法狀朝廷嘉之明年春御史出巡宣府者以邊情劇不能處分遂自經欲遣能者咸曰非公不可公既至邊將為之斂迹邊務一清四年夏以母喪還家躬修塋域見艮方多磚公曰此必古者不封之墓即掩之因增土數尺是夜夢一老人衣冠甚偉揖謝曰感公修吾宅問其名曰乖崖也既覺悟曰乖崖乃張詠之號已而考之實葬其地公之誠能感鬼神如此七年春服除復受命往巡西蜀威州土官董敏王允讐殺纍年不解勢愈大朝廷敕公率方鎮兵數千至其境公曰朝廷本意欲安之撫之不服然後加兵未晚也吾不忍其肝腦塗地乃令人賫榜於各寨宣布朝廷恩威且曰從撫者即無罪允讀其榜沉思之書囮字於榜尾令持還衆不解其意公曰此非難見囮者誘禽鳥之媒也意謂誘而殺之耳復釋此意示以誠信允大驚曰非凡御史也即投服以馬數十令子弟入貢贖罪敏亦愧服一方遂安朝廷嘉勞之十年秋復巡鳳陽逢歲歉民多窘於食公嘆曰此地民饑我饑之也輒開倉賑之然後聞於朝有司危之公曰以此得罪甘心焉若俟報何啻穿井以沃焦釜民賴全活者數十萬事竣㑹安慶以人民饑食流離聞且報無賢守之故於是大臣咸推公十一年夏出守安慶三歲至被象之明日召闔郡父老問其故皆流涕曰此處三歲不熟矣以子女易食滿載而南者無虛日公即分命止其舟借漕運糧以濟之子女得存者不下萬餘連章懇陳歲荒民流之故復乞停稅朝廷俱從之首訪余忠宣公祠已毁矣公嘆曰余公昔鎮安慶保孤城於七年之久仗義死節有功於名教今乃無祠非缺典乎遂與僚屬各捐俸立祠民之樂從者甚衆俗尚奢親沒不葬者數百家女聘未歸者千餘家公乃出令示期違者罰之貧者助之不兩月無留焉閩中冦起天下騷動安慶貧民亦欲乘勢乃聚衆强取富民粟富民以盜訟於公公曰此非盜也乃貧耳即碎其狀曉於貧民曰得其榖者報以數吾代償之貧民聞之感愧遂解散暇則集職行録以驗為政之得失櫛垢爬癢務蘇其困民賴之如父母焉工部尚書周公忱巡撫諸郡獨慮安慶歲必數至親為綜理自公下車之後曰吾無安慶之憂矣在任三年以疾卒六縣之民為之罷市巷哭若親喪願扶柩至洛陽者數十人視古之循吏亦何愧焉公為人謙恭不立崖岸外和內剛事上接下交友無不得其歡心風流醖籍善記子籍凡事必究其出處雖隱僻事亦精到喜清談遇知已對酒達旦不寐人論文或忽公詰之即窘復為開之識量過人能用其智真所謂豪傑之士也生於洪武丙寅卒於正統己巳壽六十有四配封氏子一人曰端儀用有司舉為陜西狄道縣丞女二人長端貞歸于賢次端潔嫁國子監學録王讓景泰改元端儀葬公於邙山駱駝峯之陽從先兆也謹狀傳丁三老傳三老姓丁氏名廣居鄧州天資淳篤好施豫初立别墅於城南三十餘里率子弟事農數年資用饒足有兄析居城中而貧三老夏供麥秋供米歲以為常時具酒殽躬詣兄所盡歡而回四時製衣必先其兄寒則撫兄背曰衣得無薄乎兄壽髙潜命其子持白金往湖南易棺木製而藏之兄卒悉力喪事哀戚之情同於父母兄有數子析居已而窘乏者過半三老一一賙之既與之粟帛足一歲用復與牛種使自為來歲計不能者又賙之雖數無衰意子姪後自慚忍乏不以告三老察知之怒其不告復賙之是後子姪俱能自力於衣食所居之鄉有婚不能娶者即令具酒食代為請助命置簿於席前書助物若干喪不能葬者亦然當其請助以與為榮稍弗良者置之有愧而求與者一鄉榮辱之權歸焉友人黃六居城市窘於食往造之三老大喜曰故人何疏也開樽罷未敢言三老使子弟探知之曰聞君缺食何不即言隨載糧一車送至其家自後使人察之稍窘即賙不待其告也有孔景者亦居城市貧無所營三老請與謀曰吾宅艮方古宅也君有意為鄰乎景喜過望三老即命子壻築墻造屋期月而完景挈家以居又慮其不能力田復與子壻約每歲除禾在田者若干畝與之俱令人代為入囷而後已居十數年景卒喪葬之費一力承之顧其妻子過於景在時未幾景妻為親遷於城市每歲供食為定約焉凡僧道來乞者亦必厚與之不留餘積常急用銀數錢探其藏不及一錢門對一池魚不滿尺不取見牧童獲飛禽走獸雛子者必放之家人嘗有過既痛决而復哭之怒其弗率而憐其受笞也接人謙恭溫雅對人子言則譽其父之善對人弟言則譽其兄之善已雖善蓋一鄉未嘗一言自矜恂恂然可敬可愛也鄉之耆老皆慕其義取法焉有為不善者率感化或逺去尤敬禮儒者學正姜志達重其為人數往㑹焉三老歲供時物如執弟子禮無事不詣城郭州所官僚尤敬愛凡鄉飲㑹宴敦請則一至見則翼翼然卑下小心不問不敢對宴畢即日而還偶得風疾甚危鄉人一時驚相報至者數百人咸迫切哀禱於神明日遂愈壽至七十三而終嗟夫三老之行如此回視古之陳仲弓王彥方亦孰知其先後哉豫親見其人故為之立傳向孝義傳向侃字希顔世家廬之巢縣宋元時宗族甚衆鄉人號其所居曰向家團希顔篤於孝親左右就養凡晨昏之節一毫不爽尤先意承志喻父母於道日夕惴惴惟恐人之及親也洎父允中沒毁形哀痛幾於滅性喪事一遵朱氏禮居憂三年事無巨細一一用情親族父老莫不嘆異曰生長以來見喪親者未有若是詳且盡也從此不與宴樂之㑹每歲時祭享輒痛哭無異初喪時娶趙氏尋以疾卒生一子甫六歲母湯氏臨終謂希顔曰汝若再娶務恤吾孫希顔泣受教遂終身不復娶君子曰孝子義夫兼有之者其惟向君乎雖然孝者百行之本而義者孝之推也希顔兄弟五人同居共食怡然和敬至於垂白無間言非孝而能之乎奉使浙江同事者十有七人一人忽嬰疫癘衆皆畏避希顔惻然日具湯藥疾遂愈曽謂非孝之推乎希顔為太學生大司成陳敬宗先生深器重之筮仕靜寧判官亷正慈祥父老舉以手加額曰吾輩生長田野迫於衰暮今日始見慈父嘗董運邊儲夜宿挽車傍與役夫同甘苦人人感激當道者薦擢監察御史冢宰王公知其才行復薦擢澄江知府操履始終不渝其蒞官敬矣可不謂之孝乎希顔嘗推恩及親有敕命之褒未老懇乞致仕優遊田里壽七十有三全歸以終其為孝不既大乎希顔從子曰恩為諸生念其世父孝義恐至漂沒乃不逺數千里請于太史氏然則若恩者亦可謂孝子不匱永錫爾類者乎黃氏母子賢孝傳黃氏名文父鉉江西新喻人永樂癸巳徙河間之任邱娶孫氏生文甫一歲商於南陽之鄧州守禦所百戶李興見鉉文雅以女妻之未幾歸任邱李氏與孫氏相戾間達於興興遣人取其女還鉉亦隨往時孫氏年二十有四文方四歲鉉别後音問不通孫氏與文母子二人零丁孤苦人不能堪而孫氏奮志成家勤力紡績夜以繼日以供力役之征周衣食之費撫育其子年及成童謂所親曰吾聞子弟讀書可以起家今吾備嘗艱辛幸有此子若遣入邑庠以勗其成天其或者憐吾志乎所親曰此意固善第念爾一子之外更無紀綱之僕子若在官凡百費用尤倍於昔吾恐爾之艱辛未艾也孫乃愀然泣下曰吾已慮之熟矣顧處子之計莫良於此雖倍艱辛安敢辭同編之人聞之勃然怒曰吾代爾子力役久矣今幸其長不吾纍焉而又脫之可乎雖懇情乞惠拒之益堅孫氏憂鬱食不下咽已而㑹所親達其情于有司始獲入庠孫氏且喜且懼愈極力生業勵子進學而凡從師親友之需未嘗少乏文亦感激遵母之訓潜心經史但自幼父去嘗問母曰吾父安在母曰汝父世家江西為商河南吾亦不知其所棲矣於是母子相顧澘然出涕以悲正統己巳文以成材貢入太學㑹天下士子講習一日言及其父不知所在有同舍生王綱者鄧州人聞其父名曰吾州百戶李興有壻即此名也非汝父乎文因思母所云大喜曰是也景泰初以謁告歸省至家即白於母徑詣鄧州訪父果在內鄉板橋鉉離其子已三十四年矣一見痛絶方蘇親屬㑹晤悲喜交集留數月不能同行文復辭父入監天順改元夏吏部掄才以文為兖州府通判乃奉母抵任視篆後即遣人迎父就祿以養父時年八十有五憚於逺涉再迎不起至三母曰汝之孝心盡矣彼有所戀不可再迎文悲思不已曰吾父不來吾即棄官而往闔府官僚咸跪請其母母亦悲感而許之一時見者無不沾襟乃以安車迎至鉉離孫氏已四十四年矣妻子父母始得㑹合以遂天倫之樂嗟夫黃氏母子其賢孝矣哉向非孫氏之賢其子未必成立以有今日非文之孝其父未必㑹合以獲祿養遂使零丁孤苦之室變為團欒歡慶之堂豫親見其事因為作傳以告於來世古穰集卷十九
