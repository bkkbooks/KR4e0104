body:
  text: 古穰集卷二明李賢撰奏議上禦邊事近因外使來貢索要使臣文武大臣進言遣使相答節奉聖㫖今朕嗣承大統拳拳欲富國强兵以報讎雪耻思與敵絶而卿等乃纍言復欲如前遣使與敵往來非朕本心不允所請咨爾大小文武羣臣其共計議長策果當何如可副朕志明具以聞勿事空言圖保身家而已臣雖不與共議之列伏讀天語感激奮發忠憤之心耿耿不寐夫主憂臣辱主辱臣死仰惟皇上之志欲報讎雪耻諄諄告諭臣下共議長策以副其志而凡食君之祿者寧不惕然于心乎臣聞魯國有難漆室女憂之况列於侍從立於朝廷則其憂之當何如也臣惟今日禦邊長策惟在痛敗外敵一場而已不然終不肯退然必待其自發而後應之近聞敵人其志不小東收三衛等處西收回回部落不但攻圍大同宣府而已又欲大舉入冦豈可坐待其至不早為取勝之䇿竊料彼地不過中國一大郡以天下之衆不能取勝者未得其䇿故也且外國為患自古有之其攻城掠野勝之則來敗之則去亦常事也如周之君臣豈無所用其心哉而備邊禦邊僅得中䇿秦漢而下往往無䇿以禦之臣以愚見度之敵人所以輕侮中國者惟恃弓馬之强而已中國長策無他惟在避其弓馬而已臣觀今日之拒馬木止能拒馬不能避箭挨牌止能避箭不能拒馬惟有所謂戰車者既能避箭又能拒馬蓋此車即漢時衛青武剛車之類青擊丐奴深入外地見單于兵陳必以武剛車自環為營兵法謂是車有巾有蓋為先驅焉臣謂武剛車徒能避其弓馬今之戰車不但能避弓馬又有取勝之道取勝者何火鎗是也論中國之長無出於火鎗前代未嘗有也若用得其法敵之弓馬弗能當也近來不能以此取勝者非火鎗之過用之者不得其法耳且使火鎗者須要遮避其身以壯其膽然後發而取中不然則畏其箭來傷己手足失措雖能發鎗不暇取中臣觀車制四圍箱板內藏其人下留鋭眼上開小窗長一丈五尺髙六尺五寸前後左右橫排鎗頭每車前後占地五步若用車一千輛一面二百五十輛約長四里四面共十六餘里欲行則行欲止則止謂之有腳之城內藏軍馬糧草輜重以此禦敵使其馬不得衝陳箭不得傷人彼若近前火銃齊發竒兵繼出彼若逺避我勢自張我威益振况此時大同宣府遼東一帶軍民不敢出城耕作城外之地俱是外敵馳騁之所若此等邊城俱用此車遣將出師可以橫行於沙漠可以深入其疆域不然但用退敵驅之出境使我軍民得以耕作營其衣食所謂長策莫善於此雖然此策固善又在將帥之志何如耳夫今之士卒猶古之士卒善用兵者伸其號令嚴其紀律以作其氣以鼓其勇使之畏威懷德效力用命以進死為榮以退生為辱雖赴水火不敢退縮如此而不取勝者臣未之信也况朝廷於將帥特彰剖封之典於士卒頻加賞勞之恩待之可謂厚矣若又不能為國家折衝禦侮搴旗斬將以雪前日之耻以伸朝廷之威此忠臣義士所以不能安其心也臣聞天道好還敵人自犯邊以來其勢日熾所向得利其志益驕中國之人被其殘毒甚矣今又不知止足欲生釁端安知不自取敗亡也哉此雖在於人事之修或亦天道之必然此臣所以拳拳以取勝之䇿為獻伏望陛下采而用之命工部各厰修造此車不為甚費所謂有備無患事乃克濟者也臣急於獻愚不暇組織成文干冒天威無任悚懼之至景泰二年五月十三日奉聖㫖所言皆是護國之心著管軍馬大小文武官員看采取而行欽此上禦邊保國事臣聞自古中國全盛者必使外國畏之今中國亦全盛而外國不畏何哉蓋由兵威不振故也且敵人自宣德初年以來蓄精養鋭而不敢輕發每嵗來貢以求和好者蓋以太宗之餘威猶在而有以畏之也自正統十四年得利之後中國之兵曽無一勝而敵人之鋒未嘗少挫宜乎不能使之畏矣然外敵之性雖曰輕生亦知畏死我强則退我弱則來今以中國全盛之日不能示强則敵人之志愈肆而邊境之患愈多持此悠悠實非長慮以臣愚見為今之計無他惟在與之痛殺一場以慰祖宗之心以雪中國之耻以舒生民之怨以振朝廷之威則外敵之心自懾方來之患自消而宗社可以永安矣昔契丹大舉侵宋冦凖力主親征軍勢一張敵氣即奪遂使三十餘年邊無牧馬向使更用凖言擊之可保百年無事而靖康之禍亦弭矣由是觀之則外敵之心可以威服未可以德化今敵人之多不過十萬以天下之衆而不敢加兵於彼者非將帥士卒之志不勇也由陛下未加睿斷耳若陛下誠能奮仁者之勇勵總戎之臣推赤心於其腹中使畫取勝之策虛己聽納軍中之事一以委之然後命將出師必能感激效力以圖成功矣區區之敵何所逃命若只聽其講和頻來進馬但圖金帛之利豈有敬順之心增數冒名曽無定約竭生民之膏血供無饜之貪求外國日加盛强中國日見罷弊况彼中額森包藏禍心其志非小近又弒其君主滅其族支肆然稱君無所忌憚收斂部落吞併諸畨堅甲利兵得之於中國者實多一旦侵擾邊方其害有不可勝言者矣昔賈誼言於漢文帝曰抱火厝之積薪之下火未及燃因謂之安方今之勢何以異此蓋知者防患於未然忠臣憂治世而危明主易曰危者安其位者也亂者有其治者也惟安不忘危治不忘亂是以身安而國家可保也伏望陛下慮外敵之姦凶思必報之讎耻惕然於心不少自逸雖曰據險固守為今日之長策然敵情叵測而中國之威不可不振也雖曰以逸待勞為方來之良計然敵志正驕而長驅之勢不可不挫也觀釁而動用清敵氛中興之功端在於此雖陛下神謀妙算先事而慮有非常情所能窺者但犬馬之忠不能自已輒用獻陳尚希省覽干冒天威不勝悚懼之至少保兼兵部尚書于謙覆奏竊惟外國為患自古為然而防禦之䇿不可不備何則額森之罪惡稔盈雖握髮不足數其傾覆滅亡蓋指日而可待近年之搖毒扇禍荼毒生靈誠萬世所必報之讎也今右侍郎李賢奏稱前因誠為正論但復讎必在於用兵用兵必在於任將將能為國效忠盡心所事則偏裨以下無不用命三軍之衆無不感奮何讎之不復何耻之不雪何敵之不殱邪合無准奏行移五軍三千神機等營總兵提督統兵等官各要罄竭忠誠殫盡謀慮上體朝廷委任之隆下念軍務關係之重一以國家為己任勿謂身家之私謀知有進死之榮俾無退生之辱及戒約偏裨以下俾之同心協力恪恭用命共濟國事以成大功仍須上緊操練軍馬申嚴號令鼓舞士氣振作敵愾以期殄滅敵衆以冀補報國恩毋或自餒其志甘為委靡玩愒嵗月怠廢兵政自速罪戾以貽後悔及照臣謙猥以駑鈍叨掌兵戎萬一邊方有警不論險易逺近當力疾以效驅馳以報國恩該府仍行各邊各關一體整飭官軍用心操備固守城池防備敵衆不許視常怠忽致誤事機如有疏虞罪在不宥景泰四年八月二十一日奉聖㫖是外國自古中國之患敵雖來與不來須要常慮防備不可怠忽欽此辭免吏部尚書兼翰林院學士兹者伏䝉聖恩升臣吏部尚書兼翰林院學士臣惟尚書髙曳履之班學士榮演綸之任拜恩一職已出尋常特命兼官實超異數自非碩學之輩徒取濫巾之譏臣器識卑凡藝能謭薄方虞幽黜乃誤明揚寵恩驟降於赤霄震懼即深於丹臆自猶知其弗稱人豈謂之當然敬殫迫切之誠甘觸瀆煩之譴抑存國體豈謂身謀伏望陛下照察愚情愛惜名器無嫌改命惟在量能收渙渥於己頒免速顛於非據庶新榮而弗玷斯素守以獲安恭布忱言伏須允報臣不勝感激竦懼之至天順元年月日奉聖㫖不准他辭還著做尚書辦事欽此謝除吏部尚書兼翰林院學士茲者伏䝉皇上升臣吏部尚書兼翰林院學士臣惟尚書乃喉舌之司學士實腹心之寄况天官居六卿之首而翰苑為儒職之榮匪得賢豪曷勝斯任臣天分弗髙人才甚下冒應兼組增震孤衷寄祿之階頓崇加秩之寵沓至乃非常之幸㑹誠不世之異恩况資翰墨之所長尤匪駑駘之可稱周章就列俯仰懷慙退省其愚將何塞責心獨知其冒昧人共指其僥踰姑云職業之常尚容自勉儻論乾坤之造夫豈能酬臣敢不激勵壯心贊襄先務用輸忠藎圖報寵光期不負於清朝誓益堅夫素志願效論思之實敢辭鉛槧之勞臣無任仰戴聖情之至辭第宅臣本以一介布衣遭逢盛世洊歷美職纍荷光榮自顧才無寸長學非優等濫竽綸閣祇益汗顔茲者又䝉皇上賜與房屋夫功微而受厚賞者在理非宜能薄而承殊貺者揆情未當天恩莫大雖不吝於凡庸株守如常詎敢安於甲第伏望皇上收回嘉命用遂鄙懷俾臣不動舊居均為受賜無任感激聖情之至天順三年十一月日奉聖㫖卿輔導有勞特賜近居以便宣召所辭不允三年考滿謝賜寶鈔羊酒今日伏䝉皇上以臣賢三載考滿特遣太監牛玉賜臣鈔五千貫羊三隻酒三十瓶臣拜領之際愧悚無涯竊以異數之頒乃昭代優賢之禮腆儀之賚實聖君待士之誠宜有勞而後加豈無功而遽受如臣者名習藝文實疏學業顧才力何補于當寧而眷注特異於在廷幸幽黜之偶寬豈晉錫之敢望顔忸怩而罔措心踧踖以不安恩重丘山懼深淵谷尚冀臻於實效庶少塞於空餐睿奬夙叨歡悰彌極俯殫駑鈍仰服龍光臣不勝感荷聖情之至上鑑古録臣賢猥以駑劣遭遇明時恭惟陛下聰明睿智英邁絶倫凡百所行多盛德之事臣不勝感激欣躍尚慮前代聖賢之君事迹浩瀚難於遍覽今特録堯舜以下二十二君每君摘取所行之最善者數事集為一帙名之曰鑑古録臣於每段之後略為解說數句冀陛下易於覽而行之夫古之大臣莫不欲致君於堯舜之上伊尹曰吾豈若使是君為堯舜之君哉又曰豫弗克俾厥后惟堯舜其心愧耻若撻于市今臣以庸下之才謬當輔導之任深懼不如古人况陛下有可為堯舜之資而臣不能將順其美可謂忠乎臣觀陛下所行之事已有超越前古者若又以此二十二君之善兼而有之則功德之隆真可同於堯舜而光祖宗矣臣犬馬之忠不勝惓惓謹録進呈上狀自劾因災變臣本以凡庸素無出衆之才過䝉皇上任用置諸輔導之地加以眷顧之隆在臣自當孜孜奉國知無不言致君為堯舜之君使天下之民皆得其所今乃尸位素餐緘默不言上不能輔導君德下不能康濟民生以致天時不和人心嗟怨及上天垂象猶不知警戒進言勸君恐懼修德以回天意而乃優遊度日若罔聞知是豈大臣之所為哉伏望皇上明示罪罰或放歸田里以為大臣不能盡職之戒别選忠良之士任用庶幾災變可消天意可回而祖宗鴻業可以永保無虞矣臣不勝惓惓待罪之至天順四年月日辭加太子少保臣本以凡庸才識卑下誤䝉皇上簡任置諸清切之地擢為吏部尚書兼職翰林學士班髙曳履任重衍綸自顧非才承此異數因循度日于茲五年仰惟皇上進德惟新勵精圖治躬理政務獨斷萬機如臣之愚徒爾充位於文墨則未精於學問則不博論思之所當盡者不能盡職分之所當為者不能為曽無毫髮之長以補萬分之一久處密勿祗增忸怩昨者偶被賊傷幸無重損今䝉皇上加臣太子少保臣聞命有驚措身無所不惟自慙於非據實憂仰纍於殊恩敬殫迫切之誠甘觸瀆煩之譴伏望皇上察臣僥幸已多念臣滿盈是懼既俾不去舊秩自足勉效愚忠揣分宜然懇辭非假願惜名爵乞收寵恩尚冀矜從伏須允報臣不勝戰栗懇切之至天順五年八月十六日奉聖㫖官以酬勞朝廷自有公論卿宜承命所辭不允六年考滿謝賜寶鈔羊酒今日伏䝉皇上以臣賢六年考滿遣太監牛玉齎鈔五千貫羊三隻酒三十瓶至臣第宅賜之臣拜受之餘愧悚不已竊惟明君待士必伸眷注之隆昭代重才不吝便蕃之賚顧惟異數豈及常流如臣者資本腐儒生逢盛世官崇而效寡祿厚而報微面形撻市之慙心抱履氷之懼有妨賢路無補聖朝晉錫忽臨危悰益甚冀塞論思之責用酬覆燾之仁勉竭葵誠尚殫駑力臣不勝感荷聖情之至乞消天變臣昨夜親聞空中有聲此變尚未消弭臣切憂懼不能安寢今日退朝密觀文獻通考書有曰無形有聲者謂之鼓妖以為天下人民貧苦愁怨則有此異今若將一切於民不便者悉皆停止與之休息則天意必回變異自消伏望皇上發心憫念小民艱難凡百所需咸且停罷過一二年待時和嵗豐百姓富庶安樂然後斟酌復行庶為穩便臣忠懇之懷不能自己親筆書寫謹具題知遂頒詔寬恤天下乞退閒臣猥以凡庸天順初誤䝉先帝拔用自幸遭遇感激盡心用圖報稱乃被奸臣石亨等陷害幸賴先帝保全復留任用天順五年反賊曹欽又欲害臣已被刃傷幸而不死去嵗門達又欲害臣幾遭誣陷之禍幸賴朝廷辨明免受汙辱之名臣思平日並無怨惡於人然纍次被人陷害不過以臣職居輔導心懷忌嫉故耳今皇上即位大赦天下賞罰明信紀綱振舉中外臣民無不歡欣感戴不料有等貪利之徒見朝廷法度清正屏除奸弊如此不得遂其所欲却歸怨於臣往往寫無名帖子指臣姓名說要傷害意在惑亂朝廷臣往時屢經危險懇辭退休先帝不允今又聞此憾恨之言臣實不自安決宜退避况臣稟氣最薄眼目早已昏花齒牙脫落大半犬馬之年已近六十豈能久於人世臣聞知足不辱知止不殆臣受朝廷髙爵厚祿已有年矣若尚留戀不即退去則是貪位慕祿不知止足安能保其不殆辱乎臣念慮及此殊增憂懼伏望皇上察臣衷悃之情憫臣懇切之懷容臣退歸田里庶得保全晚節優遊待盡而感戴聖恩於無窮也臣冒干天顔不勝悚懼期允之至天順八年三月二十六日奉聖㫖卿歷練老成朝廷倚任小人造言無理朕已有處治宜盡心輔導所辭不允欽此乞重用老成臣本以凡庸才學疏淺天順初䝉先帝擢用於內閣辦事蓋偶遇缺人之際聊以備員非天下之極選也臣彼時不敢遜避黽勉就職環顧其中誠所弗堪是以八年之間恆懷憂畏外雖强為支持而心則未嘗一日敢自安也况近來不足臣者讒毁多端謗議沸騰蓋由臣之鄙性拙直不能委曲宜乎人所忌嫉兼以素行不能取信於人故耳臣思內閣實機密重地須才德老成素行服人者可當此任竊見太子少保吏部尚書王翺由進士出身厯官五十餘年亷慎忠勤小心翼翼髙見逺識異於尋常士林推重未有過之者也乞照宣德年間少師吏部尚書蹇義例輟其部事量進階秩命入內閣俾與大議臣願隨行而協助之庶足以見朝廷重用老成之意而忠厚之風亦可以少振也臣布此誠懇為國至計伏望皇上鑒察而俞允之幸甚代襲封衍聖公孔𢎞緒謝表茲者恭遇聖駕親臨大學躬祀先師召臣等三氏子孫陪祀恩賚有加謹奉表稱謝者伏以繼體守文光啓重熙之運崇儒重道躬勤萬乘之尊既釋奠于先師亦寵招其後裔歡騰洙泗榮被縉紳茲蓋伏遇皇帝陛下聰明天錫問學日新膺寶厯而撫盈成纘述祖宗之洪業立皇極以臻康乂允懷賢聖之嘉謨鑾輿肅止於橋門玉帛敬將於禮殿籩豆加飭祼獻有儀八音諧而神人和敷奏大成之禮樂百官富而宗廟美增髙數仭之門墻豈惟崇德而報功用是化民以成俗臣材猶樗櫟業愧箕裘主鬯魯林勉守家庭之訓聨班魏闕叨承聖主之恩盛事欣逢逺陋漢明之儀度遺經空抱慙無頴達之敷陳感激徒深揄揚莫罄伏願奎壁文明乾坤道泰國有學黨有庠術有序益興三代之英才車同軌書同文行同倫永固萬年之宗社弭災自劾近者禮部奏今冬氣燠失調天不降雪乞命文武羣臣修省祈禱臣切思隂陽不和固大臣不能盡職之所致而大臣之中其咎最重者惟臣一人何也五府六部都察院諸司各理其事臣居內閣不但專掌制勑文書而已又任輔導之職與聞國政天之降災示變非臣之咎而誰咎且臣本凡庸與衆無異天順初誤䝉先帝擢用蓋彼時翰林急無老成儒臣備數臣亦自知才學疏淺不堪是任每欲辭之弗獲八年之間雖䝉先帝厚恩未嘗敢自安也皇上嗣登寶位念臣青宫隨侍之舊仍前委任但臣之素行未能取信於人嫉忌謗毁者至今不息雖皇上之明不為所惑而臣心實不自安已嘗懇乞退休未䝉矜允近來天象屢變水旱相仍人民餓莩盜賊生發是臣已不能盡職之所致也前代居公孤之位者多因災異䇿免今文臣之中惟臣濫叨少保之職而又不為士論所取雖無災變亦當罷去况有此災變尚可恬然自安而不退乎今內閣不為無人伏望皇上察臣情懇賜臣罷歸田里則天意可回災變弭而隂陽可和矣臣冒干犬威不勝竦懼期允之至成化年月日奉聖㫖修德弭災上下同之引咎自歸已見誠意所辭不允繳進兩廣事冝為征勦兩廣賊冦事有本院編修丘濬係廣東人深知彼處賊勢强弱民情休戚為見朝廷遣將出師前去征勦且喜且懼備將用兵事宜開寫揭帖呈示臣切看得丘濬所言利害得失明切詳盡用之必可成功以此不敢隱蔽謹録一本繳進伏乞聖明俯賜睿覽仍發下遍行總兵等官知㑹是亦平賊之一助也謹題論輔養君德竊惟人君一身為天下之主所係至重臣民瞻視以為休戚四夷觀望以為向背若行事合宜則中外人心自然恱服不然則人皆離心離德欲天下治安不可得矣今陛下初登寶位天下之人莫不廷頸舉踵仰望治平然治平之本在於君德而輔養君德又在左右前後必得老成端謹之人可也臣竊見內臣曽事先帝歷練老成隨侍皇上端謹小心者不為無人伏望皇上命其不妨管事於每日退朝燕居時分不許暫離左右舊日隨侍讀書者宜照舊每日隨侍不必分班其餘使令之人亦須選擇謹厚淳篤者供事如此庶於君德有益但有輕浮頑滑喜好生事逢迎取恱供耳目之玩信佛老之教者皆不可近伏望皇上即日退出各衙門辦事毋今隨侍如此庶於君德無損臣受朝廷祿位為宗社生民至計敢不竭忠盡言惟皇上剛斷而進退之天下幸甚奏災變臣見昨日申時天大雨雹風雷交作飄瓦拔木又聞天地壇正殿覆瓦及各屋垂脊外門拴木多有損壞上天垂戒之意顯赫如此不可不懼伏望皇上勉加修省雖在閒靜之中常如對越神明之時不可一毫與左右䙝狎亦不可聽其哄誘而寵用之每日惟與老成之臣商議君德如何而修朝政如何而舉念茲在茲頃刻不忘又當寫勑戒諭羣臣使君臣上下一同修省庶可以回天意臣愚見如此謹具題知乞終制臣於成化二年三月初七日聞父升於二月二十二日在家病故移文吏部具題欽奉聖㫖李賢著馳驛奔喪去上緊來臣惟聖朝以孝治天下士之見用于時者無分大小於父母之喪有三年之制俾為子者得以盡其孝親之心實天地之常經古今之通義也况臣叨居重職若因所任之事而不得盡為子之道恐無補於名教也伏望聖恩憐憫容臣終制依例起復庶得忠孝少盡於萬一矣臣不勝懇祈天恩之至成化二年三月初九日奉聖㫖朕賴卿輔導勿以私恩廢公義宜抑情遵命以成大孝不允終制再乞終制臣聞父升喪例該守制吏部具題奉聖㫖命臣奔喪而來臣即具奏懇乞終制又奉聖㫖不允臣切思自宣德七年出仕違父母膝下三十五年矣父今八十七嵗而卒使臣又不得終三年之制抱此終天之痛死不瞑目臣之私情其苦如此今皇上必欲臣奔喪而來蓋以事有不可釋者臣惟君親無二致忠孝同一理古者求忠臣於孝子之門未有不能盡孝而可以為忠者皇上之意以為國家事重不可以彼而捨此臣亦知其所重在此但今內外大臣當任者皆忠正老成之人使臣在此亦不過贊成其事而已無臣贊之亦不為缺臣之去就甚輕皇上所以留臣者未見有不得已之勢昔宋時宰臣富弼聞母喪守制朝廷起至五次弼終不起蓋以朝廷有人不至於甚不得已故也臣之踪跡似亦類此伏望皇上察臣區區懇切之誠容臣終制少盡孝情况三年之間瞬息而過臣今年才五十九嵗假使未填溝壑驅䇿駑鈍以報皇上尚有日矣臣不勝悚懼期允之至成化二年三月十一日奉聖㫖卿當深念職任之重移孝為忠不必固請終制所請不允三乞終制臣本以凡庸遭逢盛世誤䝉先帝擢用八年之間因循度日無所建明有乖清議而天下後世之所譏誚誠不可逭也陛下即位之初不録臣之過而反加以髙爵蓋念青宫隨侍之久耳彼時普例升進臣雖自揣非據不敢獨辭後屢以為辭終不賜允臣心愈加慙懼今臣不幸遭父之喪循禮守制子道當然陛下念朝廷事重謂臣可以委託堅欲奪情不允終制不知臣實駑劣不堪此任有類折足之鼎將必覆公之餗况奪情亦非太平美事臣若奉命供職不惟無益於朝廷抑且增罪於臣身且古之大臣若房𤣥齡張九齡冦凖文天祥諸人雖皆奪情人不非議者良以各人之才足勝重任而有益於國家天下也如臣不過尋常之流耳而亦奪情寧免人之非議乎臣無事之日亦招謗議今若不獲終制不足臣者得以藉口必謂臣心以此為榮姑陳奏章免人非議而已伏望陛下察臣此言容臣終制然後供職庶為太平美事臣迫於至情不顧煩瀆之譴惟陛下矜而從之幸甚成化二年五月初六日奉聖㫖禮有經有權朕特從權制用卿故纍辭不允若固違君命豈得為孝卿當深念大義勿恤微言勉起就任所辭不允毋得再陳四乞終制臣本無過人之才叨居重職每欲辭之不可得茲者罪逆深重禍延於父抱此無涯之戚雖循禮守制不能稱情吏部援例奏請皇上以用人之際不允終制臣又纍訴衷情皇上曲賜優容終不矜允臣彼時自慮且待回家安葬畢日決意不起遣人馳奏務求終制不意皇上特遣內臣馳驛同行妻子不得隨去到家匆匆擇日開穴卒哭祭畢內臣即日迫臣上道臣欲寬延數日亦不可得臣念君命為重不敢不從私心自計到京謝恩之後披瀝肝膽祈天請命今具疏上陳節奉聖㫖勉起就任所辭不允臣捧誦之際涕泗交頥所以不能仰遵聖訓就任者區區之心誠有所不安也用是再竭愚衷上塵天聽况臣犬馬之年迫於衰朽縱依命供職未必能副陛下之盛意徒重臣之慙增臣之罪而已伏望皇上早降綸音許臣終制不惟俾臣得遂所願而於朝廷亦有光也臣哀疚之中語言無緒冒瀆天威不勝隕越待罪之至成化二年五月初七日奉聖㫖卿言之再三朕已具知但委託尤重宜體至懷即日就任慎勿再言古穰集卷二
