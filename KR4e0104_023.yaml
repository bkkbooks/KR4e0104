body:
  text: 古穰集卷二十三明李賢撰和陶詩停雲一章瞻彼停雲載風載雨有懷伊人道逺且阻慨彼莫耶燈前獨撫寄興寥寥黯然凝佇二章停雲既濃零雨其濛懷我良人阻海與江明月何來照我軒窗願言相憶不遐以從三章商顔之老言采其榮與子相聞不以過情矢心亦云各勉于征庶幾令終無忝厥生四章彼蒼者松不改其柯矧伊人矣保此天和保天之和於我求多子不我輔將如之何時運一章風其和矣零雨崇朝載歌載逰往彼春郊有魚在沼有鳶戾霄靄靄盈疇秀矣禾苗二章我殽既潔我罍既濯時其育物可以留矚在在處處安往不足胸次悠然豈云獨樂三章有齒伊隨浴彼流沂風乎舞雩薄言旋歸少焉聽之長者頥揮寥哉髙風莫豫之追四章風雨其來息我敝廬簞瓢屢空悠哉晏如廬中之樂殊彼蓬壺清琴濁酒聊以起豫榮木一章榮木攸攸春光在兹宛其悴矣孰能戀之今我不樂將復何時光隂之速瞬息乎而二章榮木欣欣雨露培根天之生物栽者斯存而我何為棲此衡門由由與偕薄夫為敦三章嗟彼君子所居無陋卜鄰伊何人惟求舊道充為貴學足為富于焉內省庶幾無疚四章晉室之輔有葉未墜如履薄氷兢兢其畏世無伯樂鹽車伏驥况彼參母亦惑三至贈長沙公族祖一章君子之澤世逺則疏豈不念之同一厥初白日其晚嵗月云徂各慎其身言莫躊蹰二章美哉輪奐言考其堂克明厥德如圭如璋宗族聚斯永矣千霜祖武其繩邦家之光三章前烈有訓善與人同尋此墜緒障流以東古人髙跡邈矣桐江夫何今人惟命之通四章在昔子騫人無間言逰於聖門難為泰山所以回也發此喟然凡我宗人孝友為先酬丁柴桑一章作邑有道儼乎容止好善惟誠士輕千里竊有獻焉慎終如始二章道不易知民可使由豈弟君子憂民之憂民既樂矣我心則休崇酒於觴與子遨逰答龐參軍一章林下優遊伴我惟書有琴一張聊以自娛尚志伊何居我廣居不求聞達終矣敝廬二章惟儒何有席上之珍治人有道各親其親卷而藏之何求於人江上之鷗與爾為鄰三章學如不及古人孜孜人百其能已則千之所業伊何讀書誦詩伊既學矣云胡不思四章今宵風月與子平分我有㫖酒歡然交欣孰云郢歌遏此行雲古人之妙今則不聞五章干將失雌在匣常鳴與子相别潸然涕零子之文章步武西京何以教我毋惜丁寧六章君子之德草上之風執其兩端於民用中必得其名髙朗令終子其勉旃用省厥躬勸農一章夫古后稷偉哉哲人樹藝五穀乃得其真教民稼穡萬世相因菜羮必祭粒我生人二章舜有五臣莫賢於稷躬稼既勤庶類乃殖啓我後人服田力穡萬世賴之惟此艱食三章旦旦胥征載隰載陸零雨既收淑氣乃穆布穀催耕千耦相逐日既入矣不遑歸宿四章惟農之業可以恆久賢者避世亦惟耕耦嗟爾士女盡力南畝租稅莫逃勿為逰手五章力田乃豐不勤則匱捨此為生衣食何冀譬之學奕而思鴻至俯仰之間求無斯愧六章樊遲願學聖門相鄙士農異業勿乖所履各思其位莫出其軌農或士習乃就厥美命子一章厥初我祖始侯於唐升為天子四表輝光豢龍陶丘歷夏逮商因而姓之千載其昌二章惟縱既滅秦乃代周歷世隱德賁於林丘龍顔奮立乃止毒流偉哉司馬破代封侯三章祖含輔劉風虎雲龍山河帶礪懋昭厥功曰文而景有光其封潭潭相府邁於前蹤四章根株既培已茂其柯元鼎見削户乃設羅惟運則然豈曰自窊在晉中業起我長沙五章嗚呼長沙乃懋厥德厥德不惑受此方國王室賴焉孰敢僭忒豈曰今人古不易得六章世有顯人吾何為始偉哉武昌遺澤千里皇考繼之載安其止仕路有聲聞過則喜七章瞻望前烈豫何能及艱辛備嘗未有成立矯性之偏佩絃自急將類卞和抱玉以泣八章凡事預立學貴及時五官之職在心曰思君子修身尚念於兹儼其敬哉勿或怠而九章孔道如日老莊爝火君子為學取舍由我事親之孝曽子云可勉旃真有何事久假十章人之良能觀此提孩伊既學矣告往知來嗚呼小子尚竭其才爾不竭才於我何哉歸鳥一章有鳥來歸棲於舊林白雲依依亦在其岑抱甕之叟厭彼機心云胡不息惡木之隂二章歸鳥遲遲不能奮飛森森灌木載棲載依矧伊人矣豈不懷歸稅吾駕矣與世相違三章有鳥來歸繞林徘徊豈不髙舉樂此故棲雙雙比翼其意則諧悠然見之愜我襟懷四章歸鳥遲遲林下蕭條日既久矣宿于叢標載戢其羽鳴聲交交亦既倦矣云何能勞九日間居兹辰值重九撫景髙興生愛此田園居豈顧浮世名扶笻向東籬日映鬢絲明俯仰宇宙間適趣琴無聲悠然謝塵鞅從此畢餘齡難將一木力去支大厦傾孰謂林泉樂不如軒冕榮采菊泛濁醪陶然怡我情况兹禾黍登因之慶西成歸田園居六首我本無宦情髙興寄雲山農父相與鄰力田過年年擷蔬向前圃垂緡傍深淵孰知滄溟波倐焉變桑田懷彼陋巷人未達在一間三徑幸未荒五栁羅門前孤松落晴雲茅屋生暖煙瀑布瀉千尺渺渺匡廬顛對之豁心目逍遙有餘閒方尋㸃也樂胸次何悠然其二攜幼入我室羸馬脫歸鞅頓忘塵俗喧地幽無外想沮溺將並耕荷篠亦長往日上松隂清雨過菊苗長琴書聊可親但覺此心廣力田躬荷鋤庶以除蓁莽其三野外塵事少山中車馬稀既去市朝逺還遂田圃歸蘭茝紉作佩芰荷製為衣知已幸勿誚從今與世違其四地僻寡來往松菊聊自娛遂以林下室號為逍遙墟既絶鍾鼎念兹焉甘索居夜月琴一張春風栁五株醉卧北窗下其樂復何如詩成留答和吟詠趣有餘萬事盡撥遣此心逰太虛軒冕豈不貴斯志豫久無其五悠悠南山雲可以清心曲何必如廣受然後始知足悶來酒一壺間來棊一局鷗鳥宜結盟皓月堪代燭縱飲忘夜闌不知東方旭其六井田廢已久平野皆阡陌力耕足自給我心良可適床頭濁酒熟開樽醉月夕人生安得常倐如駒過隙素心樂恬淡不為外物役室人頗勤劬明燈夜深績衣食免寒餒安敢望饒益問來使南山夕雨霽當曉凝雙目逺人攜酒來賞我東籬菊摘英别我去袖此霜中馥此去秋糯成新醪幾時熟逰斜川新春景候佳正宜行樂休因之偕朋侣去作斜川逰淡淡山色逺漾漾波光流弱苕鳴翠羽淺浪翻白鷗撫景意俱豁何須問蓬丘挈榼有鄰叟攜琴得良儔詩篇互賡詠酒杯同勸酬不知春事繁再得逰此否愜兹川上樂忘彼身外憂既醉各歸去曠然奚所求示周續之祖企謝景夷三郎知己不易遇既遇情歡欣同逰復同調超然物外人周子既深造祖謝亦相因顧我蹇劣姿敢期數子臻所惜道喪久賴有錙銖聞仲尼有明訓佩服寧憚勤願與二三子永結平生鄰庶幾匡廬裔倣佛洙泗濵乞食晨屋炊煙冷悵然欲何之採蕨饑莫療去去安得辭黨有仗義士怡然迓我來烹雞復炊黍且復羅酒杯慰余落寞懷酒酣賦新詩廩粟幸有餽惜我非凡才但願來牟成勿勞為我貽諸人共逰周家墓柏樹下同逰宰樹下忽感雍門彈達者悟斯理遂以悲為歡衆人聞余言幡然俱解顔傾壺共兹飲人醉壺亦殫怨詩楚調示龐主簿鄧治中夙昔慕前修行藏合自然天地為逆旅此身無百年法度在方冊中道不宜偏奈何益蹇滯辛苦事田園雖值年嵗豐四壁空在㕓適抱䝉莊戚凄涼成獨眠自非大聖資中情寧不遷興寄孤琴裏涕落寒燈前茅屋晨未啓寂寂無炊煙陋巷屢空者徒為尼父賢答龐參軍與君相識初洗耳聆雅言景仰在沂水荒唐非漆園賦詩得深趣灑落忽數篇且與泛濁醪襟懷共悠然雖無紫霞想自可祛俗緣靜觀鳶魚樂斯理甚昭宣何時相招攜著履登廬山合并苦不易倐忽經嵗年五月旦作和戴主簿嵗晷無停運循環安得窮乾坤育萬物藐余亦在中緬唯賦與理初無嗇與豐踐形何寥寥黽勉繼前風子今佐百里善政克始終顔面無矜色慊然守謙冲為邑既如此治道豈不隆行看著聲譽可以齊髙嵩連雨獨飲秋來鮮晴日隂雨何蕭然濁醪自斟酌寄興天地間酒中有真樂何必更慕仙我祖昔感夢八翼俄登天餘庥既垂後功業孰繼先豫生時不遇暫出而即還所賴一壺酒陶然樂餘年慨今復懷昔此意誰同言移居二首其一南村有良友因之徙吾宅從此往來易可以窮朝夕力行富道德庶幾免人役俱無軒冕懷何必事割席志同道亦合素願酬宿昔永結平生歡沒世無分析其二知己二三子乘興輒題詩曲徑不可涉周道同所之昕夕遂良晤各免長相思載酒共逰賞多在春秋時丘軻去云逺文豈不在兹嗚呼顔何人聖賢不我欺和劉柴桑達人貴安命何必更躊蹰里有仁厚俗吾今已擇居顧惟靜與夀築室倚匡廬相鄰才數家亦可成村墟屈指更嵗厯菑田已堪畬汲汲事耕耨不敢辭勞劬生理雖蕭條濁酒安可無勿厭往來數莫使形迹疏開樽㑹文友古來共相須風月足清賞與君意何如酬劉柴桑嗟我承佳惠多君義已周况有珠玉句清如江水秋譬之嘉禾茂稂莠淨田疇厚德不可虛賡酬許我否何日攜琴酒同為山水逰和郭主簿二首長夏罕人事移榻坐栁隂清風時復來為我滌煩襟因之步幽徑呼童攜素琴雅懷當如何在古亦若今留侯善藏用髙風吾所欽床頭酒已熟與子且共斟古來豪傑士幾人遇知音愛此林泉居吾已投吾簪懷君對明月情同江水深其二辭官非樂隱所惜在名節愛子襟懷清有若秋水徹我居有松菊貞秀兩竒絶嚴霜萎草木二物挺相别卓哉嵗寒姿倣佛類豪傑徑氣自莫摧非有長生訣感此諧我心開樽對明月於王撫軍座送客秋霜既已肅草木倐云腓兹辰啓華席送子將南歸舉觴相勸酬欲别情依依為郡紹前躅古人諒弗違大道日已隱世態良足悲遺愛如甘棠千載有光輝而我樂間逸衡門自棲遲兹别隔嶽相思意難遺與殷晉安别憶昔初㑹時杯酒接殷勤倐忽已十載交情晚彌親所嗟久離闊無由卜為鄰徘徊共攜手行樂及兹辰如何日欲暮臨岐袂將分不知自此去相隔復幾春人生無定迹聚散若浮雲我觀古賢達出處各有因君負長卿志我甘原憲貧白鷗為伴侣天地一間人贈羊長史皥皥不復見斯民但歡虞君今向關陜為我訪遺書兩漢存舊迹想見東西都望望入秦川商顔正當踰綺皓有遺廟佳氣還扶輿斯人雖已沒名與天壤俱椒漿可致奠不必久踟蹰深谷空逶迤紫芝今何如間雲翳層嶺零露盈春蕪弔古動髙興幽景良足娛若人去云久塵世迹已疏我亦欲遐覽一使襟抱舒嵗暮和張常侍嵗華倐云暮空山響寒泉與君闊别來莫遂同話言霜菊既云謝松桂亦已繁四時更代易氣運良無愆齊君一何謬凄然泣牛山遂令偷生者乃欲鍊九還我久逺塵俗肻使虛名纒及時須行樂何必窮百年知非勿憚改見善宜速遷一盛還一衰物理固其然和胡西曹贈顧賊曹仲夏宿雨收當晨送輕颸杖履陟丘隴涼氣襲我衣清興悠然生因之歷翠微茫茫宇宙間不能忘憂葵尚念魯中叟鳯德何其衰空有奮揚志未得天戈揮魚龍失雲水非由見事遲達人能悟此撫志良足悲悲從弟仲德獨步當深秋木葉正飄零感此淚承睫傷懷在幽𡨕往事已如夢安得忘平生伊昔鴈行日風采令人傾藻思發篇翰渾然若天成氣完神亦爽滿擬到百齡蒼蒼誠叵測令我慟失聲雨苔翳行徑寒螿怨空庭杳杳夜臺閉悠悠古今情人生天地間終然當委形詠彼急難詩惻惻幽思盈始作鎮軍參軍經曲阿秦灰既云冷無由見全書所以古人行今人多不如豫兹辭畎畝駕言適通衢暫使襟宇擴敢言農事疏一覽前古迹使我胸中紓髙賢將有遇得以開緒餘念昔西河老幡然謝索居楚纍良足悲委身葬江魚古來豪傑士安可繩墨拘君看卧龍人未必終草廬庚子嵗五月中從都還阻風於規林二首悠悠返行舟異鄉非我居興盡復來歸夢覺心于于我非汗漫逰何必窮海隅歸心逐去鳥風波阻修途不比鴟夷子扁舟向五湖舊宅有松菊秋色未蕭疏西城薄有穫無勞事贏餘開樽㑹鄰曲幽樂當何如其二山川恣逰覽不歸將安之行止任自然何必有定期僮僕守成訓依然順農時雖無盤杅銘此心恆在兹歸來對松菊巵酒安得辭滄洲尋舊盟鷗鳥勿相疑辛丑嵗七月赴假還江陵夜行途中青年志已乖甘心在沈冥田園有真樂雲路無宦情兹焉將安之前途渺蓁荆不仕恐無義聊復念蒼生蒼生未蘇息何時暏文明乃今成大謬此恨安得平紛紛馳車走上下方交征君子當見幾云胡不歸耕北窗延清風吟懷無别縈人生貴適意何必身後名癸卯嵗始春懷古田舍二首其一古來耕耨勞秉耒身已踐四體良亦劬嵗歉饑不免沮溺今安在懷賢興何緬我咏豳風篇預立斯為善允矣人事勤勿云天道逺所以避世心長往竟不返有酒斟酌之此興良不淺其二哲人逹時命未遇亦安貧我懷沮溺儔寧憚四體勤躬耕有莘叟道可覺斯人三聘茍弗至天下何由新君子有其具無往不歡欣向無古人志豈望居要津我釀幸已熟開樽召比鄰同醉茅簷下自比葛天民癸卯十二月中作與從弟敬逺子期既不遇伯牙絃已絶山中少人事柴門晝長閉漠漠寒雲低紛紛忽飄雪喜與林下士襟懷共清潔詩酒有餘興盤飱無盛設因歌棠棣詩我心足怡恱既篤友于好各思繼前烈吾愛東籬花清香存晚節得意欲忘言奚較工與拙豫心雖坦然涇渭寧無别乙已嵗三月為建威參軍使都經錢溪古人英華發良由和順積果能躡前蹤未必今匪昔安得九霄上矯然奮六翮宗社孰扶持忍使中原隔試觀春秋人尚報東門役而我處畎畝坐閲嵗華易蓄志嗟莫申此意向誰析孔明去云久空憐廟前柏還舊居昔年離舊居未卜何時歸回首又六載歸來情益悲迷途尚未逺今是而昨非永固林下盟從兹與世遺琴書聊自遣鷗鳥還相依懷沙慨屈子捐軀悲介推我懷寄雲山塵世任興衰毫端有新句不妨時一揮戊申六月中遇火山下結茅屋幽居慕羲軒回祿爾何酷一宵忽見燔藏無商丘富炎焰孰敢前鼓勇無所措用智徒爾圓五行失其性造化誰能還蒼蒼不可問何必求之天人事恐未盡修省慎餘年或疑造物者無乃惡投間金石不可變此志惟貞堅動心復忍性吾但力吾田開樽對山月既醉還復眠天運既如此行將徙南園已酉嵗九月九日每嵗值重九㑹此林泉交但堅松柏撡寧論蒲栁凋何必惑仙術攜家去登髙長吟時染翰短翮難冲霄愛此晚節花不知身世勞有琴久無絃何論琴尾焦衆客互酬勸既醉樂陶陶且盡今日歡誰復知明朝庚戌嵗九月中於西園穫早稻西城幸有穫喜色在眉端勤耕此其報何敢偷自安所以齊晏子乃對先王觀舊藏既云罄新儲欣復還饘粥諒可給補綴聊禦寒我誦豳風詩稼穡良獨難力田既自足於人何所干新酒釀初熟一樽共開顔樂此塵外居世榮非所關莘野千載心喟然發長嘆丙辰嵗八月中於下潠田舍我有下潠田近在南山隈竭此耕作勞晏安非所懷今焉嵗云熟西穫願已諧飛飛田間雀喔喔林外雞逺村夕陽下髙樹涼飈回我懷古賢哲貧賤亦可哀人生憂患多笑口不易開余兹老田畝心事任摧頽唐虞去已逺吾道一何乖匪慕鴻鵠舉聊學鷦鷯栖古穰集卷二十三
