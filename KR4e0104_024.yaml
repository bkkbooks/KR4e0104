body:
  text: 古穰集卷二十四明李賢撰和陶詩飲酒詩二十首其一尊中既有酒開懷樂飲之人生穹壤間出處各有時隂陽遞消長達人恆鑒兹咄彼乾沒徒終身事狐疑君子守正命軻言良自持其二帶索憐榮啓行歌依太山當年逮九十三樂非空言貧固士之常怡然度流年斯可敦薄俗千載清風傳其三世榮寡所慕雅有丘壑情既同鹿門隱安論沒世名愛此尊中物陶然過一生世道有隆汙言之心為驚分隂未能惜悠悠何所成其四幽樹集羣鳥倐焉各驚飛驚飛不顧返使我中心悲恐非栖止處豈不失所依我行嵗云暮薄言此旋歸撫我庭前松徑撡恆不衰永言固深盟嵗寒不相違其五門前䕃五柳闃然無塵喧支頥坐中夜明月忽已偏既睡還復醒朝暉映南山攜壺向東籬獨酌欲忘還欣然對黃花此意同誰言其六君子唯蹈仁志在成其是所以三代民誰毁復誰譽今何獨不然令人徒莞爾况復厭菽粟紛紛競紈綺其七賞菊東籬下盈杯泛其英一觴未及醉悠悠今古情安得遇知己幽懷與之傾日下林色暝歸鳥相和鳴靜觀萬物樂吾亦樂吾生其八衆卉倐凋謝孤松見貞姿凛凛嵗云暮挺此霜雪枝君子夙有禀節撡同一奇惜哉老丘壑謝彼梁棟為於焉樂蕭散誰復能絆羈其九曙色上林杪柴門已云開鄰翁携酒至慰我平生懷謂我胡不仕恐於大義乖歷觀古賢逹未必終幽棲况子有逺志何必混途泥翁言意良厚我情非所諧簡書有夙訓前途安得迷君看倦飛鳥多戀故林回其十樂兹桑榆景翻思在東隅我昔驅車出冒行荆棘途康莊在何許不得遂長驅歸來卧北窗一枕清風餘安得屈夫子相與論卜居其十一憶昔顔氏子獨聞夫子道道既早有聞壽何貴於老非如莊叟談心灰形亦槁雖處陋巷間長使顔色好富貴如浮雲仁義自為寶嗟我何所求髙情在物表其十二孔子無不可斯為聖之時所以游夏徒不能贊一辭藐余千載後取則良在兹但恐盛德事反使傍人疑先正亦何人庶幾不我欺嗟爾營營者舍此將安之其十三吾性頗樂飲深識醉中境况居蕭散地宜醉不宜醒詩成無與和意適還自領醉後饒篇章聊以托毛頴我觀先哲文丹青垂煥炳其十四古人夙有戒履霜堅氷至斯理吾豈昧一觴且復醉撫景聊自娛時還豁胸次世榮何足慕天爵良可貴鄰父相與歡深得酒中味其十五我屋甚荒涼還同子雲宅扶笻玩浮雲舒卷渾無迹彭鏗去已逺人壽誰過百愛此籬菊黃寧論鬢絲白有酒斟酌之年華何足惜其十六我觀古之人耕鉏亦帶經不為外物役學道斯易成奈何夸毗子作事多紛更乃欲希古迹豈不隔徑庭顧余亦何為聊復以詩鳴終朝自吟諷庶以陶吾情其十七深谷有幽蘭清香發天風君子不採掇傷我寸心中人生信有命修已任窮通欲試養由藝今且藏吾弓其十八我口同斯味易牙乃先得安得魯中叟解我心中惑人道未能盡吾責安可塞不有君子人何能以為國有酒且復飲既醉言亦默其十九力田不自給聊以干祿仕軻書有成訓為貧非枉已乃知鄉里兒折腰良可恥因之抽吾簮浩然返田里况今歷年嵗但以甲子紀乘流固將行遇坎還宜止詩酒幸有托此外復何恃其二十六經不可尚誰復得其真後聖如有作再使風俗淳憶昔周邦舊文王受命新何意繼周者而乃在强秦遂使寰宇內紛然渾泥塵卯金成事業為之亦辛勤仁澤被四海皇天固無親萬物已枯槁生意復津津吾今處間散有此漉酒巾清風北忩下自謂羲皇人止酒四時足行樂飲酒胡可止春鳥相和鳴載酒緑隂裏夏日清風來對酒二三子秋菊籬半開酒至情偏喜冬雪滿園林酒價紛然起止酒果何如君當察斯理親交頻往來况復遇知己酒既不可止吾量亦無涘杜康安在哉我欲立其祀述酒儀狄造㫖酒古來人共聞杜康得妙術美已極十分我性獨嗜此萬事皆浮雲斯人安在哉無由酹其墳念此心戚戚對酒當清晨木石豈有知鷗鳥相與馴人生天地間飄飄遺此身子房志有在忠義良殷勤事錙非素懷終然報韓君脫身從赤松芳名久彌薰而我竟何為作詩綴空文周鼎久已沈一朝出河汾安得魯連子為我解其紛撫事但興慨杯酒聊復親古人去云久後世儔能倫責子為人體忠信相副名與實學文在餘力無徒玩紙筆各宜勉爾志求與古人匹茍不勤詩書致身那有術我言徒諄諄十不記六七譬之壠上苗結秀在堅栗賢愚且聽天不須嗟造物有㑹而作我室類懸磬稚子恆啼饑豐歲尚窘食瘠軀那得肥傷哉古之人凄涼泣牛衣此事若親睹此情良足悲窮達固有命奚論是與非豈無子孫慮顧今將何遺懷彼鹿門隱誓將與同歸去去龎德公真為百世師蠟日農人蠟祭畢聚飲情偏和老翁扶醉歸顛狂若風花傍人勿相笑歲稔歡樂多不見堯時叟亦有擊壤歌四時春醉門前栁夏登江上峯秋吟籬畔菊冬撫徑邊松擬古九首其一憶昔送君日折贈門前栁黯然離緒牽别來已云久嗟彼市道交念此金蘭友願為秋暮期同醉菊花酒古人重然諾斯言莫相負相思意何長相見情更厚世態趨炎涼君心諒無有其二羣凶竊漢鼎炎運迄將終乘輿西播遷紛然起兵戎夫何幽州牧未忍同奸雄卓哉田氏子獨存忠義風奮身赴國難寧顧前途窮歸來畢其事去隱深山中其三南方有𤣥鳥隆冬穴丘隅春社甫云過雙翼仍北舒所之有定向翩翩入舊廬但恐去歲巢損壞不可居孤村朝雨歇銜泥遍春蕪殷勤在育子返報當何如其四雨餘朝氣清登髙覽八荒安得如季路去升夫子堂一一尋墜緒吾意亦茫茫道妙不可得空遊文翰場光陰坐將老倏忽在北邙古來歌舞地禾黍互低昂未必雍門周鼓琴得其方能令孟嘗君慷慨為悲傷其五吾非公子荆為室亦茍完時復醉濁醪無暇整巾冠簞瓢頗云樂我心欲希顔白雪任來往世好非所關玩兹東籬花清興發毫端懷哉太古音有琴何必彈誰云荆枳叢可以棲鳳鸞天命人莫違奚論饑與寒其六庭樹一何茂風霜忽來兹萬物有盛衰人生貴知時我欲登太山臨流玩清淄彼中多名士欲往還復疑相逢不易合路遙非所辭念此興嘆息悠悠勞我思君子貴一誠終身行不欺前修有正路千載同所之筌蹄亦何為得意已忘詩其七曉庭宿雨收安坐養天和有懷未能已悠然發浩歌古來賢達士寂寂何其多商也樂聖道心猶蔽紛華邈乎千載下頽然將奈何其八塵事弗我嬰林間足優遊緬懷我前人雄才鎮八州豈知門祚微不能繼風流嵗月能幾何零落歸山丘哀哉箕夫子悲歌去朝周百世固相感我心何所求其九作詩陶吾情豈謂觀風採所以句工拙吟罷不復改魯連耻帝秦乃欲蹈東海顧我席上珍不聘還相待思唯正路由遁世夫何悔雜詩十二首其一郢中白雪調歌聲動梁塵欲以盈觴酒樂此百年身悠然放扁舟鷗鳥來相親結盟煙火上與爾長為鄰愛爾逺塵俗滄洲度昏晨形雖羽族微行藏類髙人其二初霜將授衣木葉飄秋嶺行吟未能休愛此籬邊景白衣送酒來解我襟懷冷蒯氏亦何人作詩名雋永其於聖賢樂茫然如捕影鄙哉戰國術縱橫任馳騁胸中何擾攘無由定而靜其三榮辱與得喪前運安可量進退一從容吾愛張子房傷哉淮隂侯俯首入未央非無報國心如藿傾太陽安得秦時鏡為我照衷腸其四古書乃糟粕見笑斫輪老吾惟效明哲此身貴能保嵗豐喜囷盈雨綿幸薪燥此外復何求農事宜及早團欒在一室兒孫喜盈抱區區利名場於我何足道其五知命恆自安何必復猶豫豈無雲霄翮軒然一騰翥古人能見幾往往拂衣去枕流清我心泠然洗塵慮老農信有方宣尼嗟不如茅屋帶烟霞樂此林下住適興時復吟不離栖遲處俯仰穹壤間貧賤夫何懼其六行年已五十知非心自喜欲如張子房願棄人間事處世亦多端安得每如意嵗月如水流暮景忽然值白髮不再黑隙駒一何駛田園雖不多聊為子孫置其七嵗華忽云徂暮景桑榆迫農家望西成禾黍盈阡陌即此遺子孫亦何愧清白心與天壤寬斗室未為窄鄰翁來共飲不知主與客坐待明月升來照吟翁宅其八農時我扶犂蠶月婦勤桑衣不充布帛食寧厭糟糠雖無陳蔡厄終嵗幾絶糧天灾莫能測或雨或愆陽坐此拙生計未能免憂傷濟已尚無術活人那有方每荷南鄰叟邀我共壺觴其九人性詎可昧我欲充四端改過在無吝見善當自遷譬彼幽谷鳥飛上喬木顛所以古之人黽勉各加餐就兹林下樂永絶塵世緣富貴非吾願聊賦歸來篇其十早年願求道言不聽無稽潛心事編簡結茅在隂崖有酒乃獨酌拍拍春滿懷慚無顔氏嘆仰之髙復彌但恐中道畫工夫竟支離聊欲試絃歌奈此塵纓羈浩然賦歸來初心終靡虧其十一浩歌明月下風度酒尊凉尊空人已醉歌聲疑繞梁顧我奚所樂所樂在醉鄉秋菊有深意盈盈傲清霜明日東籬賞更覺吟興長其十二㑹稽褚先生中山管城子兼有陳𤣥輩相親復相倚各能盡所長助我精文理詠貧士七首其一托身在何所茅屋聊相依苔蘚積行徑松蘿帶斜暉臨流嘆魚躍冲霄羡鴻飛飛躍各有適吾今豈無歸奈何拙生理不免寒與饑貧者士之常此事安足悲其二靜觀萬物理澄心坐南軒落英已滿地新蔬復盈園夜庭來明月曉屋未炊烟輪蹄寡來往簡編復窮研君子能固窮吾遵宣父言請看七十子誰如回憲賢其三伯牙古賢士髙情寄孤琴子期匪常流聽之乃知音寥寥千載下斯人安可尋濁醪誰與共偶爾成獨斟夷齊去云久清風良足欽我今知所歸安此固窮心其四百步見秋毫自昔稱離婁未能若斯人夙志那得酬酬志豈在目心明萬物周萬物各有托貧窮復何憂黔婁沒已久舉世無與儔九原如可作吾心安所求其五中心嗜編簡外物非所干家貧欣有子身輕喜無官詠彼伐檀什不能安素餐所以辭祿歸甘此饑與寒仁義存我心長有好容顔富貴如浮雲悠悠詎相關其六人間利名場紛紛如轉蓬卓哉張仲蔚身窘文則工閉户絶交往相知獨劉龔清談夜忘寐志意欣與同道腴有深味何暇論窮通堅此平生好旦夕期相從其七昔聞徐孺子髙風擅南州豈無倜儻士邈焉無前儔所以陳蕃榻不肯下凡流當時有髙識深為蒼生憂亦欲回狂瀾斯志竟難酬吾生千載後􅑫兹慕前修詠二疏二疏昔見機解綬同歸去當時富貴者詎識歸田趣譬之鳯凰烏千仭見髙舉紛紛道傍人嘆息兩賢傅能以仁為宅復以義為路賜金亦云多君儲兩深顧明此代謝理匪為邀聲譽行行適桑梓去去逺塵務生理不足論延賔暢情素知止斯無殆明哲當早悟幸有舊田廬非無子孫慮後人繼髙躅賢名亦同著詠三良三良昔事君志期補闕遺所以各獻忠殷勤在防微眷任日益隆隨君侍燕私腹心既已托謀謨入彤帷君恩有如此臣職胡敢虧生死各有命安能與同歸古無殉葬禮斯事誠乖違治命弗克遵霸業何足希傷哉黃鳥篇深為斯人悲諷詠未終什能不淚沾衣詠荆軻荆軻戰國士志欲擯秦嬴適逢燕太子尊之位上卿欲報强秦讎慷慨赴咸京藥淬匕首利懷之乃西行臨岐慘將别清吹飄華纓忽爾哀筑起座上悲羣英涕下不可遏乃復為羽聲壯士志激烈誓死不顧生白虹忽貫日見者心為驚挾彼秦舞陽同取蓋世名函封督亢圖拜獻秦王庭利刃揕豪主愁雲壓重城惜哉事莫濟徒然費經營白兹速燕亡咄嗟何所成至今易水歌徒傷千古情讀山海經十三首其一柴門掩晴晝往來人跡踈茅簷䕃槐栁鳴鳥近吾廬不為彈鋏歌奚愁出無車小圃時雨霽提筐剪春蔬有酒還自斟心與天壤俱覽此山海篇一一玩其圖試問風月侣知我意何如其二王母居瓊臺靈丹注童顔種桃瑶池曲結實三千年朝遊蓬萊島暮住崑崙山方朔今安在誰從問斯言其三槐江在何許琅玕遍山丘崑崙隔西南邈矣難與儔嵬嵬瞻紫氣洛洛見瑶流荒哉穆天子八駿曽此遊其四峚山産丹木益壽同昌陽丹泉出其下汩汨源流長就中多瑜瑾潤澤生輝光玉膏可為饌曽兹饗軒黃其五青鳥何翩翩素為王母憐奉使不辭勞取食還崑山我欲裁素書贈以中心言欲得賜桃實為我延長年其六東溟浩無極云有扶桑木根盤數百里枝葉䕃暘谷咸池若鼎沸太陽方出浴忽焉升中天萬象無不燭其七赤水有珠樹玲瓏散清隂八桂番禺西森然成巨林鳳舞翻綵苞鸞歌揚妙音無由生羽翮徒興逺遊心其八有國交脛東其人年命長非啖不死藥禀氣自異常若無奇泉水必有異種糧天地共悠久所樂殊未央其九神人有夸父追日極奔走窮力在虞淵斯志終見負渴飲河渭枯㳙滴亦無有棄杖為鄧林空傳百世後其十炎帝有少女因遊溺東海化為精衛禽怨魄固常在日銜西山木填海誓無悔海枯恨始平千載恐難待其十一溟海饒物怪未能悟斯㫖無乃與中土所禀異生死欽䲹殺祖江惡跡不可履鵕鶚與窫窳不善亦何恃其十二櫃山有鴸鳥吉凶驗其士國士茍見逐此鳥必來止物能先示兆見者必憎爾奇鳥生青丘願言來育子其十三皋䕫不易得自古難其才西伯有聖德子牙乃歸來後世匪無士庸君多忌猜丘軻終不遇吾道亦悲哉擬挽歌詩三首其一人生百年中日月何迫促但恐無實行後世不足録死生如夜旦榮悴同草木昔聞子産死鄭人多巷哭惟知生時情非望死者覺從今歸大化更無榮與辱役役久在世此心何時足其二光隂瞬息去安得久舉觴食味雖滿案吾唇不能嘗但念琴尊友何忍舍我傍名節幸不失簡冊生輝光自慚吾之善何以蓋一鄉寂寞泉臺閉長夜殊未央其三才看周六甲素髮已飄蕭况餘幾寒暑不復戀樂郊空祝南山壽南山自岧嶤草木雖零落春陽發枯條人沒不再生日暮還復朝日暮還復朝逝者其如何魂氣將安之豈復還其家哀哀執紼人薤露徒興歌惟有清宵月流輝照巖阿聨句大鵬因風起遨遊隘八極若非風歇時健翮未能息咄彼藩籬鷃自謂有餘力一飛尋丈間胡可妄夸飾騏驥困鹽車長鳴逵路側蛟龍既失水何以生羽翼我欲補衮衣有線成五色用舍姑伺時素心諒無惑桃花源武陵桃花源邈矣隔人世祖龍流毒深秦人從此逝君臣道雖乖父子倫不廢桑麻接墟里林泉任遊憩奉先潔蘋藻課子匪文藝永結比鄰歡夙駕久已稅樹顛有雞鳴花間聞犬吠柴門倚山開衣服隨身製物外自成村世人孰能詣川平土氣和老稚無札厲草木遞榮枯因之驗時嵗禽鳥聲相和猿狖性多慧當時商山隱同此逺塵界仙源不易尋白雲重遮蔽漁郎獨何幸能造塵境外再訪不可得徒此感神契古穰集卷二十四
