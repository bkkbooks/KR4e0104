body:
  text: 古穰集巻五明李賢撰記賜遊西苑記天順己夘首夏吉日上命中貴人引賢與吏部尚書王翺數人遊西苑明年亦如之又明年亦如之初入苑門即臨太液池蒲葦盈水際如劍㦸叢立芰荷翠潔清目可愛循池東岸北行榆栁森排草色鋪岸如茵花香襲人行百步許至椒園松檜蒼翠果樹分羅中有圓殿金碧掩映四面豁厰曰崇智南有小池金魚作陣遊戲其中西有小亭臨水芳木匝之曰翫芳又北行至圓城自兩掖洞門而升上有古松三株枝榦槎牙形狀偃蹇如龍奮爪拏空突兀天表前有花樹數品香氣極清中有圓殿巍然髙聳曰承光北望山峯嶙峋崒嵂俯瞰池波蕩漾澄澈而山水之間千姿萬態莫不呈竒獻秀於几窓之前西有長橋跨池下過石橋而北山曰萬嵗怪石參差為門三自東西而入有殿倚山左右立石為峯以次對峙四圍皆石贔屭齦齶蘚封蔓絡佳木異草上偃旁綴樛葛薈翳兩掖疊石為嶝崎嶇折轉而上岩洞非一山畔並列三殿中曰仁智左曰介福右曰延和至其頂有殿當中棟宇宏偉簷楹翬飛髙挿於層霄之上殿内清虚寒氣逼人雖盛夏亭午暑氣不到殊覺神觀蕭爽與人境隔異曰廣寒左右四亭在各峯之頂曰方壺瀛洲玉虹金露其中可跂而息前崖有壁夾道而入壁間四孔以縱觀覽而宫闕崢嶸風景佳麗宛如圖畫下過東橋轉峯而北有殿臨池曰凝和二亭臨水曰擁翠飛香北至艮隅見池之源云是西山玉泉逶迤而來流入宫墻分派入池西至乾隅有殿用草曰太素殿後草亭畫松竹梅於上曰嵗寒門左有軒臨水曰逺趣軒前草亭曰㑹景循池西岸南行有屋數連池水通焉以育禽鳥有亭臨水曰映輝又南行數弓許有殿臨池曰迎翠有亭臨水曰澄波東望山峯倒蘸於太液波光之中黛色嵐光可掬可挹煙靄雲濤朝暮萬狀又西南有小山子逺望鬰然日光横照紫翠重疊至則有殿倚山山下有洞洞上石巖横列密孔泉出迸流而下曰水簾其淙散激射飛薄濺灑最為可玩水聲泠泠然潛入石池龍昂其首口中噴出復潛遶殿前為流觴曲水左右危石盤折為徑山畔有殿翼然至其頂一室正中四面簾櫳欄檻之外竒峯回互茂樹環擁異花瑤草莫可名狀下轉山前一殿深靜髙爽殿前石橋隠若虹起極其精巧左右有沼沼中有臺臺外古木叢髙百鳥翔集鳴聲上下至於南臺林木隂森過橋而南有殿面水曰昭和門外有亭臨岸沙鷗水禽如在鏡中遊覽至此而止大官珍饌極其醉飽以歸夫一張一弛文武之道賜遊西苑有弛之意焉然張可久而弛不可多以歳計之弛纔一日則又未嘗不致謹也於是乎記進士題名記天順四年三月朔禮部以㑹試取中天下之士百五十人引見廷試策以治天下之要莫不各展所藴以陳乃擢王一夔為第一以次列其等第刊之於録復題名刻石于太學上命臣賢記其事竊惟國家取士莫盛於科目而人才用世莫盛於進士葢豪傑之士必由科目而進歴代以來莫不皆然本朝待之尤極其重其廷試也天子御正殿親賜策問使登對於丹墀其傳臚也天子復御正殿設鹵簿百官具朝服侍立已而致詞稱賀至於迎榜賜宴之類恩榮之典莫不悉備而又立石題名傳示永久朝廷勸士之盛意至此無以加矣為進士者能不知所勵乎雖然士之大節惟孝與忠百行之源無出此者果能忠孝則功名由是以大事業由是以廣擴而充之不難矣故嘗以謂功名事業無非孝親忠君之實未有不孝於親不忠於君而能立功名建事業於天地間者試觀古之臯夔稷契伊傅周召之徒其功名之大事業之廣孰非忠孝之所推乎噫捨忠孝而言功名則權謀術數之功名耳捨忠孝而言事業則百家衆技之事業耳烏足道哉近世人主或有見乎此者當策士之際祝曰願得忠孝狀元其意固美矣惜乎其不廣耳夫於狀元而願得忠孝之士矣於諸進士獨不願得忠孝之士乎今諸士既已策名於此必以忠孝自期然後於功名事業可以廣大而有光於前脩其措天下於唐虞三代之治也何有登是科者尚朂之哉需軒記安簡陳先生為詹事三年予與詞林諸先生造而賀之適新構一軒於堂之後規制秀潔遂設席其中以延衆賔酒一行先生起曰斯軒也尚未有名敢以請於執事者予思之未得偶見軒外若絪緼然呼吏出視之吏曰有雲在天予因誦易需卦大象之言曰雲上於天需主靜劉先生應曰正君子飲食宴樂之時也純道彭先生徐曰以需名軒可乎原博錢先生逢原吕先生皆以為然且屬為發明需義而記之噫需之義深矣哉夫需者待也先儒謂雲氣蒸而上升於天必待隂陽和洽然後成雨君子觀雲上於天需而為雨之象懐其道德安以待時飲食以養其氣體宴樂以和其心志所謂居易以俟命也又曰雲上於天無所復為待其隂陽之和而自雨耳事之當需者亦不容更有所為但飲食宴樂俟其自至而已一有所為則非需也予又通觀一卦六爻取用雖異而需待之義則同用是以名斯軒其意甚美而尤切於安簡先生之身何也詹事乃東宫之元僚謂之儲端而儲亦需之義也及觀談禄命者論先生之出處而亨運方來則當此之際乃需之時也以職言之既有以合乎需之義以命言之又有以值乎需之時則斯軒也未有善於以需名者雖然需之時義固歸於安簡先生而凡我同官者皆不可忽也茍畜其才德而未施於用能不有以需之乎必有以需之然後隨寓而安一聽於天不願乎外矣吾之胷中豈不灑落明瑩如光風霽月而無一毫係累於其間哉不然於所不當得者必欲得之責望於天而不副所望則怨天求取於人而不副所求則尤人未有不墮於行險徼幸之域矣吾人雖不至於如是亦當以之為戒而常存警畏之心可也此葢朋友責善之道不可缺者因并及之勅建𢎞仁橋記都城之南一水横流於巽方其源由兌而坤而離四泉沮洳㑹而為河至巽乃大有一津焉在南苑之左去城四十里凡外郡畿内之人自南來者東西二途胥由此渡車之大而駕者小而輓者物類之䭾者人之肩者負者騎者步者紛紜絡繹四時不休有力者每歲為架木橋然不能堅固而寒沍之際不免涉水且夏秋水漲即有覆溺艱阻之虞而人之病涉滋甚天順癸未春皇上聞之惻然軫念曰此先務也乃命創建石橋凡百所需悉出内帑一毫不干於民應用工役皆以金傭之聽其自願而不强也卜日興造人皆踴躍懽忻爭趨効力不知其勞而木石灰鐵之類率以萬計不督而集橋長二十五丈廣三丈為洞有九以釃水為攔於兩傍以障由者復増岸於南北以防衝突為寺為廟以資維䕶經始於是歲四月十五日訖功於某月某日總其事者内官監太監臣黄順臣黎賢董其工者工部右侍郎臣蒯祥臣陸祥告成之日上賜名曰𢎞仁橋仍命臣賢為之記臣聞古先聖王之治天下也以不忍人之心行不忍人之政紀綱法度細大具舉而於橋梁道路未嘗不留意焉觀夏令所謂除道成梁月令所謂開通道路可見矣是以利澤及人如天地之於萬物無有不足其分者我皇上復位以來夙夜孜孜躬理政務惟恐一民不得其所出一令也必順於人心行一事也必合於天理其無異於古先聖王之用心矣今以一津乏濟聞之惻然是即不忍人之心也為建石橋以便往來是即不忍人之政也名之曰𢎞仁葢𢎞者廓而大之之謂仁則不忍人之心之政是已嗚呼一橋之利尚不遺焉如此况其大此萬萬者乎由是以知皇上擴充仁道被於四海而利澤及人之廣信如天地之於萬物也已是宜大書特書以昭後世臣賢既為之記復系以詩曰大哉元后作民父母民之休戚同其安否所以先王發政施仁憂勤惕厲罔或因循仰惟我皇博施濟衆視民如傷惟樂與共大綱小紀乃舉乃張有或遺者於心遑遑都城巽方有水病涉惻然興懐務遂所愜不惜内帑為建石橋工役之費民無秋毫易危而安利澤惟久億萬斯年厥跡不朽由小知大如地如天帝王盛德我皇無前詞臣撰文紀述茂實勒諸堅珉永示無斁重脩歙縣㕔記今之縣治即古子男之國茍無㕔事則一縣之政令無自而宣為縣令者固以安民為先而㕔事所以視政亦事之不可後者雖然為之者必出於不得已焉可也不得已而已之則為廢事得已而不已則為生事廢事則縣令之職不修生事則一縣之民不安是以君子為令也既不生事以害民亦不廢事而曠職斯盡為令之道矣僉錦衣衞指揮事湯君𦙍勣嘗以簡投予曰比因省墓東歸歴縣多矣而令之賢者如歙無幾歙之令西蜀吳君遜也由名進士出宰是邑政通人和百廢具興且以縣㕔一事言之歙為徽之附郭邑居郡城之東問政山之麓㕔事嵗久日就頽弊前之官是者因循以度日甚至苫草以捍風雨胥𨽻無所容蔽焉遜曰是豈可以仍舊貫者既而思之曰改作㕔事雖出於不得已亦不可以勞民之力傷民之財也乃與同官相謀各出俸貲為之邑之仗義者聞之亦樂助焉於是首建正㕔次及門廂倉庫不旬月間煥然一新𦙍勣目其能如此敢乞為之記予惟遜之所存所行其詳雖不可得知即此觀之可謂不生事不廢事如前所云者夫縣之㕔事所當有也久而頽弊所當脩也雖用民之財力亦不為過而遜也猶不敢一毫動民况肯以私事而害民乎吾知歙民得遜為令殆無有不被其澤者矣異日報政豈但為一郡諸邑之最而已後之繼為令者居其㕔則思所建之人思其人則舉所行之政俾是邑之民仰觀是㕔而感德於無窮顧不美歟臨深軒記予天順癸未之夏搆小軒於後庭之中扁曰臨深盖取小旻詩中如臨深淵之義客有見者惑焉請更之曰子為是軒乃燕息之所身之所安也今以臨深名之則危之也毋乃不可乎予曰子言雖似然未知名軒之意也且危之者固所以安之也茍無危之之心而欲身之安者鮮矣是以古之聖賢兢兢業業無時而不戒謹恐懼故能免夫敗亡之禍易曰其亡其亡繫于苞桑孔子於繫辭贊之曰危者安其位者也亡者保其存者也又曰危者使平易者使傾豈惟易道為然凡詩書春秋禮樂之道莫不皆然而戒懼危亡之説未嘗為第二義也然則後世之士有志於聖賢之道者其存心行已亦惟如是而已不然則必至於慢易而傾覆之矣此名軒之意也况予濫居宥密之地所謂在四而多懼者可不危乎假使處豫亦必如六二之介于石不終日可也豈可狃于安樂躭戀不已而至於溺哉客乃憮然曰吾之所知者近也若子之言其所知者逺也語曰人無逺慮必有近憂子其庶幾無近憂矣乎斯軒斯名誠不可更於是乎記自治齋記昔孔子答樊遲脩慝之問曰攻其惡無攻人之惡先儒釋之者曰專於治已而不責人則已之惡無所匿矣葢人之常情明於觀人而暗於自觀重於責人而輕於自責所以於己之惡任其潛藏隠伏於胷中而鹵莽其心不暇鋤治焉此予所以自治名齋也夫古之聖賢莫不自治其身若成湯大聖也而猶檢身若不及曽子大賢也而猶日三省其身况後世之士乎故有惡未去吾則極力攻之必去而後已有善未存吾則極力求之必存而後已惡既去矣茍不堅忍以守之安能保其不復萌於心乎善既存矣茍不自强以振之安能保其不復失於心乎是故隨事致察使靈臺湛然而無纎惡之可容芥善之或遺則自治之功庶乎其切矣或曰子之功如此殆無異於聖賢之自治乎曰所貴乎士者在於學聖賢之學也學聖賢之學縱不及焉則亦不失於令名反是則必墮於卑汚鄙賤之域矣尚可以言士哉予於是而深懼也遂揭之以自警焉集義齋記予嘗構一小齋以集義名之或曰集義云者孟子之言也子有志於集義則觀之孟子之書可矣而必以名其齋也何居予曰即書而觀之其勢不能不旁及乎他也故摘此兩言以名吾齋庶得常目在之耳或曰集義之功可得聞歟曰子不觀夫孟子之言乎所謂必有事焉者言念念必在乎義而無一念之不義事事必合乎義而無一事之不義謂之有事是集義之外無他事謂之必有事是此事之外無他念集義之功如此可謂密矣予方體而行之庶幾自反常直無所愧怍而浩然之氣由之以生也或曰集義可以生浩然之氣乎曰所貴乎人者以其有浩然之氣也是氣也即天地之正氣雖人人有之不能以直養而為私曲所壊茍能集義以生之則復存於我矣雖然是氣也可以集義生不可以義襲取可以有事勿忘得而不可以正心助長求也或曰孟子論養浩然之氣而必先之以知言者何也曰子不聞諸先儒之言乎窮理知言以開其前則有以明夫道義而於天下之事無所疑集義養氣以培其後則有以配夫道義而於天下之事無所懼此孟子所以當大任而不動心也與顔淵曰舜何人也予何人也有為者亦若是予於孟子亦云或乃憮然曰命之矣予遂櫽括其言為記而置諸齋之楣大同鼓樓記鼓樓之建雖有司為政之一端而其所闗則甚要且人之於晝凡有目者皆知時刻之所在入夜之際非更鼓以示之則茫然無從而知然則更鼓所以代人之目者也夫一郡一邑官府列焉百工具焉衆役在焉人民聚焉必有更鼓以示之則有憑有期而不失其節庶務由之以興矣大同為邊方大郡有親王以居之有大將以鎮之有憲臣以蒞之軍民之夥不下十數萬人而更鼓不可以無設也或曰更鼓之説固然矣而必棲之樓焉樓之費也甚大然則斯舉也毋乃勞民傷財矣乎曰古者郡邑之制必為樓於城門以貯鐘鼓名之曰譙用以警衆其勢不髙則其聲不揚而人之聽聞也不廣夫以一樓之建為十數萬人之所聽聞則所費者寡所益者衆亦何勞民傷財之有或曰譙樓之鼓嚴昏曉之節而已今以為知時刻之所在何也曰昏曉之節有目者皆能知之惟夜有五時時有八刻人所不見故譙樓之鼓加之更焉夫天之運行一晝一夜九十餘萬里君子雖向晦宴息以安其身而天則未嘗不運行也茍因更鼓而知其運行之時則凡為臣工者寧不惕然興起其自强不息之志而法其健乎謂之嚴昏曉之節末矣彰武伯楊公信都察院右副都御史王公越故嘗建鼓樓於郡中而屬郡守李福至京求為記予故述其所以然之故貽之進士題名記我朝法古為治設科取士自洪武以來廷試進士幾三十科凡豪傑之士出而立要津躋膴仕芳聲偉烈匉訇振耀於宇宙之内以輔成我皇明雍熈泰和之治者率多進士發身也嗚呼盛哉天順甲申春皇上即位之初禮部請廷試貢士遵舊章也上曰臨軒策士固我祖宗法古求治之盛典茲朕㷀㷀在疚而情有不能安然行之者特令多士各陳治國平天下之要道以獻于以見皇上盡孝之誠心取士之盛意兩得之矣已而屬儒臣閲其所獻乃賜彭教等二百四十七人進士及第出身有差禮部復請立石題名于國子監上命臣賢為之記竊惟士之仕者所以行其義也豈但君臣之義凡事皆當合於義焉不然則利而已君子小人之分在於此然則義之與利豈易辯哉不致謹於疑似之微未有不以義為利者所謂毫釐之差千里之繆矣是以古之君子恒戒謹恐懼慎思明辯而不敢忽也夫人但見臯夔稷契伊傅周召之徒功名事業光明正大如此而不知其所行純乎義也後世雖有豪傑之士終莫能與之比肩者顧其所行不免雜乎利焉雜乎利則不純於義望其嫓美前烈豈可得乎嗟夫聖賢發明義利之㫖詳矣有以先義後利為言者有以正義不謀利為言者惟恐世之君子徇利而忘義也今登名於是者果能惟義是行則功名何患其不光明事業何患其不正大而雍熈泰和之治將益隆矣而今而後願與諸士勉之古穰集巻五
