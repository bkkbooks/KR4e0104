body:
  text: 古穰集卷六明李賢撰序送夏千戶序豫嘗讀太史公書見漢祖龍興豪傑雲從為腹心為股肱為爪牙者匉訇震赫飛騰乎宇宙意氣之盛蓋不止於凌泰華衝斗牛也至以不言躬行篤孝淳謹見稱於當時者惟萬石君一人而已然萬石君厯惠文景武四朝尊爵榮祿而子孫貴顯至二千石者十七八彼所謂豪傑功臣之家鮮克儷焉或僇及其身或子孫一再傳而敗者皆是也君子於此有以卜其福慶之所自矣今之世有類是者吾於鄧之守禦千戶夏侯見之蓋鄧自孔侯開創以來其間勇略特達為崖岸斬絶之行氣焰可畏於一時者不可屈指至於忠厚愛人與物無競恬然自守於禮法之中子弟謙恭族屬蕃衍而軍士仰戴不替者惟夏侯一門向之氣焰可畏者不干憲於其身則敗之於子孫數年之後泯然無迹甚矣夏侯一身一家躬行之善有類乎萬石君也譬之花栁逢春爭新鬬艷於一時至乎秋冬則頽然零落枯槁而松竹凌寒挺然蒼翠豈不可尚也哉夏侯在任蓋五十年于茲矣今以歲及指使在禮不與服戎援例用嫡子以代則今夏侯是也今侯名傑撝謙淳謹不減其父蓋前夏侯位不滿德厚施而不食其報功名富貴必於子孫乎見之蘇子所謂天定者也侯世家和州之含山歲乙未從戎遂充什伍長洪武壬申以功升懷逺衛百户纍進正千户以洪武甲戌調今任蓋世祿于茲土云送楊公儀知鄧州序是嵗戊辰夏四月吏部品士之當仕者請於上命之官有楊公儀者冠諸士為守於鄧鄧吾鄉也因贈以言昔者孔子適衛曰庶矣哉冉有曰既庶矣又何加焉曰富之既富矣又何加焉曰教之向使孔子操治人之柄以行其道不過富之教之而已楊公往治吾鄧亦惟孔子之道是遵雖然不可忽也富之教之必有道焉先儒所謂制田里薄賦斂富之道也立學校明禮義教之道也以今觀之田里之制賦斂之薄出自朝廷太守不與焉學校之立禮義之明自有師儒太守不專也然則富之教之果非太守之責乎曰政亦多術矣彼所謂富之教之之道太守雖不與且專而太守豈真無所事者哉蒞政之初必謹察之某事也有以害吾民民之窮也由此而致吾除之某事也有以利吾民民之富也由此而得吾興之又謹察之某事有以薄民俗吾禁之不使復行也某事可以厚民風吾勸之不使或墜也害除利興民生遂矣富斯得焉薄去厚存民心善矣教斯行焉此富之教之之道太守所得與且專者如此嗟夫天下為郡為邑者衆矣如孔子之言而見諸行事者幾人哉必見諸行事而不託諸空言斯無愧於聖人之徒而守令之責塞矣楊公去此其留意焉户部尚書古公挽詩序鄉之人古君本來自鈞州持其父挽詩一帙造豫舍且告曰先人為户部尚書而卒得搢紳大夫士挽詩若干首未有序焉者蓋三十年於茲矣非敢緩也以母老垂白在堂左右就養不可一日離今母以壽終始克至京師意者鄉好得序其首以為永圖豫昔寓郡庠時聞鄉之先達在朝者有古公焉為人端重有風度愛惜名節能以禮自防凡百時好無一動其心者是以在家有孝友之稱在邦有忠亷之譽歷事髙文仁宣四朝眷注咸優蓋德孚於人而行無不達真當代之偉人也既而領鄉薦上京師登進士公已棄世數年自傷不幸不得望見大君子威儀以挹道德之餘光付之悵然而已洎觀楊文貞公所撰神道碑乃知其平生履歷之實景慕之餘慨然於心思欲為詩以自附於杜子八哀之義顧多事而未能也古君乃以此見屬其又何辭然挽詩非古也其意則出於古矣禮曰弔於葬者必執引執紼言弔葬者必挽引紼以助其力其哀可知矣今也於執挽之際形諸歌詠以叙其哀蓋君子緣情而生以義起者也况因之而發揚乎行實之美亦仁人孝子所當致力者今古君惓惓不忘於嵗月之久非篤於孝親者能如是乎尚書公諱朴以清白遺家本其季子也讀書好禮重於鄉曲嘗擇子之秀者二人為郡庠生學業日進殆將復振其家聲以慰泉壤云送崇德知縣焦君序國朝進士除官內外兼用自宣德以來率多留內任或外任者什一今皇上念及元元謂親民之職莫如令嘗考郡邑之治效由進士者居多於是兩敕吏部自今縣令有缺以進士補之此求治安民之本心然意者不專於是蓋謂進士才髙氣鋭悉留內任未必不志大而忽細一旦任重或有疏略之舉必於此焉歷之使之動心勞慮增益其所不能庶可以成大器實預養之以為他日廟廊之需殆朝廷鼓舞英豪之深意或者遂以進士得此不足榮蓋未之思也自常情觀之進士授職固宜喜內戚外而君子之喜戚則異於是不以內喜不以外戚茍可以行其志雖外而喜否則雖內而戚蓋君子之喜戚係乎道之行與不行也夫何暇內外之計哉葉之焦君仲容以進士當選偕同年友十七人俱為令仲容得浙之崇德人皆為仲容戚惟仲容欣然造豫告曰吾慮得內任必安逸後不能堪事今誠得出宰為幸子知我者得無一言嗟夫仲容之志君子哉其過人逺矣是固以行道為心喜戚不係於內外者也以仲容之心觀之蓋謂一邑之事萃乎令凡其利可興害可除弊可革盜可息訟可理政可平凡百廢墜可舉者皆在吾掌握之中所以展吾才盡吾心次第而推之不難矣君子以行道為樂吾故曰仲容之志君子也回視居內任者循規制勞案牘日不暇給曽如仲容之樂乎以此易彼孰得孰失必有能辨之者仲容以為何如代李司訓作送練士還家序士之所以自顯於世者有二途焉曰文與武而文武之士各用力於自顯之業則有難易精粗之不同君子不可不察也夫用力於文者似易而為業精焉用力於武者似難而為業粗焉然則用力似易而業精者勞心用力似難而業粗者勞身勞心者治人勞身者治於人而國家取士於二途官勞心者終其身官勞身者繼其世則其所尚無乃異指乎曰未可以差殊觀也夫文士為業雖精其途夷而武士為業雖粗其途險險夷之際安危係焉人情好安惡危而夷者安所關險者危所係全生而逺害與夫出萬危不顧一安者孰輕孰重不待知者而明矣由是觀之則朝廷於官人之法其為慮也深矣今年夏豫以教官考績來京師適有故人曰褚姓而銘名者以練士相邂逅感慨而追陪者纍日既而曰吾與先生得斯㑹不可以為非幸請一言以為後㑹之張本嗟夫吾與子俱絆於仕途吾以文而子以武其用力於自顯之業則有難易精粗之異身心夷險之殊洎授職於朝廷又有終身繼世之分而終身繼世者有崇有卑有顯有微顧其崇且顯者我未之有能也子尚勉圖之古人謂九重之臺起於寸土千里之行起於足下慎勿以今日之役謂不可企及夫髙且逺者於是乎書送劉主簿序天下郡邑無慮千餘而地瘠民貧莫甚於山西山西郡邑不下百餘而事繁政劇莫甚於太谷蓋太谷者密邇藩臬盤根錯節之地也人之常情孰不惡繁而好簡喜易而憂難古之君子則異於是以為不遇盤根錯節無以别利器蓋所見出於常情之外宜乎有大過人者今之君子能若是者鮮矣劉公某之為太谷簿也方授職之初人皆為公戚惟公以為喜問之則云吾之利器行將别於此吾何為不豫哉其勿為我戚戚也聞者始愧而大異之洎下車之日邑人望見顔色威儀皆惕然生敬心已而蒞事惟明惟斷雖百務叢集而一揮判然市民始而觀者如堵墻明日去者半又明日半者去又明日無一至焉僉曰神明主簿孰敢侮之越明年令行禁止吏民悅服自藩府臬司大郡巨公無不擊節歎賞以為諸邑之簿最於是一邑之邊儲專委任焉每於事竣未嘗不先人而上官為之自慶于今已八年矣操履如一日焉太谷自開邑以來令丞簿未有能終其任者或一二年甚至數月即為邑人訟而黜之間能得白復任亦不旋踵而去獨公屹然若砥柱之在中流是果何修而得此乎亦曰其立心也公其持志也勇公則生明勇則能斷吾於是乎知劉公之利器可尚也已茲以考績書最將還於公有鄉曲之雅者謂不可無言以贈於是乎書送羅通判序通判郡佐也郡之佐其名不一自秦置守以來無慮十餘等曰郡丞曰治中曰别駕曰長史曰司馬曰贊治曰通守曰倅與夫今之所謂通判者皆是也夫一郡之大有守必有佐則是非可辨得失可别然後一政之施一令之下庶乎有利無害而民得被其澤矣茶陵羅侯琥通判河南之南陽命始下也南陽之仕于京者往見焉退而喜之咸相謂曰淳人也容貌舉止安間不躁存于中者可知也詢諸鄉人則又皆曰善人也鄉曲之譽莫有過者洎往任也寮屬被其容接者舉得歡心焉按歷所部郡邑之民欣然交慶于今三年輿人誦之曰羅侯判府吾民獲所羅侯出遊吾民以休來自郡者莫不云然豫聞而異之子貢問鄉人皆好惡何如夫子以為未可也不如鄉人之善者好之其不善者惡之羅侯不惟一鄉之人好之自其所識至吾一郡士民莫不好之與夫子所謂未可者如何解之者曰子見侯之鄉人好之者皆善人也安知惡者之不惡乎其所識與吾郡之士好之者亦若是也而吾郡之民被其德澤者豈以善惡而有間哉其說信矣嘗觀於易比之九五曰顯比王用三驅失前禽先儒以為豈惟人君比天下之道如此凡鄉黨親戚朋友衆人莫不皆然乃知侯之為人所好能明乎是道而已夫豈示私恩為虛譽者哉侯勉之歷觀古之名公巨卿莫不由是出若富鄭公在鄆李文靖公在澶吕許公在濵其後皆至台輔為有宋名臣而其人之言行政事具在方册侯考而行之不難矣夫與人言而不以逺大期者非厚之道也敢以數公由通判而至逺大者為侯告焉送王指揮序轅門巨室有王姓而徽名者其父永為陜西都指揮僉事既老且疾令徽請代于大司馬乃授西安衛指揮使瀕行祠部郎中趙君與之交好率其鄉人乞豫言以贈問其世家云武陵人大父奎國初纍功至指揮僉事伯俶復以功進都指揮使守寧夏朝廷倚重無西北憂沒於陳妻時以死從特賜貞節之誥永奉母魏至孝初授延安衛指揮使改綏德留妻謝養姑姑有疾謝驚懼禱于天刲股為羮以進疾愈至八十又六乃終永哀痛不已懇乞終制廬墓弗獲謝代之詔旌其門曰孝行從子敏卒妻趙亦以死從詔旌其門曰烈婦此其大略也豫聞而歎曰嗚呼忠孝節義萃于一門可謂盛矣夫為臣盡忠於君為子盡孝於親為妻盡節於夫為婦盡孝於姑乃天命之固有人道之當然觀王氏一門為忠為孝為節義者如出一轍夫豈有所利而為之者哉詩曰天生蒸民有物有則民之秉彛好是懿德此之謂也古之聖人立教垂世亦不過使天下之人皆欲如此而已以今觀之世祿故家如王氏者多矣有忠焉而孝無聞者有孝焉而節義無聞者有忠孝節義俱無聞者又况背理亂常甘於汚穢者比比視王氏一門相去何逺哉夫王氏之門盛矣為子孫者亦不可恃此以驕人而矜已也自古名門右族成於祖父而墜於子孫者十常六七况故家子孫一違先訓其責倍於他人實藝懿行人未必信纎瑕微纍十手爭指故曰起家難保家不易書曰惟乃祖乃父世篤忠貞詩曰毋念爾祖聿修厥德可不慎乎今侯有伯之忠有父之孝所以光前烈而振家聲必有能副鄉人之望者若夫出竒决勝應變之術所謂軍旅之事吾未之學也在侯之自勉云送廖指揮序昔漢髙祖起豐沛而將士功臣多豐沛世祖起南陽而將士功臣多南陽我太祖髙皇帝龍飛淮甸而將士功臣亦惟淮甸多焉易曰雲從龍風從虎風雲之從必其近者勢固然也長陵衛指揮使廖侯鏞其先淮之定逺人曽大父諱友洪武初仗劍從太祖開拓寰宇纍功至昭勇將軍指揮使賜誥以世其爵歷子孫三世至於鏞或曰三世為將道家所忌豈其然乎吾聞友為將軍不坑降以圖利不妄殺以邀功故官止于此使惟利是圖而功是邀以友之勇而取爵其不為侯為公也邪其心固曰積其善也多而獲其慶也長食其報也薄而遺其後也逺嗚呼友之所存如是雖歷百世而益昌復何忌哉吾不及見將軍友而嘗與寮寀以山陵祀事往來主其家見鏞之父亨從父貞皆循循雅飭類儒家子亨也事母恭而婉友弟愛而篤處家待人一於禮而不怠貞也母有疾刲肝為湯以進而愈嫂陳氏老而孀居無紀綱之僕不逺數千里取以歸處家待人如亨焉詩云兄弟既翕和樂且耽子曰父母其順矣乎吾於廖氏一門見之夫廖氏昆季盛矣而鏞繼其爵豈可忽諸嘗見鏞在諸父側執弟子禮甚恪又聞鏞出則練騎射甚工蓋恪則能心祖父之心工則能勇祖父之勇子曰父在觀其志父沒觀其行亨既沒矣人將觀鏞之行矣夫長陵我太宗文皇帝劍舄所藏世祿子孫得任守禦之責于此將必與國同休雖億萬斯年可也吾是以知廖氏之澤未艾矣所謂善多而慶長報薄而遺逺者非邪鏞將之任諸往來於鏞家者屬為序以賀且曰當風之竅聲可泯乎辭不獲乃述所見聞者頌而勉之送貊知縣之內鄉序河南七郡而稱易治者南陽也南陽十邑而稱易治者內鄉也蓋內鄉地連商於沃野千里土風物産加於衆邑以言乎士操存篤雅士易治也以言乎民習尚淳朴民易治也以言乎訟忿定氣平曲直自分訟易治也以言乎境就僻逺要迎送不煩境易治也夫以一邑之政而四者易治餘可知矣然則易治若是而令於此者雖與卓魯並駕可也近觀數令類於傷錦而去何歟蓋無卓魯之心故也夫有卓魯之心雖無四者之易而易無卓魯之心雖有四者之易而難嘗見今之為令者居則曰我所願為卓魯也夷考其行百無一似焉何也蓋非卓魯之不可及也顧其為之無實心耳傳曰子服堯之服誦堯之言行堯之行是堯而已而况卓魯乎欲為卓魯之道者惟當求其心之同不必泥其跡之似心茍同矣跡雖殊焉可也夫視民如子卓魯之心也能存此心舉而措之不難矣於是布大信推至誠决壅滯撥煩縈四民之業惟敦五土之利惟成窮獨以恤姦盜不興撫字既勤風化亦行雖不求合於卓魯之跡吾恐卓魯不能自異矣及其去也攀轅卧轍畫形配食頌德立祠紀惠刻石皆餘事耳有貊君安者潁之太和人以太學生擢內鄉令謂內鄉吾鄧之屬邑也造豫而問焉豫惟為人謀而不忠不可也乃以所見難易之說併古循吏之道告之既而內鄉宦遊之士來乞序以贈弗克更出新意也文其語以貽之送鄧州學訓導柴君序正統七年春大㑹天下舉子較藝于南宫蓋以千計而甲乙取之要之其才不甚相逺援例甲登進士乙為校官然則朝廷之意深矣郡邑之職豈不宜授何乃舍彼而授此殆以校官者人才之豐嗇係焉耳然則由乙選而任斯職者盍亦思其所寄乎雖然師生之相與貴乎恩義兼盡也竊怪夫今之曰師曰弟子者往往不能相入而卒相誤焉况北方之士始也不知自奮必待師長教條之嚴誨誘之勤既久且堅乃克就業而人才之效可冀不然以渙散疏曠之心一旦而拘攣繫縶於此必有不能堪者顧乃惑其志不以教育為樂而前日之規制弛然莫振由是弟子無執箕膺揲之願而外慕是馳或成與否若越人視秦人之肥瘠矣甚至齾齾相濁惟利之射所謂恩義者不知為何物也十年之外師以無功黜士以業荒退豈非不相入而卒相誤之明驗歟三衢柴君惟一浙之江山右族學有源委領鄉薦而來遂登乙榜授鄧庠司訓豫故鄧庠生也聞其名接其容聽其言喜甚且私為吾庠諸友賀而今而後矜式允有賴焉况鄧之教官三人皆長者善開導諸生駸駸然有所造就君往主師席必能協心以教以育决滯為通易暗為明諸生雖少長不齊聰鈍不一隨其才引而進之期底於成不數年間吾庠士子將詵詵興起掇巍科而躋膴仕君寧不快然于心乎寧不副朝廷之所寄乎所謂不相入而卒相誤者視此必報然大慙於君矣鄉之宦友餞其行屬豫以文因書此贈之詠易序豫觀易經六十四卦三百八十四爻程朱大儒解之明矣後來諸儒又復推衍而詳盡之使學者開卷了然於心目之間何其幸哉士之從事於易者可以不費辭說矣若乃有心於求異未必不流於附㑹穿鑿之失明之不得秪取譏耳豫以昏愚之資於程朱諸儒之言多不能領悟豈敢别有發明之志哉間取其一卦一爻之切於已者為詩以詠其義意庶或可以體而行之亦若先儒所謂如已有疑將决於筮而得之者虛心端意推之以事而反之於身以求其所以處此之實則於吉凶消長之理進退存亡之道將無所求而不得矣此豫之志也其餘卦爻之事泛而不切於已者不暇詠焉或曰易學貴盡其道而子遺之無乃不可乎豫曰豫詠易也非解易也解易者欲明易道不可以有遺詠易者欲體易道不可以不切或以為然曰詠之易而體之難不盡其難亦徒然耳豫聞之竦然因録所詠之辭作序存之以為筌蹄云詠毛詩序近看詩經文公集傳諸儒論說解釋義理了然明白一時讀誦自覺通暢過目之後隨已亡失蓋由不能虛心切已深潛諦玩常若匆忙急遽草略看過托其華不茹其實義理之所以然者率不可得是以多閲而好忘因歎氣質昏雜一至於此今者欲矯迫切之弊略效五言律體不恤聲病但欲吟詠詩意徐索義理庶幾可得萬一於身心也輒用録之以驗後日學之進否至若國風中男女淫奔之詞亦不暇詠也贈尚寶卿蹇公序客問士由廕叙科目二者立身之難易豫曰由廕叙者難由科目者易客惑焉且曰由廕叙者前人之澤受之而已夫何難由科目者自微而著百慮乃成夫何易今言若此則難其所易而易其所難也何見之異乎曰子之所言出身之謂也子問二者立身之難易吾以是告之則固難其難而易其易也夫前人起家功名若是其赫也爵祿若是其崇也遭遇若是其榮且幸也為子孫者之才之德雖與之等人猶以為弗及矣而况弗及者乎况違其訓乎所謂實藝懿行人未必信纎瑕微纍十手爭指廕叙之立身如此信乎其難也若夫寒士之初也名在鄉曲若是乎卑序聯親朋若是乎微身處羣衆中若是乎尋且常也入於庠序之間雖無卓異之資稍能倍其功以力其學一旦名在甲科身居顯要鄉人榮之朋友譽之士林屬望之往往名過其實矣科目之立身如此顧不易乎然則忽其難者終於難能知其難斯保其易也尚寶卿蹇君英故少師吏部尚書忠定公之子忠定歷事五朝職列三孤位冠百僚適當天下承平之日享福祿榮名者四十年士之立下風而仰餘光者至今不衰惟君克世其家始用廕補尚寶司丞秩滿以績著進秩卿恂恂儒雅有忠定風其名位功烈駸駸乎嫓美於前所謂知其難而保其易者忠定之澤蓋未艾也君之進秩鄉之仕於朝者相率來請文以贈因述或人問答之語以告之送道士韓守𤣥序或問道士立名之義豫應之曰不知也曰為學之道博而求之然後擇焉一事不知儒者恥之吾子以為何如曰然吾固應之非正對也所以大子之問也夫士者事也從道為事故曰道士其義則是其人則非也曰立名之義既聞命矣敢問其道何如曰子盍觀諸老氏不曰道之為務惟恍惟忽莊氏不曰至道之精窈窈冥冥至道之極昏昏默默韓子所謂道其所道者是已然則儒者之道同乎曰儒者之所謂道猶大路也天下之所共由者也其要不出乎君臣父子夫婦長幼朋友之間其教易知而易行也二子之所謂道則求之恍忽窈冥昏默之中非吾之所道也有韓守𤣥者鄧之簪纓家嘗曰士固各有志耳吾族之仕者已有其人吾又孜孜惟祿是干不幾於壠斷之登乎遂絶意不求仕進入祐德觀寄迹老子法中又曰昌黎吾祖也湘子吾宗也一則為儒一則為仙各造其極不能相通吾則尊祖而敬宗以老為名以儒為行所謂墨名而儒行者吾祖固嘗許之矣豫聆其言而嘉之蓋有托而逃焉者也今年春請牒於禮部而歸一日户侯張君率其鄉人屬文以贈豫儒者徒也老氏之道未之學姑取或人之問者次其說以告方將質之守𤣥試聽所以為業之詳而守𤣥匆匆别去豫亦絆於職務竟弗果云古穰集卷六
