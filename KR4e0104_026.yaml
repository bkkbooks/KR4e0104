body:
  text: 古穰集卷二十六明李賢撰天順日録上留心政務漸覺招權納賂在左右者之非厭其所為不能驅遣嘗於靜中屏其人告賢曰為之奈何賢謂人君之權不可下移果能自覽彼之勢自消惟此為良法其私情既不能行趨附之人漸亦少矣上以為然且曰無此相礙何事不順吾早晨拜天拜祖宗畢視朝既罷進膳後閲奏章易決者即批出有可議送去先生處參決賢曰臣等所見亦有不到處更望陛下再加參詳斟酌穩當施行如此則庶績其凝矣上深以為然且云左右乃曰此等奏章何必一一親覽又曰亦不必送與閣下看又曰差便差到底姦邪不忠如此賢曰惟陛下明見又曰朕負荷天下之重五更二鼓起齋潔具服拜天畢省奏章剖決訖復具服謁奉先殿行禮畢視朝循此定規定時不敢有誤退朝至文華殿或有政事有關大臣者則召而訪問商確復省奏章訖回宫進膳後從容遊息至申初復奏章暇則聽內政至晚而休若母后處每日一朝有命則兩日一朝隆冬盛暑五日一朝今左右乃曰何乃自勞如此賢曰自古賢君修德勤政莫不皆然今陛下敬天敬祖宗孝母后親覽政務則修德勤政之事􅊀矣臣願陛下持此不衰堅如金石可以馴至夫堯舜之道而為堯舜之君矣又曰如此行之亦有何勞不然則便於安逸而怠荒至矣雖悔何追賢曰陛下言及於此社稷蒼生之福也駙馬趙輝貪財好色景泰時只在南京天順改元懇乞來朝上許之既見厚有所獻賄左右求封爵一日上召賢曰趙輝求封如何賢對曰名爵豈臣下可求左右亟欲成之上復召賢議賢謂求則不可與若朝廷念其舊戚自加恩命則可遂從之已而輝以賄賂事發特免其罪封爵竟亦不行先是兵部尚書陳汝言阿順權宦將前時送去雲南兩廣湖貴等處土官盡數取回物論沸騰以為不便下情不能上逹一日賢從容言於上曰彼皆非我族類自古為中國患昔幸送之江南逺方今復取來甚是不便聞此類在彼住定以為樂土多不願來上曰吾亦悔之初取時聽其不願最善若後願去者仍從之賢曰幸甚錦衣衛官校差出提人惟財是圖動以千萬計天下之人被其擾害不可勝言此情不能上達賢一日從容言於上曰今天下百姓頗安惟有一害上曰何害賢曰錦衣官校是也一出於外如狼如虎貪財無厭寧有紀極上即悟曰此輩出外誰不畏懼其害人不言可知今後非大故重事不遣賢頓首曰幸甚鎮守遼東太監范英乞來朝見即以部下親眤都指揮髙飛乞統遼陽兵然已有參將曹廣兵部以為不可上欲允之召賢曰可以飛代廣賢不能止明日復見上曰聞飛非統御才地方所係上曰已發奈何賢曰雖發未行猶可止事未停妥雖行亦止上曰然即召兵部已之時祭風雷山川之神而壇壝在城外上不欲夜出問賢可以勳臣代之否賢曰果有故亦須代但祖訓以為不可上曰今後當自行但夜出至彼無所止宿欲效天地壇為一齋宫如何賢曰可但宜減殺其制上曰既有止宿日未下時至彼祭畢拂曙而回庶免夜間出入賢頓首曰聖慮極是上一日言宦官蔣冕雖曽效勞其實讒亂小人朕初復位時即於太后前言曰皇后無子亦當換朕即斥之方止及立東宫日復曰其母如何朕曰當為皇貴妃乃止一日命冕選宫人充用既選乃曰太后處不必知朕曰不可復於太后處曰上欲隱之及朕白太后方知其離間以此逺絶之賢曰讒説殄行自古帝王所深惡者陛下絶之最是二年冬鷹坊司內臣奏乞出外採獵上不許復固請上曰爾輩欲出獵但不許擾害州縣朕遣人訪之既許其出彼意一時之言未必追訪出至州縣不能獲一禽有司懼其威斂之於民聚鹿獐兔雉而獻之內臣以為獵所獲者遣人領進上果令人密訪某州若干某縣若干皆得其數候其至各杖而黜之冬十月間上一日屏去左右召賢從容言政治得失賢因極言下情之弊時往往差錦衣官校出外提抄罪人然此輩嗜利勢如狼虎所過無虛必飽其欲而後已動以金銀千百計有司不勝其擾略達此情上初不忤且曰今後但不可多差耳不意差者多左右貴近所囑因而譖毁謂賢多言彼有犯者自當其罪上聽之從而見踈賢初亦覺之不知所由已而左右傳説如此賢謂此弊九重之邃何由得聞賢既得親近豈忍隱蔽而不言乎言而得罪亦所甘心越旬日復召賢待之如前蓋聖鑒孔昭也時小人欲求幸進者多不能得謂賢沮之莫不怨恨乘隙排謗時刑部尚書缺人已取山東布政陸瑜即乘此駕説瑜用賄賂求而得之朝士紛然以為瑜至必不用又謂石總兵已達於上謂賢必然見害及瑜至上召賢議之仍以瑜為尚書羣小愕然衆毁方息上初雖聽譛怒言錦衣之弊復密察之皆得其實尤有過於賢所言者召其指揮者戒之曰自後差人敢有似前者必重罪不宥由是收斂不敢縱意求索人或為賢危之曰先生招怨如此奈何賢曰若除此一弊怨亦不辭先是安逺侯栁溥在涼州任邊外搶掠不敢出兵監察御史劉濬奏其畏怯以致折損官軍上怒其所言且曰與敵對壘安能不損使將校聞此言豈不解體欲置之罪賢對曰御史是耳目官所見當言用其是舍其非不宜見譴上乃止終不以為然後因錦衣之怒謂賢護向秀才且曰如某御史多言便以為當説濬後代還竟下獄尋亦悔悟輕其罰降職外補而已太傅安逺侯栁溥以禦邊無功取還既至上召賢曰溥為主將畏縮如此若不懲治何以警衆且有罪不罰人誰畏法即命言官彈劾罷太傅間住越數日溥以馬駝進上怒擲其奏曰溥無狀如此莊涼之人既被敵人搶掠頭畜殆盡復為總兵所索不然從何而得况無功戴罪朝廷復受其所獻可乎遂却之且責其非溥慙懼而退冬十一月聖節及冬至例宴羣臣於奉天殿上顧賢曰節固當宴不惜所費但計牲畜甚衆尚有正旦慶成一嵗四宴朕欲減之如何賢曰大禮之行初不在此陛下減之亦是由是每嵗二宴至於正旦亦或不宴惟慶成一宴嵗不缺云景泰不豫文武羣臣不過俟其不起請上皇復位時武清侯石亨都督張軏掌大兵小人欲圖富貴者以為少保王文于謙與中官王誠等欲取宗室立之之説以激享等借其勢而成之亨等遂以迎駕為功殺王文于謙等并貶謫陳循等數十人亨封忠國公軏封太平侯乃固寵攬權冒濫官爵黷貨無厭方復位之初人心大恱及見亨等所行人皆失望干動天象彗出星變日暈數重數月不息乃羣隂圍蔽太陽之象而亨恬不知戒賄賂公行強預朝政掠美市恩易置文武大臣邊將以彰其威有不出於門下者便欲中傷中外見其勢焰莫不寒心敢怒而不敢言亨姪彪頗驍勇驟升都督性尤貪暴粗立邊功大肆凶惡謀鎮大同邀人奏保朝廷覺其不實使人亷察果皆虛詐置彪於法人心皆快已而罪連亨朝廷初念其功纍宥之未幾家人傳説怨謗有不軌之謀於是置亨於法籍其家受禍甚烈議者以為天道好還如此人見其名位勢力如泰山之安一旦除之曽不少阻蓋幽明寃抑從此伸氣雖朝廷大法有所不免亦其罪惡貫盈人神共怒助力於其間當時若以彪鎮大同誠為可懼且在京武官多出亨門下而亨又握兵權天下精兵無如大同稍有變動內外相應其禍可勝言哉此時雖欲撲滅力不能及今辨之於早除此大害非上之剛明果斷不能如此而亦祖宗在天之靈有以默相之社稷綿逺端兆於此天順四年天下諸司官吏朝覲至京上召賢謂曰朝覲之弊不可不革賢曰誠如聖慮即出榜禁約不許與京官交通餽送土物亦不許下人挾讎告害由是肅然不犯上召賢謂曰黜陟之典亦當舉行賢曰此祖宗舊制即勑吏部都察院退不職者數百人旌其才行超卓政績顯著布政以下賈銓等十人賜以衣服楮幣禮部筵宴命太監牛玉吏部尚書王翺及豫三人侍宴以勵其衆輿論歡然隨於其中召布政蕭烜為禮部尚書賈銓為副都御史先時吏部舉銓可大用以其名重欲任以戶部尚書上問賢以為何如賢對曰聞其名則可未見其人及銓至京命賢觀之貌不稱名乃别求之賢以副都御史年富執法不撓可居此職上亦以為然不意左右不恱富者甚衆謂賢曰上不喜此人不可再舉賢以為實然一日上召賢謂曰户部之缺果誰當之恐非年富不可賢曰此人不恱者衆愈見其賢上曰富之執法正宜居此國計所關豈顧私情不恱者遂召富為戶部尚書士林咸以為宜內府庫官奏金嵗用計之不數年而盡於是勑户部議欲以蘇松嘉嵗折糧銀折金五萬兩上召賢謂曰國家錢糧出在東南而金非其所産今欲折金價必湧貴賢對曰誠如聖慮因論雲南各處土人有嵗辦金銀遂令以銀折金數千兩待十年後不乏再議而行會昌侯孫繼宗因冒報迎駕功升官者俱自首其子弟家人冒報者亦二十餘人具奏辭免上召賢謂曰此事何以處之賢對曰以正法論之盡當革去但念國戚於親子弟存之革其家人冒升者庶全恩義上曰然但此事若白於太后必盡革去雖侯爵未可保也賢對曰惟陛下裁之上不失母后之心幸甚上曰須如先生之言然後允當卒從之上天資英武益明習政務天下奏牘一一親覽或有毫末差失便能察見凡有發下裁斷賢等一出至公上知其無私委任益隆凡事不肯輕易即出必召問其可否或遣中官來問務得其當然後行是以政事無大差失法度振舉人心警懼平昔縱放者莫不收斂其中官惟一二耆舊特加重焉自餘雖一時寵眷至優一旦有失即置於法略不假借用是不敢肆然法司奏石亨等冒報升官者俱合查究上召賢問曰此事可否恐驚動人心賢對曰若查究則不可但此等冒升職者自不能安欲自首猶豫不決若朝廷許令自首免罪事方妥帖上曰然遂行之於是冒升職者四千人盡首改正人心皆快或有議欲追其支過俸糧者賢曰不可戶部奏請得旨乃免人心皆安石亨既置於法平日出入門下者無不驚懼一日賢言於上曰元惡既除宜戒諭羣臣且安人心不究其餘遂行之中外釋然無不感戴朝廷之恩者初石彪事發言官密奏明日大班劾之即有漏泄於彪者上召賢謂曰羣臣黨惡如此不可不戒賢對曰誠如旨意乃勑諭百官今後文武大臣無故不許往來近侍官不許造大臣私宅錦衣衛官亦然於是莫不肅靜天下聞之亦皆竦息交通之弊遂止石亨下獄死法司請瘞其尸上召賢曰如何賢對曰如此行之未為盡善法司宜執法論罪欲梟首示衆朝廷不從特全其首領尤見恩義兩存上曰然即從之一日從容言及迎駕奪門之功賢曰迎駕則可奪門二字豈可示後况景泰不諱陛下宜復位天命人心無有不順文武羣臣誰不願請何必奪門且內府之門豈可奪奪之一字尤非順幸賴陛下洪福得成其事假使景泰左右先知此事亨輩何足惜不審置陛下於何地上曰然彼時何以自解方悟此輩非為社稷計不過貪圖富貴而已賢曰臣彼時極知此舉之非亦有邀臣與其謀者臣不從以臣之愚見若景泰果不起率文武羣臣請出陛下復位安用如此擾攘雖欲升賞以誰為功老成耆舊依然在職豈有毁戮降黜之事致干天象而羣小之計無所施矣招權納賂何由而得忠良之士亦無排擠之患國家太平氣象豈不由此而盛易曰開國承家小人勿用言其必亂邦也於此驗之為尤信上曰然天順初以迎駕為功者大開賄賂之門在朝文武之士靡然從風奔走其門惟恐或後以財寶先投者先得美職無復論才之賢否風俗大壞不可勝言上亦極知其非但復位之初俯而從之明年稍自振作十從其四五又數月十從其二三又明年凡百自斷其賄賂之門徒開而已初時有美要職事一缺謀之者如蠅聚腥爭欲得之自後缺雖多而謀之者無一人蓋用人之柄在上權貴不與焉雖欲賄賂何所投乎向日奔競之風一變而為恬退之習可見士風之振否顧上之人力行何如耳天下氣候關於朝廷驗之果然景泰時不孝於親不敬其兄不睦其室而朝廷之上怨恨憂鬱之氣充滿是以六七年間水旱災傷遍天下天變於上氣乖於下一年甚於一年自天順初上復位之後敬天尊祖孝親睦族宫室之中有恩以相愛有禮以相接嵗時調和年榖屢豐海內之民無飢寒流離之苦由是觀之朝廷之氣和天下亦和朝廷之氣乖天下亦乖中庸所謂致中和天地位焉萬物育焉聖賢之言信不誣矣耿九疇軒輗皆廉介之士操履素定天下信之天順初首用耿為都御史軒為刑部尚書但二人之才不異於衆特取其行之髙於人洎供職未有建明耿欲糾石亨之罪反為所排出為江西布政尋轉四川上知其為人清正但為亨輩所嫉一日泛論人才念及九疇非其罪賢因曰此人操行誠不易得遂有召用意賢竊慮彼時臺憲本無罪被石亨所排而黜之人皆惜朝政之失幸而召用以見朝廷悟亨之非所係不小未幾因禮部缺人召至京師上憐其衰命為南京刑部尚書且曰遂其優間可也初軒在刑部數月因疾作懇乞致仕還家後每念輗之為人亦不易得賢因曰二人素行海內共知一日南京總督糧儲缺人理之論及往日能理此事者莫如輗遂召為左都御史委任之未幾九疇卒上嗟悼良久曰可惜此老欲其優間而遽亡邪尋以左都御史蕭維禎為南京刑部尚書上因説校尉行事者亦多枉人且如行臨川王與四尼姑通及鎮撫司指揮門逹問之實無此情又聞行事者法司依其所行不敢辨雖知其枉付之嘆息惟門達能辨之賢因言往時行事者挾仇害人涉虛者治以重罪上曰若如此又慮其不肯用心訪察今後但令鎮撫辨其枉者可也古穰集卷二十六
