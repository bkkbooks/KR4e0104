body:
  text: 古穰集巻二十九明李賢撰雜録李時勉在翰林直言進諫仁廟怒命力士打十數𤓰不死洎宣廟即位察其忠復召入翰林拜學士自後不聞直言矣正統時為國子祭酒倣胡安定教條隨其器而造就之諸生勃然興起人材遂盛於一時待諸生恩義兼盡有病者委醫調治死者助其棺衾為文以祭之後王振怒其持儒禮構以罪枷於監門諸生不忍願代者甚衆獲免未幾乞歸士林髙之亦可謂明哲保身矣錦衣指揮馬順正統初欲作威被御史訟之洎王振擅權順乃媚附之振以為爪牙翰林侍講劉球進言權不可下移振怒欲置之法順阿之適有翰林官董璘亦進言願為太常卿以事神順即依振意苦拷令招球畫此謀當朝捽去支解其體由是人益憚順自府部臺憲而下莫敢誰何聽其指揮奔競之徒請託者滿門賄賂苞苴殆無虛日振益寵愛之洎振土木之敗衆情切齒劾其擅權悞國狀順猶回䕶當闕揚言衆怒不可忍直言捽之亂毆至死人情始舒順體肥暴其尸於長安門外恨者猶毆之不釋衆欲没其産為中官沮之可為附權者之戒刑部尚書魏源為人倜儻豪邁不羣嘗為河南布政臨事直前當之民感其惠凡出廵者亦讓之在刑部不刻其待僚屬也所見或不合即盛怒若不可解既過或别事相合即嬉笑與語若未嘗怒者僚屬以此敬之但為御史時被同出廵者搜得私物收繫於京後數十年其人以别罪謫配又以罪解部猶報怨决而辱之清議以此少之然亦名卿材大夫之流也植物亦有知覺試觀有蔓者必附物而纒繞之物有逺近則捨逺而就近物或逺者必斜長而附之若有見焉然則人豈有無知覺邪人物各有所能而不能相通但人為最靈其所能者非物之比然物之所能者人亦不能為如蜘蛛吐絲結網人豈能為其為網也布置不紊今日拂去明日又成其速如此且以兩樹並列枝幹參差亦能髙牽於兩樹梢端而結網於中間甚可怪也以此推之物物皆有能山川之生俱有理予嘗遍歴蜀川登髙而望萬山雜亂誠不可辯若沿川而行亦如樹之枝幹然各有條理以此溪澗之水未嘗有壅阻而不流者且岷江自岷而出以至於海數千里之逺若非山川自有條理豈能通達大禹疏鑿不過因其自然之勢而去其兩傍石之阻者予甞經過三峽見兩山壁立萬仭而中則通焉此造化之妙有非人力所能為也且衆水之流俱來附合初無蔽障而不附者以此見得有理存焉讀書有三到眼到口到心到大抵以心到為要心茍到矣眼口未有不到者若眼口到而心不到所謂視而不見聽而不聞食而不知其味者也予嘗讀書心忽思念他事眼雖㸔書口雖念書只茫然過去却收心復㸔如未嘗見者孟子謂學問之道無他求其放心而已即此可驗過則相規善則相勉惟朋友能然今之交友盡此道者絶少士習所以卑陋也且人之不幸莫大乎不聞過若如子路聞過而喜人猶肯告若惡聞者如諱疾忌醫人誰肯告而况在髙位者乎都御史洪英福建人中省元㑹元為文選主事辭藻新奇遷考功郎中士林重之尋陞山東左布政歴轉都臺未曽至京中官不識其人洎徃浙江考察官貟被黜者妄訴之且加謗毁朝廷不及察而罷之令致仕二三大臣雖知其故莫能扶持朝士皆後進不知其為人既去方惜之真儒雅君子動履似迂而處世若泛然者以此見笑於譎智云刑部尚書王質始由教官薦授御史歴陞參政布政侍郎俱纔一考或未及者在蜀以亷稱出廵惟蔬食而已蜀人呼為王青菜在山東有惠及民召拜地官輿論懽然及遷刑部僚屬不樂言行或過少變於前未幾以失囚左遷其學甚博為文或滯論者謂如蜂採花不能釀成蜜也吏部尚書魏驥浙人初為松江教官汲汲成就人材諸生在學居者候一更盡必攜茶徃視之見書聲者供茶一甌而反至三更將盡必攜粥以隨尚有誦書者供粥一碗且嘉其勤如此者亦不頻數間旬一行士子咸感激後出其門者顯宦甚盛為考功貟外郎有聲遷太常少卿拜吏部侍郎尋至太宰篤尚斯文性好吟詠臞然若不勝衣中官王振亦重之呼為先生贄見惟帕一方振亦不較以引年致仕士林嘉之陳鎰為人忠厚端謹為都御史鎮陜西民賴以安者十餘年見其美鬚髯呼為鬍子爺爺每還朝必遮道送之不能捨及赴鎮必歡忻鼓舞迎之數程或乆旱至必得雨饑必賑濟民益戴之但其心仁恕流為私恩同列少之亦不與較居臺端而激揚之志緩不失為長者以疾致仕識者羡之學者先要去一矜字能去者百無二三大抵天資美者自然謙下不自誇大不然鮮有不矜者靜觀接談者必言已所行事如何徃徃言其所行之美事而過惡之事則不肯言與古之君子善則稱人過則稱已者異矣物我無間之心學者誠不能存亦嘗體驗自已每有家人買物買之多者則喜或有虧者則怒是知有已而不知有人也雖欲勉强平心云不要虧人未嘗嫌其多也此等克己工夫誠欠若更不勇力行之望入聖賢之域難矣嘗於靜時體驗自己所思偏要思在富貴利達上去情意樂然有時覺得所思是人欲轉思向道德上去終是勉强以此覺得遏人欲存天理之功甚難且所思不正便能知之即奮然欲止之只在心上驅遣不去急引正道思之亦不能奪以此覺得素無存養之功大抵中人以下之資皆如是也古之豪傑之士所見未嘗不同諸葛武侯曰臣鞠躬盡力死而後已至於成敗利鈍非臣之明所能逆覩也范文正公曰為之自我者當如是其成與否有不在我者雖聖賢不能必韓魏公曰人臣當盡力事君死生以之至於成敗天也豈可豫憂其不濟遂輟不為哉李忠定公曰吾知事君之道不可則全進退之節禍患非所惜也由是觀之則四公之心合而為一者也奈何今之事君者惟顧利害事有當為者稍涉於害即止而不為自以為得計或有不宜為者有利存焉則勇於必為由無四公之見故也嗟夫若四公者真所謂豪傑之士雖無文王猶興者也霸州守張需長於治民先佐鄭州有聲渠有淤者廢水田數十年守相繼者莫能疏需甫至守言及此憚於動衆需徃相之曰若得人若干三日可畢守怪以為妄需乃聚人得其數各帯器物分量尺數爭効其力三日遂畢守徃視之大驚以為有神助洎守霸見其民游食者多每里置一簿列其户每户各報男女大小口數𣲖其合種粟麥桑棗紡績之具鷄豚之數徧曉示之暇則下鄉至其戸簿驗之缺者罰之於是民皆勤力無由墯者不二年俱有恒産生理日滋葢以生道使人其易如此後以覲禮至京遂受旌異之典尋畿内蝗作捕之有法吏部侍郎魏公廵至其郡異之下其法於諸郡人皆便之有牧馬者擾其民需笞之領牧者譛於宦官王振捕之下獄棰楚幾至於死竟謫戍邊城人咸惜之而莫能救也兵部尚書鄺埜初任陜西臬司副使有聲其父家教至嚴嘗以俸易一紅褐寄之父大怒曰此子不才如此汝掌一方刑名不能洗寃澤物以安其民乃索此不義之物汙我即封還以書責之埜欲見其父不可得以父為教職居閑因秋闈聘典文衡者謀於僚友徃請其父父大怒曰此子無知汝居憲司吾為考官何以防範且將遺誚於人矣又以書罵之埜一念之孝為此舉不恤其他迎書跪誦泣受其教而已後為府尹益勵其操聲價愈髙召為兵部侍郎端謹小心行事縝密没於土木士林惜之清議無所貶云予榜狀元曹鼐為人疏通俊爽初為校官不樂願得繁劇一職改泰和典史益進學不倦復修舉子業遂登進士第西楊先生嘉其志薦入經筵復入閣與政士林榮之自東楊没後議大事多决於鼐明敏之才頗相類焉雖王振恣横亦曲加禮敬没於土木之難劉子欽江西人為舉子業最工由省元至㑹元將殿試解縉在翰林㑹間稱之曰狀元屬子矣子欽自負畧不遜避縉少之密以題意示曽棨明日廷對棨䇿最詳殆及萬言遂為狀元至十人之後方及子欽壓其負也後子欽終於敎職名位竟不顯云曹端為教職留心窮理之學在霍庠造就士子務躬行實踐弟子出門者亦循循雅飭遵其敎不忍違後調蒲庠霍庠士子爭之不釋竟終於霍一郡人罷市巷哭童子亦悲泣座下足著兩磚處皆穿靜專之功多方岳重職不敢以屬禮待至其郡必敬謁之凡考校諸庠生必請端主其去取事畢而還父好善信佛洎聞端言聖賢之道即從之於是作夜行燭一書與父誦之所著四書詳說太極圖解詩文數十巻傳於世襄城伯李隆丰資凝重器宇宏逺守南京數十年鎮之以靜最識大體富貴尊嚴擬於王者雅重斯文接儒者之禮尤恭以此上下官僚無不敬畏若祭酒陳敬宗先生造宅務欵留之不醉無歸士林嘉之仰慕丰采三楊學士極重愛之正統中以得人心見疑召來京師始近聲妓為自安計數年終於第自後代者數易其人終莫能繼都御史軒輗天性廉介初為進士徃淮上催粮時冬寒舟行忽落水即救出衣盡濕得一綿被裹之不能出有司急為製衣一襲却之不用只待舊衣之乾後為御史獨振氷蘗之聲用當道者薦為浙江按察使前使林實在任富貴擬於王者服食器用極其精巧洎輗在任一切供給皆罷之俸資之外一毫不取自著一青布袍無間於四時破則補之蔬食不厭午則燒餅一枚而已與僚屬約三日各以廩米時值買肉一斤口數多者亦如此皆不能堪有減回故鄉者或故舊幹經㑹晤者留供一飯至厚者殺一鷄僚屬見之驚異此舉不易得也自餘盤肉一味而已忽聞親喪明日就行雖僚屬尚有未知者及奪情復任頗以廉自負又嗜酒或公筵或僚友相燕樂必至醉弄酒詈人士林以此少之及居臺憲總理南京粮儲清操愈堅張都憲設席㑹諸僚獨不赴既而以卓食饋之亦不納人皆以為僻蓋古者狷介之流雖或過中有激貪風嗟夫今之仕途中若此真鳥中之孤鳳也處士吳夢字與弼撫州人司業溥之子讀書窮理累辟不就不教人舉業弟子從遊者講道而已父在京時命還鄉畢姻而來及至親迎後不行合􅈟之禮另舟赴京拜父母畢始入室祭酒胡儼父執也自京還家夢徃謁之至大門四拜而退明日又造其宅方請見曰昨日已行拜禮今惟長揖問其故曰先生父執也若面拜恐勞尊凡行類此有來從學者不納贄見之禮或極其誠敬姑收之不動後或有過即以所收者還之辭而不教非其力不食一介不以取於人或親農事弟子亦隨而助其力多不能堪躬行實踐鄉人化之徃時閩中盜起四方摇動聞撫之貧者亦欲乘機劫富家夢早覺之既曉其富家曰宜散積粮於是皆從之一方遂安能自重不妄交人師道尊嚴好書字奇古自成一家不立文字暇則詠物適興胷襟髙邁凡經史子集天文兵法隂陽易卜無不曉悉楊溥先生深重之兩薦不起嘗曰宦官釋氏不除而欲天下治難矣必除之吾可出人皆笑其迂曾見詠桃一詩云靈臺清曉玉無瑕獨立東風玩物華春氣夜來深幾許小桃又放兩三花有吾與㸃也氣象方岳名公皆重其為人分巡至多造其宅運使韓偉温州人魁梧端重為御史有聲獲妖盗有功酬以男婦數口出巡河南鎮靜有體一方仰頼闔省上下咸謂前出巡者十數輩或過於刻或猛而嚴或貪而懦或矜而昩或佻而輕或奸而譎或愚而暗未有如偉者自後繼者十數輩亦莫能及後遷運使於河東清操甚著多所建明創立學宫得師儒擇其屬户子弟之秀者教之繼登科第人材遂興天性至孝以母垂白在堂屢乞致仕兼以輭疾兩足不能行朝廷亦不釋終於任所士林惜其位不滿德云予徃蜀中考官恒以此心對天地鬼神平心應物以鑑自比而物形莫遁妍醜自分亦必詢訪於前方能如此自謂黜退者庻幾不枉或其過惡未甚但量輕重决責懲戒俾之改過自新中間或有黜未盡者自分寧失於寛况世無全才有取其所長而棄其所短者奈何小人猶有不足者妄加是非大抵去人之爵不能無怨故也以此觀之當權無謗者甚難雖曰所行無愧於心而情不能無愠也第予於彼秋毫無犯不但蜀中士民知之其山川鬼神莫不鑒臨向使稍渉於私何以自解及觀㝠行妄作之人飽載而還者反無是非之惱又不知其何如也定西侯蔣貴起自行伍一卒之微以功歴陞至此其為將也能與士卒同甘苦凡出境折衝禦侮衣糧器械不役一人親帯而行與兵士無異及臨戰陣必當先直衝敵皆披靡子弟及士卒如蟻追隨以死向敵用是徃徃取勝其勝也未嘗不親手撃殺數十人所恨者不識字耳以此短於謀畧必得軍師而後成功然天性樸實能忘已之勢聽人指揮畧不較也不止於為勇將而已威振邊庭西羌北敵莫不畏仰而麓川之績亦偉叅之名將抑其次也户部主事王良機謀過人有御衆之才文廟知名委督口外粮餉威聲大振凡軍衞有司無不畏服一出境邊衞自指揮以下數百里來迎為前驅負弩邊將亦敬憚之英國公莫有抗禮者出師在邊亦屈勢相接後雖有尚書侍郎繼理其事者名位徒髙人不如此畏服也後與主事劉良遘怨相訟卒白其枉惜乎位止於斯以老疾致仕蓋奇特豪邁之士云昌平侯楊洪起行伍生長在邊有機變用詭道累立邊功歴陞將帥能用奇兵如遇外敵兵必擣其虛或出其不意善於劫營敵人畏之呼為楊王然自宣德以來敵人與中國和好每嵗進馬貨賣薄來厚徃未嘗大舉入邊或有擾邊者不過朶頥之類或獵或掠多不過百餘騎少或十數騎而已洪以此得立邊功大抵用譎道取之洎正統十四年敵将額森大舉入邊洪在宣府驚惶無措閉門不出若􅀢特之圍洪能以後衝之必無是敗及敵人得上皇至城下呼之亦不出救視君父之難畧不為急所存可知矣後至京師適邊烽告警之際人心驚疑念以邊之舊將遂進侯爵用之終不能挫敵鋒尋以疾卒然在邊校之諸將紀律頗嚴士卒用命為一時之巨擘焉户部尚書王佐山東人儀表凝重器宇深厚初為給事中奏對宏亮擢户部侍郎得大臣體立心忠恕有愛民之意士林重之與人相接開心見誠坦然無疑光明正大雖政務叢集未嘗廢學恒以不若人為恥書義有不通者必請教於閣下先生後卒於土黙特之難蓋有篤實君子之風人咸惜之户部侍郎焦宏初父為萍鄉丞嘗以出身不由科目為恨一日與僚友宴樂邑之宦遊歸老者亦在論及出身髙下其父大慙而歸謂其子宏輩曰汝兄弟當努力務學求科目出身為汝父増氣宏以此奮發遂登進士鄉人榮之宏為御史出色見重於閣老薦副臬司尋遷方伯江西人畏而愛之及在户部聲名益著為人爽愷變通和氣溢於接談之際尤篤厚於鄉人寛亦繼為御史宏子鈍又中進士任兵部主事論吾郡今世門地閥閱無出其右也先儒謂心有主則實外患不能入心有主則虛外邪不能入又謂有主於中謂實外邪不入謂虛若以愚見有主則實外邪不能入有主則虛不可言外邪不能入且凡物安有虛而不能入者如人之身體虛弱者邪氣便能侵入蓋有主則虛以虛明而言於物無不照耳若伊川之意謂心體虛明主敬而言方可說外邪不能入也吏部郎中常中孚出身甚㣲初為巡檢得異術能煑白金或寳玉之器有損者能補之如舊文廟知之召見試其術果然乃授是職每用其術必引入内廷為之雖中官至狎者亦不得造其處賞賚頗多已而闕古穰集巻二十九
