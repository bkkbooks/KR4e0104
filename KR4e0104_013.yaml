body:
  text: 古穰集卷十三明李賢撰神道碑銘通議大夫禮部左侍郎兼翰林院學士薛公神道碑銘吾道正脉實由近世周程張朱有以倡明之也至我太宗文皇帝乃始表章其言行天下由是天下士習一歸於正嗚呼盛哉然今之君子能欣慕而篤信之則河東薛公其人也公諱瑄字德溫世為山西河津人其先自奚仲封薛侯居河東子孫遂以為氏曽祖常祖仲義皆通經教授鄉里父貞洪武初領鄉薦為真定元氏教諭仲義貞俱以公貴贈通議大夫大理寺卿祖母母皆淑人初母齊淑人夢一紫衣人謁見已而生公祖以生時卜之吉曰此子必大吾門童時教之詩書輒成誦日記千百言貞為滎陽教諭公侍行時年十二以所作詩賦呈監司監司竒之既而聞魏范二老先生深於理學乃禮延於家供子弟職日與講習周程張朱性理諸書久之嘆曰此道學正脉也遂焚其所作詩賦專心於是至忘寢食永樂已亥貞改河南鄢陵時教官考績以科貢多寡為黜陟貞大以為憂公乃補鄢陵諸生遂中河南鄉試第一明年登進士第以省親西歸是歲秋貞有疾公日夜不離左右及居喪一遵古禮服闋願就教職會宣廟思得良憲臣選擢雲南道監察御史出監湖廣銀場公聞前監者多致富至則黜貪墨正風俗手録性理大全一書潛心誦讀每至夜分方寢或思有所得即起燃燭記之或通宵不寢味而樂之不知手舞足蹈也丁繼母憂服闋㑹有言學政不舉者吏部尚書郭璡首薦公提調山東學校公欣然就之曰此吾事也每臨諸生必親為講解不事夏楚皆呼之曰薛夫子未幾用楊文貞公薦召為大理寺右少卿明日轉左少卿公作大理針以自警時中官王振權傾一時或欲邀公拜其門公正色曰安有受爵公朝拜官私門邪已而遇諸途衆行跪禮公獨不屈振由是不悅㑹有獄夫實病死三年其妾私於人欲出嫁妻弗聽遂誣妻魘魅夫死公為辨其寃都御史王文諂事振乃誣公出入人罪繫獄當死人皆危之公怡然曰辨寃獲咎死何愧焉手持周易誦讀不輟至覆奏將決大臣有申救之者得免官放歸田里公居家六年閉門不出留心理學造詣益深正統己已以吏科給事中程信論薦起公為大理寺丞時敵騎薄都城公分守北門都帥初疑其迂及接言論遂訪䇿焉公曰以天時人事驗之此敵必宵遁既而果然貴州苗寇猖獗朝廷命將往征之公督軍餉事竣而還景泰初懇乞致仕學士江淵上疏留之明年升南京大理寺卿有富豪殘虐人命者獄久不決執法者欲貸之公曰死者何辜竟抵於法明斷之譽播於民謡刑部尚書楊寧都御史張純初以材力相尚及與公同事嘆曰如薛公當於古人中求之中官金英奉使道出南京公卿俱餞於江上公獨不往英至京言於衆曰南京好官惟薛卿耳壬申秋召至京復為大理寺卿有草場火朝廷欲置典守者罪公力辨之獲免蘇松有飢民乞粟富家吝而不與遂火其屋蹈海以避罪時遣太子太保王文往廉之文以謀叛籍其家衆皆畏勢莫敢發公抗章辨之文亦悟其非獲免者甚衆是歲公年近七十復乞致仕不允天順改元英廟復位素知公學行遷禮部右侍即兼翰林院學士召入內閣知制誥尋主考㑹試事竣轉左侍郎居數月公見將臣石亨等竊弄威權嘆曰君子見幾而作豈俟終日乎遂引疾懇乞致仕居家八年四方學者從之甚衆公惓惓以復性為教嘗曰此程朱喫緊為人處而歐陽公言性非所先誤矣又曰學者讀書窮理須實見得然後驗於身心體而行之不然無異於買櫝而還珠也忽遘疾彌留衣冠危坐於正寢精神不亂悠然而逝時風雷大作有白氣上升天順甲申六月十五日也距生洪武乙巳八月十日享年七十有三配寧氏贈淑人生子四人長曰溥次曰淳次曰濬邑庠生早卒次曰治亦卒孫男四人禥登天順甲申進士第孫女五人嗚呼公之學踐履篤實之學也嘗曰格物只是格箇性吾於日用之間必體察之何事是仁之發見何事是義之發見至於萬物各具一理萬物同出一原是其貫通處也每以聖賢為師隨其所寓圖書針規一言一動於理稍有違失便覺身心不安凡辭受取與必揆諸義一毫不茍晚年玩心高明默契其妙有不言而悟者矣其出處大節光明峻潔於富貴利達泊如也接人無大小衆寡一以誠待之教之有序而其言平易簡切不為穿鑿竒僻之說為文必根於理辭㫖條暢所著有讀書録行於世河汾集藏於家嗚呼宣德甲寅秋豫始識公於河津知其造詣之深自後仕途南北弗獲相從有時同朝亦各守職務或有所疑但手書質問而己天順初公入內閣豫亦濫與其間曽未數月公致仕去矣有道者之難遇也如此公之沒也四方之士聞之莫不嘆悼朝廷得訃遣官諭祭其家復令有司營葬事禥乃以公門人國子監丞閻禹錫之狀來請銘其神道之碑嗚呼豫豈足以知公也哉然義有不可辭者銘曰昔有王氏鳴道河汾流風餘韻以啓後聞相彼薛公不以自足濂洛關閩意向尤篤學優而仕實始為親仕日以進學日以新學匪辭華實欲聞道身體力行遂以深造惟公之心勝已之私惟公之迹不愠不知富不幸求難不茍免隨寓而安名亦丕顯成彼後學篤是先賢在古為難公無間然嗟今之人無公所好公今己矣誰臻其奧我銘其隧以詔鄉人千載而下庶得其真資德大夫正治上卿南京户部尚書張公神道碑銘公諱鳳字子儀先世滄州鹽山人後徙真定之安平曽祖才興祖德林俱潛德弗耀考益故為禮科給事中與德林俱用公貴贈資政大夫户部尚書祖母王氏母李氏俱贈夫人初李氏有娠一夕夢大星出懷中覺而生公人以為異三歲取父書作讀誦狀識者知有竒志鄰有病召巫治之公往觀竟不驗扣其神曰卿相在此公去神乃降衆驚異曰此子殆不凡者稍長從太常少卿鄭雍言授春秋經每有講說即能問難頴悟異常已而母病躬侍湯藥衣不解帶母卒居喪盡哀人服其孝永樂己丑北敵侵邊文廟親征以給事君贊理戎務因主將失利沒於陳公時年十四大父母垂白在堂家道蕭然公哀毁踰禮與兄奉祖還家竭力事養得其歡心久之有司聞公孝友選為邑庠生公益奮力於學雖祁寒暑雨不輟遂領鄉薦入太學時鴻臚序班缺員例選北人為之吏部尚書蹇忠定公義見公異之曰是生不可就此職也宣德丁未登進士第癸丑春擢刑部江西司主事時江西豪民為逆者千餘人繫獄未決付公理之公一訊皆得其情獄上獲生者數百人能譽大振大司寇嘉公之才特令總闔部章奏及録在京逮繫者正統戊午冬特升本部右侍郎由主事進侍郎者自公以前未有也己未夏以京城草場出納多弊敕公巡督之辛酉春改南京户部右侍郎公上疏曰南京根本重地糧不可不素蓄宜每歲分米二百萬石遂定為令往年南京芻粟專委之憲臣至是勑公兼督蓋以出納嚴慎故也時人以公執法呼為張板朝廷亦知其名己巳春賜璽書嘉勞有清勤公正之褒賚以白金文綺景泰壬申春升本部左侍郎未幾進尚書明年廷議謂公素有譽望乃轉兵部尚書參贊守備機務又明年召為户部尚書時邊務方殷錢榖之費動以萬計多以不給為憂公至處之裕然國用不勞而足天順改元皇上復位思南京舊都得舊人庶可以厭衆心仍命公為南京户部尚書兼督糧儲辛巳春以考績赴闕上慰勞有加公以足疾懇辭休致不允舟還疾作未抵任而卒是歲三月十八日也距生洪武丙子九月四日享年六十有六公為人正直而心地平易遇事敢為人不敢以私干之尤篤於友義同門蹇於仕途者必極力助之故人李恂為太常贊禮郎母老子幼夫婦相繼而卒公惻然遂養其母以終聘其女為子婦教養其子至於成立又急於濟人嘗渡江偶遇一舟覆於急流公即捐白金購人救之舟中之人賴以全活性尤真率客至即出酒殽對酌為樂不計豐約與之接者未嘗不稱為朴實君子人也歷官幾四十年勤慎如一日曽無過舉卒之日有司以訃聞上深悼之遣官諭祭賜以賻儀復令有司為治墳墓給官舟歸葬於鄉公配李氏纍封夫人子男三人長曰愷次曰悌次曰忭女二人長適王玘次幼在室孫男六人孫女二人銘曰侃侃張公生也不偶大器宏才童時已負乃承家學乃掇巍科歷躋膴仕不偏以頗不偏以頗時呼為板愈見其操孰不嚴憚允顯天性孝友諄諄濟物之心一何孔仁既參兵戎復總餉饋茂績宏昭光我士類稽其終始惟忠惟勤懿此言行蔚為名臣褒典式承存沒無間嗚呼張公全歸於善資善大夫南京刑部尚書耿公神道碑銘今之公卿大夫功業文章表著天下者甚盛如司寇耿公所存所行尤不易得蓋清潔之志如金石之不可奪也嗚呼難哉公諱九疇字禹範別號恆菴初母妊公時忽夢神告曰吾自冠山來當大汝門覺而公生自幼頴敏讀書必究義理弱冠為邑庠生登永樂甲辰進士第宣德辛亥擢禮科給事中凡事務存大體有清譽正統改元之明年大臣言兩淮鹺政之弊必得重名檢者理之於是推公為鹽運司同知公巡行諸鹽場盡革宿弊公私便之復條奏數事曰均搭𣲖節樣鹽二事遂著為令癸亥丁母太淑人憂鹽場數千人詣闕留公從之乃進升鹽運使公益循法責效廉名大著嘗坐水傍一童子曰水清不如使君之清公因號恆菴以自勵尋以詿誤逮至京事白朝廷知公廉正特升刑部右侍郎屢與同官辨疑獄不為勢利所怵有婦誣其夫衆欲斷異公曰不可杖其婦而歸之人服其當未幾有邊警乘輿出巡以公留守京師既而鳳陽歲凶盜起復敕公往綏之公乃留英武飛熊諸衛軍耕守以杜奸寇覬覦之心招徠流民七萬餘户一方晏然兩淮鹺政自公去任多廢至是復屬公兼理之於是奏罷易米法申飭條戒有加於舊尋復勑公巡撫江北諸郡公益盡心宣布德意凡可以惠民者無不極力為之景泰初敕公審録諸郡大辟囚公曰洗寃澤物吾所願也凡以情得原者二十六人有來婦人何菊家者既去而死其家訟菊與弟殺之菊誣服公驗其無實而釋之後知殺者果仇人也人服其明代還適議關中重地守臣缺人僉謂非公不可特勑公以往既至革弊黜貪威望愈振初六部卿佐使外文移不得徑下按察司以故偃蹇不受約公首奏下之邊將請於臨洮諸衛添取防兵朝廷下公議公上疏言邊城士卒不為少矣在為將者馭之何如耳果能嚴紀律精練習勤撫恤絶侵漁以養其鋭氣則一可當百加以賞罰明信則人人自奮而悍敵不足慮矣不然添兵何益徒冗食耳遂從公議初邊民春夏就田耕作秋冬移入公疏言邊將所以禦敵而衛民也今民自避兵而失恆産將何為哉乞委邊將以止移入不能衛者罪之民皆稱便朝廷以公兼理戎務宜居憲職遂轉都察院右副都御史仍鎮其地公聞朝廷下有司買羊角以充燈費上疏曰昔宋神宗買浙燈而蘇軾輒諫止之此忠臣愛君之至情也今買羊角製燈無乃類是書曰不矜細行終纍大德遂止繼以災異下詔求直言公復上疏曰天地間有必然之理有或然之數理可盡而數不可泥臣願陛下延儒碩以廣聰明公賞罰以別忠邪擇守令以惠黎庶簡將帥以固邊疆此必然之理不可忽也優詔答之天順改元皇上復位思公可大用顧侍臣曰耿九疇廉正人也即召為右都御史士類皆賀臺憲得人時子裕任給事中公言父子同在要地非宜遂改裕為翰林檢討公自幸遭遇思圖報稱首進五事曰崇廉耻以勵士風清刑獄以召和氣勸農桑以厚民生節糧賞以簡軍士任臺諫以振綱紀上皆嘉納之因敕戒風憲公進御史告曰朝廷望治於憲職至矣各宜澡滌以副任使不然吾不汝貸衆皆悚息風紀為之肅清時邊情不寧將臣怠命公將率諸道御史劾之事泄反為所訴置公等於理公引咎自當朝廷察非公罪出為江西古布政使尋升四川左布政使明年召為南京刑部尚書先在職者流於諧俗有乖清議公至肅然自歸於正天順四年八月二十九日忽遘疾不語移時而逝距生洪武二十九年四月十三日享年六十有五訃聞上深哀悼遣官諭祭於其家復令有司為營葬事士大夫識與不識莫不惜之公天性孝友親終追思不忘遇亡日悲痛如初喪時事三兄恭而盡禮嘗修耿氏家乘以昭先德平生慕司馬溫公為人敦尚古道耻同流俗奉身節儉無他嗜好公退居家惟焚香讀書而己交人不泛關節不至其門雖權貴亦敬憚不敢犯凡論事是非確然不撓未嘗詭隨於邪正之辨尤嚴坐是與衆寡合纍遭讒困賴上知其所存卒保全之公先世束鹿人有諱昉者仕金為平定軍指揮使因家平定州有諱守直者務儒業舉進士任總帥府教授高祖復仕元為大都路知事曽祖文大寧路推官祖承祖太常太祝考絅通經學洪武中為河南盧氏縣學教諭卒葬金谷陀之原子孫遂為盧氏人與太祝公俱贈通議大夫刑部右侍郎妣和氏纍贈太淑人配高氏纍贈淑人子男三長曰智次即裕今為泗州判官次曰發女六長適都察院右僉都御史葉盛次適渭南醫官張瓘次適張暹次適舉人張紀次適主事王上齡次幼孫男七女二卜葬於先塋之次裕詣京師持鄉人左都御史軒公狀乞豫為神道碑豫亦鄉人也不可辭則序而銘之銘曰麟之祥蹄鳳之瑞跖實難其逢云誰不惜有若斯世挺生偉人玉立清修如鳳如麟有偉耿公巨鹿之胄一時英賢鮮出公右蚤登仕版青瑣黃門直道而行邁於前聞鹺政既清疑獄既辨乃整邊防乃正臺憲周思職務寢不遑安出領二藩之屛之翰冰壺湛然不容少滓初志如山死而後已百鍊之剛不損毫芒南畿作士帝寵煌煌知無不言言則剴切社稷是安既安乃悅繄公之𠂻士類所宗譽流無窮惟公之終中憲大夫南京都察院右僉都御史張公神道碑銘天順庚辰冬十一月南京都察院右僉都御史張公致慶禮於京師居公邸數日一疾而逝是月七日也上聞訃驚悼良久特遣官諭祭復令有司為營葬事其子銜哀乞碑銘於豫按其鄉人編修楊守陳狀公諱楷字式之浙之寧波慈溪人天資頴敏讀書過目即成誦年十二能屬文有司聞其名召補邑庠生公益奮力進學十七領鄉薦登永樂甲辰進士愈肆力於古文辭宣德改元之明年試政於夏官時方北征輿馬之需甚急大司馬雅知公才委往關中督之果先期而集拜江西道監察御史初有强盜繫刑部獄中吏受賕脫之公劾其尚書以下十數人皆罷黜名聲赫然六年考績至行在因獻聖德頌留俟鴻臚寺正統初乃還在任能辨疑獄有造僞印者本夏三也賂書牒人吳謙承之公廉得其實以罪三有與妖僧作逆事者連坐其主當族公察之逃日所為主得勿論有兄毆人死誣與弟同毆歷臺審無能辨之者公察其枉謂毆時爾安在曰在鄉學乃拘其師友驗之果然遂釋之此類甚多庚申用大臣薦升陜西按察司僉事理屯田督租賦治水利俱有成績尋遷副使時靖逺伯王驥奉敕巡邊以公同行公上安邊十二策多見采者丁卯升都察院右僉都御史畿甸蝗起上命公督捕公授郡邑捕法而按行之蝗遂息閩賊鄧茂七作亂朝廷遣將率兵往平之以公為監軍兵至廣信賊黨圍延平甚急公謂都督劉聚曰賊聞大軍至寧無懼心即具榜遣人馳諭以威信賊果解去兵至沿山賊圍將樂公調都督劉得新乘夜襲之賊皆潰散茂七僅以身免退保陳山公駐兵建寧四招其黨賊復攻延平公以浙江軍伏後坪南京軍伏後洋江西軍伏沙溪之南而以福建軍素為賊所易者出城挑之已而炮作伏起合擊大破之遂斬茂七俘其衆未捷之先朝廷慮賊衆兵寡復遣寧陽侯陳懋統大兵繼之至則茂七已誅餘賊有據九龍山者公選精兵二千撤其筏誡曰明日賊必空寨來攻若疾入其寨而反攻之比旦賊視我營兵少果至溪上無筏而還二千兵已據其寨用其滚木攂石下殪之賊衆遂降凡定三郡七縣破三十六寨擒僞總兵學士等官三百二十四人招徠其民八十餘萬初處州賊葉宗留亦起已遣都督徐恭征之至是復勑公旋師與之掎角恭次金公山甚危公往援之至即伏兵樹鴨兒芭為壘賊至公麾兵擊之少頃佯走賊追逼壘伏兵四起一鼓殲之景泰改元公班師至京有妬其功者劾公初至耽詩玩寇以罪罷歸天順改元皇上復位念公之勞仍舊官致仕明年陜右興師禦邊而給軍餉增戰騎募勇士以佐師者難其人適公至京入謝上見公曰朕得其人矣遂以公往還京上嘉勞之轉南京都察院方專委託而數止於斯豈非命邪公生於洪武三十二年三月二十三日享年六十有三曽祖好古祖叔申俱潛德弗耀父惟哲尚義攻詩以公貴贈監察御史母毛氏贈孺人娶邱氏贈孺人繼室胡氏封孺人子男三長應麒寧波府醫學正科次應麟寧波衛鎮撫次應鵬以懷材抱德舉待選於吏部女二長適余凱次適萬宗希孫男幾人女幾人公早孤事母至孝為人瀟灑心地坦夷好奬引士類見人有善必延譽之遇患難者必拯濟之尤喜賓客篤於友道其學浩瀚善行草隸篆所著有四經糠粃大明律解律條撮要諸書至於選詩唐音李杜詩草堂詩餘凡十數家公悉和之纍數百卷皆豪贍壯麗海內之士莫不口腴而心悅之外國亦市其集而慕其風采狀之所稱者如此銘曰香蘆句餘扶輿磅礴金玉丹砂乃氣之略必有精者屬之於人竒士挺生適逢其辰翼翼張公其氣秀越玉佩瓊琚文采煥發揚歷中外名振臺端敵愾之績人以為難螢迹微嫌曽無少損晚復登朝益篤忠悃皇恤公死異數惟加浙東故里有賁無涯行實可稽壟有貞石銘以傳之永永無斁中順大夫詹事府少詹事劉公神道碑銘聖朝承平相繼將百年於兹而博雅老成之士歌詠贊襄於其間以賁飾一代之盛者屢見於世若詹事府少詹事姑蘇劉公其一人焉而今已矣公子瀚持史官陳鑑之狀泣而請銘豫因慨夫老成之人漸以澌盡而尚忍銘公哉辭弗獲按狀公諱鉉字宗器號假菴其先汴人有為黃州統領者宋南渡時徙建康高祖順之仕元為平江路𣙜茶提領因家於蘇遂為長洲人曽祖元善號雪樓元末兵亂嘗率其賢豪以障鄉井里人德之祖德讓洪武中以明經為沛縣儒學教諭考仲輿隱德不仕用公貴贈徵仕郎中書舍人妣陸氏贈孺人公生彌月而孤數歲入鄉孰輒有志向學雖衣食粗糲弗顧也未冠即授徒里中從之者甚衆其言動規模如宿儒鄉之長者皆折輩行與交性孝友母遘疾刲腕肉以進旦夕籲天求代比沒哀毁垂絶者再見者莫不感嘆事兄若嚴師雖加楚毒不敢怨迎寡姊養於家從父沒而絶嗣公以父命出繼之永樂戊戌以善書徴入翰林明年中京闈鄉試未上春闈授中書舍人宣德己酉與修兩朝實録成賜白金文綺升兵部車駕主事仍蒞事內廷正統戊午與修宣廟實録成進翰林侍講金綺之賚有加正統戊辰詔擇進士頴敏者為庶吉士屬公教之公懲曩之事虛文者慨然以師道自任俾力追古作有一字未愜者經月不置以故諸吉士大有所造後多以文學致名己巳進侍講學士景泰庚午主考京闈及揭曉第一人劉宣乃盧龍軍士同事者欲更之公曰朝廷立賢無方不可乃止時論韙之公未沒宣已第進士為翰林修撰矣初置經筵官公居首選數賜白金文綺寶鏹禮遇甚隆辛未夏不雨特遣祀濟瀆壬申春缺祭酒衆難其人大學士高榖曰學行老成無如劉某者遂抗章薦之命下以公為國子祭酒士類歡然有得人之賀公曰士子若室女當保愛之於是定程課示教條旦暮講解如恐弗及有託權貴以求幸得者斥弗聽六館之士帖然明年養母陳氏卒朝廷欲奪其情公力求終制服除仍拜祭酒天順改元皇上復位念宮端必求宿德之儒在朝無踰公者遂升少詹事日侍講讀輔導惟謹忽一日不至云已捐館矣朝紳莫不䀌然上聞訃哀悼曰安得學行醇篤如斯人者遣禮部侍郎李紹諭祭於其家公生洪武甲戌八月二十日卒天順戊寅十月六日享年六十有五公性介特絶軟媚之態立身以不欺為主未嘗疾言遽色尚儉約已貴而猶僦居隘陋裕如也祿賜之餘必分惠宗族故舊之貧者恆館粟之僚友卒而乏者為具後事復教其孤有至顯官者有病吏公憐而舍之染其疾及家人或請遣之公弗聽已而皆愈鄉人有逮繫不能明者公為白其寃其人廉之懷金以謝公曰吾直爾公也豈為私邪遂感泣而退其善行如此類者甚多立朝無惰容不以寒暑久速而少變亦其志之堅定也楊文貞文定兩公皆重其為人每稱道之家訓素嚴仲子瀚以進士使南方戒之曰見利毋茍得也閲其衣篋以行比還仍閲之如故乃喜曰無玷吾門矣平生耽嗜文籍博極羣書素有醖藉為文紆徐演迤務造至理詩古淡舂容自有餘味方衆賢聚于朝以意氣相雄長公獨用心於內退然沈毅略不與較有假菴稿若干卷藏於家配陸氏有淑德封孺人子男四長曰澄早卒次曰瀚天順丁丑進士次曰滸次曰泳女四安清安福安正安吉俱適士人孫男女十人卜以明年某月某日葬其縣武邱鄉之原從先兆也銘曰時惟雍熙氣乃淳固豪傑之才咸出仕路姑蘇之墟文物之鄉卓犖之士後先相望猗嗟劉公聞道甚早成童為師唬其長老六書之精應帝之徵受薦於京文為世程乃入祕書染翰滋久國史屢修皇錫多有乃訓吉士乃典文衡懇切公正位升譽騰公為司成聿興士類其教以身展也無愧公為詹事入佐元良其輔以道燁兮有光兹也全歸惟帝之恤勒銘高原永示無斁古穰集卷十三
