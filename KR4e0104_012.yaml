body:
  text: 古穰集卷十二明李賢撰神道碑銘吏部尚書致仕贈太保諡文端王公神道碑銘公諱直字行儉別號抑菴系出琅琊晉太傅導之後也導輔東晉遂家金陵後數世有崇文者仕唐為吉州刺史因家吉州又數世孫贄仕宋為户部侍郎徙居泰和代有顯人曽祖以道祖子興隱居不仕父伯貞仕國朝為肇慶知府俱以公貴纍贈少傅兼太子太師吏部尚書妣皆贈一品夫人公早喪母而父以事去賴祖母李夫人撫育自幼端重異於常兒家貧力薄刻苦讀書永樂改元遂領鄉薦明年登進士第時太宗皇帝篤意古學詔選進士曽棨等二十八人為翰林庶吉士俾讀中祕書冀成逺大之器公在選中感激奮志不數年文辭追古作者上以公卓越諸士召入內閣凡機密之政屬執筆焉尋授翰林修撰車駕巡幸北京仁宗為皇太子監國留務之重選任尤嚴時翰林則留黃淮楊士竒與公三人輔導公夙夜勤慎不懈中外咸倚重之及再幸北京公在扈從遂與修太祖實録未成以憂去服闋仍入翰林升侍讀仁宗即位進侍讀學士宣宗為皇太子慎選宫僚首升公右春坊右庶子仍兼侍讀學士凡經筵講義及文武羣臣誥勑皆以屬公又兼記注至於聖政聖訓之當書者皆録之以備纂述進階奉議大夫宣宗即位與修兩朝實録成進詹事府少詹事仍兼侍讀學士有白金綵幣襲衣寶鏹之賚進階中順大夫今上嗣位詔修先朝實録以公總裁書成進禮部左侍郎仍兼學士賞賚如前久之以禮部缺人命公出蒞部事宗伯胡公大喜闔部之政悉付之公處之裕然若素習者吏部尚書郭璡去位詔以公代之命下士類皆悅進階資善大夫歷再歲有無賴不得志者以選撥事嫁禍於公給舍御史交章論列乃直公誣加授資德大夫正治上卿正統己巳秋北敵犯邊車駕欲親征公獨以為不可率廷臣上疏止之不獲特命公留守京師加太子太保兼吏部尚書尋進階榮祿大夫景泰初進少傅壬申兼太子太師進階光祿大夫公纍疏求退不允天順改元皇上復位圖任舊人公艱於步履不能朝謁懇乞休致并辭師傅二職詔特許之賜以璽書有忠清之操簡于朕懷之語復出白金文綺寶鏹賜之給驛舟以歸公方面修髯器宇宏偉望之若神仙中人天性嚴重寡言笑居家儼然及至接人和氣可掬學富才敏詩文清緻四方求者接踵屢典春闈文衡得人最盛在翰林三十餘年恭勤不怠如一日與王文安公齊名時稱二王又以居第在東稱東王先生士類莫不拭目海內想其風采及位冢宰益加廉慎時方面官罷廷臣薦舉專屬吏部公益留意人才委任部屬凡御史出巡歸者必令報其高下以備拔用自是四方多號得人奔競之風為之一息居第隘陋曽不屑意一切世味安於淡薄朝廷重公之德每優禮之免其朝謁及退休居家杜門不出日課諸孫讀書而已所著有抑菴集若干卷行於世天順六年九月二十三日以疾終於正寢享年八十有四訃聞上為之悼惜特贈太保諡文端遣官諭祭于其家復令有司營葬事公配陳氏纍封一品夫人先公二年卒子男五人長曰䆅翰林檢討居母憂以卒次曰稹次曰穆次曰秱女三人長適梁相次適蕭稹次適袁傑孫男十人曽孫男七人稹等卜以天順七年正月六日葬于邑之信實鄉高坪之原乃以公所為墓志示賢請銘其神道賢從公遊最久公未嘗待以屬吏又引之同升平生之知未有過於公者謹次第其事而系之以銘銘曰國之明昌繫彼才賢有一挺生繄豈偶然侃侃王公天賦其秀有聲蔚然大江之右鑾坡鳳閣容與翺翔惟學之昌惟譽之芳遂秉鈞衡不倚不忒百司庶府位稱其德位稱其德乂我蒸民列聖汝嘉保傅師臣公之旋歸既祿且夀國藉蓍龜士仰山斗公之云亡軫我聖衷節惠二名錫命三公有美哀榮無然愧怍銘在豐碑元老之墓禮部尚書致仕贈太保諡忠安胡公神道碑銘我朝名公巨卿聰明特達者多矣若器識宏逺福壽隆長惟武進胡公一人嗚呼休哉公諱濙字源潔別號潔菴其先淮安宿遷人有諱藩者仕劉宋為太子左衛將軍遷豫章數傳至諱􅀈者仕唐為侍御史子常州刺史瓊生持因家於常遂為武進人持四世孫曰宿仕宋為樞密副使宿十一世孫曰中立為常州制置中立生昭公之高祖也曽祖庸仕元為江浙儒學提舉祖禎為常州路醫學録考宗仁隱居不仕皆以公貴贈光祿大夫少傅兼太子太師禮部尚書曽祖妣章氏祖妣徐氏妣李氏皆贈一品夫人公生而髮白彌月方黑母夢一僧持花以遺之覺而生公居數日有僧至家索觀公見僧即笑僧曰此吾師天池高僧後身也命我求見以笑為志果然聞者咸驚異之公自幼端重不好嬉戲弱冠入邑庠洪武中領鄉薦登庚辰進士第授兵科給事中尋遷右給事中公勤識大體士林譽之太宗文皇帝入正大統公供職如舊永樂改元秋以奏對稱㫖升户科都給事中丁亥上察近侍中惟公忠實可託遂命公巡遊天下以訪異人為名實察人心向背時御製性理大全為善隂隲孝順事實書成俾公以此勸勵天下以故雖窮鄉下邑軌跡無不到在湖廣間最久丙申秋還朝丁內艱乞終制不允尋進禮部左侍郎明年往巡兩浙諸州授嘉議大夫癸卯自均襄還朝時御駕親征北敵駐蹕宣府公馳謁行在所上卧不出聞公至喜而起且慰勞之曰卿馳驅良苦賜坐與語凡所歷山川道里郡邑豐嗇民情休戚以至所聞所見保國安民之事悉為陳說上欣然納之向所疑慮者至是皆釋比退漏下四鼓先是仁宗皇帝為太子監國時有飛語上聞文廟屬公往察之公至以所見七事皆誠敬孝謹密疏以聞上覽之大悅自是不復疑仁宗嗣位特賜誥命授正議大夫資治尹已而聞公曽有密疏疑之乃轉太子賓客兼國子祭酒之官南京未幾閲奏章見公所上密疏深嘉其忠方議重用之而龍馭上賓矣宣宗皇帝即位復禮部左侍郎兼職如故洪熙乙已冬公自南京來朝上素重公及入見顧問良久即留任行在禮部事宣德改元春進尚書是歲秋漢王謀叛事覺公贊上親征事平公受賞賚甚厚復給叛者家屬四人丁未賜誥命授資善大夫復賜近第一區於長安右門外給閽者二人戊申上嘉公忠勤特賜銀章四其二曰文恭世家曰清和恭靖蓋嘉羡褒美之也尋以公生辰賜宴於其第秋八月公扈從巡邊至㑹州而還已酉命兼詹事府事夏五月復扈從北巡時常民有豪橫者既抵於法悉以田宅賜公辛亥命兼行在户部事聖節御製詩一章賜公及蹇忠定楊文貞文敏三公且曰朕茂膺天眷惟爾四人贊翼之功因賜宴盡醉而罷新建禮部成命光祿設宴勳戚公卿皆往賀公公以為盛事立石㕔事之右倚任益隆每燕見上虛心問曰卿有何言得其章奏即施行之時有芝産於公署人以為公和氣所召今上皇帝踐祚亦惟圖任舊人待公尤厚凡軍國重務皆與聞加授資德大夫正治上卿每考績必有賚豫甲子以年至七十上章乞致仕上以公精力未衰慰勉留之己巳上親征北敵命公留守京師秋八月進太子太傅階榮祿大夫景泰初賜誥命辛未春公因災異數見乞放免以回天意不許尋進少傅壬申兼太子太師二俸兼支公固辭一俸癸酉復賜誥命進階光祿大夫自後每歲引年乞歸皆不許丙子復因災變乞賜罷黜亦不許時公年八十二忽疾作艱於步履明年皇上復位公喜不自勝扶疾入朝而筋力不可强矣遂乞謝事且辭師傅二職上方重用耆舊憫其老皆從之陛辭賜白金寶鏹金織襲衣給驛舟以歸復賜璽書有卿宅心允臧處事惟慎雖經變故無改厥常之諭歸之日鄉人老稚聚觀者以億萬計公陳所受賜於堂感激泣下遣冢子長寧詣闕申謝上念公歷事纍朝遂官長寧為錦衣衛世襲鎮撫俾歸終養公之弟克恭克寧克誠時年皆七十餘蒼顏白髮燕樂於一堂遂扁曰壽愷優游桑梓者七年疾復作召諸子前曰爾輩圖報國恩勿墜家聲遂暝目而逝天順七年八月八日也享年八十有九終之夕常州守卓天錫夢公來辭已而聞終大以為異訃聞上為之震悼贈太保諡忠安遣官諭祭於其家復令有司營葬事恩榮始終世莫與比公為人平易寬和廉靜寡欲自奉淡薄起居有常居官敬慎一毫不茍歷事列聖無纖毫過舉蔚然為一代名臣立朝幾六十年薦拔士類甚多十知春闈貢舉天下之士盡出其門平居未嘗疾言遽色雖庸夫孺子亦知其為長者暇則手不釋卷喜為詩文晚年譽望益尊其酬應愈劇曽不厭倦所著有芝軒集若干卷又嘗輯録醫藥經驗者曰衛生易簡方經進又有律身規鑑俱行於世公配范氏早卒纍贈夫人繼張氏纍封夫人子男四人長曰谼即長寧居母喪廬墓有司聞於朝旌其門曰孝子次曰􅳚以武舉得官沒於王事次曰豅錦衣衛指揮僉事次曰􅀈女三人長贅林玘次適成國公朱儀次適武陽侯薛琮孫男一人曽孫男一人銘曰大明盛時有臣胡公從容其間以篤其忠始為夕郎乃教胄子輿論攸歸多士咸喜作賓春宫遂長春官列聖倚之四海乂安國之老成進位師傅溫恭維人翊我皇度公在朝廷六十春秋祿位優游莫之匹休公身雖亡中有不死懿行崇功昭彼信史皇惜耆英曠典是承隧道有碑儒臣刻銘工部尚書謹身殿大學士兼東閣大學士致仕高公神道碑銘公諱榖字世用姓高氏其先世居河南之懷慶有仕宋者從高宗南渡徙維揚今為高郵興化人曽祖諱明祖諱椿父諱焯俱以公貴纍贈少保兼太子太傅工部尚書東閣大學士曽祖妣劉氏祖妣王氏妣黃氏俱纍贈一品夫人高自上世以儒業相傳至椿當元末避兵姑蘇恐廢先業有子四人皆令從事詩書洪武初復歸維揚始占籍於興化四子業皆有成其季公之父也尤長於詩有書數千卷不樂仕進隱居教授而鄉之後進多從之游公自幼承家訓舉止如老成人父竒之甫十歲乃遣入邑庠即能奮力於學弱冠遂領鄉薦登永樂乙未進士選入翰林為庶吉士辛丑授中書舍人甲辰升左春坊左司直郎洪熙改元受敕階承務郎未幾以學行獨優升翰林侍講丁外艱服除還任宣德甲寅主考順天府鄉試人服其公正統改元春上初御經筵少傅楊士竒等上言經筵講官必得學問貫通言行端正者以供其職遂薦公與苗𠂻馬愈曹鼐四人專侍講讀賜三品章服公每進講敷衍詳明聞者嘆服戊午預修宣廟實録成進侍講學士甲子復主考應天府鄉試士無間言乙丑進工部右侍郎兼侍講學士入內閣知制誥丁卯進階通議大夫己巳秋聖駕北征命公留守尋進工部尚書兼翰林學士時景泰初邊烽告警軍務方嚴選使邊者得中書舍人趙榮升大理少卿公嘉榮之奮忠即解所束金帶與之景泰初聖駕自北還議奉迎禮公欲從厚衆涉疑未定有千户龔遂榮投書於公言奉迎當重之意公即袖其書以進且曰武夫尚知此禮况儒臣乎已而朝廷以遂榮非分得譴比聖駕至百官郊迎公復上章以伸前議無所顧忌聞者義之辛未朝廷以公望重進少保仍以尚書兼東閣大學士壬申兼太子太傅公懇辭不允尋賜階榮祿大夫甲戌南京災朝廷念祖宗陵寢所在以公大臣中清慎者特命往祭事竣録被災者千餘家悉發廩賑之歸奏稱㫖是歲冬給事中有忤執政者執政欲害之乃諷御史劾其私而羅織其罪公獨持正議卒從輕典士論韙之乙亥星變疊見公上疏謂臣濫居保傅不能盡匡輔之道宜譴罷以謝天意不允丙子寰宇通志書成進謹身殿大學士是歲秋順天府鄉試太常少卿兼翰林侍讀劉儼為考官有二執政以子入試不中交章奏儼去取不公欲置於法乞詔翰林及六科十三道覆考公時以疾不出一聞此事即强起預考畢毅然入言曰大臣子與寒士並進已不可况又不安於命欲殺考官可乎由是儼得釋公之名益振而拂其意者銜之公屢求退避朝廷重公忠直不允天順改元皇上復位首召公慰諭而留之其餘誅斥殆盡公即上疏辭保傅二職時機務填委公以衰老弗堪懇乞骸骨上以公舊人方隆倚任然憫其老且重違公意特允所請賜白金楮幣織金襲衣給驛舟送歸其鄉復賜勑諭有曰日與親戚故舊徜徉邱園展契濶之深懷道朝廷之盛事清風高致足以勵廉而革貪夙德雅望足以敷化而導俗則卿亦永有終譽焉士林以為榮越四年庚辰忽疾作以正月十日終於正寢距生洪武辛未三月十日享年七十娶郭氏纍封一品夫人先公卒生女一適中書舍人黃清側室杜氏生子一曰峘為邑庠生女一周氏生子一曰岡劉氏生子一曰岐俱幼上聞訃嗟悼遣官諭祭於其家公天資簡重操履清介而交人不泛視義所在勇於必為雖違衆不恤也在位論薦多號得人可謂慥慥乎篤實之君子矣所著有育齊集八十卷峘以侍讀學士錢君溥之伏來請銘銘曰白葦黃茅易脆而朽松柏挺生何獨能久抑根之固越心之堅蔚然蒼翠何千萬年豪傑之生有類於此相彼高公實同容止早登仕路厥聲孔揚英華之發斐然成章翰苑優游帝資啓沃文衡兩持士論咸服乃位保傅乃參化機錦袍玉帶金馬彤闈見義必為莫之能禦直道古心慨然自許保全晚節宸眷優優容與桑梓胡不少留亦既蓋棺名著天壤恤典之褒百世之仰有銘在石懿行輝光嗚呼泉室哲人之藏資政大夫都察院左都御史贈少保諡莊愍寇公神道碑銘都御史乃糾慝繩違之任總憲度肅百僚權奸之所最忌者寇公居是職五年矣持法嚴明見逆賊曹欽父子兄弟恣意妄為乃率御史劾之欽等遂行反逆首害公賊雖誅滅公命殞矣朝廷震悼特贈少保諡莊愍加賜賻儀遣官諭祭令有司為營安葬蓋深念任事之臣遭此凶禍而恤典宜厚也其子林泣且告曰先人不幸弗獲全歸而墓石之銘不可以無託敢固以請辭弗釋按知府張祝狀公諱深字文淵其先山西渾源人世多顯宦曽祖廣仕元為提舉有才行見寵於世祖為擇宣寧縣黑虎鎮之乾河里俾居之國朝洪武初以閭右給省檄過保定唐縣止連頤莊見其風土之美因占籍焉今為保定人祖彥和父禮俱以公貴贈資善大夫都察院左都御史祖妣宋氏妣李氏俱贈夫人公自幼警發永樂中為郡庠生上言時務朝廷竒其人召入胄監時山東要路軍需錢榖有弊政遣中貴人陳保孫往廉之求國子生精敏者同事得公甚喜宣德初擢刑部主事有勤能之譽尋升員外郎丁外艱服闋復任益盡心刑獄凡疑獄人不能辨者必屬公正統甲子用執政薦升山西按察副使時天久不雨朝廷念刑獄有寃抑者特委公録山西諸郡大辟囚公察其情可矜疑者五十餘人悉奏釋之又上邊務數十事多見采納丙寅四川松潘夷不靖守臣請出師𠞰之朝廷念撫治者非其人乃命廷臣推有風力者僉謂公可即日召至京師拜都察院右僉都御史以往遂破賊寨擒其渠魁送京師諸番讋伏獻盔甲刀劍三千童男三十七人駿馬四百餘匹繼後入貢不絶公暇則撫恤士卒相地要害築關堡城池六十處道路險峻者咸削平之以便儲運番夷酋長或率其黨來見公宣布朝廷威德且諭以享福之道莫不感化地方底寧朝廷嘉公之能進左副都御史加食二品祿綵幣白金之賚甚厚一日得母報平安書潸然出涕曰老母在堂久曠定省安能為懷即上章懇乞終養朝廷優詔慰而留之景泰辛未召公還特加奬勞番人乞留者十有七奏不從未踰月提督遼東軍務缺人廷議復屬公遂假以便宜之權賜白金綵幣慰勉以往公至遼左威名益振乃積糧練兵畫防備守禦之計中外守臣咸敬畏之癸酉海賊李福惠挾妖術以惑山東之民聚衆萬人公得報略不改容乃親率數百騎直抵海州遣都指揮周英授以成算捕之遂獲千餘人公詰其造亂之由得首惡者二十餘人械至京師餘皆釋之景泰甲戌北敵入境會總戎得公所議巡邊之䇿因其勢便斬敵首七十餘級獲馬六百餘匹公在邊歲久思親益切或與同事者言及母老輒流涕終日不食纍上章乞歸不允丙子得還京議邊事時母年九十有四已感風疾曰得見吾兒即瞑目矣公悲泣懇求歸省至家母一見而逝公哀毁踰禮朝廷起公復任公乞終制章凡三上不允天順改元皇上復位乃許公終制時臺長缺人思臣僚中老成剛徑無踰公者復起公視事進左都御史公威望日隆百僚敬憚上深嘉之寵賚優厚嘗召公咨訪政務但加老字於姓上呼之而不名蓋重公也公天性至孝雖居顯仕惟以不得養親為歉諳於世故凡本朝舊典歷歷能記聽獄果斷人服其明未老即以家事付林綜理曰吾受朝廷重託惟職務是盡餘不恤也生於洪武癸酉五月七日沒於天順辛巳七月二日得壽六十有二配李氏先卒纍贈夫人生子男三長即林國子生次彬次桂早卒女三長適保定中衛千户劉琮次適旗手衛指揮使高裕次幼在室卜以是年十一月二十四日與夫人合葬於連頤西岡之陽銘曰惟錐在囊頴脫斯見惟楠在壑昂霄可羡彼物且然而况於人惟人之傑衆孰與倫侃侃寇公早有大負揚歷仕途才智稱首兩鎮邊陲邊塵不揚入總臺憲大振朝綱賊奸忌之竟為所害恤典有加遺澤未艾惟孝與忠在公則崇有志不餒名位攸隆墓碑峩峩昭此行實永閟泉臺曷有其極資政大夫户部尚書諡恭定年公神道碑銘天順庚辰户部尚書缺人皇上以年公富可當其任有惡其執法者沮之乃屬吏部改議上曰掌國計者正用執法之人卒用公命下朝紳皆悅已而在任公勤慎密士望益重一旦以疾卒無有不悼惜者其子請銘其神道之碑按侍郎薛君狀公字大有別號謙齊姓嚴氏上世莫詳所居曽祖孟陽仕元為萬户守滁陽因家全椒元季兵亂子孫流徙鳳陽之懷逺洪武初附版籍誤以嚴為年遂因之祖遇春父景和俱以公貴贈資政大夫户部尚書祖妣朱氏妣邵氏俱贈夫人公甫十歲即入邑庠為弟子員明敏端重師友咸器異之弱冠領永樂丁酉鄉薦明年以乙榜教諭濟南之德平年雖少而教規甚嚴諸生多所造就秩滿以績最擢吏科給事中兼署刑科糾正違失務存大體宣德乙卯吏部薦升光祿少卿宣廟欲大用之乃奏留不下久之特升陜西布政司右參政至任即巡歷郡邑察民隱革奸弊興學勸農尤嫉贓吏貪墨者聞風即托故解去鎮守憲臣獨加禮焉或指畫未冝聞公言即止初三邊士馬衆盛供費浩繁民皆疲於逺輸而郡邑豪猾之徒因緣為奸邊儲多空乏朝廷深以為慮乃屬公總之公量地里之逺近按收支之遲速定其徵科防其出入立法甚嚴夙弊盡革民不告勞而邊廩實矣正統甲子升河南右布政使惠政及民愈廣時鄰省飢民流聚南陽陳州諸處無慮十數萬剽掠居民有司莫能制公往撫諭乃分散安輯而賑恤之衆皆感公之德願為編氓己巳轉左布政使未幾北敵入寇雲中烽火通於京畿軍民走避道阻糧絶朝廷憂之以公有謀為特委督運糧餉八萬石濟邊吏民聞公號令皆冒險而進無後期者邊餉以充明年用邊將論奏進都察院左副都御史提督大同軍務兼理邊儲時軍民瘡痍未復室家離散呻吟之聲不絶公招亡撫存舉廢政革科徵抑豪橫廣屯田軍民始有更生之望初倉庫所儲多為勢要侵敓公至悉追復之由是軍旅數興錢榖不乏時北征大將而下多納賂冒功公至悉核實不録故爵賞無濫及者景泰乙亥丁外艱朝廷以邊警方急奪哀視事公懇乞終制不允天順改元將臣石彪因私怨以危事中公逮繫於京賴英廟保全乃令致仕不數月即起為南京兵部右侍郎尋轉户部右侍郎巡撫山東隨復左副都御史公按行青齊諸郡官吏畏服奸豪屏迹有畨人居東昌者多頑獷弗率其首羅姓者尤為桀黠公慮為患乃言於朝因其來京留之以消其不逞之謀庚辰春召為户部尚書英廟知公忠直禮遇優厚公益毖懋夙夜不懈以國計為已任然處之以靜不動聲色而事無不集癸未賜誥命詞極褒奬甲申春公以陜西纍年用兵而督餉道者多不得人乃薦三人為藩司郡守使理其事吏部以公為侵官公上疏極論大臣薦賢為國之道且以年至七十懇乞致仕上初臨御以公舊臣慰勉之使復任忽得瘡疾且劇上命醫往視竟不起深為之震悼輟視朝一日賜諡恭定復遣官諭祭令有司治葬事朝之公卿大夫莫不弔哭盡哀公為人剛正言不輕發廉靜寡欲遇事敢為臨利害不少變氣節才識世不易得生於洪武乙亥十二月七日卒於天順甲申四月十六日享年七十配蘇氏贈夫人早卒子男四人長曰茂早卒次曰芳國子生次曰英次曰華女四人何璟盧剛周縉薛希良其壻也孫男八人卜以是歲某月某日歸葬於先塋之次銘曰天順人才一時極盛有偉年公尤號敬正既司國計法不可搖峩冠秉笏挺然孤標有偉年公揚歷最久始終不渝惟道是守屢摧不折勵操愈剛儼如蒼檜任彼冰霜有偉年公一代無幾星鳳之祥海內咸視皇恤耆舊恩禮是優恭定之名百世之休形歸泉臺無虞有妥史臣作銘刻石道左翰林院學士奉政大夫贈禮部左侍郎諡文懿呂公神道碑銘公諱原字逢原姓呂氏浙之嘉興秀水人自幼頴敏九歲能通孝經小學稍長為文輒驚動長者時父兄俱為教官識者曰此子殆頴脫而出者也未幾父兄俱卒于景州公尚未成童孤貧不能歸喪或諷以邊俗焚之者公潸然出涕不從遂厝州城之東曰他日有力必歸之也年及弱冠乃奉其母歸嘉興故無田宅假館以養母力學不輟清苦之志愈堅郡守黃懋廉知之乃延為子弟師尋俾充邑庠生公亦自奮大肆力於經史正統辛酉遂魁鄉薦明年中禮部㑹試廷對賜進士及第第二人擢翰林編修得入祕閣讀所未見書其學益富癸亥與修五倫書丁卯朝廷思用竒才乃簡狀元劉儼等十人進學東閣入侍經筵公居其一景泰初遣祭蜀王往還萬里間凡有饋遺一毫不取未幾充經筵講官辛未進侍講壬申夏以右春坊右中允兼侍講秋九月進侍講學士仍兼中允癸酉與修歷代君鑑秋八月主順天府鄉試已亥與修寰宇通志明年書成進右春坊大學士兼侍講每書成進講輒有寶鏹白金文綺之賚天順改元皇上復位轉通政司右參議仍兼侍講春三月主禮部㑹試夏六月召入內閣知制誥尋轉翰林學士庚辰春主禮部㑹試尋總裁大明一統志凡金帶玉杯梭服貂帽便蕃之賚歲無虛月公夙夜感激思盡論思之職時母老病在牀公躬調湯藥憂形於色久而不愈壬午秋八月母卒公哀毁踰禮啓父櫬歸而合葬之詔有司營葬公襄事即還朝懇乞終制不允抵家未及窆期忽以風疾不起在是歲十一月二十七日距生永樂戊戌六月十八日得年四十有五訃聞上悼嘆不已特贈禮部右侍郎諡文懿命工部為營葬事遣官諭祭於其家仍命其子㦂為國子生皆異數也公天性孝友事母得其歡心撫育兄子皆底成立宗族中有困乏者必推所有以賙之遇人之危殆者濟之惟恐不及也歲時賞賚奉母之餘輒分遺鄉黨僚友而自奉甚儉為人沈毅有醖藉悃愊無華內端外和與物無競處已待人不立崖岸事有不可則據理諍之未嘗諛言媚色以狥人取悅三為主考取士得人最多其教人也誠切懇到善於警發故四方之士及門者衆其學造詣益深作為文章議論超越皆有根據而理趣充然詩有典則音律渾厚無纖巧靡麗態初入翰林時楊文貞文定諸公咸器重之知其所就必逺大也及入內閣與大議所見出人意表而為民之心尤切天下有隂受其賜者矣士望方殷冀必久於其位用極康濟之功而天不假年可勝痛哉公之先世多顯於宋其故居有稱為呂家府者高祖茂卿仕元為提舉曽祖仲雄祖伯誠俱隱德不仕考嗣芳永樂中領鄉薦為山西萬泉教諭纍贈翰林侍講學士兼春坊中允母顧氏纍封太宜人兄本亦領鄉薦為景州訓導故萬泉就養而終於此公亦流寓者久之配徐氏纍封宜人子男二長即㦂次曰㥣早卒女二俱幼所著有介軒集若干卷藏於家嗚呼公與豫同事者六年蓋端謹篤實之士也世何可多得哉今其已矣可不銘諸銘曰浙水之彥代有其人呂氏一族罕與之倫自宋以來至公再顯卓然奮興斯慶之衍儒業相傳自其父兄公克振之以大厥聲遭遇之隆千載不偶事業文章世豈多有冥冥造物胡不假年乘除之數率由自然曠典是承賁於鄉土生榮死哀昭示終古古穰集卷十二
