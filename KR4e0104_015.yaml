body:
  text: 古穰集卷十五明李賢撰墓表贈御用監太監阮公墓表公姓阮諱浪世家交址永樂中太宗皇帝因安南作亂遣將征之衆悉歸附時公甫十餘歲特俊爽被選入掖庭太宗見而竒之冀成其才命讀書於內館公穎敏好學孜孜不倦遂博通羣書頡頏儒者然德性惇篤能以禮自持與物無競輩行莫不折已加敬焉用是太宗命理尚衣監事公益敬謹小心克勤所事洎侍仁宗尤愛其才將有寵任之漸宣宗初遂擢奉御俾掌寶鈔司時官軍直禁衛者宜置金牌特委公督治事不日而完宣德三年西洋諸國進御船抵廣南有司馳報宣宗以為封堵寶物必得其人命公馳往處置周密而還所歷秋毫無犯宣宗甚喜賞賚殊厚五年宣宗念敵人弗率親帥六師出塞以振威武公扈征有功升御用監右丞正統改元之初今上以公為先朝舊臣多效勞勩特升左少監侍上十有五年恭慎不懈如一日及上居南宫公復以老成端謹入侍左右事無大小悉咨委之時景泰已易太子姦臣覬圖爵賞構辭加害言公欲糾衆復立正統又欲公旁引內外勛舊羅織成狀百端拷掠雖極其慘毒未肯承服遂忍恨而死終不纍人聞者莫不酸辛嗚呼公能之死不變以息內外勛舊之禍視古之剖心明誣者亦何讓哉公生於洪武某年九月九日卒於景泰三年七月十二日春秋若干今皇上復位改元天順首誅姦惡而深悼公之誣枉特贈公御用監太監賜以祕器如禮斂之復令所司擇地為營塜壙遣官諭祭以妥其靈公雖弗克享髙爵於生前而所以表公之節白公之心傷公之亡寵眷已極則公之死不為徒死所謂有重於泰山者也司設監丞賈公安猶慮公之行實未盡暴於世屬豫為表刻石墓道以示不朽云資善大夫吏部左侍郎俞公墓表竊怪夫世之人見害必避見利必趨已而避害者得害趨利者失利大抵不知命者也若夫知命者遵道而行盡其在已人謂蹈害而利反至焉人謂失利而害莫侵焉豈非明哲之士哉今之士效用於世能若是者其惟俞公乎公諱山字積之别號梅莊先世居汴有仕宋者扈蹕南渡因占籍嘉興遂為秀水人髙祖瑞卿曽祖禮之俱不仕祖伯綱父璿俱不幸坐纍遷戍而死人咸惜之後以公貴俱纍贈資善大夫太子少傅兼吏部左侍郎妣王氏鄉先生逹道之女纍封太夫人公生而岐嶷風骨秀爽志趣不凡逹道見而異之曰俞氏之昌其在兹乎遂妻以子弱冠補郡庠生治春秋從西園李先生講學專業不懈至忘寢食踰年即得其奧義永樂癸卯領鄉薦以祖妣周氏垂老不忍去左右就養者三載宣德丁未乃入太學時祭酒四明陳先生師道尊嚴慎許可六館之士肅然惟待公以色庚戌春遂中乙榜人或諷之曰以子之才乃屑就邪公曰命也不可強遂得蘇之崑山訓導崑山之士樂公善教莫不爭先奮勵底于成俄丁外艱諸生攀留弗克有隨之抵家受業者正統丙辰服闋調常之宜興時公之執友楊氏適主師席遂同心率教士習丕變未幾丁祖母憂宜興之士思之不置爭詣提學御史留之弗果正統庚申服除赴京時朝廷嚴敕吏部擇儒官以輔親藩人皆托故避之公曰自有定數吾何避為遂選擢郕王府伴讀公既居是職若將終身日勤講説不少輟祿微數窘略不芥意弟子從遊者益衆慕求公之文者接踵於門正統己巳景泰即位進公鴻臚左寺丞時都御史楊善掌寺事雅重公薦升左少卿踰月拜吏部右侍郎賜誥命階嘉議大夫尋轉左侍郎壬申進兼太子少傅復賜誥命階資善大夫久之忽嬰風疾朝廷屢遣太醫往視後少愈景泰乙亥乃上疏乞骸骨不許且慰留之踰年請之益切人或謂曰委任方隆疾以漸瘥何苦欲休公曰隆替相尋亦理之常吾非不戀明時揣分宜休况以疾乎復上疏懇辭朝廷重違其意特允其請賚與甚厚俾乘驛舟以歸别之日公卿大夫設祖帳都門外觀者如堵莫不嗟嘆曰于今復見古人矣既歸越數歲舊疾復作竟弗起公生于洪武己卯六月四日卒于天順改元十月九日享年五十有九卜葬嘉興永豐鄉之原所著梅莊集若干卷藏于家配沈氏纍封夫人生男三長曰謨次曰誥工科給事中改判兖之沂州次曰諫女一未笄而沒孫男三孫女二公為人敦厚簡靜於勢利淡如也在藩邸時嘗衍義經書纂成講章尤善諷諫屢有裨益及顯用之日持以正大守以清謹不市私恩不取容悅人皆知為君子人也景泰初議迎復之禮公奮然曰鑾輿回則人心安力贊其成言官有持正被嫉者公曲為調護竟致顯用其佐銓衡也人才多所拔用未嘗自言曰薦賢為國豈為私也噫公之行藏不避害不趨利已而未嘗有害吉無不利者如此雖嗇於壽而立心制行之髙俯仰無愧足以暴白於天下後世矣通議大夫兵部右侍郎宋公墓表有衰絰而深墨其容者造子云自南京來泣且告曰孤之父先生故人也屬纊時謂孤曰表吾墓者必屬先生孤敢奉遺命以請豫悲其意不忍辭按侍郎俞宗立狀公諱琰字廷圭拙菴其别號也系出唐廣平文貞公之後世居邢州之南和唐末有為浙之奉化令者因土著焉詩禮相承歷宋元弗替曽祖起潛為元鄮山書院山長方國珍據四明即歸隱祖允宜性勤學尤喜成才為孰以教鄉族子弟有遺規焉父諱原亮人稱竹軒先生而祖與父俱以公貴贈通議大夫兵部右侍郎祖妣蔣氏妣朱氏俱贈淑人公生於洪武壬申二月二日自幼穎敏甫六歲讀書日記千百言遂能吟詠得句甚竒鄉先達嘆異之永樂初為邑庠生益肆其力淹貫經學旁通子史凡隂陽厯數卜筮相法咸造其精字書遒徑不下古人年十七遭母喪哀毁過禮時弟琬甫四歲抱養惟勤不貽憂於父居鄉勇於行義時疫大作姑家尤甚人皆逺避無至門者公曰若此噍類絶矣患難不恤何以親為遂宿其家躬治湯藥以全活之卒者出地葬之鄉閭為之感化永樂乙未乃登進士第選為翰林庶吉士預修性理大全書未幾仁宗皇帝以太子監國南京選公隨侍既而太宗皇帝知公之才復召還北京預修永樂大典書成賜白金文綺授中書舍人涖事翰林仁宗嗣位之初特賜勑命階徵仕郎宣宗皇帝御極遷禮部儀制主事仍涖翰林事宣德庚戌以親老懇陳歸省未閲月復遣使召還正統改元皇上嗣位特選公入史館纂修宣宗實録未幾遭外艱痛踊幾絶四年秋服闋至京上以公纍朝舊臣轉吏部考功主事日侍禁庭凡中貴人幼而秀者屬公訓之公雖被寵光達盛衰之理益畏慎不安屢乞外補或曰如公遭遇千載一時搢紳所願不可得者何乃自疏如此公曰以吾所見當如是古人固有不俟終日者九年春遂遷河南布政司右參政時汝陽不雨禾將稿蝗復大出官民憂懼走報藩司公大驚曰尚可緩乎即日往視之且自訟曰匹夫一念之誠尚能格天况吾任承宣之職乃齋嚴致禱方畢民忽報云有鳥數千成陳而下延頸長足名曰秃鶖啄蝗無遺已而飛去越明日大雨官吏士民交相欣忭景泰四年冬以考績來京轉太僕寺卿尋遷兵部右侍郎公益勵忠勤士林推重未幾賜誥命進通議大夫天順改元上念南京根本重地以公老成往涖部事越三月以疾卒于官是年七月四日也壽六十有四配李氏前禮部尚書兼左春坊大學士志剛之女先卒贈淑人繼室同邑竺氏女封淑人亦先卒側室孫氏金氏生男二長曰旻次曰晏女慈恩適王績餘早卒孫男二俱幼旻等將卜歸葬于嶺山之陽公雅性不喜喧囂嘗扁退公之所曰靜齋書八詠以自况時重公之文求者接踵所著拙菴集若干卷沒之日有司奏報上深悼之特遣官諭祭仍命工部為營塜壙嗚呼公之見用于世慎終如始愛惜名節無纎毫之玷置之名卿才大夫之列無愧焉是宜有永于後矣奉直大夫尚寶司少卿袁公墓表士生天地間有遭遇明時而不得見用於世者有見用於世而不得見知於君者有見知於君而無才術以顯其名者有名雖顯而不能保全始終福壽俱隆者今之君子兼而有之者吾於尚寶袁公見之嗚呼休哉公諱忠徹别號靜思前人世居南昌至七世祖子誠仕宋纍官刑部尚書南渡時扈蹕家於鄞六世祖芳為吉州泰和令髙祖鏞咸淳進士為宋死節曾祖澤民養道不仕祖士元為元翰林國史院檢閲官父珙國朝太常寺丞贈中順大夫太常寺少卿母倪氏封恭人公自幼穎敏神氣異常讀書強記童丱時已能詩文凡名士巨儒一見知為大器太常君精於風鑒公得其傳文廟在潛邸時聞太常君名以書幣召之公隨侍文廟見公論相大喜賞賚甚厚尋許歸家未幾高廟崩建文嗣位信任非人猜忌宗室文廟不安因有靖難志召公問之對曰天命有在誰能禦之奉命纂人象大成書以獻賚豫有加壬午夏文廟入正大統首遣使召公父子至官其父太常丞且曰忠徹臨事有斷制所言多驗特授鴻臚序班賞賚殊厚公入謝曰陛下當畏天修德偃武崇文率由舊章振肅綱紀撙節財用明慎賞罰禮貌大臣黜陟臧否用臻太平之治並賜嘉納尋知公在戎籍即令兵部蠲之又嘗勉公進學公以務冗對遂升尚寶司丞且曰此職有暇可親詩書公退而感激不怠庚申改中書舍人己丑春營北京公扈從既至日與大議復遣中使召太常君至父子相隨出入禁庭尋密遣公乘傳看楚王子重瞳公還奏無他異庚寅春以公父髙年優賚遣還公扈從北征既還上屏左右從容密問大臣優劣之狀武臣丘福朱能張輔李逺陳懋柳升薛祿文臣姚廣孝夏原吉蹇義金忠吳中吕震李慶方賓公一一論斷以對上曰卿所識鑒正合朕意是歲冬太常君卒􅉠葬加厚公奔喪葬畢詔起復之癸巳春扈從至北京甲午春復扈征衛喇特乙未夏上謂公曰東宫不聞教子對曰臣聞古者不親教子宜選文學老成之人以輔導之責其成遂選儒臣儀智陳山等日侍講讀丙申春秩滿復尚寶司丞特加賞賚戊戌春召公至便殿示以進升之意公固辭以父未有贈官即日召吏部贈其父官賜誥命公益感勵進相書機要丙子升尚寶司少卿恩典稠疊莫與為比壬寅春扈從北征公言利出東路上不從洎還軍在東者果大獲復觀將兵者得利已而捷至每從征所言無不驗者仁廟登極待之尤厚賜誥命尋賜還家燎黃省視宣廟嗣位召至京宣德改元丁內艱不獲奔喪詔以從子代還襄事一日見上容色曰宗室人有謀上之意七日內果有報漢王反狀者公扈從往征之既還受賚彌厚甲寅春得展祭之請乙卯春今上嗣位公入朝己未夏懇乞致政既得請南歸傾朝縉紳祖餞都門外公之術竒驗於文廟者不能盡述若公效忠讜論則人不及知者甚多如終大孝之情而慎密機事論養賢之實而贍其取給乞賜孔氏玉軸之誥歷言遣使取寶之非議武職宜準終喪諫服藥勿信方士如此之類皆有人所難者休官居間二十餘年忽遘疾顧其子曰死生常理吾何憾惟信誠忠厚可以立身汝宜勉之屏藥端坐而終公生于洪武丙辰十一月七日卒于天順戊寅三月三日壽八十有三娶邊氏纍封宜人先公二年卒子男二長應麟早沒次應驤鴻臚寺序班女七長適泰寧侯子陳鏞次適都轉運鹽使金逹次適光祿寺卿子井醴次適寧波衛指揮萬全次適行人司副金亮次適昌國衛指揮武銛次適王逈孫男女各二應驤將以某年某月某日與宜人合葬于前嶴山之側前期奉狀以治命來請表其墓公為人慷慨有大志不隨流俗正論毅然不以利害少沮與人交洞見肺腑不立町畦見人患難惻然力援傾囊不惜理有不直者面折不少借其致政也聞朝廷出令之善用人之當則躍然而喜有不便於民者必憂形於色此其為人豈特風鑒一事可稱道哉所著鳯池吟藁符臺外集若干卷贈嘉議大夫户部右侍郎薛公墓表有自無為來者曰薛氏之子傳父逺命曰先公行實願托執事之文以不朽豫憐其用情不以辭按其僚友翁君世資狀公諱能字士能姓薛氏世家廬之無為州有仕元為鎮撫諱景仁公之曾祖也娶李氏有隱士諱舜卿公之祖也娶顧氏考諱祥有智勇知元祚將終必有真主者出歲乙未聞太祖髙皇帝龍飛淮甸慨然提戈集鄉兵歸附已而從征渡江屢獲竒功授水寨管軍鎮撫明年克臺城己亥攻安慶洪武改元為漕運使轉輸軍餉進工部尚書出為北平布政使後罷中書升六部復召為尚書時公已成立隨侍克盡孝敬歲辛酉尚書以事下獄卒公之兄覬坐逮謫戍廣東之海南公倉忙中獨承喪事奉尚書柩啓壙與母夫人賀氏合葬都城之南既襄事扶擕老稚跋涉萬里抵瓊州備嘗艱苦不以為勞顧兄在尺籍乃經營家務以佐之而修德善行不荒僻貧賤易其心嘗扁其齋居曰敬修以見志翰林學士解縉聞而嘉之為作記處他昆弟間友愛篤至交賢士大夫久而益敬命諸子從事詩書嘗戒之曰先君當擾攘之際奮自武功歷官中外活人甚衆而子孫播遷海外庸知造物者非玉成邪汝輩勉之忽一疾不起宣德丙午四月十七日也距生元至正庚子二月四日享年六十有七瓊之儒輩私諡曰靖安處士卜葬于瓊以子逺貴纍贈嘉議大夫戶部右侍郎娶歐陽氏有淑行早卒纍贈淑人繼娶沈氏纍封太淑人佐夫起家一力勤儉既逺登進士第擢戶部主事歷郎中侍郎祿養之餘悉以散之族衆逺數遣人迎養太淑人憚於跋涉第慰逺曰汝雖不在膝下吾心安矣天順二年七月二十七日卒享年八十有四生子男五長繼善次繼隆次繼常次繼升俱早卒次即逺女二長適汪鏞次適訓導唐虔孫男四太淑人訃聞于朝遣官諭祭復敕有司為營葬事逺乞迎新柩合葬故里復給之驛舟以行皆特恩也系以辭曰前有尚書後有侍郎公雖韜晦益振其光靖安之名嘉議之贈公雖云亡孰掩其盛首邱之義子克成之我表其墓百世之思中憲大夫湖廣按察司副使彭公墓表太常少卿兼翰林學士彭君時狀其叔父慎菴先生之行以示賢曰先叔平生存心制行之高不可以無述冀執事為表刻諸墓以示我後人賢固辭弗獲則按狀而書之公諱琉字育敬其先鄱陽人宋哲宗時有諱忠泰者官於吉之安福子孫因家焉代有顯宦若亷訪使仕益轉運使國祥其表表者至諱六有為國子生未釋褐而宋亡遂隱不仕子孫相戒終元之世無顯者公之髙祖祥翁曾祖芳逺祖古清父欽樂皆業儒欽樂用公貴纍贈奉政大夫修正庶尹廣東按察司僉事母李氏纍封太宜人生子六公行三自幼卓秀受業於古亷退山先生蚤有時譽永樂甲午首領鄉薦戊戌春登進士第觀政憲臺時營建京城大臣以公才可集事奏委督起應天諸郡夫役有司服其亷令出無敢後期者吏受賄者置于法夫道亡者當械公以誠感之曰能自首者免於是首者十八九溧水有虞真者素以財力自雄為梗公列其惡狀真計窮而出公曰爾所以安於豐産者皆君上之賜也獨不知報邪真叩首愧服自後無敢亡者明年以山東夫役緩於運木復委公督之令甚嚴衆為公危公如期而還時侍郎李友直統其事嘉公之能而延譽之公之名益著明年冬以親民職重擢公知政和縣御史李宷時巡銀場懼公不容其家人姦利乃文致其罪謫徒沛中公處之泰然自得洪熙改元用薦者授臨清教諭乃作新士習具有程法諸生莫不悅服感激奮勵多底成才公在師席凡三典文衡楊文貞公髙其學行薦升翰林院編修公曰是職不易稱也益力學忘倦雖空匱不恤預修五倫書及宣廟實録同事者服其精勤正統改元賜敕命進文林郎時朝廷留意人材乃簡儒臣學行淳正者十三人授以憲職提督天下學校公與選中升廣東按察司僉事既涖任立教條嚴考課歲歷郡邑開導諸生凡黌舍廢缺者增修二十餘所書籍不備者咸刻而傳之嶺南士風為之丕變科目之盛幾於中州復兼督農桑黜陟官屬奉法不撓人服其公朝廷嘉之賜誥命進奉政大夫修正庶尹尋升山西按察司副使仍理學事景泰初罷提學改任湖廣奉勑贊理廣西軍務公益孜孜盡職不憚勞涉未幾引疾致仕太宜人猶在堂公得奉歡膝下已而居喪營葬一遵家禮處兄弟間尤篤於友愛恆欲相接怡怡如也立義孰以訓子弟暇則徜徉山水間自謂無樂以易之如是者五六年忽疾作不能言舁至正寢精神不亂意欲永訣乃秉筆以書有曰內不見已外不見人又曰保躬全歸始終不移書畢而逝天順戊寅六月二十七日也距生洪武辛未十一月十日享年六十有八配劉氏纍封宜人先公卒側室周氏生子一人晉早卒女三人長適歐陽和次適管驥次適伍瑭晉之卒也無後公命時之仲子頥為之後孫女一卜葬于故里黃牛嶺之陽公為人剛毅嚴肅雖燕居無惰容然孝友忠厚出於天性接人意誠而禮至尤謹於奉祀先塋在四逺者歲躬展省平居言論一出於正義有不合雖小不為所當為者雖違俗忤物為之弗顧也性甘淡薄於書無所不讀為文雄贍追古作者所著有備忘録慎菴等集若干卷藏于家嗚呼天下人物江右為盛而江右世家彭為盛彭之彥公為盛然則公之行顧可使之泯泯無傳哉賢與時同官久知其博雅君子所狀必非過其實者故繁其詞而不殺云贈文林郎江西道監察御史鄭君墓表鄭氏在宋有名綺者浦江人事親至孝臨終誓子孫毋析産乾道中賜號沖素處士子孫世守其訓歷二百四十餘年宋元本朝皆旌其門豫恨不識其子孫有為御史者謁豫告曰佑義門之裔也先君棄世七年矣而墓未有表懼善行之泯焉無聞冀有以白之豫嘗歆慕鄭氏以為有三代之遺風故不以辭按狀君諱沂字景元别號菊軒髙祖季二仕元由省元為參尉自浦江遷常山曽祖朝宗祖辰表皆含章弗耀父德傅以才行薦試事地官出使閩越有能聲未幾以疾求退母程氏昆弟五人君行居四自幼穎敏能詩善書性極孝父在官隨侍不釋至七易寒暑備嘗艱辛而和豫之色不少替與昆弟處怡怡然永樂初家遭多事計資費不能支君恐貽親憂乃極力當之業以不墜嘗總理一區租稅曰吾聞仁人君子惟以濟利為心若掊克朘削者為利已也不知害已隨之矣用是小民感悅相率無後期者至於絶沒田土歲久為豪姦據匿而糧賦纍及小民君慨然白于有司用是免代輸之患後雖遇君之子弟不論疏戚禮意必勤念君之德故也族胤既蕃一門同居逮二千口藹然雍睦無梗訓者有家孰焉恆延師儒合親黨子弟教育之居當水陸之衝凡搢紳官僚經過者必見之君亦欵留竟日夕或辨論古今人物微詞奧旨多出人意毗陵吳公以都給事中出宰常山聞君名往造其廬與語大悅歸謂僚友曰吾於是邑得子羽焉欲以賢良應詔君以親老固辭乃止二親年偕八旬餘康強無恙君别構堂以奉之扁曰怡樂與昆弟子姪朝夕會於堂下捧觴為壽及親沒葬祭一遵朱氏禮復構堂扁曰永思以寓終慕之情尤好施豫見貧乏者濟之患難者恤之孤孽無依者婚嫁之有弗協於家而忿爭者陳大義以感化之去家二里許有溪曰亭潭往來病涉多溺死君為置舟濟之里有王乙遭疫暴尸雖至親懼不敢近君為具棺瘞之凡所行之善多類此伯父景範以富室起實京師君嘗往省焉及卒曰毋苦其後也以子佑代時佑已從學日有造君諭之曰吾聞獨學無友則孤陋寡聞京師文物之淵藪汝往親之卒業焉佑承命而往景泰初遂登進士第擢監察御史君嘗以書勉其忠勤儉慎及佑使蜀便道歸省君曰汝承王命不可久於此吾雖老邁有諸子在無慮也歲甲戌二月八日一疾而逝距生洪武癸酉四月十五日享年六十有二卜葬于江陽奄山之陽天順丁丑以佑貴贈君如其官配王氏先公九年卒贈孺人子男五人長某次某次某某女一適某孫男七人孫女五人嗚呼鄭君力學好善不干仕祿孝友刑于家德惠及于人慶澤衍于後是豈愧于義門之佳子弟哉是為表進賢縣學教諭張先生墓表嗚呼先生棄世在景泰六年十二月十三日距天順三年則四星終矣子滿自上饒至京師謁賢泣且告曰先人屬纊之際顧諸子曰李原德知我平生托其文以表吾墓足矣言畢而逝不肖奉先人遺命以來惟執事有以惠之昔賢方童丱時先生來主鄧庠師席至宣德改元春二月賢始為諸生是歲八月先生以大故去賢受業先生之門才數月而誘引開導方殷自後粗有成立不至于棄才實先生啓之今先生遺命屬賢賢尚何辭按國子學正張淵狀先生諱受字應祥其先河南信陽人曾祖某元末遊宦江西之饒州祖友諒因移家廣信之上饒遂土著焉父明道不樂仕隱居靈溪母李氏洪武甲寅正月二十一日先生生焉自幼穎悟逈出等夷時翰林王欽止師道尊嚴先生往受學焉大肆其力於經史子集乃入郡庠未幾以學成貢入成均得友天下士子聞見益廣有聲搢紳間永樂丁亥召入文淵閣與修大典明年秋闈遂中髙第又明年春闈名在乙榜得晉州儒學訓導丁酉秋浙省禮聘校文鄉闈尋以秩滿調鄧州先生曰晉庠之士非無成效者科目中否則有命焉今以此為功吾可必哉益修教條以盡吾責而已庚子秋復校文於陜右宣德初丁內艱服闋除深州秩滿調溫州十年校文於福建正統戊午校文於河南凡四典文衡皆號得人秩滿考績應遷先生以老疾辭弗允遂升進賢縣學教諭又六載致仕時年七十有七先生器宇魁梧襟懷灑落無斬絶崖岸之行接人和氣溢於言面所至後學多造就如賢之疏鄙亦在門下而春坊庶子周旋禮部侍郎章綸監察御史王福生輩皆其髙第論者以比安定然一官淹至三十年之久豈造物者有所乖歟雖然使先生不一任而躋膴仕則人才出其門者未必若是之盛由此觀之則先生顯晦自不可以尋常之見論也先生壽八十有二配同邑徐氏早卒繼晉州劉氏亦卒男曰真曰觀女適大學生宋福嘉者徐出也男曰滿女一適羅瑛一適童頊一適宋友俊者劉出也孫男曰琦曰瓘曰珙曰顯曰璘曰瓏女六三在室曽孫男女十有四卒之明年八月卜葬邑之雙峯山下是為表古穰集卷十五
