body:
  text: 古穰集卷十一明李賢撰神道碑銘奉天翊衛推誠守正文臣特進光祿大夫柱國兵部尚書靖逺伯追封靖逺侯諡忠毅王公神道碑銘本朝之制文臣不許封爵邑惟有武功者不在令自洪武以來蓋百年於兹矣文臣有武功而封爵邑者始一人焉靖逺伯王公是已嗚呼休哉公諱驥字尚德系出太原先世有宦遊雲中者因家宣寧高祖而上多顯仕曽祖守道祖思宗仕元為高陽令有惠政父成適元季兵亂因徙家束鹿娶程氏生公公自幼警敏年十三入邑庠為諸生即有逺大志未幾父母相繼以沒公哀毁盡禮能自樹立遂領鄉薦登永樂丙戌進士第授兵科給事中尋出使山西見徐溝民困奏免鹽池虧課二十餘萬時應天府缺丞務急且冗委公署之立辦復署行在都察院事持正不撓升山西按察司副使洪熙改元仁廟素知公才召為順天府尹畿甸大治特賜誥以褒之宣廟即位之明年升行在兵部右侍郎時慮南京根本重地真定定州畿內要衝秦蜀二王府護衛兵多兩遣公分調屯駐公皆處之得宜宣德乙卯進兵部尚書先是敵帥阿勒坦多爾濟巴勒軍橫于塞下今皇上即位之明年特遣公往視師許以便宜行事公至見沿邊城堡不堅將無紀律嘆曰邊防如此宜乎敵至翊日大集官兵問曰往年出兵遇敵於魚兒海首先退縮者為誰咸曰都指揮安敬即命左右引出斬之一軍為之股栗又誓於衆曰自今遇敵有不前者罪亦如之號令一新兵威大振既而敵帥巴圖博囉入侵莊浪公即遣都指揮魏榮授以方略率兵𠞰之遂擒其部落以還敵始知懼遁走公閲甘涼軍冗曰兵貴精强乃退其三之一八月還京上慰勞者久之敵聞公還復入侵上復敕公往公至遣大將蔣貴率精騎數千出境且戒曰遇敵不捷無復相見也再遣偏將趙安率兵繼之公與太監魯安都督任禮分兵為殿遂擒阿勒坦俘殺所屬幾盡邊境底寧捷聞上遣人賫金幣勞公加兼大理寺卿明年還京先是雲南麓川宣慰使思任發叛纍征不利辛酉春復以蔣貴率諸道兵往討之仍命公總督軍務賜以明鎧雕弓蟒龍緋袍以壯其行公至聞賊在大候州即遣都指揮馬讓授成算以往斬首數百級餘賊遁去是歲冬分道並進㑹于上江以夾攻之因風縱火斬獲無算賊首父子僅以身免遂蕩平其巢寨捷聞降敕奬勞召公北還時蠻賊韋郎羅造釁於維摩州公遣指揮萬誠先聲率土兵討之賊潰散郎羅逃之安南復傳檄諭之邊人遂斬其首來獻廣南富州土官儂郎舉沈政讎殺十餘年公宣諭朝廷恩威兩讎頓釋至京上親宴于奉天門文武官僚以次陪宴士林榮之論功封公推誠宣力武臣特進榮祿大夫柱國靖逺伯食祿一千二百石特賜誥劵追封三代曽祖考皆如其爵妣皆伯夫人未幾思任發竄入緬甸謀復叛上召公曰勞卿再一行耳公復總諸軍至金齒遣人促緬甸送思任發至軍前緬人佯諾不遣公曰緬人黨賊不可不加兵乃至騰衝分為五營公與蔣貴及都督沭昂分督以進木邦宣慰使統兵萬餘駐於蠻江滸觀我軍容公責以忠義賞以牛酒遂感悅而退緬人擁衆大至公密令貴率兵匝江而下焚其舟數百艘大戰一晝夜賊潰遁去捷聞上召公班師慰勞益厚加祿三百石壬戌秋北敵近邊上復命公出巡仍許便宜行事乃自寧夏抵甘肅凡寨堡烽堠悉增修之仍授邊將以破敵及練士方略事竣還京麓川遺孽思機發思卜發復據孟養以叛戊辰春上復命公總諸軍率兵往討之至金沙江賊於西岸立柵以拒公伐竹為梁麾兵悉渡一鼓破之賊又於鬼哭山巔立柵公與偏將親冒矢石往拔之二孽死於亂兵南服遂寧景泰初都督宫聚征湖貴苗賊失利乃以公佩平蠻將軍印代總其兵遂大破苗賊獲其酋僞稱剗平王苗蟲富檻送京師餘寨悉平振旅而還復增祿一百石子孫世襲尋委公總督守備南京壬申秋以衰老乞間還京天順改元皇上復位思用舊人召公慰諭良久賚以白金文綺顧公精力尚健復拜兵部尚書再閲月兵政漸有次第而公固辭不可强矣上亦念公重違其請令朝朔望復賜誥加號奉天翊衛推誠守正文臣特進光祿大夫禮遇甚厚天順四年五月十一日以疾薨於正寢公天資通敏遇事敢為正色立朝欲以身狥天下每陳國家利害生民休戚辭氣懇切孜孜不已襟懷開爽好賢樂善人有寸美必極口稱道見人材沈滯必拔起任用始終成就之未嘗有德色與人交不立崖岸循循和易雖位兼將相望重纍朝曽無一毫驕矜之意見於顏面體貌清癯風儀俊整尤善談論見者為之􅋏然當大事屹若砥柱之在中流功名事業視前古為無愧矣疾亟家人皆惶懼公曰古人以死為歸何至是邪且對故人大理卿龔水吉敘間闊神思如常客甫出門公就席而逝享年八十有三上聞訃哀悼輟視朝一日祭葬賻儀悉從典禮追封靖逺侯諡忠毅士大夫莫不茹泣相弔公娶張氏纍封伯夫人生子二曰玉瑢俱早卒側室劉氏生子二曰瑺嗣公爵曰珩為勳衛孫男二女二卜以是年七月吉日歸葬於束鹿祖塋之右銘曰天生豪傑作我邦家大其抱負𢎞彼聲華乃若斯人世豈多有乃鳳乃麟出也非偶惟忠毅公間氣所鍾紛紛茅葦挺見孤松早奮於庠入奉廷對羽儀公朝展也無愧歷試繁劇如劒斷犀佐持憲節名震山西召尹京畿畿內安堵二我夏官折衝樽俎進大司馬出巡邊陲斬其怯將大振兵威于甘于涼于彼沙漠矯矯徑敵罔不就縛麓寇弗靖以跳以梁公來督戰如鷹之揚殲厥渠魁蕩其巢穴滇南之境遺患斯絶報功有典迥出羣流河山帶礪與國同休將相之才一代之望壽考哀榮孰與公抗束鹿之原卜此牛眠豐碑有銘百世之傳奉天翊衛推誠宣力武臣特進榮祿大夫柱國南和侯諡忠襄方公神道碑銘公諱瑛字某姓方氏世居滁之全椒曽祖銘洪武中驍將也官至留守衛太平門百户祖信繼以戰功升濟陽衛千户父政永樂中從文皇帝靖難纍功升左軍都督府都督同知洪熙宣德間屢佩將軍印總兵鎮守交趾開平大同正統初進右都督征麓川領兵深入援絶而死追封威逺伯諡忠毅母陳氏繼萬氏俱封夫人公以廕授金吾右衛指揮使論父死事功升都指揮同知麓川賊首思任發自忠毅沒後益肆猖獗辛酉春上命定西伯蔣貴率師討之以公故將子嘗從其父領支兵殺賊有膽氣且熟其鄉道俾與貴同事公以此賊實所不共戴天者自誓必𠞰滅以復父仇師環其境提兵先登一鼓而破之遂平其地還進都指揮使人皆嘆羡以為方氏有子矣壬戌秋復從靖逺伯王驥征貢章沙埧阿嶺諸蠻克之進後軍都督府都督僉事丁卯春朝廷以公勇略兼人命充參將將兵鎮守雲南時賊子思機發復據孟養以叛公自將精兵擊走之獲其妻子象馬而還己巳夏師宗州羅羅賊首黑救番來等為逆公悉捕擒之還京進都督同知賞賚有加景泰初貴州東苗作亂圍平越興隆諸衛復命公將兵與兵部侍郎侯璡往解之遂生縶渠魁斬首無算進充右副總兵廷議以苗賊叛服不常必得名將以鎮之遂進公右都督總兵鎮守貴州明年征香爐山諸寨悉平之復進左都督癸酉冬合四川兵𠞰滅草塘叛寇斬首七千餘級甲戌春大臣有言公之將略堪掌禁兵者乃召公還俾分總五軍營且論其前後平賊之功進封奉天翊衛宣力武臣特進榮祿大夫柱國南和伯食祿一千石子孫世襲給賜誥券追封曽祖銘祖信皆為伯爵曽祖妣某氏祖妣湯氏生母黎氏皆為伯夫人明年專總神機營未幾銅鼓五開諸苗復叛僉謂非公不能靖乃命公佩平蠻將軍印總兵討之公至賊境奬勵諸軍指授方略克平四百餘寨誅擒八千餘衆餘賊屏迹遂留鎮湖廣貴州威德並行苗蠻聞風納欵者甚衆天順改元進封南和侯明年東苗酋長干把猪僭稱僞號據險為患公分兵進𠞰直搗其巢穴破六百餘寨斬首一萬餘級俘獲八千餘人械送干把猪至京斬之又明年出𠞰都勻等處克平二百餘寨擒斬三千餘人惡黨殆盡餘皆竄伏內地悉平議者謂自前平苗之功未有盛於公者朝廷方將論功行賞而公一疾逝矣訃聞上深哀悼輟視朝一日諡曰忠襄祭禮賻儀悉從厚典復命有司為營塜壙公生於永樂丙申某月某日卒於天順庚辰十月二十八日享年四十有五配劉氏封伯夫人子男二長曰毅次曰某窆公於都城西山之陽從吉兆也公天資英邁才識通敏凡古兵法雖皆精曉而行師制敵不祖故常運用之妙恆出人意是以所向克捷嘗疏練兵法及圖諸陳勢以獻上深嘉賞之其待裨將以誠撫士卒以恩接士大夫謙恭而有禮是以上下無不得其歡心者回視古之良將豈多讓哉銘曰赳赳方公出自將門鍾氣之秀迥然不羣帥其父兵庸以自效究厥所存惟忠惟孝既平南徼復殄東苗威震殊方受帝之褒帝曰虎臣孰敢豫侮南顧無憂功邁爾祖左右股肱是託是膺委之重鎮光此中興玉帶貂蟬金書鐵券報公之勳惟帝之眷公本武臣有禮有仁遇彼章縫盎然生春在古或難于今乃見天不憖遺匪常斯變西山之麓有石峩峩有銘在刻千載不磨奉天翊衛宣力武臣特進榮祿大夫柱國南寧伯追封南寧侯諡莊毅毛公神道碑銘將臣子孫能繼前人之烈而益振之以大其功至於都顯爵受重寄者必其才略之過人乃克能之若南寧伯毛公其一焉公諱勝字用欽其先幽薊人曽祖教化在元有功封畿寧王伯父曼濟官至太尉祖父拜布哈中書右丞相父安泰國朝授昭勇將軍指揮使皆用公貴追封南寧伯妣皆伯夫人公天姿剛毅風神俊偉有膽氣善騎射於凡兵書悉通大義宣德辛亥以父廕升都指揮使正統辛酉從征麓川入其境賊酋力招漢伏兵于路公將遊兵覘之射其象馬應手而仆遂敗其衆督船濟江直抵其巢穴走其賊首思任發破寨而還以功升左軍都督府都督僉事明年奉勑充右參將將兵復征麓川公益思自效勇氣當百平其寨柵而縶其黨與前後無算還進都督同知己巳秋大同有警公適以幹當遇敵於道生致數人以歸尋復委公巡視邊城屢敗其衆朝廷嘉其功進左都督復往紫荆倒馬諸關追殺敵衆纍有金帛之賚是歲冬奉敕充左副總兵往征湖廣貴州苗賊凡下百十餘寨賊皆敗散景泰初重安江苗寇復叛總戎者有難色公慨然當之即日以兵壓其境既與敵遇公獨發一矢中其酋而斃餘賊驚潰由是香爐山諸寨苗賊皆望風讋服生擒僞王韋同烈記哥等械送京師斬之西南夷之患遂息壬申夏朝廷委公鎮守雲南金齒騰衝諸處論功封奉天翊衛宣力武臣特進榮祿大夫柱國南寧伯食祿一千石子孫世襲賜以誥券追封三代公在鎮號令雖嚴而御軍撫夷率以仁恕酋長聞風歸嚮無梗化者明年春將兵詣金沙江械賊子思機發送京師又明年冬餘寇刀放革復叛勢甚猖獗公率精兵突至騰衝賊不暇為謀遂生縶刀放革餘衆悉竄伏事聞奬勞有加蓋倚賴方殷而公已遘疾不起矣實天順庚辰八月十四日也享年五十有八訃聞皇上震悼輟視朝一日追封南寧侯諡莊毅遣官諭祭復勑工部為營葬事親王以下皆行祭禮公為人孝友天成遇士大夫有禮謙恭自卑皆出於誠無一毫虛假處宗黨之間上下稱道無異辭平生不事華靡早有大志卒能償之可以謂之將才也已配白氏繼姜氏皆封伯夫人生男曰榮嗣伯爵曰倫錦衣衛指揮使女適都指揮僉事沈英其次男三曰俊曰傑曰信女一俱側室出也孫男二女一榮與諸弟扶櫬自金齒至南京卜葬於靜明山高家庫之原從吉兆也銘曰嗚呼毛公猗將之雄赳赳之資建此武功官以廕升志乃自奮長驅滇南敵無堅陳再征而捷帝曰汝嘉祿秩屢進賚豫頻加惟彼朔方邊塵忽警公往巡之敵迹斯屏苗寇有作屬公徂征一矢中酋諸寨悉平遐邇南夷託公往鎮逺人底寧不煩血刃繼爾前烈益大其聲生有世澤沒有追榮懿此將臣世濟其美堅石有銘終古無毁奉天翊衛宣力武臣特進榮祿大夫柱國東寧伯追封東寧侯諡襄毅焦公神道碑銘公諱禮字尚節山後人曽祖噶沁祖克哷木父巴斯台以公貴贈東寧伯曽祖妣巴約特祖妣庫楚克妣伯特氏俱贈伯夫人公天資雄偉有智略善騎射纍功至通州衛指揮僉事永樂初屢從太宗皇帝北征戰功居多宣德初以遼東密邇諸邊命公往守適與敵遇公當陳生致敵帥和斯巴勒餘皆潰散升指揮使辛卯邊將以公才堪御衆薦升都指揮僉事壬辰以征哨功進都指揮同知威名大振正統辛酉用都督曹義薦升都指揮使壬戌遼東邊事起公率兵禦之獲士馬甚衆癸亥朝廷嘉公之能遣敕命守寧逺乙丑以公多邊功進僉左軍都督府事仍守寧逺丁卯公率兵襲敗敵於境外以奇功升都督同知復有白金綵幣之賚己巳復襲敗敵如丁卯獲馬牛軍器無算敕升右都督充左副總兵白金綵幣之賚甚厚景泰甲戌公復率兵對敵生致渠魁一人獲牛馬尤衆進左都督天順改元英宗皇帝念公久於邊遣敕封奉天翊衛宣力武臣特進榮祿大夫柱國東寧伯食祿一千二百石子孫世襲賜誥券明年召至京師慰勞之陛辭降敕奬諭賜蟒龍衣并甲胄諸物公至鎮感上知遇益竭力邊事未幾以疾卒天順癸未正月十四日也距生洪武壬戌五月五日享年八十有二訃聞上震悼輟視朝一日追封東寧侯諡襄毅遣官諭祭令有司營葬事公配程氏繼劉氏俱封伯夫人子男一曰亮孫男四曰壽嗣封東寧伯曰俊曰傑曰仁孫女三是年五月九日葬於順天府通州祖塋之次公平生尚氣節識大義臨陳奮不顧身善撫士卒人人樂為之用以故所至成功敵人畏之時以比漢之飛將軍銘曰桓桓焦公際我明代展也長城橫亘紫塞公在東鎮帝顧無憂四十餘年礪爾戈矛獻馘之功幕府屢上閫外威名如古飛將帝念公功報典異常金書鐵券垂裕無疆壽考令終邊帥無幾帝恤公亡篤是恩禮勒銘於石百世不刋芳躅偉烈海內式觀特進榮祿大夫征南將軍右軍都督府右都督沐公神道碑銘公諱璘字廷章姓沐氏別號繼軒故開國輔運推誠宣力武臣榮祿大夫柱國追封黔寧王諡昭靖諱英之曽孫西平侯諡惠襄諱春顯忠輔運推誠宣力武臣特進榮祿大夫右柱國太傅追封定逺王諡忠敬諱晟駙馬都尉諱昕之從孫黔國公諡榮康諱斌之從子特進光祿大夫左都督追封定邊伯諡武襄諱昂之孫贈特進榮祿大夫右都督諱僖之子也母顧氏鎮逺侯興祖之女贈夫人公自幼頴敏不凡讀書日記數千百言舉動遵禮如老成人十三喪父十五喪祖及母哀毁盡禮初廕受父武略將軍千户祿朝廷知其賢進襲祖明威將軍指揮僉事正統戊辰時年十有八矣㑹孟養賊孽思機發負固拒命而參將方瑛都督張軏率兵討之公時在行擐甲躍馬掎角進攻賊衆大潰思機發僅以身免孟養遂平朝廷嘉其功遣使賚以白金綵幣進僉雲南都指揮使司事練習戎務雖厖葺獷悍轇轕於前而威令未嘗少阻景泰初榮康薨乃進公同知右軍都督府事總兵繼鎮時多易公少年者後見公下令動中肻綮老將宿校及藩臬舊臣無不凛然凡百廢墜以次修舉而城堡學宮尤加之意汰冗剔蠧撫軍簡僚靖邊足饋德化大行越五年朝廷以思機發尚在屬公殄之衆議欲深入公曰此釡中魚耳安能久乎若我軍深入徒冒崖谷谽谺之險非萬全計也但以大軍壓境振我威武懸重賞於軍中下檄書於緬甸內襲其穴外扼其吭擒之如拉朽耳諸軍校皆曰善已而緬人果餌重賞獲思機發并妻子以出乃檻送於京師朝廷大喜遣使勞公白金綵幣之賚甚厚廣南酋儂𦙍榮叔姪為亂聚至數萬人及木邦陶孟思掯搆兵劫其長公皆遣兵受以成算殲其桀驁而平其地雲南境臨廣西上林安隆有爭占村甲者搆兵久而不息公遣使勸諭之二酋相謂曰我等小夷辱大將軍逺諭遂相讓而罷天順改元皇上念其父祖子孫世篤忠貞俾朝廷無西南憂乃進右都督賜敕嘉奬賚以白金文綺明年六月九日俄以疾薨于鎮距生宣德辛亥四月十八日春秋二十有八滇南僚屬軍民父老相向而哭皆失聲上聞訃震悼罷朝一日遣進士曽瑄營葬諭祭進其弟瓚同知右軍都督府事總兵繼鎮公性端謹恬淡類儒者苞苴不及其門篤信好學尤長於詩工篆籀行草字畫遒徑可人至於揮灑山水圖畫亦臻其妙立五華書屋政暇竟日端坐其中與二三才士講論經史高下古今人物手不釋卷晝不入內室不私近習不耽玩遊每遇節令必延賓僚於所居凝清堂淨香亭諸勝處𢋫和宴樂有古儒將風所著詩文數千篇渾厚典雅追配古人娶鍾氏封夫人生女二俱夭從弟琮嗣封黔國公以是歲十二月十九日葬公於商山普吉村之原從吉兆也己卯冬十月瓚走書至京師曰先兄不幸早亡法得樹碑神道敢請文以信天下後世豫惟高皇帝創業之初其功臣蓋多矣惟昭靖王以懿親元勳奠此南服自是以來傳其子孫兄弟七人皆佩征南將軍印世守其地而又有如公之文武才行可謂不忝其家世者矣固宜永其年繁其後今乃夭而無嗣豈造物者之乖乎乃托其槩於前而系之銘銘曰昔我高皇奄有萬方攀龍附鳳沐氏孔昌惟此滇南實居徼外平而撫之奕世其賴丕顯前烈有美嗣人英年繼鎮號令一新椎髻卉裳罔不向化邊陲帖然事我耕稼齗齗賊孽負險跳梁殲而俘之武功大彰何嗇其齡而絶其嗣於族則繁於才則試文武之藝希世之華碧雞金馬同此無涯峩峩翠珉永昭行實震爾百蠻千古無斁古穰集卷十一
