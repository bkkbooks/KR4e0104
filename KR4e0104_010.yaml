body:
  text: 古穰集巻十明李賢撰神道碑銘特進榮禄大夫右柱國太保成國公追封平隂王諡武愍神道碑銘帝王有天下者必藉武臣運謀宣力以成大業而報功之典未嘗嗇焉有與之誓曰黄河如帶泰山如礪國以永存爰及苗裔望其悠久同休之意何如哉考其子孫不一再傳而國已絶者十常六七非報功之典異也顧其立功有厚薄而子孫之傳亦有久近之不同焉我太祖高皇帝創業功臣不為少矣子孫至今不衰者惟中山黔寧兩王家故存洎夫太宗文皇帝靖難功臣尤盛而元勛上公子孫能繼者亦惟平隂王一門而已王姓朱諱勇字惟貞世家鳳陽之懐逺祖諱亮當元之末天下土崩從高皇帝起兵屢立戰功至武毅將軍燕山中護衛千戶考諱能從文皇帝靖内難功第一封奉天靖難推誠宣力武臣特進榮禄大夫右柱國太子太傅成國公永樂初佩征夷將軍印率師征安南未至沒於軍追封東平王諡武烈詳見楊文貞公所撰碑王幼在醜夷不與凡人伍出就外傅耻公子氣象不為惟淡薄自處與韋布之士同讀書不事章句必求其要領於忠孝之節義利之辨尤致力主師席者為之擊節嘆賞武烈薨之明年遂嗣公爵恭慎益倍無一毫驕態見於言面而敦厚簡靜之譽籍甚文皇帝大異之日加眷注巡狩北京必以自隨命掌都督府事留守南京王握兵訓練有法不怒而威時仁宗昭皇帝監國尤見禮重永樂十八年召至北京二十二年扈從文皇帝北征及昭皇帝繼統眷顧益隆左右股肱不二三人王巋然居其一未幾宣宗章皇帝臨御以王勛舊恩典有加宣德初漢王高煦謀不軌京師震動王密勸親征章皇帝用其䇿兵出近郊忽雷雨大作王知吉兆喜白於上曰天意有在可不戰而克矣遂計日兼行師至其城漢王大驚不意上親征而兵至之速也即日出降罪人旣得乃班師而運贊之功在王居多賚予極厚三年隨章皇帝北征以功加太子太保命總京營兵王益殫心以副委注兵威大振五年王以南北兩京及緣海陜西諸軍京操漕運逺近相乖請以南軍漕運北軍京操緣海陜西諸軍還戍上從之人以為便自是每歲巡邊謁陵必命王綜理留務六年冬王以京營兵分往大同諸路防守者多恐非居重御輕之意上以為然乃命兵部選精兵十萬以益之七年上慮勲臣子孫過於優逸後不堪事自公侯以下皆屬王督練之時宣府諸軍勞民供餉王請屯田以息轉運又請留宣府諸軍之備邊者九年扈從巡邊慨然欲選將士長驅直入以殄之㑹北敵自殘其帥阿魯台部落離散多相率歸順者遂還師十年正月今上皇帝嗣位王宿衛禁闥久之尋命兼知經筵事仍總兵而以為天下雖安不可忘戰復奏選鋭兵四萬以備邊正統改元之秋上敕王敎勲臣子孫王於是親為講解經史大義後多成才者四年授特進榮祿大夫右柱國九年邊報有警王率兵出喜峯口敗敵於富裕川追至熟水川獲人馬駝羊而還以功進太保尋賜蟒龍衣十四年敵帥額森大舉入寇王復帥兵扈從親征還至土黙特不意敵衆來襲進逼宣府上命王提兵四萬以禦之至雞鳴山軍未及陳敵伏四發王遂力戰以死是年八月十三日也距生洪武辛未七月二十二日壽五十有九天順改元上復登大寶重念昔者死事之臣下詔追封平隂王諡武愍命有司治墳於武烈王墓側以爪髪衣冠𦵏焉仍遣官諭祭立碑神道命臣賢撰文以賜之王立朝四十餘年小心謹慎未嘗一日廢朝謁脩幹魁顏虎目虎吻髪髯蝟張望之森然氣欲搏人然寛衣博帯儀若偉儒至待搢紳之流則謙恭自卑和氣可掬遇士類之貧者務在奬濟得所而後已兵士得其撫恤莫不樂為之用凡天文兵法騎射劒槊之藝咸底於精性至孝先王違世時年尚幼居喪哀毁人不能堪而事母尤極榮養嗚呼王於忠孝己用其情俯仰之間可謂無憾者矣配王氏都督官同之女封成國夫人子男二儀嗣公爵佶指揮使女五長適泰寧侯陳瀛次適都督郭震次適彭城伯張瑾次適武功中衛指揮韓銘次幼在室銘曰有廟需梁有身需股賴其力焉孰敢予侮我弓爾張我矛爾揚捐軀之志畢竟以償矯矯平隂元勲之胄克世其勲家聲益茂事我列聖屢効勤勞心膂之寄恒總節旄匪帝私王人惟求舊上公寵榮孰在王右元徳偉烈著於盛時忠孝大節展也無虧惟帝念功聿崇報典堅珉有辭百世不顯奉天靖難推誠宣力武臣特進榮祿大夫柱國太保寧陽侯追封濬國公諡武靖陳公神道碑銘永樂初靖難功臣不下數十人然克享禄位於悠久者鮮矣惟太保寧陽侯陳公歴事五朝出藩入衛凡六十餘年而以令終嗚呼盛哉公諱懋字舜卿鳳陽壽州人高祖萬曽祖福三祖大一俱追封涇國公妣皆涇國夫人父亨從太祖高皇帝定天下以功陞都指揮使洪武三十二年從太宗文皇帝靖内難復以功進都督同知卒贈奉天靖難推誠宣力武臣特進榮祿大夫柱國追封涇國公諡襄敏母韓氏涇國夫人襄敏公三子長恭嗣為都督同知次忠府軍前衛指揮使季即公也器宇宏逺識見超卓尤負膽氣工騎射年弱冠即從父領兵為前行凡壩上廣昌蔚州大同白溝濟南之戰與父同功又禦敵於單橋藁城西寨東平固鎮小河戰尤力累陞右都督永樂初論功行賞進封奉天翊衛宣力武臣特進榮祿大夫柱國寧陽伯食祿一千石子孫世襲賜誥券賚予甚厚六年受詔佩征西將軍印總兵鎮守寧夏賜寶鏹白粲牛羊以為戒嚴之費公至鎮號令一新凡邊人降附者親撫綏之務得其歡心乃已七年選精兵自將大敗之於境外由是敵衆逺遁邊塵為之一清捷聞加封奉天靖難推誠宣力武臣特進榮祿大夫柱國寧陽侯食祿一千三百石子孫世襲復賜誥券及貂蟬冠服錦綺寶鏹八年春上親征北敵公將左掖兵十一年冬還鎮十二年春上復親征公仍將左軍俘馘甚衆明年還鎮十四年夏有報敵帥瑪哈穆特死者公未之信曰是欲懈我邊備也即申飭諸將固守已而敵衆果來見有備而退二十年春上復北征公率所部兵以從還京賜玉帯金綺龍衣且聞公有女賢淑禮聘入宮冊封麗妃尋命歸寧父母賚予駢蕃當世無與為比二十一年詔公統陜西寧夏甘肅三鎮兵出𠞰强敵公率衆直抵賀蘭山所向無前盡收其隊長額森圖罕部落及其牛馬駝羊數萬凱還上大悦寵賚有加二十二年復隨上北征師還以公為殿至京遂領前軍都督府事仁宗皇帝登極以公勲戚有勞加太保復官其長子昭為勲衛宣宗皇帝臨御待公尤厚樂安州之平公領京營兵衛上有功還有金帛人口之賜二年復鎮寧夏三年春奏徙靈州城以便防守四年春得黑白二以進上賜璽書奬諭兼有玉帯龍衣馬圖之賚六年還京十年命佩平羌將軍印移鎮甘肅正綂改元今上皇帝嗣位念公勲戚之舊召還奉朝請十三年冬福建民鄧茂七作亂偽稱閩王勢甚猖獗上曰此賊非老將不能平特命公率師往討之至浙江有欲分兵先守海口者公曰如此是絶其生路則為死冦矣不從明年春師次建寧有欲屠沙尤二縣者公曰如此則益堅賊心矣乃下令諭之俾各復業能斬賊首者官賞與王師同於是降者日衆公曰賊勢已孤無能為也乃五路進兵一鼔而收之凱還賞勞加等命領中軍都督府事尋兼領宗人府事景泰中加太子太師天順改元皇帝復位恩遇益隆固辭宫師許之六年春忽得疾踰秋不能起上言臣老死不足恨惟陛下以生民為念任賢用能以圖太平之治則國家幸甚上覽之惻然曰看卿所奏足見忠誠宜尚加調治以副朕懐久之醫藥弗效遂薨時天順癸未七月十六日也距生洪武乙未二月九日享年八十有五訃聞上震悼輟視朝一日追封濬國公諡曰武靖遣官諭祭加賻及營葬事東宮及諸王亦各致祭公偉觀脩髯語音洪亮胷懷磊落敬禮文士雖位極人臣未嘗妄自尊大而南征北伐口不言功當為中興名將稱首配嚴氏封寧陽侯夫人早卒子男六人長即昭次曰福寧俱早卒次曰晟為勲衛次曰潤次曰瑛次曰昂女五人長適應城伯孫傑次即恭順榮穆麗妃次適東勝右衛指揮使張昭次適府軍左衛指揮使張輪次適都督同知馬良潤等卜以是嵗某月某日與嚴夫人合葬於都城西香山之原銘曰壽有陳宗父子傑特涇公濬公後先開國文皇靖難孰多勲勞涇公輔之首秉節旄奮武桓桓所向披靡大事垂成星殞於壘濬公承之以篤世忠鼔勇前馳涇公是同躍馬揮戈到處喋血乃伯乃侯成此茂烈金符虎節屢鎮邊陲于征于狩無逺不隨閩寇劻勷東南震恐濬公征之遂輯其衆巍巍勲戚歴事五朝龍衣玉帯惟帝之褒壽嘏旣經允顯六紀容與承平宿將無幾煌煌愍冊賁此令終生死哀榮孰如濬公西山嵯峨佳城在側史臣勒銘千載輝赫奉天靖難推誠宣力武臣特進榮祿大夫柱國豐城侯追封茂國公諡剛毅李公神道碑銘公諱彬字文質姓李氏鳳陽定逺人父信善騎射少從太祖高皇帝征伐以戰功累官明威將軍濟川衛指揮僉事後以老疾致仕公方弱齡補父官即如老成人上下交譽之洪武庚午率所部兵從穎國公征北敵歴朶顏鴉兒諸山追襲敵帥阿咱爾實哩至洮兒河獲人馬數十復歴黒嶺寒山諸處至熊皮山追襲敵帥烏梁海時太宗文皇帝居潛邸聞公智勇深嘉賞之明年遣公巡視宣府興河保安隆慶懷來諸邊城尋以公父信為遼東都司都指揮使癸酉命公率兵築宣府徳勝口城巡視邊關明年復命公率兵築萬全懷安城又明年命公率兵征哨泥河營黒松林諸處至哈刺之地乃還敵衆逺遁庚辰文皇帝舉兵靖難命公率兵攻薊州遵化克之以功陞指揮同知又攻雄縣莫州克之陞都指揮僉事復克大寧城又克敵於鄭邨壩克廣昌蔚州大同諸城明年夏於白溝河大戰以功陞都指揮同知進克滄州壬午於滹沱河單橋藁城諸處克敵追至彰徳出哨定州陞右軍都督僉事又於楊村交戰被鎗上命遣醫視之賚予優淳俾還北平公奏曰臣本戰士豈以微傷自餒願隨軍効犬馬之力上不允命輔世子守城癸未命公率兵䕶中宫至京師永樂甲申上以四方旣平乃論功行賞念公之勞居多封奉天靖難推誠宣力武臣特進榮祿大夫柱國豐城侯食祿一千石子孫世襲自是委托益重乙酉命鎮江西丙戌命巡皂君山丁酉命征交趾有功加祿五百石乙亥𠞰平東海倭寇庚子督操江尋命往長沙討賊李法良獲之辛丑命捕福建海寇癸卯命佩征逺前將軍印總兵守甘肅大振軍威敵衆讋服丁未隨駕至京命佩征夷將軍印總兵守交趾逺人莫不仰德畏威南陲晏然在鎮六年以疾卒時永樂二十年正月十五日也交人莫不罷市巷哭其德澤及人深矣訃聞上為之震悼輟視朝一日加賜賻儀追封茂國公諡曰剛毅遣官諭祭復追封三代祖考皆上公妣皆公夫人敕葬宛平縣西安里之原葢四十有四年於今矣配某氏累封公夫人子男四人長曰賢故嗣封豐城侯次曰芳次曰恭次曰禎女二人長適彭旭次適豐潤伯曹義孫男二人長曰勇今嗣封豐城侯次曰鉞孫女二人長適指揮戴瑄次適都督子陳珦嗚呼公以武士遭遇龍飛之運乃能建勲庸胙茅土東征西討迨無寧嵗可謂國之勞臣矣是豈可以不銘輙因勇之請序而銘之銘曰桓桓李公慶時之逢奮武揚威克効其忠統其父兵所向無敵長驅敵場左右搏擊邊塵旣清武備是營飭彼邊城大振軍聲靖難之師惟公義勇奉戴真人不震不悚通侯之爵帝寵是加世澤之延與國無涯公復何心殫其智力奉命周旋曽不少息或鎮邊方或殄强梁意氣之盛泰華軒昂終於炎荒𦵏於畿土史臣勒銘光照千古推誠宣忠翊運武臣特進榮祿大夫柱國㑹昌伯累贈奉天佐理推誠宣力武臣特進光祿大夫右柱國太傅安國公諡恭憲孫公夫人董氏合墳神道碑銘我國家制度文為迥超前古凡勲舊大臣生榮死哀之禮務極詳備至於外戚之賢者待之尤極其厚葢天理人情之至誠不可得已者然亦不多見焉今見太傳安國孫恭憲公一人而已公聖烈慈壽皇太后之父也距薨已八年而夫人董氏卒訃聞宫庭哀悼上輟視朝一日凡白金寶鏹布帛之類祭𦵏之禮率異常例旣襄事復命臣賢為撰合葬神道碑銘用昭公與夫人善行於來世嗚呼休哉公諱忠字主敬姓孫氏世家濟南之鄒平高祖而上代有顯宦曽祖七翁祖復初父士英俱不仕以公貴皆追封㑹昌伯曽祖妣張氏祖妣高氏俱贈夫人妣丁氏封太夫人公自幼端重祖父母尤鍾愛之嘗相謂曰此兒風骨不凡必大吾門者惜吾輩不及見也一日忽患喉腫氣塞舉家驚救無措是夜父夢神人曰上帝鑒汝隂德命吾醫汝兒汝毋恐覺聞公口果有藥香病遂愈嘗與里中羣兒嬉戲公獨自重餘皆呼呵擁䕶見者異之曰此貴兆也稍長知向學乃選入邑庠即力學不怠久之入貢太學聞見益廣洪武己卯擢山西介休簿邑素號難治令丞已為豪横所梗公至凡不率者悉置諸法不旬月政聲大振尋以外艱去服闋調河南永城時營造天壽山陵寢公率邑夫赴工撫恤惟周他邑夫多亡去公所部者俱存督理總戎嘉其能召與計事凡所需悉以委公事竣内補鴻臚序班時宣廟為皇太孫將議婚仁宗昭皇后之母太夫人知公第四女有淑德太宗文皇帝特遣彭城伯張㫤奉太夫人之永城選至京立為皇太孫妃洎宣廟踐阼冊為貴妃陞公驃騎將軍中軍都督府都督僉事賜宴并錦袍犀帯宣徳丁未今上皇帝誕生冊貴妃為皇后越三年進封公推誠宣忠翊運武臣特進榮祿大夫柱國㑹昌伯食祿千石子孫世襲復賜誥券追封三代遣公還家燎黄以中官隨行仍幸其第慰問甚至未幾太夫人卒公乞奔喪復遣中官督葬事又嘗念公居第湫隘欲命工撤而新之公懇辭曰自臣視之已為寛矣勞人費財非臣所安也遂止公嘗語諸子曰吾家幸居戚里富貴已極爾等宜知止足庶足以保名位諸子奉教惟謹公天性樂善好義鄉人有鰥而謫戍者賙之不倦及卒葬以地有罷職而不能舉喪者助之棺衾而恤其家有受誣而謫戍者力為伸雪薦用之有左遷嶺廣囊無一錢者贐以金有坐受賕而貧無貸者為償以其數有遺女無依者備妝奩以嫁有罷爵乞腴田者推以與之有蒼頭詐取人財者代償而遣之歸凡善行不可勝紀忽疾作朝廷命醫往治不效疾亟謂諸子曰吾起寒微不自意姻㜕戚畹身都顯爵實出望外奈何起家難保家不易汝輩勉之言畢而逝在景泰三年九月十七日距生洪武元年七月三日享年八十有五朝廷聞訃敕有司營𦵏於宛平縣西香山之原追封㑹昌侯諡康靖天順改元皇上復位首念公復追封奉天佐理推誠宣力武臣特進光祿大夫右柱國太傅安國公改諡恭憲夫人董氏加封安國夫人夫人諱元貞公同邑人父彥恭母齊氏皆邑之好善家夫人自幼莊重寡言旣笄歸公闔家宜之及公為邑庠生夫人同其清苦佐以勤儉公歴邑簿夫人與俱凡服御如韋布妻未嘗有所増益有饋物者必嚴拒之用是公有冰蘖聲而夫人家範益肅旣封夫人常被召入内小心慎密未嘗一語及外事出則未嘗一語及内事雖賚予駢蕃若不與者凡公賙貧恤孤施予之際夫人未嘗不極力贊之至於兩嫁孤女夫人之力尤多而待婣族御僮婢一于恩惠每遇嵗時集子孫于前諄諄戒諭謂貴而能謙富而好禮乃處已良法公没之後有欲以烈禍中公家者事勢洶洶夫人教諸子靜以守之卒消其變天順以來夫人壽益高福益備子孫益盛而朝廷篤念外戚之意益厚一門榮顯前代無比已而遘疾上命醫往治遣中官問安相屬於道旣愈復作至彌留乃召諸子囑之與公治命一同夫人生於洪武二年七月十七日卒天順四年四月四日享年九十有二卜以是歲五月十五日啓公之竁而合葬焉子男五人長繼宗嗣㑹昌伯以翊戴功封侯次紹宗顯宗俱都指揮同知次續宗都指揮僉事次純宗錦衣衛指揮僉事女九人皇太后居四長早卒次適陳禮次適張雄次適王希用次適光祿寺丞朱璽次適朱能餘在室孫男十人璉錦衣衛指揮僉事瓚珍玹璘理瓏瑀瑛俱錦衣衛千户孫女十人八適人餘幼曽孫男六人女四人為之銘曰戚里之貴歴世攸崇夷考其行鮮克令終惟恭憲公迥出倫類㦤美夫人德罔不偹篤生聖母永祚邦家惟功之盛浩浩無涯公復何心汲汲行善賙貧恤孤曽不少倦夫人之志惟公是同一念之善樂之無窮自天祐之吉元不利慶鍾一門天也何意金蘭玊樹盈于庭階簮組輝耀惟義是諧公目雖暝公心則慰厚澤綿綿雲仍曷旣恩典之隆曠世之逢用全始終式昭至公峨峨翠珉刻銘載實億萬斯年安此泉室恭順侯追封涼國公諡忠壯吳公神道碑銘天順辛巳逆賊曹欽謀為不軌潛俟七月二日早朝入内為亂恭順侯吳公先於是夜一鼔聞之即與其弟廣義伯琮約總兵懐寧伯孫鏜走詣長安門告變於是禁門不啓賊計遂窮舉火燒禁門公等率兵𠞰殺奮不顧身賊雖誅滅公已捐軀矣嗚呼先機告變公之忠也殺賊喪元公之勇也然則逆賊之敗豈非公之功乎皇上聞公之沒哀悼殊深輟視朝一日追封涼國公諡忠壯凡祕器諭祭賻儀之類悉從厚典復命有司為營塜壙以安葬之葢痛念勲戚之臣為社稷而死故報功之典倍蓰尋常也旣而琮詣予泣且告曰先兄不幸沒於鋒鏑兹欲立石墓前以白於世非先生之文不可辭弗獲按通政司參議趙君昂之狀公諱瑾字廷璋其先西涼人祖諱允誠永樂中累以戰功封恭順伯父諱克忠嗣伯爵洪熙初以戚里恩進封恭順侯正統甲子以征敵功加太子太保己巳秋禦敵北邊力戰而死追封邠國公諡壯勇母楊氏封邠國夫人叔父克勤官至左軍都督府左都督亦同兄沒於陣追封遵化伯諡僖敏公生而英鋭襟度爽闓親賢好善未嘗以門第驕人以故搢紳士大夫樂與之㳺相與議論古今講說道義而公頗能識其㫖趣尤閑武藝精騎射方其父叔禦敵之際公亦在陣中發矢射敵洎父叔矢盡而亡公始就執其酋長念公忠義之後釋之乃還京遂嗣父爵天順改元皇上復位公以勲戚隨侍應對稱㫖自是日備顧問賚予甚厚尋命理左軍都督府事公益感激夙夜效勤一旦遭變委身則其允蹈忠義視乃父乃叔為無愧矣公生於永樂癸巳十二月一日享年四十有九配李氏故㑹寧伯之女有淑行封侯夫人生子男三長曰鑑次曰鏞次曰錫女一適指揮使劉王琮嗣廣義伯遵化公之子卜以是年八月某日葬公於順天府房山縣之新莊從先兆也銘曰世祿之家忠義無幾有若吳門展也無比彼美忠壯虎視耽耽遵化之姪邠公之男忠以捐軀壯以禦侮相繼如歸光照中土飭終追榮惟帝之恩匪帝之私惟以報勲闃矣泉宮西山之麓秘器旅陳穹碑載陸仁者有後公則成仁銘以貞之何千萬春古穰集巻十
